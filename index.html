// ─── DAM ─────────────────────────────────────────────────────────
const DAM_KEY="manabi_dam_v3";
const DAM_MAX=60;
const DAM_BATCH=5;
const getDam=()=>{try{return JSON.parse(localStorage.getItem(DAM_KEY)||"{}");}catch(e){return{};}};
const saveDam=d=>{try{localStorage.setItem(DAM_KEY,JSON.stringify(d));}catch(e){}};
// 重複判定キー: 問題全文 + 誤答 + 正答 を連結。
// question.slice(0,30) だけだと「次の計算をしましょう」等の固定頭で衝突するため、
// 内容の差異（数値・答え）まで含めた複合キーで同一問題を識別する。
const dupKey=q=>`${(q.question||"")}|${(q.student_answer||"")}|${(q.correct_answer||"")}`;
const addToDam=(subj,qs)=>{const dam=getDam(),ex=dam[subj]||[];const keys=new Set(ex.map(dupKey));dam[subj]=[...ex,...qs.filter(q=>!keys.has(dupKey(q)))].slice(-DAM_MAX);saveDam(dam);};
// 復習問題はストックの「先頭」に挿入して優先使用されるようにする
const addToDamFront=(subj,qs)=>{const dam=getDam(),ex=dam[subj]||[];const keys=new Set(ex.map(dupKey));const fresh=qs.filter(q=>!keys.has(dupKey(q)));if(!fresh.length)return;dam[subj]=[...fresh,...ex].slice(0,DAM_MAX);saveDam(dam);};
const popFromDam=(subj,n=1)=>{const dam=getDam(),b=dam[subj]||[];if(!b.length)return[];
  const take=Math.min(n,b.length);const r=b.slice(0,take);
  dam[subj]=b.slice(take);saveDam(dam);return r;};
const getDamStats=(subjects=SUBJECTS)=>subjects.reduce((a,s)=>({...a,[s]:(getDam()[s]||[]).length}),{});
const getDamTotal=(subjects=SUBJECTS)=>subjects.reduce((t,s)=>t+(getDam()[s]||[]).length,0);
const lowestBuckets=(n=1,subjects=SUBJECTS)=>{const dam=getDam();return subjects.map(s=>({subj:s,cnt:(dam[s]||[]).length})).sort((a,b)=>a.cnt-b.cnt).slice(0,n);};

// ─── STEP SHUFFLE ─────────────────────────────────────────────────
const shuffleStep=step=>{
  const origAnswer=typeof step.answer==="number"&&step.answer>=0&&step.answer<step.choices.length?step.answer:0;
  const ix=step.choices.map((c,i)=>({c,i}));
  for(let i=ix.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]];}
  const newAnswer=ix.findIndex(x=>x.i===origAnswer);
  return{...step,choices:ix.map(x=>x.c),answer:newAnswer>=0?newAnswer:0};
};
const shuffleAllSteps=q=>({

};

// ─── バリデーション（構造チェック＋意味チェック＋「1箇所だけ違う」ヒューリスティックの3層） ───
const VALID_SUBJECTS=new Set(["国語","算数","英語","社会","理科"]);
// 外部ビジュアルへの参照が明確なパターン（図形・年表・発表など正当な語は除外）
const VISUAL_REF_RE=/グラフ|地図|イラスト|[次下右左上]の図|図を見|[次下右左上]の表|表を見/;
// 並び順依存の禁止表現（プロンプトルール「上記の全て」等）
const META_CHOICE_RE=/上記の全て|以上の全て|全て正しい|全て誤り/;

// ── 「1箇所だけ違う」ヒューリスティック ─────────────────────────────
// 目的：「完全別解・桁崩壊・複数箇所ズレ」を落とす。判定できない場合は通す（false負より false正を避ける）
// 簡易 Levenshtein（short string 向け、O(n*m)）
const levenshtein=(a,b)=>{
  if(a===b)return 0;
  const m=a.length,n=b.length;
  if(m===0)return n;if(n===0)return m;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
};

// 「明らかに複数箇所ズレている」かを判定。true = 怪しいので落とす
const looksMultipleErrors=(sa,ca)=>{
  const a=sa.trim(),b=ca.trim();
  const la=a.length,lb=b.length;

  // ① 長さ比チェック：長い方が短い方の2倍以上 → 桁崩壊・完全別解
  //    minLen=1 は除外（「0」→「10」など1箇所変化として正当）
  const minLen=Math.min(la,lb);
  if(minLen>1&&Math.max(la,lb)/minLen>=2.0)return true;

  // ② 短い回答（≤8文字）: Levenshteinで判定しない
  //    「Paris→London」「123→456」など1語まるごと置換も正当な1箇所ズレ
  if(la<=8&&lb<=8)return false;

  // ③ 中程度（9〜30文字）: 文字bigram の Jaccard距離で判定
  //    2文字n-gramの共通割合が 0.30 未満 → ほぼ別物
  if(la<=30&&lb<=30){
    const bigrams=s=>{const r=new Set();for(let i=0;i<s.length-1;i++)r.add(s.slice(i,i+2));return r;};
    const ba=bigrams(a),bb=bigrams(b);
    const inter=[...ba].filter(g=>bb.has(g)).length;
    const union=new Set([...ba,...bb]).size;
    if(union>0&&inter/union<0.30)return true;
    return false;
  }

  // ④ 長い回答（>30文字）: トークン差分
  //    読点・スペース等で分割したトークンが両側3つ以上不一致 → 複数箇所
  const tokenize=s=>s.split(/[\s、。，．,.\-・]+/).filter(Boolean);
  const ta=new Set(tokenize(a)),tb=new Set(tokenize(b));
  const onlyInA=[...ta].filter(t=>!tb.has(t));
  const onlyInB=[...tb].filter(t=>!ta.has(t));
  if(onlyInA.length>=3&&onlyInB.length>=3)return true;
  return false;
};

const localValidate=q=>{
  if(!q||typeof q!=="object")return false;

  // ── 構造チェック ───────────────────────────────────────
  // 必須フィールドが存在し非空文字列であること
  const req=["question","student_answer","correct_answer","correct_feedback","mistake_type","topic_tag","subject"];
  if(req.some(k=>!q[k]||typeof q[k]!=="string"||!q[k].trim()))return false;
  // 問題文の文字数（プロンプト指定200文字、多少の余裕を持たせる）
  if(q.question.length>300)return false;

  // ── 意味チェック ───────────────────────────────────────
  // 誤答と正答が同一→間違い問題として成立しない
  if(q.student_answer.trim()===q.correct_answer.trim())return false;
  // 科目が既知の5科目以外→subject フィールドのハルシネーション
  if(!VALID_SUBJECTS.has(q.subject.trim()))return false;
  // 問題文に外部ビジュアルへの参照がある→テキストだけで解けない
  if(VISUAL_REF_RE.test(q.question))return false;
  // 「1箇所だけ違う」ヒューリスティック：明らかに複数箇所ズレていれば落とす
  if(looksMultipleErrors(q.student_answer,q.correct_answer))return false;

  // ── analysis_step1〜3 ────────────────────────────────
  for(let i=1;i<=3;i++){
    const s=q[`analysis_step${i}`];
    if(!s||typeof s!=="object")return false;
    if(!s.question||typeof s.question!=="string"||!s.question.trim())return false;
    if(!Array.isArray(s.choices)||s.choices.length!==4)return false;
    if(s.choices.some(c=>!c||typeof c!=="string"||!c.trim()))return false;
    // answer は 0〜3 の整数
    if(typeof s.answer!=="number"||!Number.isInteger(s.answer)||s.answer<0||s.answer>3)return false;
    if(!s.feedback||typeof s.feedback!=="string"||!s.feedback.trim())return false;
    // 選択肢100文字以内（プロンプト指定）
    if(s.choices.some(c=>c.length>100))return false;
    // 選択肢内に重複がある→「正解は1つ」が保証できない
    if(new Set(s.choices.map(c=>c.trim())).size!==4)return false;
    // 並び順依存の禁止表現が含まれる
    if(s.choices.some(c=>META_CHOICE_RE.test(c)))return false;
  }
  return true;
};

const calcRecent100=h=>{if(!h||!h.length)return null;const last=h.slice(-100),c=last.filter(r=>r.correct).length;return{rate:Math.round(c/last.length*100),count:last.length};};
const calcSubjRates=h=>{if(!h||!h.length)return{};const m={};for(const r of h.slice(-100)){if(!m[r.subject])m[r.subject]={q:0,c:0};m[r.subject].q++;if(r.correct)m[r.subject].c++;}return m;};

// ─── 当日スコア計算（コンボ×1.82、100点上限） ──────────────────────
const calcTodayScore=h=>{
  const td=today();
  const entries=(h||[]).filter(r=>r.date===td);
  let combo=0,score=0;
  for(const e of entries){if(e.correct){combo+=1;score+=combo*1.82;}else{combo=0;}}
  return{score:Math.min(100,Math.floor(score*10)/10),combo};
};
const calcNextScore=(score,combo)=>Math.min(100,Math.floor((score+(combo+1)*1.82)*10)/10);

// ─── AnalysisPanel ───────────────────────────────────────────────
// quiz / analysisStep / stepAns が変わらない限り再レンダーしない
const AnalysisPanel=React.memo(({quiz,analysisStep,stepAns,stepResults,currentStep,stageClr,stageIcon,onAnswer,onNext,onReport,currentReviewItemId,setLogs,saveLogs,isReview,isNorma,todaySess})=>{
  if(!quiz||!analysisStep)return null;
  const ModeBanner=()=>{
    if(isReview) return(
      <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📝</span>
        <div>
          <div style={{fontSize:12,fontWeight:900,color:"#92400e"}}>復習問題</div>
          <div style={{fontSize:11,color:"#78350f"}}>以前まちがえた問題に再チャレンジ！</div>
        </div>
      </div>
    );
    if(isNorma) return(
      <div style={{background:"linear-gradient(135deg,#ede9ff,#ddd6fe)",border:"1.5px solid #a78bfa",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🎯</span>
        <div>
          <div style={{fontSize:12,fontWeight:900,color:"#5b3ff8"}}>ノルマ問題 {todaySess+1} / 3</div>
          <div style={{fontSize:11,color:"#4c1d95"}}>3問クリアでノルマ達成！</div>
        </div>
      </div>
    );
    return null;
  };
  if(analysisStep!=="done"&&currentStep){
    return(
      <div className="an-card">
        <ModeBanner/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:900,color:"#5b3ff8",letterSpacing:".04em"}}>🔍 誤答分析チャレンジ</div>
          <span style={{fontSize:12,fontWeight:800,color:"#9990cc"}}>{analysisStep} / 3</span>
        </div>
        <div className="an-qbox">
          <div className="an-qbox-label">📌 問題</div>
          <div className="an-qbox-text">{quiz.question}</div>
        </div>
        <div className="an-wrong">
          <div className="an-wrong-label">❌ ある生徒の答え</div>
          <div className="an-wrong-text">「{quiz.student_answer}」</div>
        </div>
        <div className={`an-stage ${stageClr[analysisStep-1]}`}>
          {stageIcon[analysisStep-1]} {currentStep.name}
        </div>
        <div className="an-q">{currentStep.question}</div>
        {currentStep.choices.map((c,i)=>{
          let cls="an-choice";
          if(stepAns!==null){if(i===currentStep.answer)cls+=" correct";else if(i===stepAns)cls+=" wrong";else cls+=" dim";}
          return(
            <button key={i} className={cls} onClick={()=>onAnswer(i)} disabled={stepAns!==null}>
              <span className="an-num">{i+1}</span>{c}
            </button>
          );
        })}
        {stepAns!==null&&(
          <React.Fragment>
            <div className="an-fb">
              <strong style={{color:stepAns===currentStep.answer?"#059669":"#dc2626"}}>{stepAns===currentStep.answer?"✓ 正確に特定！":"✗ ここに注目しよう"}</strong><br/>
              {currentStep.feedback}
            </div>
            <button className="an-next" onClick={onNext}>
              {analysisStep<3?`次のステップへ（${analysisStep+1}/3）→`:"結果を見る ✨"}
            </button>
          </React.Fragment>
        )}
      </div>
    );
  }
  if(analysisStep==="done"){
    const sc=stepResults.filter(Boolean).length;
    return(
      <div className="an-card">
        <ModeBanner/>
        <div className="an-complete">
          <span className="an-complete-icon">{sc===3?"🧠":sc===2?"🌟":sc===1?"🌱":"😅"}</span>
          <div style={{fontSize:21,fontWeight:900,color:"#1e1e3a",marginBottom:4}}>
            {sc===3?"完璧な分析！":sc===2?"惜しい！もう少し！":sc===1?"もう一息！":"まだまだ伸びしろあり！"}
          </div>
          <div style={{fontSize:13,color:"#7c6fb0",marginBottom:8}}>
            {sc===3?"3問全問正解！すばらしい思考力だね 🎉":sc===2?"2問正解！あと1問で完璧だったよ 🎯":sc===1?"1問正解！次は3問全問を目指そう 🌱":"難しかったね。次こそ一緒に考えよう 💪"}
          </div>
          <div style={{fontSize:11,color:"#bbb",marginBottom:12}}>{sc} / 3 ステップ正解</div>
          <div className="an-score-row">
            {stepResults.map((r,i)=><div key={i} className={`an-score-dot ${r?"ok":"ng"}`}>{r?"✓":"✗"}</div>)}
          </div>
          <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"12px 16px",marginBottom:12,textAlign:"left"}}>
            <div style={{fontSize:11,fontWeight:900,color:"#16a34a",marginBottom:4}}>✅ 正解</div>
            <div style={{fontSize:16,fontWeight:800,color:"#166534"}}>{quiz.correct_answer}</div>
            <div style={{fontSize:12,color:"#166534",marginTop:6,lineHeight:1.65}}>{quiz.correct_feedback}</div>
          </div>
          {quiz.mistake_type&&quiz.mistake_type!=="不明"&&(
            <div style={{background:"#f0edff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"10px 14px",marginBottom:12,textAlign:"left"}}>
              <div style={{fontSize:10,fontWeight:900,color:"#7c6fb0",marginBottom:4,letterSpacing:".04em"}}>💡 この間違いのポイント</div>
              <div style={{fontSize:13,fontWeight:700,color:"#4c1d95"}}>{quiz.mistake_type}</div>
            </div>
          )}

        </div>
        <button className="btn-green" style={{marginBottom:8}} onClick={onNext}>次の問題へ →</button>
        <button className="report-btn" onClick={onReport}>⚠️ この問題の内容がおかしい</button>
      </div>
    );
  }
  return null;
});

  const [waitingForStock,setWaitingForStock]=useState(null); // null | 科目名
  const waitingForStockR=useRef(null);
  useEffect(()=>{waitingForStockR.current=waitingForStock;},[waitingForStock]);
  // polling 無効化トークン。setWaitingForStock を呼ぶ直前にインクリメントすることで、
  // React commit 遅延に依らず次の tick を即キャンセルできる。
  const pollingCancelRef=useRef(0);

  useEffect(()=>{autoRefillR.current=autoRefill;try{localStorage.setItem("manabi_autorefill",JSON.stringify(autoRefill));}catch(e){};},[autoRefill]);

  // ストック待機中: 補充されたら自動で問題を表示（全科目チェック、あればズレて出題）
  useEffect(()=>{
    if(!waitingForStock)return;
    // 科目・学年・トークンをeffect起動時にスナップショット固定。
    // pollingCancelRef は setWaitingForStock を呼ぶ直前に必ずインクリメントされるため、
    // React commit 遅延に依らず次の tick で即キャンセルできる。
    const snapshotSubj=waitingForStock;
    const currentGrade=gradeR.current;
    const myToken=pollingCancelRef.current; // 自分のトークン番号を記憶
    const timer=setInterval(()=>{

      if(nextLk.current||fetchLk.current)return;

      for(const s of [snapshotSubj,...subs.filter(x=>x!==snapshotSubj)]){

          pollingCancelRef.current++; // 自分を含む旧tickを全て無効化してからsetState

          if(s!==snapshotSubj){setSubject(s);setIsReview(false);setSubjectSlideMsg(`📦 ${displaySubject(snapshotSubj,currentGrade)}のストックがなかったため、${displaySubject(s,currentGrade)}に切り替えました`);setTimeout(()=>setSubjectSlideMsg(""),3500);}
          // 復習待機中に問題が来てもキュー削除はしない（分析完了後にIDで削除）
          setQuiz(q[0]);
          setDamStats(getDamStats(subs));

        }
      }
    },3000);

  },[waitingForStock]);

  // ── 誤答分析ステート（フラット） ──
  const [analysisStep,setAnalysisStep]=useState(null); // null | 1 | 2 | 3 | "done"
  const [stepAns,setStepAns]=useState(null);
  const [stepResults,setStepResults]=useState([null,null,null]);
  const stepResultsR=useRef([null,null,null]);

  const logsR=useRef(logs);const gsR=useRef(gs);const subjR=useRef(subject);
  const keysR=useRef(apiKeys);const gradeR=useRef(grade);const bdR=useRef(birthday);
  const refillLk=useRef(false);const fetchLk=useRef(false);const nextLk=useRef(false);const reqId=useRef(null);

  useEffect(()=>{logsR.current=logs;},[logs]);
  useEffect(()=>{gsR.current=gs;},[gs]);
  useEffect(()=>{subjR.current=subject;},[subject]);
  useEffect(()=>{keysR.current=apiKeys;},[apiKeys]);
  useEffect(()=>{gradeR.current=grade;},[grade]);
  useEffect(()=>{bdR.current=birthday;},[birthday]);
  useEffect(()=>{normaQueueR.current=normaQueue;},[normaQueue]);
  useEffect(()=>{try{localStorage.setItem(SESS,JSON.stringify({...gs,savedDate:today()}));}catch(e){}},[gs]);
  // ノルマ達成バナー
  useEffect(()=>{
    const cur=logs.dailyLog?.[today()]?.sessions||0;
    if(cur>=3&&prevSessionsRef.current<3&&prevSessionsRef.current>=0){
      setShowNormaBanner(true);setTimeout(()=>setShowNormaBanner(false),3500);
    }
    prevSessionsRef.current=cur;
  },[logs]);

  // ⑦ ウェルカムバック（app画面に入ったとき）
  useEffect(()=>{
    if(screen!=="app"||welcomeShownRef.current)return;
    welcomeShownRef.current=true;
    const yk=jstYesterday();
    const yl=logsR.current.dailyLog?.[yk];
    if(yl&&yl.q>0){
      const subjs=(yl.subjects||[]).map(s=>displaySubject(s,grade)).join("・");
      const msg=subjs?`昨日は${subjs}を${yl.q}問頑張ったね！今日もいこう ✨`:`昨日は${yl.q}問頑張ったね！今日もいこう ✨`;
      setWelcomeMsg(msg);
      setTimeout(()=>setWelcomeMsg(""),4000);
    }
  },[screen]);

  // ⑨ 苦手科目改善検知
  useEffect(()=>{
    const rates=calcSubjRates(logs.recentHistory);
    const prev=prevRatesRef.current;
    for(const s of subjectsR.current){
      const r=rates[s];const p=prev[s];
      if(r&&r.q>=5&&p&&p.q>=5){
        const pr=p.c/p.q;const cr=r.c/r.q;
        if(pr<0.5&&cr>=0.5){
          setSubjectImprovedMsg(`📈 ${displaySubject(s,gradeR.current)}の正解率が${Math.round(pr*100)}%→${Math.round(cr*100)}%にアップ！`);
          setTimeout(()=>setSubjectImprovedMsg(""),4500);
        }
      }
    }
    prevRatesRef.current=rates;
  },[logs]);

  // quiz がセットされたら分析を自動スタート
  useEffect(()=>{
    if(!quiz)return;
    if(hasValidAnalysis(quiz)){
      setAnalysisStep(1);
      setStepAns(null);
      setStepResults([null,null,null]);
    }
  },[quiz]);

  useEffect(()=>{
    try{
      const p=localStorage.getItem(PROF);
      if(p){const d=JSON.parse(p);setBirthday(d.birthday||"");setGrade(calcGrade(d.birthday||""));if(d.apiKeys&&Array.isArray(d.apiKeys))setApiKeys(d.apiKeys);else if(d.apiKey)setApiKeys([d.apiKey,"","",""]);}
      const s=localStorage.getItem(SESS);
      if(s){const p2=JSON.parse(s);if(p2.savedDate===today())setGs(p2);else setGs(prev=>({...prev,streak:p2.streak||0,best:prev.best||0,wrong:0,qNum:1}));}
    }catch(e){}
    loadLogs();setDamStats(getDamStats(subjectsR.current));

  // ─── 旧データの "数学" → 内部キー "算数" 正規化 ────────────────────
  // loadLogs / importData でロード直後に呼ぶ。in-memory を常にクリーンに保つ。
  const normalizeSubjectsInLogs=logs=>{
    const out={...logs};
    // reviewQueue: 科目正規化 + idなし旧エントリに id を補完
    // id がないと updateAnalysisStats の topic fallback 削除が誤爆するため、
    // ロード時に一括で id を付与して id ベース削除に一本化する。
    if(Array.isArray(out.reviewQueue)){
      out.reviewQueue=out.reviewQueue.map(q=>{
        const normalized=q.subject==="数学"?{...q,subject:"算数"}:q;
        return normalized.id?normalized:{...normalized,id:crypto.randomUUID()};
      });
    }
    // debugHistory
    if(Array.isArray(out.debugHistory)){
      out.debugHistory=out.debugHistory.map(h=>
        h.subj==="数学"?{...h,subj:"算数"}:h
      );
    }
    // recentHistory
    if(Array.isArray(out.recentHistory)){
      out.recentHistory=out.recentHistory.map(r=>
        r.subject==="数学"?{...r,subject:"算数"}:r
      );
    }
    // subjectStats: "数学" キーがあれば "算数" にマージして削除
    if(out.subjectStats?.["数学"]){
      const m=out.subjectStats["数学"];
      const a=out.subjectStats["算数"]||{q:0,c:0};
      out.subjectStats={...out.subjectStats,"算数":{q:a.q+m.q,c:a.c+m.c}};
      delete out.subjectStats["数学"];
    }
    // dailyLog の subjects 配列
    if(out.dailyLog){
      const dl={};
      for(const [k,v] of Object.entries(out.dailyLog)){
        dl[k]=Array.isArray(v.subjects)
          ?{...v,subjects:v.subjects.map(s=>s==="数学"?"算数":s)}
          :v;
      }
      out.dailyLog=dl;
    }
    return out;
  };

  // ─── localStorage 肥大化防止 ──────────────────────────────────────
  // 保存前に呼ぶ。in-memory の state は触らず、書き込み用オブジェクトだけ刈る。
  const pruneLogs=nl=>{
    const out={...nl};
    // topicMastery: LLM生成キーが無限増殖するため300件上限
    // attempts が少ない（＝ほぼ触っていない）エントリから削除
    const tm={...(out.topicMastery||{})};
    const tmKeys=Object.keys(tm);
    if(tmKeys.length>300){
      tmKeys.sort((a,b)=>(tm[a].attempts||0)-(tm[b].attempts||0));
      tmKeys.slice(0,tmKeys.length-300).forEach(k=>delete tm[k]);
      out.topicMastery=tm;
    }
    // dailyLog: 1日1エントリで永続増殖するため365日上限
    // キーが "YYYY-MM-DD" 形式なので辞書順ソート＝日付順
    const dl={...(out.dailyLog||{})};
    const dlKeys=Object.keys(dl).sort();
    if(dlKeys.length>365){
      dlKeys.slice(0,dlKeys.length-365).forEach(k=>delete dl[k]);
      out.dailyLog=dl;
    }
    return out;
  };

  const loadLogs=()=>{
    try{
      const r=localStorage.getItem(STORE);
      if(r){
        const p=JSON.parse(r);
        if(!p.debugStats)p.debugStats={completed:0,perfect:0};
        if(!p.topicMastery)p.topicMastery={};
        if(!p.debugHistory)p.debugHistory=[];
        if(!p.bestLoginStreak)p.bestLoginStreak=0;
        if(!p.bestDayScore)p.bestDayScore=0;
        const td=today();
        const yk2=jstYesterday();
        const isGap=p.lastLogin&&p.lastLogin!==td&&p.lastLogin!==yk2;
        if(!isGap&&p.loginStreak>=2&&p.lastLogin!==td){setShowLoginBonus(true);setTimeout(()=>setShowLoginBonus(false),3500);}
        // ⑪ 1日以上空いた場合の休み明けメッセージ（loginBonusと排他）
        if(isGap){setShowRestartMsg(true);setTimeout(()=>setShowRestartMsg(false),5000);}
        setLogs(normalizeSubjectsInLogs(p));
      }

  const saveLogs=nl=>{try{localStorage.setItem(STORE,JSON.stringify(pruneLogs(nl)));}catch(e){}};

  const checkBadges=(next)=>{

  };

  const updateLogs=useCallback((correct,subj,wrongItem,newBest)=>{
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));const td=today();
      if(!next.subjectStats[subj])next.subjectStats[subj]={q:0,c:0};
      next.subjectStats[subj].q++;if(correct)next.subjectStats[subj].c++;
      if(!next.dailyLog[td])next.dailyLog[td]={q:0,c:0,subjects:[],sessions:0};
      next.dailyLog[td].q++;if(correct)next.dailyLog[td].c++;
      if(correct)next.dailyLog[td].sessions++; // 3/3正解のセッションのみノルマカウント
      if(!next.dailyLog[td].subjects.includes(subj))next.dailyLog[td].subjects.push(subj);
      next.totalQ++;if(correct)next.totalCorrect++;
      if(newBest!==undefined)next.bestStreak=Math.max(next.bestStreak||0,newBest);
      if(!next.recentHistory)next.recentHistory=[];
      next.recentHistory.push({correct,subject:subj,date:td});
      if(next.recentHistory.length>200)next.recentHistory=next.recentHistory.slice(-200);
      if(!correct&&wrongItem){if(!next.reviewQueue)next.reviewQueue=[];if(next.reviewQueue.length<20)next.reviewQueue.push(wrongItem);}
      if(next.lastLogin!==td){const ys=jstYesterday();next.loginStreak=(next.lastLogin===ys)?(next.loginStreak||0)+1:1;next.lastLogin=td;next.bestLoginStreak=Math.max(next.bestLoginStreak||0,next.loginStreak);}
      // 当日スコアを計算してbestDayScoreを更新
      const {score:dayScore}=calcTodayScore(next.recentHistory);
      if(!next.bestDayScore)next.bestDayScore=0;
      if(dayScore>next.bestDayScore)next.bestDayScore=dayScore;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic){
        if(!next.topicMastery[topic])next.topicMastery[topic]={subj,attempts:0,correct:0,debugDone:0,mastered:false};
        const tm=next.topicMastery[topic];tm.attempts++;if(correct)tm.correct++;
        if(!tm.mastered&&tm.attempts>=5&&tm.correct/tm.attempts>=.8)tm.mastered=true;
      }
      checkBadges(next);saveLogs(next);return next;
    });
  },[quiz]);

  const updateAnalysisStats=useCallback((results,subj)=>{

      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      // 問題ID単位で削除。旧データは normalizeSubjectsInLogs でロード時に id を補完済みなので

      const reviewId=currentReviewItemIdR.current;
      if(reviewId){
        next.reviewQueue=(next.reviewQueue||[]).filter(q=>q.id!==reviewId);
      }
      if(topic&&next.topicMastery[topic]){
      next.topicMastery[topic].debugDone++;
    }
      if(!next.debugHistory)next.debugHistory=[];
      next.debugHistory.unshift({date:today(),subj,topic:topic||"—",results});
      if(next.debugHistory.length>100)next.debugHistory=next.debugHistory.slice(0,100);
      checkBadges(next);saveLogs(next);return next;
    });
  },[quiz]);

  const getFireLevel=n=>{if(n>=30)return 5;if(n>=14)return 4;if(n>=7)return 3;if(n>=3)return 2;if(n>=1)return 1;return 0;};
  const pickSubject=cur=>{
    const subs=subjectsR.current;
    const rates=calcSubjRates(cur.recentHistory);
    const ws=subs.map(s=>{const r=rates[s];if(!r||r.q<3)return{s,w:3};const rt=r.c/r.q;return{s,w:rt<.5?4:rt<.7?2:1};});
    const tot=ws.reduce((a,b)=>a+b.w,0);let r=Math.random()*tot;
    for(const x of ws){r-=x.w;if(r<=0)return x.s;}return subs[0];
  };

  const buildNormaQueue=cur=>{
    const subs=subjectsR.current;
    const done=cur.dailyLog?.[today()]?.sessions||0;
    const needed=Math.max(0,3-done);
    if(!needed)return[];
    const rates=calcSubjRates(cur.recentHistory);
    const result=[];const used=new Set();
    // 優先1: 復習キューの科目
    // reviewItemId をこの時点で確定して埋め込む。
    // handleNext で logsR.current.reviewQueue[0] を参照すると
    // 直前の updateAnalysisStats で削除済みの場合に別アイテムを指すため。
    const reviewItem0=cur.reviewQueue?.[0];
    if(reviewItem0&&result.length<needed&&!used.has(reviewItem0.subject)){
      result.push({subj:reviewItem0.subject,reason:"復習タイム！",reviewItemId:reviewItem0.id});
      used.add(reviewItem0.subject);
    }
    // 優先2: 未挑戦・苦手順
    const sorted=subs.filter(s=>!used.has(s))
      .map(s=>{const r=rates[s];const rate=(r&&r.q>=3)?r.c/r.q:null;return{s,rate,q:r?.q||0};})
      .sort((a,b)=>{
        if(a.rate===null&&b.rate===null)return a.q-b.q;
        if(a.rate===null)return-1;if(b.rate===null)return 1;
        return a.rate-b.rate;
      });
    for(const{s,rate,q}of sorted){
      if(result.length>=needed)break;
      const reason=q===0?"まだ未挑戦！":rate<0.5?"苦手科目！":rate<0.7?"もう少し！":"バランス調整";
      result.push({subj:s,reason});used.add(s);
    }
    return result;
  };

  const startWithNorma=(cur,g)=>{
    const nq=buildNormaQueue(cur);
    if(nq.length){
      const[first,...rest]=nq;
      setNormaQueue(rest);normaQueueR.current=rest;
      setNormaReason(first.reason);
      // ノルマ1問目が復習由来かどうかチェック
      // reviewItemId は buildNormaQueue 時点で確定済み → logsR を再参照しない
      if(first.reason==="復習タイム！"&&first.reviewItemId){
        setCurrentReviewItemId(first.reviewItemId);
        currentReviewItemIdR.current=first.reviewItemId;
        setIsReview(true);
        isReviewR.current=true;
      }
      resetFetch(first.subj,g);
    }else{
      setNormaReason("");
      // ノルマ達成済み → 復習キューがあれば復習モードで開始
      if(cur.reviewQueue?.length){
        const item=cur.reviewQueue[0];
        setCurrentReviewItemId(item.id);
        currentReviewItemIdR.current=item.id;
        setIsReview(true);
        isReviewR.current=true;
        resetFetch(item.subject,g);
      }else{
        resetFetch(pickSubject(cur),g);
      }
    }
  };

  const resetState=()=>{
    setQuiz(null);
    setAnalysisStep(null);setStepAns(null);
    stepResultsR.current=[null,null,null];
    setStepResults([null,null,null]);
    // currentReviewItemId はここでリセットしない
    // （startWithNorma でセット後に resetFetch→resetState が呼ばれて上書きされるため）
    // リセットは handleNext の冒頭で行う
  };

  // バックグラウンド補充
  useEffect(()=>{
    if(screen!=="app")return;
    let cancelled=false;
    const doRefill=async()=>{
      if(cancelled||refillLk.current)return false;
      // 緊急生成と同時実行しない（同じ科目への二重API呼び出しを防ぐ）
      if(emergencyGenLk.current)return false;
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)return false;
      const g=gradeR.current||calcGrade(bdR.current);
      const curSubjects=calcSubjects(g);
      // 全科目をストック数昇順で並べ、不足科目を全部補充対象にする
      // 全科目が満タンの場合は autoRefillON のときだけ先頭1科目（最古ストック）を差し替え対象にする
      const sorted=lowestBuckets(curSubjects.length,curSubjects);
      const lacking=sorted.filter(t=>t.cnt<DAM_MAX);
      const filtered=lacking.length>0?lacking:(autoRefillR.current?sorted.slice(0,1):[]);
      if(!filtered.length)return true;
      refillLk.current=true;setIsRefilling(true);
      try{
        // ─ 生成 ──────────────────────────────────────────────────
        const genResults=[];
        for(let i=0;i<filtered.length;i++){
          if(cancelled)break;
          const target=filtered[i];
          const key=keys[i%keys.length];
          const damTopics=[...new Set((getDam()[target.subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
          // 中学・高校の場合「算数」キーでも「数学」としてGeminiに要求する
          const promptSubj=(target.subj==="算数"&&(g.startsWith("中")||g.startsWith("高")))?"数学":target.subj;
          const body={systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:`【科目固定】「${promptSubj}」の誤答付き問題を${DAM_BATCH}問。student_answer・correct_answer・analysis_step1〜3を必ず含めること。\n学年:${g}\n出力JSONの"subject"フィールドには必ず「${promptSubj}」をそのまま書くこと。他の科目名・略称・英語表記は禁止。\n図・グラフ・表・イラスト・地図・実験器具の図への言及は禁止。テキストのみで解ける問題にすること。\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",temperature:.4,topP:.9,topK:20}};
          try{
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
            if(!res.ok){genResults.push({subj:target.subj,valid:[]});continue;}
            const data=await res.json();if(data.error){genResults.push({subj:target.subj,valid:[]});continue;}
            const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text){genResults.push({subj:target.subj,valid:[]});continue;}
            let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){genResults.push({subj:target.subj,valid:[]});continue;}
            if(!Array.isArray(parsed))parsed=[parsed];
            const valid=parsed.filter(q=>q.question&&q.student_answer&&q.correct_answer&&hasValidAnalysis(q)).map(q=>{
              // subjectの前後空白を正規化（全角スペース含む）
              const normSubj=(q.subject||"").replace(/^[\s\u3000]+|[\s\u3000]+$/g,"");
              // 中学・高校では「数学」を「算数」として扱う（Geminiが「数学」と返す場合の吸収）
              if(target.subj==="算数"&&normSubj==="数学")return{...q,subject:"算数"};
              // 「理科」の別表記を吸収（Geminiが「科学」「自然科学」「自然」等を返す場合）
              if(target.subj==="理科"&&["科学","自然科学","自然","理科学","サイエンス"].includes(normSubj))return{...q,subject:"理科"};
              return{...q,subject:normSubj};
            }).filter(q=>q.subject===target.subj);
            genResults.push({subj:target.subj,valid});
          }catch(e){genResults.push({subj:target.subj,valid:[]});}
        }
        if(cancelled)return false;
        // ─ バリデーション ────────────────────────────────────────
        let totalRejected=0;let anyPassed=false;
        genResults.forEach(({subj,valid})=>{
          if(!valid.length||cancelled)return;
          // ローカルバリデーション
          const localPassed=valid.filter(q=>localValidate(q));
          const localRejected=valid.length-localPassed.length;
          totalRejected+=localRejected;
          if(!localPassed.length)return;
          if(cancelled)return;
          const toStore=localPassed.map(q=>shuffleAllSteps({...q,mistake_type:q.mistake_type||"不明",_subject:subj}));
          if(toStore.length&&!cancelled){
            const isReviewSubj=(logsR.current.reviewQueue||[]).some(q=>q.subject===subj);
            if(isReviewSubj)addToDamFront(subj,toStore);
            else addToDam(subj,toStore);
            anyPassed=true;
          }
        });
        // ─────────────────────────────────────────────────────
        if(totalRejected>0){setRejectCount(p=>{const n=p+totalRejected;try{localStorage.setItem("manabi_reject_count",String(n));}catch(e){}return n;});}
        if(!cancelled)setDamStats(getDamStats(subjectsR.current));
        return anyPassed;
      }catch(e){}finally{refillLk.current=false;if(!cancelled)setIsRefilling(false);}
      return false;
    };
    const loop=async()=>{let delay=15000;while(!cancelled){await new Promise(r=>setTimeout(r,delay));if(cancelled)break;const ok=await doRefill();if(cancelled)break;const hasReview=(logsR.current.reviewQueue||[]).length>0;const isWaiting=!!waitingForStockR.current;delay=isWaiting?15000:hasReview?45000:ok?120000:90000;}};
    loop();
    return()=>{cancelled=true;if(retryTimerRef.current)clearInterval(retryTimerRef.current);};
  },[screen]);

  // ─── 緊急生成: ストックが空のとき即座に3問生成してDAMに積む ──────────
  const generateEmergency=useCallback(async(subj,g)=>{
    if(emergencyGenLk.current)return null;
    const keys=keysR.current.filter(k=>k.trim());
    if(!keys.length)return null;
    emergencyGenLk.current=true;setIsEmergencyGen(true);
    // キーローテーション: バックグラウンド補充と同じ方式で偏りを防ぐ
    const key=keys[_ki%keys.length];_ki++;
    try{
      const currentGrade=g||gradeR.current;
      const promptSubj=(subj==="算数"&&(currentGrade.startsWith("中")||currentGrade.startsWith("高")))?"数学":subj;
      const damTopics=[...new Set((getDam()[subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
      const body={systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:`【科目固定】「${promptSubj}」の誤答付き問題を3問。student_answer・correct_answer・analysis_step1〜3を必ず含めること。\n学年:${currentGrade}\n出力JSONの"subject"フィールドには必ず「${promptSubj}」をそのまま書くこと。他の科目名・略称・英語表記は禁止。\n図・グラフ・表・イラスト・地図・実験器具の図への言及は禁止。テキストのみで解ける問題にすること。\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",temperature:.4,topP:.9,topK:20}};
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok)return null;
      const data=await res.json();if(data.error)return null;
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text)return null;
      let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){return null;}
      if(!Array.isArray(parsed))parsed=[parsed];
      const valid=parsed.filter(q=>q.question&&q.student_answer&&q.correct_answer&&hasValidAnalysis(q)).map(q=>{
        const normSubj=(q.subject||"").replace(/^[\s\u3000]+|[\s\u3000]+$/g,"");
        if(subj==="算数"&&normSubj==="数学")return{...q,subject:"算数"};
        if(subj==="理科"&&["科学","自然科学","自然","理科学","サイエンス"].includes(normSubj))return{...q,subject:"理科"};
        return{...q,subject:normSubj};
      }).filter(q=>q.subject===subj);
      const localPassed=valid.filter(q=>localValidate(q));
      if(!localPassed.length)return null;
      const toStore=localPassed.map(q=>shuffleAllSteps({...q,mistake_type:q.mistake_type||"不明",_subject:subj}));
      addToDam(subj,toStore);
      const pop=popFromDam(subj,1);
      return pop.length?pop[0]:null;
    }catch(e){return null;}
    finally{emergencyGenLk.current=false;setIsEmergencyGen(false);}
  },[]);

  const fetchQ=useCallback(async(g,subj)=>{
    if(fetchLk.current)return;fetchLk.current=true;
    // ⑦ fetch開始時点の学年をスナップショット固定（途中の学年変更を無視）
    const currentGrade=g||gradeR.current;
    const rid=Date.now()+Math.random();reqId.current=rid;
    const stale=()=>reqId.current!==rid;
    try{
      if(!stale()){resetState();setAppError("");}
      // ストック優先。指定科目を優先、0なら他科目へズレる、全科目0なら緊急生成→失敗時のみ待機。
      const subs=subjectsR.current;
      const st=popFromDam(subj,1);
      if(st.length){
        if(!stale()){setQuiz(st[0]);setDamStats(getDamStats(subs));}
        return;
      }
      // 指定科目が0 → 他科目へズレる
      let shifted=null,shiftedSubj=subj;
      for(const s of subs){
        if(s===subj)continue;
        const any=popFromDam(s,1);
        if(any.length){shifted=any[0];shiftedSubj=s;break;}
      }
      if(shifted){
        if(!stale()){
          if(shiftedSubj!==subj){setSubject(shiftedSubj);setSubjectSlideMsg(`📦 ${displaySubject(subj,currentGrade)}のストックがなかったため、${displaySubject(shiftedSubj,currentGrade)}に切り替えました`);setTimeout(()=>setSubjectSlideMsg(""),3500);}
          setQuiz(shifted);setDamStats(getDamStats(subs));
          
        }
        return;
      }
      // 全科目0 → 緊急生成（3問）
      if(!stale()){
        const generated=await generateEmergency(subj,currentGrade);
        if(!stale()){
          if(generated){setQuiz(generated);setDamStats(getDamStats(subs));}
          else{pollingCancelRef.current++;setWaitingForStock(subj);}
        }
      }
    }catch(e){
      if(!stale()){
        setAppError("AIにつながれなかったよ！もう一度おしてみてね");
        // 15秒クールダウン開始
        if(retryTimerRef.current)clearInterval(retryTimerRef.current);
        retryCooldownRef.current=15;setRetryCooldown(15);
        retryTimerRef.current=setInterval(()=>{
          retryCooldownRef.current--;
          setRetryCooldown(retryCooldownRef.current);
          if(retryCooldownRef.current<=0)clearInterval(retryTimerRef.current);
        },1000);
      }
    }
    finally{fetchLk.current=false;}
  },[]);

  const resetFetch=useCallback((subj,sg)=>{
    const cur=gsR.current;const init={streak:cur.streak,best:cur.best,wrong:0,qNum:1};
    // fetchLk/nextLkを明示リセット。rAF前に解放しないとfetchQ冒頭ガードで弾かれる。
    fetchLk.current=false;nextLk.current=false;
    resetState();setGs(init);setSubject(subj);pollingCancelRef.current++;setWaitingForStock(null);
    const g=sg||grade;requestAnimationFrame(()=>fetchQ(g,subj));
  },[grade,fetchQ]);

  // 分析ステップ回答（useCallback: quiz/analysisStep/stepAns が変わるたび更新）
  const handleStepAnswer=useCallback(idx=>{
    if(stepAns!==null||!analysisStep||analysisStep==="done")return;
    const step=quiz[`analysis_step${analysisStep}`];
    const correct=idx===step.answer;
    setStepAns(idx);
    setStepResults(p=>{const n=[...p];n[analysisStep-1]=correct;stepResultsR.current=n;return n;});
    // ① 正解バースト
    if(correct){setShowCorrectBurst(true);setTimeout(()=>setShowCorrectBurst(false),750);}
  },[stepAns,analysisStep,quiz]);

  // 次のステップへ / 完了（useCallback: gs/analysisStep/quiz/subject が変わるたび更新）
  const handleStepNext=useCallback(()=>{
    if(!analysisStep||analysisStep==="done")return;
    if(analysisStep<3){
      setAnalysisStep(p=>p+1);
      setStepAns(null);
    }else{
      const finalResults=[...stepResultsR.current];
      const score=finalResults.filter(Boolean).length;
      const correct=score>=3;
      // ⑥ 連続正解が途切れたとき
      if(!correct&&gs.streak>=3){
        setStreakBrokenMsg(`🔥 ${gs.streak}連続まで行ったね！惜しい！`);
        setTimeout(()=>setStreakBrokenMsg(""),3500);
      }
      const wrongItem=!correct?{
      id:crypto.randomUUID(),
      topic:quiz.topic_tag||quiz.question.slice(0,20),
      subject,
      mistakeType:quiz.mistake_type||"不明"
     }:null;
      const nextStr=correct?gs.streak+1:0;
      const newBest=Math.max(gs.best,nextStr);
      updateLogs(correct,subject,wrongItem,newBest);
      updateAnalysisStats(finalResults,subject);
      setGs(p=>({...p,streak:nextStr,best:newBest,wrong:correct?p.wrong:p.wrong+1,qNum:p.qNum+1}));
      setAnalysisStep("done");
    }
  },[analysisStep,gs,quiz,subject,updateLogs,updateAnalysisStats]);

  const handleNext=async()=>{
    if(nextLk.current)return;nextLk.current=true;
    // ⑦ handleNext開始時点の学年をスナップショット固定（途中の学年変更を無視）
    const currentGrade=gradeR.current;
    // 待機モード突入フラグ: finally でロック解放タイミングを切り替えるため
    let enteredWaiting=false;
    // 次の問題へ進む前に復習IDをリセット（次のsetIsReview/setCurrentReviewItemIdで上書きされる）
    setCurrentReviewItemId(null);currentReviewItemIdR.current=null;
    setIsReview(false);isReviewR.current=false;
    resetState();
    try{
      const cur=logsR.current;
      const doneSessions=cur.dailyLog?.[today()]?.sessions||0;
      const normaActive=doneSessions<3;
      if(normaActive){
        // ノルマモード: キューから次の科目を取り出す
        const q=normaQueueR.current;
        let ns,reason;
        if(q.length){
          const[next,...rest]=q;
          setNormaQueue(rest);normaQueueR.current=rest;
          ns=next.subj;reason=next.reason;
          // ノルマキューの次が復習由来なら reviewItemId をセット
          // buildNormaQueue 時点で確定した id を使う → logsR.reviewQueue[0] を再参照しない
          if(reason==="復習タイム！"&&next.reviewItemId){
            setCurrentReviewItemId(next.reviewItemId);currentReviewItemIdR.current=next.reviewItemId;
            setIsReview(true);isReviewR.current=true;
          }
        }else{
          // キュー切れ（不正解続き）: バランスで補填
          ns=pickSubject(cur);reason="バランス調整";
        }
        setNormaReason(reason);setSubject(ns);
        // 指定科目のストックを確認、0なら他科目へズレる
        {
          const subs=subjectsR.current;
          const fromDam=popFromDam(ns,1);setDamStats(getDamStats(subs));
          if(fromDam.length){setQuiz(fromDam[0]);return;}
          // 指定科目が0 → 他科目へズレる
          let shifted=null,shiftedSubj=ns;
          for(const s of subs){if(s===ns)continue;const any=popFromDam(s,1);if(any.length){shifted=any[0];shiftedSubj=s;break;}}
          if(shifted){setSubject(shiftedSubj);setDamStats(getDamStats(subs));setQuiz(shifted);if(shiftedSubj!==ns){setSubjectSlideMsg(`📦 ${displaySubject(ns,currentGrade)}のストックがなかったため、${displaySubject(shiftedSubj,currentGrade)}に切り替えました`);setTimeout(()=>setSubjectSlideMsg(""),3500);}return;}
          // 全科目0 → 緊急生成（3問）
          {
            const generated=await generateEmergency(ns,currentGrade);
            if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
            else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(ns);}
            return;
          }
        }
      }
      // フリーモード
      setNormaReason("");
      if(cur.reviewQueue?.length){
        const item=cur.reviewQueue[0];
        const fromDamReview=popFromDam(item.subject,1);
        if(fromDamReview.length){
          // 解消済みは分析完了後にIDで削除するため、ここでは削除しない
          setCurrentReviewItemId(item.id);  // normalize済みで必ずidあり
          setSubject(item.subject);setIsReview(true);setDamStats(getDamStats(subjectsR.current));
          
          setQuiz(fromDamReview[0]);return;
        }
        // 復習キューがあるのにストックが0 → 緊急生成（3問）
        setCurrentReviewItemId(item.id);
        setSubject(item.subject);setIsReview(true);
        {
          const generated=await generateEmergency(item.subject,currentGrade);
          if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
          else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(item.subject);}
        }
        return;
      }
      const cand=subjR.current;
      let fromDam=popFromDam(cand,1),ns=cand;
      if(!fromDam.length){for(const s of subjectsR.current){if(s===cand)continue;const any=popFromDam(s,1);if(any.length){fromDam=any;ns=s;break;}}}
      if(fromDam.length){
        if(ns!==subjR.current){setSubject(ns);setSubjectSlideMsg(`📦 ${displaySubject(subjR.current,currentGrade)}のストックがなかったため、${displaySubject(ns,currentGrade)}に切り替えました`);setTimeout(()=>setSubjectSlideMsg(""),3500);}
        setIsReview(false);setDamStats(getDamStats(subjectsR.current));
        
        setQuiz(fromDam[0]);return;
      }
      setIsReview(false);if(ns!==subjR.current)setSubject(ns);
      // ストック空 → 緊急生成（3問）
      {
        const generated=await generateEmergency(ns,currentGrade);
        if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
        else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(ns);}
      }
    }finally{
      // 待機モード突入時は polling にすぐ制御を渡すため即解放。
      // quiz取得成功時は連打防止のため 150ms 維持。
      if(enteredWaiting){nextLk.current=false;}
      else{setTimeout(()=>{nextLk.current=false;},150);}
    }
  };

  const saveSettings=()=>{

  // ─── エクスポート / インポート ─────────────
  const exportData=()=>{
    const now=new Date();
    const ts=now.toISOString().replace("T"," ").slice(0,19);
    const g=grade||calcGrade(birthday)||"不明";
    const dateStr=now.toISOString().slice(0,10).replace(/-/g,"");

  const importData=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.app!=="まちがいラボ")throw new Error("invalid app");
        if(!d.logs||typeof d.logs!=="object")throw new Error("invalid logs");
        const restored=normalizeSubjectsInLogs({...initLogs(),...d.logs});
        if(!restored.debugStats)restored.debugStats={completed:0,perfect:0};
        if(!restored.topicMastery)restored.topicMastery={};
        if(!restored.debugHistory)restored.debugHistory=[];
        if(!restored.bestLoginStreak)restored.bestLoginStreak=0;
        if(!restored.bestDayScore)restored.bestDayScore=0;
        setLogs(restored);saveLogs(restored);
        if(d.dam&&typeof d.dam==="object"){
          const current=getDam();
          const importSubjects=d.birthday?calcSubjects(calcGrade(d.birthday)):subjectsR.current;
          // 「数学」キーも「算数」にマージできるよう両方チェック
          const allKeys=new Set([...importSubjects,"数学"]);
          for(const subj of allKeys){
            const targetSubj=(subj==="数学"&&!importSubjects.includes("数学"))?"算数":subj;
            if(Array.isArray(d.dam[subj])&&d.dam[subj].length){
              const merged=current[targetSubj]||[];
              const existingKeys=new Set(merged.map(dupKey));
              const incoming=d.dam[subj].filter(q=>!existingKeys.has(dupKey(q)));
              current[targetSubj]=[...merged,...incoming].slice(-DAM_MAX);
            }
          }
          saveDam(current);setDamStats(getDamStats(subjectsR.current));
        }
        if(d.birthday){
          setBirthday(d.birthday);
          const g=calcGrade(d.birthday);setGrade(g);
          try{localStorage.setItem(PROF,JSON.stringify({birthday:d.birthday,apiKeys}));}catch(ex){}
        }
        setImportMsg(`✓ インポート完了！ ${d.grade||"不明"} ／ ${d.exportedAt||"日時不明"}`);
        setTimeout(()=>setImportMsg(""),5000);
      }catch(err){
        setImportMsg("❌ ファイルを読み込めませんでした");

    };

  };

  // ── 派生値 ────────────────────────────────
  const recent100=calcRecent100(logs.recentHistory);
  const subjRateMap=calcSubjRates(logs.recentHistory);
  const subjectRates=subjects.map(s=>{const r=subjRateMap[s];return r&&r.q>0?{s,rate:Math.round(r.c/r.q*100),q:r.q}:{s,rate:null,q:0};});
  // ④ 昨日との比較メッセージ
  const yesterdayKey=jstYesterday();
  const todayQ=logs.dailyLog?.[today()]?.q||0;
  const yesterdayQ=logs.dailyLog?.[yesterdayKey]?.q||0;

                  {logs.debugHistory?.length>0&&(
                    <React.Fragment>
                      <div style={{fontSize:11,fontWeight:800,color:"#7c6fb0",marginBottom:6,marginTop:4}}>直近の分析履歴</div>
                      {logs.debugHistory.slice(0,5).map((h,i)=>(
                        <div key={i} className="anhist-row">
                          <span style={{fontSize:11,color:"#7c6fb0",minWidth:36}}>{h.date.slice(5)}</span>
                          <span className="anhist-subj">{displaySubject(h.subj,grade)}</span>
                          <span style={{flex:1,fontSize:11,color:"#5b3ff8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.topic}</span>
                          <div className="anhist-score">
                            {(h.results||[]).map((r,j)=>(
                              <div key={j} className={`anhist-dot ${r?"ok":"ng"}`}>{r?"✓":"✗"}</div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </React.Fragment>
                  )}
                </div>

                {/* 28日カレンダー */}
                <div className="card">
                  <div className="section-title">28日間の学習カレンダー</div>
                  <div className="week-grid">
                    {["日","月","火","水","木","金","土"].map(d=><div key={d} className="week-label">{d}</div>)}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {Array.from({length:cal28[0].dow},(_,i)=>(
                      <div key={`empty-${i}`}></div>
                    ))}
                    {cal28.map(d=>{
                      let cls="week-dot empty";
                      if(d.q>0){cls=d.rate>=80?"week-dot high":d.rate>=50?"week-dot mid":"week-dot low";}
                      return(
                        <div key={d.key} className="week-dot-wrap">
                          <div className={cls} title={`${d.key}: ${d.q}問`}>{d.d}</div>
                          {d.q>0&&<div style={{fontSize:8,color:"#9990cc",textAlign:"center"}}>{d.q}問</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:10,justifyContent:"center"}}>
                    {[{cls:"week-dot high",label:"80%+"},{cls:"week-dot mid",label:"50%+"},{cls:"week-dot low",label:"50%未満"}].map(x=>(
                      <div key={x.label} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#9990cc"}}>
                        <div className={x.cls} style={{width:20,height:20,fontSize:8}}></div>{x.label}
                      </div>
                    ))}
                  </div>
                </div>

                {/* 単元習熟マップ */}
                {masteryList.length>0&&(
                  <div className="card">
                    <div className="section-title">🗺️ 単元習熟マップ</div>
                    <div className="mastery-grid">
                      {masteryList.map(({topic,subj,attempts,correct,mastered})=>{
                        const rate=attempts>0?Math.round(correct/attempts*100):0;
                        const state=mastered?"mastered":rate>=50?"learning":"fresh";
                        const labels={fresh:"学習中",learning:"定着中",mastered:"習熟済み"};
                        return(
                          <div key={topic} className={`mastery-card ${state}`}>
                            <div className="mastery-tag">{labels[state]} ｜ {displaySubject(subj,grade)}</div>
                            <div className="mastery-topic">{topic}</div>
                            <div className="mastery-meta">{attempts}問 正解率{rate}%</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontSize:11,color:"#bbb",marginTop:8,textAlign:"center"}}>5問以上解いて正解率80%超えで「習熟済み」</div>
                  </div>
                )}

                {reviewCount>0&&(
                  <div className="card" style={{background:"#fffbeb",border:"1.5px solid #fde68a"}}>
                    <div style={{fontWeight:800,color:"#92400e",marginBottom:6}}>📝 復習キュー: {reviewCount}件</div>
                    <div style={{fontSize:13,color:"#78350f"}}>次回の学習で自動出題。分析完了で自動削除！</div>
                  </div>
                )}

                {/* ストック */}
                <div className="card" style={{background:"#f8f7ff"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div className="section-title" style={{margin:0}}>📦 問題ストック</div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      {isRefilling&&<span className="refill-dot"></span>}
                      <span style={{fontSize:12,fontWeight:900,color:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}>{damTotal}/{DAM_MAX*subjects.length}問</span>
                    </div>
                  </div>
                  <div style={{marginBottom:8}}><div className="bar-wrap" style={{height:7}}><div className="bar" style={{width:`${Math.min(100,damTotal/(DAM_MAX*subjects.length)*100)}%`,background:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}></div></div></div>
                  {subjects.map(s=>{const cnt=damStats[s]||0;const pct=Math.min(100,cnt/DAM_MAX*100);const c=pct>60?"#22c55e":pct>30?"#f59e0b":"#ef4444";return(
                    <div key={s} className="dam-row">
                      <span className="dam-label">{displaySubject(s,grade)}</span>
                      <div className="dam-bw"><div className="dam-bf" style={{width:`${pct}%`,background:c}}></div></div>
                      <span style={{fontSize:11,fontWeight:900,minWidth:40,textAlign:"right",color:c}}>{cnt}/{DAM_MAX}</span>
                    </div>
                  );})}
                  <div style={{fontSize:10,color:"#bbb",marginTop:6,textAlign:"center"}}>{isRefilling?`⚡ ${autoRefill?"問題を入れ替え中...":"ストックを補充中..."}`:waitingForStock?"⏳ 問題を待機中...（バックグラウンドで補充します）":`✓ ${autoRefill?"自動更新ON（常に最新）":"自動更新ON（ストックが満たされたら停止）"}`}</div>
                  {rejectCount>0&&<div style={{fontSize:10,color:"#f59e0b",marginTop:4,textAlign:"center",fontWeight:700}}>🚫 品質フィルター棄却: {rejectCount}問（ローカル検証不合格）</div>}
                </div>
              </React.Fragment>
            )}

            {/* ── BADGE ── */}
            {tab==="badge"&&(
              <BadgeGrid earnedBadges={logs.earnedBadges} totalBadges={BADGES.length}/>
            )}

            {/* ── SETTINGS ── */}
            {tab==="settings"&&(
              <React.Fragment>
                <div className="card">
                  <div className="section-title">プロフィール設定</div>

                  <div className="setting-row">
                    <span className="setting-label">生年月日（学年自動計算）</span>
                    <input type="date" value={birthday} onChange={e=>setBirthday(e.target.value)} min="2000-01-01" max="2026-12-31" style={{marginBottom:0}}/>
                    <div style={{fontSize:12,color:"#5b3ff8",fontWeight:700,marginTop:4}}>→ {calcGrade(birthday)}</div>
                  </div>

                  <div className="setting-row" style={{paddingTop:14}}>
                    <span className="setting-label">Gemini APIキー（最大4つ）</span>
                    {apiKeys.map((k,i)=>(
                      <div key={i} className="key-row">
                        <input type="password" value={k} onChange={e=>{const nk=[...apiKeys];nk[i]=e.target.value;setApiKeys(nk);}} placeholder={`APIキー ${i+1}${i===0?" (任意)":" (任意)"}`}/>
                        <span className={`key-status ${k.trim()?"ok":"empty"}`}>{k.trim()?"✓":"—"}</span>
                      </div>
                    ))}
                    <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#5b3ff8",fontWeight:700,textDecoration:"none"}}>🔑 APIキーを取得する（無料）</a>
                  </div>

                  <div style={{marginTop:16}}>
                    <button className="btn btn-primary" onClick={saveSettings}>
                      {settingsSaved?"✓ 保存しました！":"設定を保存する"}
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">問題ストック設定</div>
                  <div className="setting-row" style={{borderBottom:"none",paddingBottom:0}}>
                    <span className="setting-label">📦 ストック自動更新</span>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                      <button
                        onClick={()=>setAutoRefill(v=>!v)}
                        style={{
                          width:52,height:28,borderRadius:14,border:"none",cursor:"pointer",
                          background:autoRefill?"linear-gradient(135deg,#5b3ff8,#9b59f8)":"#e8e3ff",
                          position:"relative",transition:"all .2s",flexShrink:0,padding:0
                        }}
                      >
                        <span style={{
                          position:"absolute",top:3,left:autoRefill?26:3,
                          width:22,height:22,borderRadius:"50%",background:"#fff",
                          boxShadow:"0 1px 4px rgba(0,0,0,.2)",transition:"left .2s",display:"block"
                        }}/>
                      </button>
                      <span style={{fontSize:13,fontWeight:700,color:autoRefill?"#5b3ff8":"#9990cc"}}>
                        {autoRefill?"ON（最新問題に入れ替え中）":"OFF（問題数が満たされるまで補充）"}
                      </span>
                    </div>
                   </div>
                 </div>

                <div className="card">
                  <div className="section-title">エクスポート / インポート</div>
                  <button className="btn btn-ghost" style={{marginBottom:8}} onClick={exportData}>
                    📤 学習データをエクスポート
                  </button>
                  <label style={{display:"block",background:"#f0edff",color:"#5b3ff8",border:"none",borderRadius:14,padding:"13px 20px",fontSize:15,fontWeight:800,fontFamily:"inherit",cursor:"pointer",width:"100%",textAlign:"center",boxSizing:"border-box",marginBottom:importMsg?8:0,transition:"all .18s"}}>
                    📥 学習データをインポート
                    <input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
                  </label>
                  {importMsg&&(
                    <div style={{fontSize:12,fontWeight:700,borderRadius:10,padding:"8px 12px",marginBottom:4,
                      color:importMsg.startsWith("✓")?"#166534":"#991b1b",
                      background:importMsg.startsWith("✓")?"#dcfce7":"#fee2e2"}}>
                      {importMsg}
                    </div>
                  )}
                  <div style={{fontSize:11,color:"#bbb",marginTop:6}}>APIキーはエクスポートされません。ファイル名に学年・日付が入ります。</div>
                </div>

                <div className="card">
                  <div className="section-title">データ管理</div>
                  <div className="danger-zone">
                    <div style={{fontSize:12,fontWeight:800,color:"#991b1b",marginBottom:10}}>⚠️ 削除操作は取り消せません</div>
                    <button className="danger-btn" onClick={clearLogs}>
                      📊 学習記録・バッジをリセット
                    </button>
                    <button className="danger-btn" onClick={clearStock}>
                      📦 ストック問題をすべて削除
                    </button>
                    <button className="danger-btn secondary" onClick={clearAllData}>
                      🗑️ すべてのデータを削除
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">アプリについて</div>
                  <div style={{fontSize:13,color:"#9990cc",lineHeight:1.8}}>
                    <div>📚 まちがいラボ</div>
                    <div>🔍 誤答分析型 学習エンジン</div>
                    <div>⚡ Gemini 2.5 Flash 使用</div>
                  </div>
                </div>
              </React.Fragment>
            )}

          </div>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
