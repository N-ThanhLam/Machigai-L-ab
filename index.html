    const SUBJECTS = ["国語", "算数", "英語", "社会", "理科"];
    const LEVELS = [1, 2, 3];

    const SYSTEM_PROMPT = `あなたは日本の最優秀AI学習コーチです。Growth Mindsetを体現し、子どもの学力を最大化することが使命です。

【対象】
・指定された学年・科目・単元に準拠（学習指導要領ベース）

※思考プロセスやチェック結果をテキストとして出力してはいけません。

【出力形式】
JSON配列のみ（説明・Markdown禁止）

{
  "self_check_fact": "事実確認と制約チェック結果",

    // =====================================================================
    // ダム（在庫管理）システム
    // 5科目 × 3レベル = 15バケット、各50問、合計750問
    // =====================================================================
    const DAM_KEY = "manabi_dam_v1";
    const DAM_MAX_PER_BUCKET = 50;
    const DAM_REFILL_BATCH = 10;

    const getDam = () => {
      try { return JSON.parse(localStorage.getItem(DAM_KEY) || "{}"); } catch { return {}; }
    };
    const saveDam = (d) => {
      try { localStorage.setItem(DAM_KEY, JSON.stringify(d)); } catch {}
    };
    const damBKey = (subj, lv) => `${subj}_${lv}`;

    /** 問題をバケットへ追加（重複排除つき） */
    const addToDam = (subj, lv, questions) => {
      const dam = getDam();
      const bk = damBKey(subj, lv);
      const existing = dam[bk] || [];
      const existKeys = new Set(existing.map(q => (q.question || "").slice(0, 30)));
      const fresh = questions.filter(q => !existKeys.has((q.question || "").slice(0, 30)));
      dam[bk] = [...existing, ...fresh].slice(0, DAM_MAX_PER_BUCKET);
      saveDam(dam);
    };

    /** バケットからcount件ポップ（隣レベルへのフォールバックあり） */
    const popBatchFromDam = (subj, lv, count = 1) => {
      const dam = getDam();
      const lvOrder = lv === 1 ? [1, 2, 3] : lv === 2 ? [2, 1, 3] : [3, 2, 1];
      const result = [];
      for (const l of lvOrder) {
        if (result.length >= count) break;
        const bk = damBKey(subj, l);
        const bucket = dam[bk] || [];
        const take = Math.min(count - result.length, bucket.length);
        if (take > 0) {
          result.push(...bucket.slice(0, take).map(q => ({ ...q, _level: l })));
          dam[bk] = bucket.slice(take);
        }
      }
      if (result.length > 0) saveDam(dam);
      return result;
    };

    /** 全15バケットの在庫数を返す */
    const getDamStats = () => {
      const dam = getDam();
      return SUBJECTS.reduce((acc, subj) => {
        acc[subj] = LEVELS.reduce((la, lv) => {
          la[lv] = (dam[damBKey(subj, lv)] || []).length;
          return la;
        }, {});
        return acc;
      }, {});
    };

    /** 在庫率が最低のバケットを返す（補充エンジン用） */
    const findLowestBucket = () => {
      const dam = getDam();
      let target = null, lowestCnt = Infinity;
      for (const subj of SUBJECTS) {
        for (const lv of LEVELS) {
          const cnt = (dam[damBKey(subj, lv)] || []).length;
          // 40問以下（空きが補充量以上の時）のみ補充
          if (cnt <= (DAM_MAX_PER_BUCKET - DAM_REFILL_BATCH) && cnt < lowestCnt) {
            lowestCnt = cnt;
            target = { subj, lv, cnt };
          }
        }
      }
      return target;
    };

    /** 全在庫合計 */
    const getDamTotal = () => {
      const dam = getDam();
      return SUBJECTS.reduce((total, subj) =>
        total + LEVELS.reduce((t, lv) => t + (dam[damBKey(subj, lv)] || []).length, 0), 0);
    };
    // =====================================================================

    function calcGrade(birth) {
      if (!birth) return "一般";
      const b = new Date(birth), now = new Date();
      let sy = now.getFullYear();
      if (now.getMonth() < 3) sy--;
      let ent = b.getFullYear() + 7;
      if (b.getMonth() < 3) ent--;
      const y = sy - ent + 1;
      if (y >= 1 && y <= 6) return `小学${y}年生`;
      if (y >= 7 && y <= 9) return `中学${y - 6}年生`;
      if (y >= 10 && y <= 12) return `高校${y - 9}年生`;
      return "一般";
    }

      function today() { return new Date().toISOString().slice(0, 10); }

const shuffleQuestion = (q) => {
  const indexed = q.choices.map((c, i) => ({ c, i }));

  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }

  return {
    ...q,
    choices: indexed.map(x => x.c),
    answer: indexed.findIndex(x => x.i === q.answer)
  };
};

// ▼ここに追加
let lastAnswer = null;

const shuffleWithBalance = (q) => {
  let newQ;
  let tries = 0;

  do {
    newQ = shuffleQuestion(q);
    tries++;
  } while (newQ.answer === lastAnswer && tries < 5);

  lastAnswer = newQ.answer;
  return newQ;
};

    function calcRecent100Rate(recentHistory) {
      if (!recentHistory || recentHistory.length === 0) return null;
      const last100 = recentHistory.slice(-100);
      const correct = last100.filter(r => r.correct).length;
      return { rate: Math.round(correct / last100.length * 100), count: last100.length };
    }

    function calcRecentSubjectRates(recentHistory) {
      if (!recentHistory || recentHistory.length === 0) return {};
      const last100 = recentHistory.slice(-100);
      const map = {};
      for (const r of last100) {
        if (!map[r.subject]) map[r.subject] = { q: 0, c: 0 };
        map[r.subject].q++;
        if (r.correct) map[r.subject].c++;
      }
      return map;
    }

    const initLogs = () => ({
      subjectStats: {},
      dailyLog: {},
      totalQ: 0,
      totalCorrect: 0,
      bestStreak: 0,
      loginStreak: 0,
      lastLogin: "",
      earnedBadges: [],
      reviewQueue: [],
      recentHistory: [],
    });

    function ManabiV3() {
      const [screen, setScreen] = useState("start");
      const [tab, setTab] = useState("learn");
      const [apiKeys, setApiKeys] = useState(["", "", "", ""]);
      const [birthday, setBirthday] = useState("");
      const [grade, setGrade] = useState("");
      const [subject, setSubject] = useState("");
      const [gs, setGs] = useState({ lv: 2, streak: 0, best: 0, wrong: 0, qNum: 1, retry: false, used: [] });

      const [qQueue, setQQueue] = useState([]);
      const [quiz, setQuiz] = useState(null);
      const [loading, setLoading] = useState(false);
      const [isCooldown, setIsCooldown] = useState(false);
      const [answered, setAnswered] = useState(null);
      const [error, setError] = useState("");
      const [showSubjectSelect, setShowSubjectSelect] = useState(false);
      const [damStats, setDamStats] = useState(() => getDamStats());
      const [isRefilling, setIsRefilling] = useState(false);

      const [logs, setLogs] = useState(initLogs());
      const [isReview, setIsReview] = useState(false);
      const [newBadges, setNewBadges] = useState([]);
      const storageKey = "manabi_logs_v3";
      const profileKey = "manabi_profile_v2";

      // refs for stale-closure防止
      const logsRef = useRef(logs);
      const gsRef = useRef(gs);
      const fetchLockRef = useRef(false);
      const subjectRef = useRef(subject);
      const apiKeysRef = useRef(apiKeys);
      const gradeRef = useRef(grade);
      const birthdayRef = useRef(birthday);
      const refillLockRef = useRef(false);
      const screenRef = useRef(screen);

      useEffect(() => { logsRef.current = logs; }, [logs]);
      useEffect(() => { gsRef.current = gs; }, [gs]);
      useEffect(() => { subjectRef.current = subject; }, [subject]);
      useEffect(() => { apiKeysRef.current = apiKeys; }, [apiKeys]);
      useEffect(() => { gradeRef.current = grade; }, [grade]);
      useEffect(() => { birthdayRef.current = birthday; }, [birthday]);
      useEffect(() => { screenRef.current = screen; }, [screen]);

      useEffect(() => {
        try {
          const p = localStorage.getItem(profileKey);
          if (p) {
            const d = JSON.parse(p);
            setBirthday(d.birthday || "");
            if (d.apiKeys && Array.isArray(d.apiKeys)) {
              setApiKeys(d.apiKeys);
            } else if (d.apiKey) {
              setApiKeys([d.apiKey, "", "", ""]);
            }
          }
        } catch {}
        loadLogs();
        setDamStats(getDamStats());
      }, []);

      const loadLogs = async () => {
        try {
          const r = localStorage.getItem(storageKey);
          if (r) setLogs(JSON.parse(r));
        } catch {}
      };

      const saveLogs = async (newLogs) => {
        try { localStorage.setItem(storageKey, JSON.stringify(newLogs)); } catch {}
      };

      const updateLogs = (correct, subj, wrongItem, newBest) => {
        setLogs(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const td = today();

          if (!next.subjectStats[subj]) next.subjectStats[subj] = { q: 0, c: 0 };
          next.subjectStats[subj].q++;
          if (correct) next.subjectStats[subj].c++;

          if (!next.dailyLog[td]) next.dailyLog[td] = { q: 0, c: 0, subjects: [] };
          next.dailyLog[td].q++;
          if (correct) next.dailyLog[td].c++;
          if (!next.dailyLog[td].subjects.includes(subj)) next.dailyLog[td].subjects.push(subj);

          next.totalQ++;
          if (correct) next.totalCorrect++;

          if (newBest !== undefined) {
            next.bestStreak = Math.max(next.bestStreak || 0, newBest);
          }

          if (!next.recentHistory) next.recentHistory = [];
          next.recentHistory.push({ correct, subject: subj, date: td });
          if (next.recentHistory.length > 200) next.recentHistory = next.recentHistory.slice(-200);

          if (!correct && wrongItem) {
            if (!next.reviewQueue) next.reviewQueue = [];
            if (next.reviewQueue.length < 20) next.reviewQueue.push(wrongItem);
          }

          if (next.lastLogin !== td) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().slice(0, 10);
            next.loginStreak = (next.lastLogin === yStr) ? (next.loginStreak || 0) + 1 : 1;
            next.lastLogin = td;
          }

          const earned = BADGES.filter(b => !next.earnedBadges.includes(b.id) && b.cond(next));
          if (earned.length > 0) {
            next.earnedBadges = [...next.earnedBadges, ...earned.map(b => b.id)];
            setNewBadges(earned);
            setTimeout(() => setNewBadges([]), 3500);
          }

          saveLogs(next);
          return next;
        });
      };

      const pickSubject = (currentLogs) => {
        const recentRates = calcRecentSubjectRates(currentLogs.recentHistory);
        const rates = SUBJECTS.map(s => {
          const rt = recentRates[s];
          if (!rt || rt.q < 3) return { s, w: 3 };
          const rate = rt.c / rt.q;
          return { s, w: rate < 0.5 ? 4 : rate < 0.7 ? 2 : 1 };
        });
        const total = rates.reduce((a, b) => a + b.w, 0);
        let r = Math.random() * total;
        for (const item of rates) { r -= item.w; if (r <= 0) return item.s; }
        return SUBJECTS[0];
      };

                                  return next;
                                });
                                alert("「この問題はおかしい」と報告しました。復習リストから削除されます。");
                              }}
                            >
                              ⚠️ 問題の内容がまちがっている
                            </button>

                            <div style={{ height: 12 }}></div>
                            <button className="btn btn-primary" onClick={handleNext}>次の問題へ →</button>
                          </React.Fragment>
                        )}
                      </div>
                    )}

                    {showSubjectSelect ? (
                      <div className="card" style={{ marginTop: 4, padding: "16px", background: "#f8f7ff" }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: "#5b3ff8", marginBottom: 10, textAlign: "center" }}>勉強したい科目を選んでね！</div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                          {SUBJECTS.map(s => (
                            <button key={s} className="btn btn-primary" style={{ padding: "10px 8px", fontSize: 14 }} onClick={() => handleSubjectSelect(s)} disabled={loading}>{s}</button>
                          ))}
                          <button className="btn btn-ghost" style={{ padding: "10px 8px", fontSize: 14, background: "#e8e3ff" }} onClick={() => setShowSubjectSelect(false)} disabled={loading}>もどる</button>
                        </div>
                      </div>
                    ) : (
                      <div className="row2" style={{ marginTop: 4 }}>
                        <button className="btn btn-ghost" onClick={() => setShowSubjectSelect(true)} disabled={loading}>科目選択</button>
                        <button className="btn btn-ghost" onClick={handleWeakSubject} disabled={loading}>苦手科目</button>
                        <button className="btn btn-ghost" onClick={() => setScreen("start")} disabled={loading}>設定変更</button>
                      </div>
                    )}
                  </React.Fragment>
                )}

                {tab === "log" && (
                  <React.Fragment>
                    <div className="login-streak">
                      <div style={{ fontSize: 28, fontWeight: 900 }}>{logs.loginStreak || 0}日連続</div>
                      <div style={{ fontSize: 13, opacity: .85, marginTop: 4 }}>学習中！この調子で続けよう 🔥</div>
                    </div>

                    <div className="recent-rate-card" style={{ background: rateBg, borderColor: rateBorder }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 800, color: "#9990cc", marginBottom: 4 }}>過去直近100問の正解率</div>
                          {recent100 ? (
                            <React.Fragment>
                              <div style={{ fontSize: 38, fontWeight: 900, color: rateColor, lineHeight: 1 }}>{recent100.rate}%</div>
                              <div className="rate-note" style={{ color: rateColor }}>
                                {recent100.count < 100 ? `（まだ${recent100.count}問分のデータ）` : "直近100問の結果"}
                              </div>
                            </React.Fragment>
                          ) : (
                            <div style={{ fontSize: 20, fontWeight: 800, color: "#9990cc" }}>まだデータなし</div>
                          )}
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 11, color: "#9990cc", marginBottom: 4 }}>累計</div>
                          <div style={{ fontSize: 18, fontWeight: 900, color: "#5b3ff8" }}>{logs.totalQ}問</div>
                          <div style={{ fontSize: 11, color: "#9990cc", marginTop: 4 }}>最高連続</div>
                          <div style={{ fontSize: 18, fontWeight: 900, color: "#f59e0b" }}>{logs.bestStreak}問</div>
                        </div>
                      </div>
                      {recent100 && (
                        <div style={{ marginTop: 12 }}>
                          <div className="bar-wrap" style={{ height: 12 }}>
                            <div className="bar" style={{ width: `${recent100.rate}%`, background: rateColor }}></div>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="card">
                      <div className="section-title">科目別 正解率（直近100問より）</div>
                      {subjectRates.map(({ s, rate, q }) => (
                        <div key={s} className="subj-row">
                          <span className="subj-name">{s}</span>
                          <div style={{ flex: 1 }}>
                            <div className="bar-wrap">
                              <div className="bar" style={{
                                width: rate !== null ? `${rate}%` : "0%",
                                background: rate >= 70 ? "#22c55e" : rate >= 50 ? "#f59e0b" : "#ef4444"
                              }}></div>
                            </div>
                          </div>
                          <span className="subj-rate">{rate !== null ? `${rate}%` : "未挑戦"}</span>
                          <span style={{ fontSize: 11, color: "#bbb", minWidth: 30, textAlign: "right" }}>{q > 0 ? `${q}問` : ""}</span>
                        </div>
                      ))}
                      <div style={{ fontSize: 11, color: "#bbb", marginTop: 8 }}>※ 直近100問の中での科目別集計</div>
                    </div>

                    <div className="card">
                      <div className="section-title">直近7日間</div>
                      {recentDays.map(d => (
                        <div key={d.key} className="day-row">
                          <span style={{ fontWeight: 800, minWidth: 40, color: d.q > 0 ? "#5b3ff8" : "#bbb" }}>{d.label}</span>
                          <div style={{ flex: 1 }}>
                            <div className="bar-wrap">
                              <div className="bar" style={{ width: d.q > 0 ? `${Math.min(100, d.q * 5)}%` : "0%", background: "#5b3ff8" }}></div>
                            </div>
                          </div>
                          <span style={{ fontSize: 12, color: "#9990cc", minWidth: 50, textAlign: "right" }}>
                            {d.q > 0 ? `${d.c}/${d.q}問` : "お休み"}
                          </span>
                        </div>
                      ))}
                    </div>

                    {logs.reviewQueue?.length > 0 && (
                      <div className="card" style={{ background: "#fffbeb", border: "1.5px solid #fde68a" }}>
                        <div style={{ fontWeight: 800, color: "#92400e", marginBottom: 6 }}>📝 復習キュー: {logs.reviewQueue.length}件</div>
                        <div style={{ fontSize: 13, color: "#78350f" }}>次の学習で自動的に復習問題が出るよ</div>
                      </div>
                    )}

                    {/* ダム在庫ウィジェット */}
                    <div className="card" style={{ background: "#f8f7ff" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div className="section-title" style={{ margin: 0 }}>📦 問題ストック（ダム在庫）</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          {isRefilling && <span className="dam-refill-dot"></span>}
                          <span style={{ fontSize: 12, fontWeight: 900, color: damTotal > 300 ? "#22c55e" : damTotal > 100 ? "#f59e0b" : "#ef4444" }}>
                            {damTotal} / 750問
                          </span>
                        </div>
                      </div>
                      <div style={{ marginBottom: 6 }}>
                        <div className="bar-wrap" style={{ height: 8 }}>
                          <div className="bar" style={{
                            width: `${Math.min(100, (damTotal / 750) * 100)}%`,
                            background: damTotal > 300 ? "#22c55e" : damTotal > 100 ? "#f59e0b" : "#ef4444"
                          }}></div>
                        </div>
                      </div>
                      {SUBJECTS.map(subj => (
                        <div key={subj} style={{ marginBottom: 10 }}>
                          <div style={{ fontSize: 11, fontWeight: 800, color: "#5b3ff8", marginBottom: 3 }}>{subj}</div>
                          <div className="dam-grid">
                            {LEVELS.map(lv => {
                              const cnt = damStats[subj]?.[lv] || 0;
                              const pct = Math.min(100, (cnt / DAM_MAX_PER_BUCKET) * 100);
                              const color = pct > 60 ? "#22c55e" : pct > 30 ? "#f59e0b" : "#ef4444";
                              return (
                                <div key={lv} className="dam-bucket">
                                  <div className="dam-lv-label">Lv.{lv}</div>
                                  <div className="dam-count" style={{ color }}>{cnt}<span style={{ fontSize: 9, color: "#bbb" }}>/50</span></div>
                                  <div className="dam-minibar">
                                    <div className="dam-minibar-fill" style={{ width: `${pct}%`, background: color }}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                      <div style={{ fontSize: 10, color: "#bbb", marginTop: 4, textAlign: "center" }}>
                        {isRefilling ? "⚡ バックグラウンドで補充中..." : "✓ 自動補充エンジン稼働中（90秒間隔）"}
                      </div>
                    </div>
                  </React.Fragment>
                )}

                {tab === "badge" && (
                  <div className="card">
                    <div className="section-title">獲得バッジ {logs.earnedBadges?.length || 0} / {BADGES.length}</div>
                    <div className="badge-grid">
                      {BADGES.map(b => {
                        const earned = logs.earnedBadges?.includes(b.id);
                        return (
                          <div key={b.id} className={`badge ${earned ? "earned" : "locked"}`}>
                            <div className="badge-icon">{b.icon}</div>
                            <div className="badge-name">{b.label}</div>
                            <div className="badge-desc">{b.desc}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ManabiV3/>);
  </script>
</body>
</html>
