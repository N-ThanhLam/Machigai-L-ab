// 学年に応じて科目リストを返す（小学生は算数、中学・高校は数学）

  if (grade && (grade.startsWith("中") || grade.startsWith("高"))) {
    return ["国語", "数学", "英語", "社会", "理科"];
  }
  return ["国語", "算数", "英語", "社会", "理科"];
};

// ─── SYSTEM PROMPT ────────────────────────────────────────────────
const SYSTEM_PROMPT = `あなたは日本のAI学習コーチです。児童・生徒が「どこで間違えたか」に気づき、正しい考え方を理解できるよう支援することが目的です。問題は「ある生徒のよくある誤答」をもとに作成し、対象学年に合った自然な学習支援にしてください。

【対象】指定された学年・科目・単元に準拠（学習指導要領ベース）
・現在の学習月に合わせること。その月時点で未習の内容は出さない。

【問題ルール】
・テキストだけで解ける問題にする（図・地図・表への言及は不可）
・未習漢字はひらがなで書く。問題文は200文字以内
・1問で確認することは1つだけ
・教師が授業で実際に使う、自然な問題にする
・英語問題でも指示文は日本語
・国語では文法の分類を目的にした不自然な問いにしない

【誤答の生成】
・その学年の子がよくやる思考のズレ・混同を1つ選び、student_answer に入れる
・正解を correct_answer に必ず入れる
・誤答は「1箇所だけ」ズレている答えにする。複数箇所がちがう誤答は禁止
・例：筆算なら「一の位だけ間違えた」「繰り下がりの1箇所だけミスした」など1点のみ
・誤答と正答を並べたとき、どこが違うかが1箇所に特定できない場合は問題を作り直す

【3段階の分析設問（analysis_step1〜3）】

各ステップ共通ルール：
・4択、正解は1つ、各選択肢100文字以内
・その学年で習った言葉だけを使う
・未習漢字を使わない
・正解が明確に1つに絞れる問いだけ作る
・「部分的には正しい」「場合によっては正しい」選択肢は禁止
・心理・性格・注意不足を推測しない
・不正解は、明確に不正解と判断できる内容にする
・feedback は1〜2文で短く、否定せず寄り添う表現にする
・「上記の全て」「以上の全て」など、選択肢の並び順に依存する表現は禁止

analysis_step1（問題理解の確認）:
この問題で「何を答える問題か」を4択で問う。

・正解だけが、問題文に対応する内容にする
・不正解は、聞かれていない内容にする
・選択肢の細かい比較で迷わせない

analysis_step2（答えのズレを特定）:
その生徒が、まず直すべきポイントを4択で問う。

・正解だけが、誤答を正答に近づける内容にする
・不正解は、誤答と関係ない内容にする
・用語説明や一般論は禁止
・「これしか正解ない」と分かる選択肢にする
・設問文では「あなた」ではなく「その生徒」を主語にすること。

analysis_step3（正しく考えよう）:
正解するために、どう考えればよいかを4択で問う。

・正解だけが、正答につながる考え方にする
・不正解は、考えても正答にたどり着けない内容にする
・学習者が次に何を確認すればよいか分かる内容にする

【出力形式】
・要素数1のJSON配列のみを出力
・説明・コードブロック・前置き・後置き禁止
・JSONとして正しい形式で出力すること
[{
"mistake_type":"誤答で起きている具体的なズレを短く書く",
"topic_tag":"単元名",
"subject":"科目名",
"question":"問題文（200文字以内）",
"student_answer":"生徒の誤答",
"correct_answer":"正解",
"correct_feedback":"なぜ正しいかを1文で",

"analysis_step1":{
"name":"何を聞かれていた？",
"question":"設問文",
"choices":["選択肢0","選択肢1","選択肢2","選択肢3"],
"answer":0,
"feedback":"解説1文"
},

"analysis_step2":{
"name":"答えのズレを見つけよう",
"question":"設問文",
"choices":["選択肢0","選択肢1","選択肢2","選択肢3"],
"answer":0,
"feedback":"解説1文"
},

"analysis_step3":{
"name":"どう教えてあげる？",
"question":"設問文",
"choices":["選択肢0","選択肢1","選択肢2","選択肢3"],
"answer":0,
"feedback":"解説1文"
}
}]

※ answer は choices 配列の正解インデックス（0始まり）

【mistake_type のルール】
・誤答で起きている「観測できるズレ」を短く書く
・心理・性格・注意不足を書かない
`;

// ─── INSPECT PROMPT ──────────────────────────────────────────────
const INSPECT_PROMPT = `あなたは学習問題の品質検査AIです。入力されたJSONの問題を審査し、以下の観点でチェックしてください。

【必須チェック項目】
1. correct_answer は事実として正しいか（算数・国語・英語・社会・理科として）
2. student_answer は correct_answer と「1箇所だけ」異なるか（複数箇所ズレていたら不合格）
3. 問題文がテキストだけで解けるか（図・グラフ・表・地図への依存があれば不合格）
4. analysis_step1〜3 それぞれの answer インデックスが、その choices の中で実際に正解に対応しているか
5. correct_feedback に事実誤りがないか
6. 学年・科目に対して適切な難易度・語彙か

【出力形式】
JSONのみ出力。説明文・コードブロック・前置き禁止。
合格: {"pass":true,"issues":[]}
不合格: {"pass":false,"issues":["具体的な問題点を1文で"]}
`;

// ─── INSPECT FUNCTION ────────────────────────────────────────────
// 戻り値: "pass"（合格）| "fail"（不合格）| "unchecked"（検査不能）
const INSPECT_TIMEOUT_MS = 20000;
const inspectQuestion = async (q, grade, key) => {
  if (!key || !key.trim()) return "unchecked"; // キーなし → 未検査扱い
  const payload = JSON.stringify({
    grade,
    subject: q.subject,
    topic_tag: q.topic_tag,
    question: q.question,
    student_answer: q.student_answer,
    correct_answer: q.correct_answer,
    correct_feedback: q.correct_feedback,
    mistake_type: q.mistake_type,
    analysis_step1: q.analysis_step1,
    analysis_step2: q.analysis_step2,
    analysis_step3: q.analysis_step3,
  });
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), INSPECT_TIMEOUT_MS);
  try {
    const body = {
      systemInstruction: { parts: [{ text: INSPECT_PROMPT }] },
      contents: [{ role: "user", parts: [{ text: payload }] }],
      generationConfig: { responseMimeType: "application/json", temperature: 0.1, topP: 0.8, topK: 10 }
    };
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body), signal: controller.signal }
    );
    clearTimeout(timer);
    if (!res.ok) return "unchecked";         // HTTPエラー → 検査不能
    const data = await res.json();
    if (data.error) return "unchecked";      // APIエラー → 検査不能
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return "unchecked";           // 空レスポンス → 検査不能
    let result;
    try {
      result = JSON.parse(text.replace(/```json/g, "").replace(/```/g, "").trim());
    } catch (e) {
      return "unchecked";                    // JSON崩れ → 検査不能
    }
    if (!result || typeof result !== "object" || !("pass" in result)) return "unchecked";
    return result.pass === true ? "pass" : "fail";
  } catch (e) {
    clearTimeout(timer);
    return "unchecked"; // タイムアウト・ネットワークエラー → 検査不能
  }
};

// ─── DAM ─────────────────────────────────────────────────────────
const DAM_KEY="manabi_dam_v3";
const DAM_MAX=60;
const DAM_BATCH=5;
const getDam=()=>{try{return JSON.parse(localStorage.getItem(DAM_KEY)||"{}");}catch(e){return{};}};
const saveDam=d=>{try{localStorage.setItem(DAM_KEY,JSON.stringify(d));}catch(e){}};
const addToDam=(subj,qs)=>{const dam=getDam(),ex=dam[subj]||[];const keys=new Set(ex.map(q=>(q.question||"").slice(0,30)));dam[subj]=[...ex,...qs.filter(q=>!keys.has((q.question||"").slice(0,30)))].slice(-DAM_MAX);saveDam(dam);};
// 復習問題はストックの「先頭」に挿入して優先使用されるようにする
const addToDamFront=(subj,qs)=>{const dam=getDam(),ex=dam[subj]||[];const keys=new Set(ex.map(q=>(q.question||"").slice(0,30)));const fresh=qs.filter(q=>!keys.has((q.question||"").slice(0,30)));if(!fresh.length)return;dam[subj]=[...fresh,...ex].slice(0,DAM_MAX);saveDam(dam);};
const popFromDam=(subj,n=1)=>{const dam=getDam(),b=dam[subj]||[];if(!b.length)return[];
  // checked を優先して先頭に、unchecked を後に並べてから取り出す
  const checked=b.filter(q=>q._checkState==="checked");
  const unchecked=b.filter(q=>q._checkState!=="checked");
  const ordered=[...checked,...unchecked];
  const take=Math.min(n,ordered.length);const r=ordered.slice(0,take);
  dam[subj]=ordered.slice(take);saveDam(dam);return r;};
const getDamStats=(subjects=SUBJECTS)=>subjects.reduce((a,s)=>({...a,[s]:(getDam()[s]||[]).length}),{});
const getDamTotal=(subjects=SUBJECTS)=>subjects.reduce((t,s)=>t+(getDam()[s]||[]).length,0);
const getDamUncheckedTotal=(subjects=SUBJECTS)=>{const dam=getDam();return subjects.reduce((t,s)=>t+(dam[s]||[]).filter(q=>q._checkState!=="checked").length,0);};
const lowestBuckets=(n=1,subjects=SUBJECTS)=>{const dam=getDam();return subjects.map(s=>({subj:s,cnt:(dam[s]||[]).length})).sort((a,b)=>a.cnt-b.cnt).slice(0,n);};

// ─── UTILS ───────────────────────────────────────────────────────
const calcGrade=birth=>{if(!birth)return"一般";const b=new Date(birth),now=new Date();let sy=now.getFullYear();if(now.getMonth()<3)sy--;let ent=b.getFullYear()+7;if(b.getMonth()<3)ent--;const y=sy-ent+1;if(y>=1&&y<=6)return`小学${y}年生`;if(y>=7&&y<=9)return`中学${y-6}年生`;if(y>=10&&y<=12)return`高校${y-9}年生`;return"一般";};
const today=()=>{const d=new Date();const jst=new Date(d.getTime()+9*60*60*1000);return jst.toISOString().slice(0,10);};
const jstYesterday=()=>{const d=new Date();const jst=new Date(d.getTime()+9*60*60*1000);jst.setUTCDate(jst.getUTCDate()-1);return jst.toISOString().slice(0,10);};
let _ki=0;
const pickKey=keys=>{const k=keys[_ki%keys.length];_ki++;return k;};

// ─── STEP SHUFFLE ─────────────────────────────────────────────────
const shuffleStep=step=>{
  const origAnswer=typeof step.answer==="number"&&step.answer>=0&&step.answer<step.choices.length?step.answer:0;
  const ix=step.choices.map((c,i)=>({c,i}));
  for(let i=ix.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]];}
  const newAnswer=ix.findIndex(x=>x.i===origAnswer);
  return{...step,choices:ix.map(x=>x.c),answer:newAnswer>=0?newAnswer:0};
};
const shuffleAllSteps=q=>({
  ...q,
  analysis_step1:shuffleStep(q.analysis_step1),
  analysis_step2:shuffleStep(q.analysis_step2),
  analysis_step3:shuffleStep(q.analysis_step3),
});

const hasValidAnalysis=q=>{
  if(
  !q ||
  !q.student_answer ||
  !q.correct_answer ||
  !q.question
)return false;
  return[1,2,3].every(i=>{const s=q[`analysis_step${i}`];return s&&s.question&&Array.isArray(s.choices)&&s.choices.length===4&&typeof s.answer==="number";});
};

// ─── ローカルバリデーション（LLM検査前の軽量チェック） ─────────────
// LLM検査より前に実行し、明らかな構造不正・必須項目欠落を排除する
const localValidate=q=>{
  if(!q||typeof q!=="object")return false;
  // 必須フィールドが存在し非空文字列であること
  const req=["question","student_answer","correct_answer","correct_feedback","mistake_type","topic_tag","subject"];
  if(req.some(k=>!q[k]||typeof q[k]!=="string"||!q[k].trim()))return false;
  // 問題文の文字数（プロンプト指定200文字、多少の余裕を持たせる）
  if(q.question.length>300)return false;
  // analysis_step1〜3 の構造チェック
  for(let i=1;i<=3;i++){
    const s=q[`analysis_step${i}`];
    if(!s||typeof s!=="object")return false;
    if(!s.question||typeof s.question!=="string"||!s.question.trim())return false;
    if(!Array.isArray(s.choices)||s.choices.length!==4)return false;
    if(s.choices.some(c=>!c||typeof c!=="string"||!c.trim()))return false;
    // answer は 0〜3 の整数
    if(typeof s.answer!=="number"||!Number.isInteger(s.answer)||s.answer<0||s.answer>3)return false;
    if(!s.feedback||typeof s.feedback!=="string"||!s.feedback.trim())return false;
  }
  return true;
};

const calcRecent100=h=>{if(!h||!h.length)return null;const last=h.slice(-100),c=last.filter(r=>r.correct).length;return{rate:Math.round(c/last.length*100),count:last.length};};
const calcSubjRates=h=>{if(!h||!h.length)return{};const m={};for(const r of h.slice(-100)){if(!m[r.subject])m[r.subject]={q:0,c:0};m[r.subject].q++;if(r.correct)m[r.subject].c++;}return m;};

// ─── initLogs ────────────────────────────────────────────────────
const initLogs=()=>({
  subjectStats:{},dailyLog:{},totalQ:0,totalCorrect:0,
  bestStreak:0,loginStreak:0,bestLoginStreak:0,lastLogin:"",
  earnedBadges:[],reviewQueue:[],recentHistory:[],
  debugStats:{completed:0,perfect:0},
  checkStats:{total:0,correct:0},
  topicMastery:{},
  debugHistory:[],
});

// ─── MAIN ────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("start");
  const [tab,setTab]=useState("learn");
  const [apiKeys,setApiKeys]=useState(["","","",""]);
  const [birthday,setBirthday]=useState("");
  const [grade,setGrade]=useState("");
  const [subject,setSubject]=useState("");
  const [gs,setGs]=useState({streak:0,best:0,wrong:0,qNum:1});
  const [quiz,setQuiz]=useState(null);
  const [loading,setLoading]=useState(false);
  const [isCooldown,setIsCooldown]=useState(false);
  const [startError,setStartError]=useState("");
  const [appError,setAppError]=useState("");
  const [showSubjSel,setShowSubjSel]=useState(false);
  const [damStats,setDamStats]=useState(()=>getDamStats(calcSubjects(calcGrade(""))));
  const [isRefilling,setIsRefilling]=useState(false);
  const [logs,setLogs]=useState(initLogs);
  const [isReview,setIsReview]=useState(false);
  const isReviewR=useRef(false);
  // isReviewとisReviewRを同期
  useEffect(()=>{isReviewR.current=isReview;},[isReview]);
  // 現在解いている復習キューアイテムのID（問題ID単位管理）
  const [currentReviewItemId,setCurrentReviewItemId]=useState(null);
  const currentReviewItemIdR=useRef(null);
  useEffect(()=>{currentReviewItemIdR.current=currentReviewItemId;},[currentReviewItemId]);
  const [newBadges,setNewBadges]=useState([]);
  const [settingsSaved,setSettingsSaved]=useState(false);
  const [showLoginBonus,setShowLoginBonus]=useState(false);
  const [normaQueue,setNormaQueue]=useState([]);
  const [normaReason,setNormaReason]=useState("");
  const [showNormaBanner,setShowNormaBanner]=useState(false);
  // ① 正解バースト
  const [showCorrectBurst,setShowCorrectBurst]=useState(false);
  // ⑥ 連続正解途切れメッセージ
  const [streakBrokenMsg,setStreakBrokenMsg]=useState("");
  // ⑦ ウェルカムバックメッセージ
  const [welcomeMsg,setWelcomeMsg]=useState("");
  // ⑨ 苦手科目改善メッセージ
  const [subjectImprovedMsg,setSubjectImprovedMsg]=useState("");
  // ⑪ 休み明けメッセージ
  const [showRestartMsg,setShowRestartMsg]=useState(false);
  const normaQueueR=useRef([]);
  const prevRatesRef=useRef({});
  const welcomeShownRef=useRef(false);
  const prevSessionsRef=useRef(0);
  const [autoRefill,setAutoRefill]=useState(()=>{try{return JSON.parse(localStorage.getItem("manabi_autorefill")??'true');}catch(e){return true;}});
  const [importMsg,setImportMsg]=useState("");
  const [rejectCount,setRejectCount]=useState(()=>{try{return parseInt(localStorage.getItem("manabi_reject_count")||"0",10);}catch(e){return 0;}});
  const [waitingForStock,setWaitingForStock]=useState(null); // null | 科目名
  const waitingForStockR=useRef(null);
  useEffect(()=>{waitingForStockR.current=waitingForStock;},[waitingForStock]);
  const autoRefillR=useRef(autoRefill);

  // 学年に応じた科目リスト（gradeが変わると自動更新）
  const subjects = calcSubjects(grade);
  const subjectsR = useRef(subjects);
  useEffect(()=>{ subjectsR.current = calcSubjects(grade); setDamStats(getDamStats(calcSubjects(grade))); },[grade]);
  useEffect(()=>{autoRefillR.current=autoRefill;try{localStorage.setItem("manabi_autorefill",JSON.stringify(autoRefill));}catch(e){};},[autoRefill]);

  // ストック待機中: 補充されたら自動で問題を表示（全科目チェック、あればズレて出題）
  useEffect(()=>{
    if(!waitingForStock)return;
    const timer=setInterval(()=>{
      const subs=subjectsR.current;
      // 元の科目を優先、なければ他科目へズレる
      for(const s of [waitingForStock,...subs.filter(x=>x!==waitingForStock)]){
        const q=popFromDam(s,1);
        if(q.length){
          setWaitingForStock(null);
          if(s!==waitingForStock){setSubject(s);setIsReview(false);}
          // 復習待機中に問題が来てもキュー削除はしない（分析完了後にIDで削除）
          if(isReviewR.current&&s===waitingForStock){}
          setQuiz(q[0]);
          setDamStats(getDamStats(subs));
          
          return;
        }
      }
    },3000);
    return()=>clearInterval(timer);
  },[waitingForStock]);

  // ── 誤答分析ステート（フラット） ──
  const [analysisStep,setAnalysisStep]=useState(null); // null | 1 | 2 | 3 | "done"
  const [stepAns,setStepAns]=useState(null);
  const [stepResults,setStepResults]=useState([null,null,null]);
  const stepResultsR=useRef([null,null,null]);

  const STORE="manabi_logs_v4";const PROF="manabi_profile_v2";const SESS="manabi_session_v2";

  const logsR=useRef(logs);const gsR=useRef(gs);const subjR=useRef(subject);
  const keysR=useRef(apiKeys);const gradeR=useRef(grade);const bdR=useRef(birthday);
  const refillLk=useRef(false);const fetchLk=useRef(false);const nextLk=useRef(false);const reqId=useRef(null);

  useEffect(()=>{logsR.current=logs;},[logs]);
  useEffect(()=>{gsR.current=gs;},[gs]);
  useEffect(()=>{subjR.current=subject;},[subject]);
  useEffect(()=>{keysR.current=apiKeys;},[apiKeys]);
  useEffect(()=>{gradeR.current=grade;},[grade]);
  useEffect(()=>{bdR.current=birthday;},[birthday]);
  useEffect(()=>{normaQueueR.current=normaQueue;},[normaQueue]);
  useEffect(()=>{try{localStorage.setItem(SESS,JSON.stringify({...gs,savedDate:today()}));}catch(e){}},[gs]);
  // ノルマ達成バナー
  useEffect(()=>{
    const cur=logs.dailyLog?.[today()]?.sessions||0;
    if(cur>=3&&prevSessionsRef.current<3&&prevSessionsRef.current>=0){
      setShowNormaBanner(true);setTimeout(()=>setShowNormaBanner(false),3500);
    }
    prevSessionsRef.current=cur;
  },[logs]);

  // ⑦ ウェルカムバック（app画面に入ったとき）
  useEffect(()=>{
    if(screen!=="app"||welcomeShownRef.current)return;
    welcomeShownRef.current=true;
    const yk=jstYesterday();
    const yl=logsR.current.dailyLog?.[yk];
    if(yl&&yl.q>0){
      const subjs=(yl.subjects||[]).join("・");
      const msg=subjs?`昨日は${subjs}を${yl.q}問頑張ったね！今日もいこう ✨`:`昨日は${yl.q}問頑張ったね！今日もいこう ✨`;
      setWelcomeMsg(msg);
      setTimeout(()=>setWelcomeMsg(""),4000);
    }
  },[screen]);

  // ⑨ 苦手科目改善検知
  useEffect(()=>{
    const rates=calcSubjRates(logs.recentHistory);
    const prev=prevRatesRef.current;
    for(const s of subjectsR.current){
      const r=rates[s];const p=prev[s];
      if(r&&r.q>=5&&p&&p.q>=5){
        const pr=p.c/p.q;const cr=r.c/r.q;
        if(pr<0.5&&cr>=0.5){
          setSubjectImprovedMsg(`📈 ${s}の正解率が${Math.round(pr*100)}%→${Math.round(cr*100)}%にアップ！`);
          setTimeout(()=>setSubjectImprovedMsg(""),4500);
        }
      }
    }
    prevRatesRef.current=rates;
  },[logs]);

  // quiz がセットされたら分析を自動スタート
  useEffect(()=>{
    if(!quiz)return;
    if(hasValidAnalysis(quiz)){
      setAnalysisStep(1);
      setStepAns(null);
      setStepResults([null,null,null]);
    }
  },[quiz]);

  useEffect(()=>{
    try{
      const p=localStorage.getItem(PROF);
      if(p){const d=JSON.parse(p);setBirthday(d.birthday||"");setGrade(calcGrade(d.birthday||""));if(d.apiKeys&&Array.isArray(d.apiKeys))setApiKeys(d.apiKeys);else if(d.apiKey)setApiKeys([d.apiKey,"","",""]);}
      const s=localStorage.getItem(SESS);
      if(s){const p2=JSON.parse(s);if(p2.savedDate===today())setGs(p2);else setGs(prev=>({...prev,streak:p2.streak||0,best:prev.best||0,wrong:0,qNum:1}));}
    }catch(e){}
    loadLogs();setDamStats(getDamStats(subjectsR.current));
  },[]);

  const loadLogs=()=>{
    try{
      const r=localStorage.getItem(STORE);
      if(r){
        const p=JSON.parse(r);
        if(!p.debugStats)p.debugStats={completed:0,perfect:0};
        if(!p.checkStats)p.checkStats={total:0,correct:0};
        if(!p.topicMastery)p.topicMastery={};
        if(!p.debugHistory)p.debugHistory=[];
        if(!p.bestLoginStreak)p.bestLoginStreak=0;
        const td=today();
        const yk2=jstYesterday();
        const isGap=p.lastLogin&&p.lastLogin!==td&&p.lastLogin!==yk2;
        if(!isGap&&p.loginStreak>=2&&p.lastLogin!==td){setShowLoginBonus(true);setTimeout(()=>setShowLoginBonus(false),3500);}
        // ⑪ 1日以上空いた場合の休み明けメッセージ（loginBonusと排他）
        if(isGap){setShowRestartMsg(true);setTimeout(()=>setShowRestartMsg(false),5000);}
        setLogs(p);
      }
    }catch(e){}
  };
  const saveLogs=nl=>{try{localStorage.setItem(STORE,JSON.stringify(nl));}catch(e){}};

  const checkBadges=(next)=>{
    const subs=subjectsR.current;
    const earned=BADGES.filter(b=>!next.earnedBadges.includes(b.id)&&b.cond(next,subs));
    if(earned.length){next.earnedBadges=[...next.earnedBadges,...earned.map(b=>b.id)];setNewBadges(earned);setTimeout(()=>setNewBadges([]),3500);}
  };

  const updateLogs=(correct,subj,wrongItem,newBest)=>{
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));const td=today();
      if(!next.subjectStats[subj])next.subjectStats[subj]={q:0,c:0};
      next.subjectStats[subj].q++;if(correct)next.subjectStats[subj].c++;
      if(!next.dailyLog[td])next.dailyLog[td]={q:0,c:0,subjects:[],sessions:0};
      next.dailyLog[td].q++;if(correct)next.dailyLog[td].c++;
      next.dailyLog[td].sessions++; // 正解・不正解問わず分析完了でカウント
      if(!next.dailyLog[td].subjects.includes(subj))next.dailyLog[td].subjects.push(subj);
      next.totalQ++;if(correct)next.totalCorrect++;
      if(newBest!==undefined)next.bestStreak=Math.max(next.bestStreak||0,newBest);
      if(!next.recentHistory)next.recentHistory=[];
      next.recentHistory.push({correct,subject:subj,date:td});
      if(next.recentHistory.length>200)next.recentHistory=next.recentHistory.slice(-200);
      if(!correct&&wrongItem){if(!next.reviewQueue)next.reviewQueue=[];if(next.reviewQueue.length<20)next.reviewQueue.push(wrongItem);}
      if(next.lastLogin!==td){const ys=jstYesterday();next.loginStreak=(next.lastLogin===ys)?(next.loginStreak||0)+1:1;next.lastLogin=td;next.bestLoginStreak=Math.max(next.bestLoginStreak||0,next.loginStreak);}
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic){
        if(!next.topicMastery[topic])next.topicMastery[topic]={subj,attempts:0,correct:0,debugDone:0,mastered:false};
        const tm=next.topicMastery[topic];tm.attempts++;if(correct)tm.correct++;
        if(!tm.mastered&&tm.attempts>=5&&tm.correct/tm.attempts>=.8)tm.mastered=true;
      }
      checkBadges(next);saveLogs(next);return next;
    });
  };

  const updateAnalysisStats=(results,subj)=>{
    const perfect=results.every(Boolean);
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next.debugStats)next.debugStats={completed:0,perfect:0};
      next.debugStats.completed++;if(perfect)next.debugStats.perfect++;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      // 問題ID単位で該当アイテムのみ削除（同一単元の別誤答を巻き込まない）
      const reviewId=currentReviewItemIdR.current;
      if(reviewId){
        next.reviewQueue=(next.reviewQueue||[]).filter(q=>q.id!==reviewId);
      }else if(topic){
        // IDなし旧データの後方互換: 同じtopicの最初の1件だけ削除
        const idx=(next.reviewQueue||[]).findIndex(q=>q.topic===topic&&!q.id);
        if(idx!==-1)next.reviewQueue.splice(idx,1);
      }
      if(topic&&next.topicMastery[topic]){
      next.topicMastery[topic].debugDone++;
    }
      if(!next.debugHistory)next.debugHistory=[];
      next.debugHistory.unshift({date:today(),subj,topic:topic||"—",results});
      if(next.debugHistory.length>100)next.debugHistory=next.debugHistory.slice(0,100);
      checkBadges(next);saveLogs(next);return next;
    });
  };

  const getFireLevel=n=>{if(n>=30)return 5;if(n>=14)return 4;if(n>=7)return 3;if(n>=3)return 2;if(n>=1)return 1;return 0;};
  const pickSubject=cur=>{
    const subs=subjectsR.current;
    const rates=calcSubjRates(cur.recentHistory);
    const ws=subs.map(s=>{const r=rates[s];if(!r||r.q<3)return{s,w:3};const rt=r.c/r.q;return{s,w:rt<.5?4:rt<.7?2:1};});
    const tot=ws.reduce((a,b)=>a+b.w,0);let r=Math.random()*tot;
    for(const x of ws){r-=x.w;if(r<=0)return x.s;}return subs[0];
  };

  const buildNormaQueue=cur=>{
    const subs=subjectsR.current;
    const done=cur.dailyLog?.[today()]?.sessions||0;
    const needed=Math.max(0,3-done);
    if(!needed)return[];
    const rates=calcSubjRates(cur.recentHistory);
    const result=[];const used=new Set();
    // 優先1: 復習キューの科目
    const reviewSubj=cur.reviewQueue?.[0]?.subject;
    if(reviewSubj&&result.length<needed&&!used.has(reviewSubj)){
      result.push({subj:reviewSubj,reason:"復習タイム！"});used.add(reviewSubj);
    }
    // 優先2: 未挑戦・苦手順
    const sorted=subs.filter(s=>!used.has(s))
      .map(s=>{const r=rates[s];const rate=(r&&r.q>=3)?r.c/r.q:null;return{s,rate,q:r?.q||0};})
      .sort((a,b)=>{
        if(a.rate===null&&b.rate===null)return a.q-b.q;
        if(a.rate===null)return-1;if(b.rate===null)return 1;
        return a.rate-b.rate;
      });
    for(const{s,rate,q}of sorted){
      if(result.length>=needed)break;
      const reason=q===0?"まだ未挑戦！":rate<0.5?"苦手科目！":rate<0.7?"もう少し！":"バランス調整";
      result.push({subj:s,reason});used.add(s);
    }
    return result;
  };

  const startWithNorma=(cur,g)=>{
    const nq=buildNormaQueue(cur);
    if(nq.length){
      const[first,...rest]=nq;
      setNormaQueue(rest);normaQueueR.current=rest;
      setNormaReason(first.reason);
      resetFetch(first.subj,g);
    }else{
      setNormaReason("");
      resetFetch(pickSubject(cur),g);
    }
  };

  const buildPrompt=(g,subj,s,review,reviewItem,cur)=>{
    const mon=new Date().getMonth()+1;
    const rates=calcSubjRates(cur.recentHistory);
    const weak=calcSubjects(g).filter(sub=>{const r=rates[sub];return r&&r.q>=3&&r.c/r.q<.6;});
    const dam=getDam();
    const damTopics=[...new Set((dam[subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
    // 中学・高校で「算数」が渡された場合は「数学」としてGeminiに要求
    const promptSubj=(subj==="算数"&&(g.startsWith("中")||g.startsWith("高")))?"数学":subj;
    let p=`\n学年:${g}\n時期:${mon}月\n科目:${promptSubj}\n日本公立学校の進度に合わせること。${mon}月時点で未習内容は禁止。\n`;
    p+=`【出題済み単元】以下の単元はストックに存在する。同じ単元でも問題文・題材・数値が異なれば出題可。完全に同じ問題は禁止:${damTopics}\n`;
    if(review&&reviewItem)p+=`【復習】科目「${promptSubj}」で過去に間違えたテーマ:${reviewItem.topic}の類似問題を1問。`;
    else p+=`科目「${promptSubj}」から1問。`;
    p+=`\nmistake_type を必ず含めること。`;
    p+=`\n「誤答付き問題」形式で student_answer・correct_answer・analysis_step1〜3 を必ず含めること。`;
    return p;
  };

  const resetState=()=>{
    setQuiz(null);
    setAnalysisStep(null);setStepAns(null);
    stepResultsR.current=[null,null,null];
    setStepResults([null,null,null]);
    setCurrentReviewItemId(null);
  };

  // バックグラウンド補充
  useEffect(()=>{
    if(screen!=="app")return;
    let cancelled=false;
    const doRefill=async()=>{
      if(cancelled||refillLk.current)return false;
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)return false;
      const g=gradeR.current||calcGrade(bdR.current);
      const curSubjects=calcSubjects(g);
      const dam=getDam();
      // 復習キューの科目を優先、足りなければ最少バケツで埋める（キー数分まで）
      const reviewSubjs=[...new Set((logsR.current.reviewQueue||[]).map(q=>q.subject).filter(Boolean))].filter(s=>(dam[s]||[]).length<DAM_MAX);
      const byCount=lowestBuckets(keys.length,curSubjects);
      const seen=new Set();const targets=[];
      for(const s of reviewSubjs){if(!seen.has(s)&&targets.length<keys.length){targets.push({subj:s,cnt:(dam[s]||[]).length});seen.add(s);}}
      for(const t of byCount){if(!seen.has(t.subj)&&targets.length<keys.length){targets.push(t);seen.add(t.subj);}}
      const filtered=targets.filter(t=>autoRefillR.current||t.cnt<DAM_MAX);
      if(!filtered.length)return true;
      refillLk.current=true;setIsRefilling(true);
      try{
        // ─ 生成: キー数分を並列実行 ──────────────────────────
        const genResults=await Promise.all(filtered.map(async(target,i)=>{
          const key=keys[i%keys.length];
          const damTopics=[...new Set((getDam()[target.subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
          // 中学・高校の場合「算数」キーでも「数学」としてGeminiに要求する
          const promptSubj=(target.subj==="算数"&&(g.startsWith("中")||g.startsWith("高")))?"数学":target.subj;
          const body={systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:`【科目固定】「${promptSubj}」の誤答付き問題を${DAM_BATCH}問。student_answer・correct_answer・analysis_step1〜3を必ず含めること。\n学年:${g}\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",temperature:.4,topP:.9,topK:20}};
          try{
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
            if(!res.ok)return{subj:target.subj,valid:[]};
            const data=await res.json();if(data.error)return{subj:target.subj,valid:[]};
            const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text)return{subj:target.subj,valid:[]};
            let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){return{subj:target.subj,valid:[]};}
            if(!Array.isArray(parsed))parsed=[parsed];
            const valid=parsed.filter(q=>q.question&&q.student_answer&&q.correct_answer&&hasValidAnalysis(q)).map(q=>{
              // 中学・高校では「数学」を「算数」として扱う（Geminiが「数学」と返す場合の吸収）
              if(target.subj==="算数"&&q.subject==="数学")return{...q,subject:"算数"};
              return q;
            }).filter(q=>q.subject===target.subj);
            return{subj:target.subj,valid};
          }catch(e){return{subj:target.subj,valid:[]};}
        }));
        if(cancelled)return false;
        // ─ 検査: ローカルバリデーション → 検査AI（科目ごと並列） ─────────────
        let totalRejected=0;let anyPassed=false;
        await Promise.all(genResults.map(async({subj,valid},i)=>{
          if(!valid.length||cancelled)return;
          // ① ローカルバリデーション（LLM前の軽量チェック）
          const localPassed=valid.filter(q=>localValidate(q));
          const localRejected=valid.length-localPassed.length;
          totalRejected+=localRejected;
          if(!localPassed.length)return;
          // ② LLM検査AI（"pass"|"fail"|"unchecked" の三値）
          const inspKey=keys[i%keys.length];
          const inspResults=await Promise.all(localPassed.map(q=>inspectQuestion(q,g,inspKey)));
          let llmRejected=0;
          const toStore=[];
          localPassed.forEach((q,j)=>{
            const result=inspResults[j];
            if(result==="fail"){llmRejected++;return;}          // 不合格 → 棄却
            const checkState=result==="pass"?"checked":"unchecked"; // pass or unchecked
            toStore.push(shuffleAllSteps({...q,mistake_type:q.mistake_type||"不明",_subject:subj,_checkState:checkState}));
          });
          totalRejected+=llmRejected;
          if(toStore.length&&!cancelled){
            // checked を先頭に配置してストックの品質を高める
            const checkedItems=toStore.filter(q=>q._checkState==="checked");
            const uncheckedItems=toStore.filter(q=>q._checkState!=="checked");
            const isReviewSubj=(logsR.current.reviewQueue||[]).some(q=>q.subject===subj);
            if(isReviewSubj)addToDamFront(subj,[...checkedItems,...uncheckedItems]);
            else addToDam(subj,[...checkedItems,...uncheckedItems]);
            anyPassed=true;
          }
        }));
        // ─────────────────────────────────────────────────────
        if(totalRejected>0){setRejectCount(p=>{const n=p+totalRejected;try{localStorage.setItem("manabi_reject_count",String(n));}catch(e){}return n;});}
        if(!cancelled)setDamStats(getDamStats(subjectsR.current));
        return anyPassed;
      }catch(e){}finally{refillLk.current=false;if(!cancelled)setIsRefilling(false);}
      return false;
    };
    const loop=async delay=>{await new Promise(r=>setTimeout(r,delay));if(cancelled)return;const ok=await doRefill();if(!cancelled){const hasReview=(logsR.current.reviewQueue||[]).length>0;const isWaiting=!!waitingForStockR.current;const next=isWaiting?15000:hasReview?45000:ok?120000:90000;loop(next);}};
    loop(15000);
    return()=>{cancelled=true;};
  },[screen]);

  const fetchQ=useCallback(async(g,subj,review,reviewItem)=>{
    if(fetchLk.current)return;fetchLk.current=true;
    const rid=Date.now()+Math.random();reqId.current=rid;
    const stale=()=>reqId.current!==rid;
    try{
      if(!stale()){resetState();setAppError("");}
      // 常にストックから出題。直接生成しない。
      // 指定科目を優先、0なら他科目へズレる、全科目0なら待機。
      const subs=subjectsR.current;
      const st=popFromDam(subj,1);
      if(st.length){
        if(!stale()){setQuiz(st[0]);setLoading(false);setIsCooldown(false);setDamStats(getDamStats(subs));}
        return;
      }
      // 指定科目が0 → 他科目へズレる
      let shifted=null,shiftedSubj=subj;
      for(const s of subs){
        if(s===subj)continue;
        const any=popFromDam(s,1);
        if(any.length){shifted=any[0];shiftedSubj=s;break;}
      }
      if(shifted){
        if(!stale()){
          if(shiftedSubj!==subj)setSubject(shiftedSubj);
          setQuiz(shifted);setLoading(false);setIsCooldown(false);setDamStats(getDamStats(subs));
          
        }
        return;
      }
      // 全科目0 → 待機モード
      if(!stale()){setLoading(false);setWaitingForStock(subj);}
    }catch(e){
      if(!stale())setAppError("AIにつながれなかったよ！もう一度おしてみてね");
    }
    finally{if(reqId.current===rid)setLoading(false);fetchLk.current=false;}
  },[]);

  const resetFetch=useCallback((subj,sg)=>{
    const cur=gsR.current;const init={streak:cur.streak,best:cur.best,wrong:0,qNum:1};
    resetState();setGs(init);setSubject(subj);setWaitingForStock(null);
    const g=sg||grade;requestAnimationFrame(()=>fetchQ(g,subj,false,null));
  },[grade,fetchQ]);

  // 分析ステップ回答
  const handleStepAnswer=idx=>{
    if(stepAns!==null||!analysisStep||analysisStep==="done")return;
    const step=quiz[`analysis_step${analysisStep}`];
    const correct=idx===step.answer;
    setStepAns(idx);
    setStepResults(p=>{const n=[...p];n[analysisStep-1]=correct;stepResultsR.current=n;return n;});
    // ① 正解バースト
    if(correct){setShowCorrectBurst(true);setTimeout(()=>setShowCorrectBurst(false),750);}
  };

  // 次のステップへ / 完了
  const handleStepNext=()=>{
    if(!analysisStep||analysisStep==="done")return;
    if(analysisStep<3){
      setAnalysisStep(p=>p+1);
      setStepAns(null);
    }else{
      const finalResults=[...stepResultsR.current];
      const score=finalResults.filter(Boolean).length;
      const correct=score>=2;
      // ⑥ 連続正解が途切れたとき
      if(!correct&&gs.streak>=3){
        setStreakBrokenMsg(`🔥 ${gs.streak}連続まで行ったね！惜しい！`);
        setTimeout(()=>setStreakBrokenMsg(""),3500);
      }
      const wrongItem=!correct?{
      id:`rq_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
      topic:quiz.topic_tag||quiz.question.slice(0,20),
      subject,
      mistakeType:quiz.mistake_type||"不明"
     }:null;
      const nextStr=correct?gs.streak+1:0;
      const newBest=Math.max(gs.best,nextStr);
      updateLogs(correct,subject,wrongItem,newBest);
      updateAnalysisStats(finalResults,subject);
      setGs(p=>({...p,streak:nextStr,best:newBest,wrong:correct?p.wrong:p.wrong+1,qNum:p.qNum+1}));
      setAnalysisStep("done");
    }
  };

  const handleNext=async()=>{
    if(nextLk.current)return;nextLk.current=true;
    resetState();
    try{
      const cur=logsR.current;
      const doneSessions=cur.dailyLog?.[today()]?.sessions||0;
      const normaActive=doneSessions<3;
      if(normaActive){
        // ノルマモード: キューから次の科目を取り出す
        const q=normaQueueR.current;
        let ns,reason;
        if(q.length){
          const[next,...rest]=q;
          setNormaQueue(rest);normaQueueR.current=rest;
          ns=next.subj;reason=next.reason;
        }else{
          // キュー切れ（不正解続き）: バランスで補填
          ns=pickSubject(cur);reason="バランス調整";
        }
        setNormaReason(reason);setSubject(ns);setIsReview(false);
        // 指定科目のストックを確認、0なら他科目へズレる
        {

          let shifted=null,shiftedSubj=ns;

          if(shifted){setSubject(shiftedSubj);setDamStats(getDamStats(subs));setQuiz(shifted);return;}

        setQuiz(fromDam[0]);return;

  };

  // ─── エクスポート / インポート ─────────────
  const exportData=()=>{

  const importData=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.app!=="まちがいラボ")throw new Error("invalid app");
        if(!d.logs||typeof d.logs!=="object")throw new Error("invalid logs");
        const restored={...initLogs(),...d.logs};
        if(!restored.debugStats)restored.debugStats={completed:0,perfect:0};
        if(!restored.checkStats)restored.checkStats={total:0,correct:0};

                        if(rid){n.reviewQueue=(n.reviewQueue||[]).filter(q=>q.id!==rid);}
                        else if(topic){const idx=(n.reviewQueue||[]).findIndex(q=>q.topic===topic&&!q.id);if(idx!==-1)n.reviewQueue.splice(idx,1);}
                        saveLogs(n);return n;});
                      alert("報告しました。復習リストから削除されます。");
                    }}>⚠️ この問題の内容がおかしい</button>
                  </div>
                )}

                {/* ノルマ中インジケーター */}
                {(!analysisStep||analysisStep==="done")&&!dailyGoalMet&&(
                  <div style={{marginTop:4,padding:"10px 14px",background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:12,textAlign:"center",fontSize:12,color:"#92400e",fontWeight:800}} className={todaySessions===2?"norma-last":""}>
                    {todaySessions===2?"🎯 あと1問でノルマ達成！":"🎯 ノルマ "+todaySessions+"/3　— AIが科目を選んでいます"}
                  </div>
                )}

                {/* 科目選択 - ノルマ達成後のみ表示 */}
                {(!analysisStep||analysisStep==="done")&&dailyGoalMet&&(
                  showSubjSel?(
                    <div className="card" style={{padding:14,background:"#f8f7ff"}}>
                      <div style={{fontSize:13,fontWeight:800,color:"#5b3ff8",marginBottom:10,textAlign:"center"}}>勉強したい科目を選んでね！</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                        {subjects.map(s=>(
                          <button key={s} className="btn btn-primary" style={{padding:"10px 8px",fontSize:14}} onClick={()=>{setShowSubjSel(false);resetFetch(s);}} disabled={loading}>{s}</button>
                        ))}
                        <button className="btn btn-ghost" style={{padding:"10px 8px",fontSize:14,background:"#e8e3ff"}} onClick={()=>setShowSubjSel(false)} disabled={loading}>もどる</button>
                      </div>
                    </div>
                  ):(
                    <React.Fragment>
                      <div className="row2" style={{marginTop:4}}>
                        <button className="btn btn-ghost" onClick={()=>setShowSubjSel(true)} disabled={loading}>科目選択</button>
                        <button className="btn btn-ghost" onClick={()=>{
                          const cur=logsR.current;const rates=calcSubjRates(cur.recentHistory);
                          const un=subjects.filter(s=>!rates[s]||rates[s].q===0);
                          if(un.length&&Math.random()<.7){resetFetch(un[Math.floor(Math.random()*un.length)]);return;}
                          let ws=subjects[0],mr=Infinity,found=false;
                          for(const s of subjects){const r=rates[s];if(r&&r.q>=3){const rt=r.c/r.q;if(rt<mr){mr=rt;ws=s;found=true;}}}
                          if(!found){const qc=subjects.map(s=>({s,q:rates[s]?.q||0})).sort((a,b)=>a.q-b.q);ws=qc[0].s;}
                          resetFetch(ws);
                        }} disabled={loading}>苦手科目</button>
                      </div>
                    </React.Fragment>
                  )
                )}
              </React.Fragment>
            )}

            {/* ── LOG ── */}
            {tab==="log"&&(
              <React.Fragment>
                <div className="login-streak">
                  <div style={{fontSize:28,fontWeight:900}}>{logs.loginStreak||0}日連続</div>
                  <div style={{fontSize:13,opacity:.85,marginTop:4}}>この調子で続けよう 🔥</div>
                </div>

                {/* デイリー目標 */}
                <div className={`daily-goal-card${dailyGoalMet?" done":""}`}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:900,fontSize:14,color:dailyGoalMet?"#166534":"#92400e"}}>
                      {dailyGoalMet?"🎉 今日の目標達成！":"🎯 デイリー目標"}
                    </div>
                    <div style={{fontWeight:900,fontSize:20,color:dailyGoalMet?"#16a34a":"#d97706"}}>{todaySessions}/3</div>
                  </div>
                  <div className="daily-goal-bar-wrap">
                    <div className={`daily-goal-bar${dailyGoalMet?" done":""}`} style={{width:`${Math.min(100,todaySessions/3*100)}%`}}></div>
                  </div>
                    <div style={{fontSize:11,color:dailyGoalMet?"#166534":"#92400e",fontWeight:700}}>
                       3問クリアで目標達成！
                   </div>
                </div>

                {/* 正解率カード */}
                <div style={{background:rateBg,borderColor:rateBorder,borderRadius:16,padding:18,marginBottom:12,border:"2px solid"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:800,color:"#9990cc",marginBottom:4}}>直近100問の正解率</div>
                      {recent100?(<React.Fragment>
                        <div style={{fontSize:38,fontWeight:900,color:rateColor,lineHeight:1}}>{recent100.rate}%</div>
                        <div style={{fontSize:11,color:rateColor,opacity:.7,marginTop:4}}>{recent100.count<100?`まだ${recent100.count}問分のデータ`:"直近100問"}</div>
                      </React.Fragment>):(<div style={{fontSize:18,fontWeight:800,color:"#9990cc"}}>まだデータなし</div>)}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:"#9990cc"}}>累計</div>
                      <div style={{fontSize:18,fontWeight:900,color:"#5b3ff8"}}>{logs.totalQ}問</div>
                      <div style={{fontSize:11,color:"#9990cc",marginTop:4}}>最高連続</div>
                      <div style={{fontSize:18,fontWeight:900,color:"#f59e0b"}}>{logs.bestStreak}問</div>
                    </div>
                  </div>
                  {recent100&&<div style={{marginTop:12}}><div className="bar-wrap" style={{height:12}}><div className="bar" style={{width:`${recent100.rate}%`,background:rateColor}}></div></div></div>}
                </div>

                {/* 科目別正解率 */}
                <div className="card">
                  <div className="section-title">科目別 正解率（直近100問）</div>
                  {subjectRates.map(({s,rate,q})=>(
                    <div key={s} className="subj-row">
                      <span className="subj-name">{s}</span>
                      <div style={{flex:1}}><div className="bar-wrap"><div className="bar" style={{width:rate!==null?`${rate}%`:"0%",background:rate>=70?"#22c55e":rate>=50?"#f59e0b":"#ef4444"}}></div></div></div>
                      <span style={{fontSize:12,color:"#9990cc",minWidth:36,textAlign:"right"}}>{rate!==null?`${rate}%`:"未挑戦"}</span>
                      <span style={{fontSize:11,color:"#bbb",minWidth:30,textAlign:"right"}}>{q>0?`${q}問`:""}</span>
                    </div>
                  ))}
                </div>

                {/* 分析実績（ライトカード） */}
                <div className="card" style={{background:"#f0edff",border:"1.5px solid #ddd6fe"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#5b3ff8",marginBottom:10}}>🔍 分析実績</div>
                  <div className="an-stat-row">
                    <div className="an-stat"><div className="an-stat-n" style={{fontSize:14}}>{(()=>{const h=(logs.debugHistory||[]).slice(0,100);if(!h.length)return"—";const perfect=h.filter(x=>Array.isArray(x.results)&&x.results.every(Boolean)).length;return Math.round(perfect/h.length*100)+"%";})()}</div><div className="an-stat-l">直近完璧分析率</div></div>
                  </div>
                  {logs.debugHistory?.length>0&&(
                    <React.Fragment>
                      <div style={{fontSize:11,fontWeight:800,color:"#7c6fb0",marginBottom:6,marginTop:4}}>直近の分析履歴</div>
                      {logs.debugHistory.slice(0,5).map((h,i)=>(
                        <div key={i} className="anhist-row">
                          <span style={{fontSize:11,color:"#7c6fb0",minWidth:36}}>{h.date.slice(5)}</span>
                          <span className="anhist-subj">{h.subj}</span>
                          <span style={{flex:1,fontSize:11,color:"#5b3ff8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.topic}</span>
                          <div className="anhist-score">
                            {(h.results||[]).map((r,j)=>(
                              <div key={j} className={`anhist-dot ${r?"ok":"ng"}`}>{r?"✓":"✗"}</div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </React.Fragment>
                  )}
                </div>

                {/* 28日カレンダー */}
                <div className="card">
                  <div className="section-title">28日間の学習カレンダー</div>
                  <div className="week-grid">
                    {["日","月","火","水","木","金","土"].map(d=><div key={d} className="week-label">{d}</div>)}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {Array.from({length:cal28[0].dow},(_,i)=>(
                      <div key={`empty-${i}`}></div>
                    ))}
                    {cal28.map(d=>{
                      let cls="week-dot empty";
                      if(d.q>0){cls=d.rate>=80?"week-dot high":d.rate>=50?"week-dot mid":"week-dot low";}
                      return(
                        <div key={d.key} className="week-dot-wrap">
                          <div className={cls} title={`${d.key}: ${d.q}問`}>{d.d}</div>
                          {d.q>0&&<div style={{fontSize:8,color:"#9990cc",textAlign:"center"}}>{d.q}問</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:10,justifyContent:"center"}}>
                    {[{cls:"week-dot high",label:"80%+"},{cls:"week-dot mid",label:"50%+"},{cls:"week-dot low",label:"50%未満"}].map(x=>(
                      <div key={x.label} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#9990cc"}}>
                        <div className={x.cls} style={{width:20,height:20,fontSize:8}}></div>{x.label}
                      </div>
                    ))}
                  </div>
                </div>

                {/* 単元習熟マップ */}
                {masteryList.length>0&&(
                  <div className="card">
                    <div className="section-title">🗺️ 単元習熟マップ</div>
                    <div className="mastery-grid">
                      {masteryList.map(({topic,subj,attempts,correct,mastered})=>{
                        const rate=attempts>0?Math.round(correct/attempts*100):0;
                        const state=mastered?"mastered":rate>=50?"learning":"fresh";
                        const labels={fresh:"学習中",learning:"定着中",mastered:"習熟済み"};
                        return(
                          <div key={topic} className={`mastery-card ${state}`}>
                            <div className="mastery-tag">{labels[state]} ｜ {subj}</div>
                            <div className="mastery-topic">{topic}</div>
                            <div className="mastery-meta">{attempts}問 正解率{rate}%</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontSize:11,color:"#bbb",marginTop:8,textAlign:"center"}}>5問以上解いて正解率80%超えで「習熟済み」</div>
                  </div>
                )}

                {reviewCount>0&&(
                  <div className="card" style={{background:"#fffbeb",border:"1.5px solid #fde68a"}}>
                    <div style={{fontWeight:800,color:"#92400e",marginBottom:6}}>📝 復習キュー: {reviewCount}件</div>
                    <div style={{fontSize:13,color:"#78350f"}}>次回の学習で自動出題。分析完了で自動削除！</div>
                  </div>
                )}

                {/* ストック */}
                <div className="card" style={{background:"#f8f7ff"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div className="section-title" style={{margin:0}}>📦 問題ストック</div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      {isRefilling&&<span className="refill-dot"></span>}
                      <span style={{fontSize:12,fontWeight:900,color:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}>{damTotal}/{DAM_MAX*subjects.length}問</span>
                    </div>
                  </div>
                  <div style={{marginBottom:8}}><div className="bar-wrap" style={{height:7}}><div className="bar" style={{width:`${Math.min(100,damTotal/(DAM_MAX*subjects.length)*100)}%`,background:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}></div></div></div>
                  {subjects.map(s=>{const cnt=damStats[s]||0;const pct=Math.min(100,cnt/DAM_MAX*100);const c=pct>60?"#22c55e":pct>30?"#f59e0b":"#ef4444";return(
                    <div key={s} className="dam-row">
                      <span className="dam-label">{s}</span>
                      <div className="dam-bw"><div className="dam-bf" style={{width:`${pct}%`,background:c}}></div></div>
                      <span style={{fontSize:11,fontWeight:900,minWidth:40,textAlign:"right",color:c}}>{cnt}/{DAM_MAX}</span>
                    </div>
                  );})}
                  <div style={{fontSize:10,color:"#bbb",marginTop:6,textAlign:"center"}}>{isRefilling?`⚡ ${autoRefill?"問題を入れ替え中...":"ストックを補充中..."}`:waitingForStock?"⏳ 問題を待機中...（バックグラウンドで補充します）":`✓ ${autoRefill?"自動更新ON（常に最新）":"自動更新ON（ストックが満たされたら停止）"}`}</div>
                  {rejectCount>0&&<div style={{fontSize:10,color:"#f59e0b",marginTop:4,textAlign:"center",fontWeight:700}}>🚫 品質フィルター棄却: {rejectCount}問（ローカル検証 or 検査AI不合格）</div>}
                  {damUncheckedTotal>0&&<div style={{fontSize:10,color:"#9990cc",marginTop:2,textAlign:"center",fontWeight:700}}>⏳ 未検査（検査エラー）: {damUncheckedTotal}問 ← checked問題が優先出題</div>}
                </div>
              </React.Fragment>
            )}

            {/* ── BADGE ── */}
            {tab==="badge"&&(
              <div className="card">
                <div className="section-title">実績 {logs.earnedBadges?.length||0} / {BADGES.length}</div>
                <div className="badge-grid">
                  {BADGES.map(b=>{const e=logs.earnedBadges?.includes(b.id);return(
                    <div key={b.id} className={`badge ${e?"earned":"locked"}`}>
                      <div className="badge-icon">{b.icon}</div>
                      <div className="badge-name">{b.label}</div>
                      <div className="badge-desc">{b.desc}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}

            {/* ── SETTINGS ── */}
            {tab==="settings"&&(
              <React.Fragment>
                <div className="card">
                  <div className="section-title">プロフィール設定</div>

                  <div className="setting-row">
                    <span className="setting-label">生年月日（学年自動計算）</span>
                    <input type="date" value={birthday} onChange={e=>setBirthday(e.target.value)} min="2000-01-01" max="2026-12-31" style={{marginBottom:0}}/>
                    <div style={{fontSize:12,color:"#5b3ff8",fontWeight:700,marginTop:4}}>→ {calcGrade(birthday)}</div>
                  </div>

                  <div className="setting-row" style={{paddingTop:14}}>
                    <span className="setting-label">Gemini APIキー（最大4つ）</span>
                    {apiKeys.map((k,i)=>(
                      <div key={i} className="key-row">
                        <input type="password" value={k} onChange={e=>{const nk=[...apiKeys];nk[i]=e.target.value;setApiKeys(nk);}} placeholder={`APIキー ${i+1}${i===0?" (任意)":" (任意)"}`}/>
                        <span className={`key-status ${k.trim()?"ok":"empty"}`}>{k.trim()?"✓":"—"}</span>
                      </div>
                    ))}
                    <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#5b3ff8",fontWeight:700,textDecoration:"none"}}>🔑 APIキーを取得する（無料）</a>
                  </div>

                  <div style={{marginTop:16}}>
                    <button className="btn btn-primary" onClick={saveSettings}>
                      {settingsSaved?"✓ 保存しました！":"設定を保存する"}
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">問題ストック設定</div>
                  <div className="setting-row" style={{borderBottom:"none",paddingBottom:0}}>
                    <span className="setting-label">📦 ストック自動更新</span>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                      <button
                        onClick={()=>setAutoRefill(v=>!v)}
                        style={{
                          width:52,height:28,borderRadius:14,border:"none",cursor:"pointer",
                          background:autoRefill?"linear-gradient(135deg,#5b3ff8,#9b59f8)":"#e8e3ff",
                          position:"relative",transition:"all .2s",flexShrink:0,padding:0
                        }}
                      >
                        <span style={{
                          position:"absolute",top:3,left:autoRefill?26:3,
                          width:22,height:22,borderRadius:"50%",background:"#fff",
                          boxShadow:"0 1px 4px rgba(0,0,0,.2)",transition:"left .2s",display:"block"
                        }}/>
                      </button>
                      <span style={{fontSize:13,fontWeight:700,color:autoRefill?"#5b3ff8":"#9990cc"}}>
                        {autoRefill?"ON（最新問題に入れ替え中）":"OFF（問題数が満たされるまで補充）"}
                      </span>
                    </div>
                   </div>
                 </div>

                <div className="card">
                  <div className="section-title">エクスポート / インポート</div>
                  <button className="btn btn-ghost" style={{marginBottom:8}} onClick={exportData}>
                    📤 学習データをエクスポート
                  </button>
                  <label style={{display:"block",background:"#f0edff",color:"#5b3ff8",border:"none",borderRadius:14,padding:"13px 20px",fontSize:15,fontWeight:800,fontFamily:"inherit",cursor:"pointer",width:"100%",textAlign:"center",boxSizing:"border-box",marginBottom:importMsg?8:0,transition:"all .18s"}}>
                    📥 学習データをインポート
                    <input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
                  </label>
                  {importMsg&&(
                    <div style={{fontSize:12,fontWeight:700,borderRadius:10,padding:"8px 12px",marginBottom:4,
                      color:importMsg.startsWith("✓")?"#166534":"#991b1b",
                      background:importMsg.startsWith("✓")?"#dcfce7":"#fee2e2"}}>
                      {importMsg}
                    </div>
                  )}
                  <div style={{fontSize:11,color:"#bbb",marginTop:6}}>APIキーはエクスポートされません。ファイル名に学年・日付が入ります。</div>
                </div>

                <div className="card">
                  <div className="section-title">データ管理</div>
                  <div className="danger-zone">
                    <div style={{fontSize:12,fontWeight:800,color:"#991b1b",marginBottom:10}}>⚠️ 削除操作は取り消せません</div>
                    <button className="danger-btn" onClick={clearLogs}>
                      📊 学習記録・バッジをリセット
                    </button>
                    <button className="danger-btn" onClick={clearStock}>
                      📦 ストック問題をすべて削除
                    </button>
                    <button className="danger-btn secondary" onClick={clearAllData}>
                      🗑️ すべてのデータを削除
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">アプリについて</div>
                  <div style={{fontSize:13,color:"#9990cc",lineHeight:1.8}}>
                    <div>📚 まちがいラボ</div>
                    <div>🔍 誤答分析型 学習エンジン</div>
                    <div>⚡ Gemini 2.5 Flash 使用</div>
                    <div>🛡️ 検査AI（品質フィルター）搭載</div>
                  </div>
                </div>
              </React.Fragment>
            )}

          </div>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
