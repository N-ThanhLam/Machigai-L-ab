<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── Safari/PrivateMode 対応 localStorage ラッパー ─────────────────
// iOS Safari の ITP は7日アクセスなしでlocalStorageを消去する。
// プライベートモードや容量超過でも setItem が throw する。
// インメモリ＋IndexedDBミラーで透過的に救済する。
const _memStore = (()=>{ try{ return new Map(); }catch(e){ return null; } })();
const _safeLS = {
  get(k){
    try{ const v = localStorage.getItem(k); if(v!==null) return v; }catch(e){}
    return _memStore ? (_memStore.has(k) ? _memStore.get(k) : null) : null;
  },
  set(k,v){
    try{ localStorage.setItem(k,v); }catch(e){}
    if(_memStore) _memStore.set(k,v);
    // 重要キーは IndexedDB にも複製（非同期・失敗無視）
    // manabi_logs_v4 / manabi_dam_v4 / manabi_profile_v2 などのバージョン番号末尾、
    // および __u{id} のユーザー接尾辞付きも対象にする。
    if(/^manabi_/.test(k) && /(_v\d+|profile|session|dam|logs|users|curUser|theme|autorefill|reject_count|advanced)(?:__u[a-z0-9]+)?$/.test(k)){
      try{ _idbSet(k,v); }catch(e){}
    }
  },
  remove(k){
    try{ localStorage.removeItem(k); }catch(e){}
    if(_memStore) _memStore.delete(k);
    try{ _idbRemove(k); }catch(e){}
  }
};

// ─── IndexedDB ミラー（Safari ITP 対策の本丸）─────────────────────
let _idbP=null;
const _idbOpen=()=>{
  if(_idbP) return _idbP;
  _idbP = new Promise((resolve,reject)=>{
    try{
      const r=indexedDB.open("manabi_mirror",1);
      r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv"); };
      r.onsuccess=()=>resolve(r.result);
      r.onerror=()=>reject(r.error);
    }catch(e){ reject(e); }
  });
  return _idbP;
};
const _idbSet=async(k,v)=>{ try{ const db=await _idbOpen(); const tx=db.transaction("kv","readwrite"); tx.objectStore("kv").put(v,k); }catch(e){} };
const _idbGet=async(k)=>{ try{ const db=await _idbOpen(); return await new Promise((res,rej)=>{ const r=db.transaction("kv","readonly").objectStore("kv").get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }catch(e){ return null; } };
const _idbRemove=async(k)=>{ try{ const db=await _idbOpen(); db.transaction("kv","readwrite").objectStore("kv").delete(k); }catch(e){} };
const _idbKeys=async()=>{ try{ const db=await _idbOpen(); return await new Promise((res,rej)=>{ const r=db.transaction("kv","readonly").objectStore("kv").getAllKeys(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }catch(e){ return []; } };
// ロード時に localStorage が空 & IndexedDB に複製がある場合は復元（ITP救済）
const restoreFromIdbIfNeeded=async()=>{
  try{
    const keys=await _idbKeys();
    let restored=0;
    for(const k of keys){
      try{ if(localStorage.getItem(k)===null){ const v=await _idbGet(k); if(v!=null){ try{ localStorage.setItem(k,v); }catch(_){ _memStore && _memStore.set(k,v); } restored++; } } }catch(e){}
    }
    return restored;
  }catch(e){ return 0; }
};

// ─── マルチユーザー: 現在ユーザーの ID で localStorage キーをスコープ化 ─
const USERS_KEY="manabi_users_v1";       // ユーザー定義一覧
const CUR_USER_KEY="manabi_curUser_v1";  // 現在のユーザーID
const DEFAULT_USER={id:"u1",name:"わたし",icon:"😀"};
const getUsers=()=>{
  try{ const r=_safeLS.get(USERS_KEY); if(r){ const a=JSON.parse(r); if(Array.isArray(a)&&a.length) return a; } }catch(e){}
  return [{...DEFAULT_USER}];
};
const saveUsers=us=>_safeLS.set(USERS_KEY,JSON.stringify(us));
const getCurrentUserId=()=>{
  const id=_safeLS.get(CUR_USER_KEY);
  if(id){ const us=getUsers(); if(us.find(u=>u.id===id)) return id; }
  return getUsers()[0].id;
};
const setCurrentUserId=id=>_safeLS.set(CUR_USER_KEY,id);
// 現在ユーザーIDをユーザーキーに付与（"u1" は後方互換のため接尾辞なしも許容）
let _CURRENT_UID=getCurrentUserId();
const userKey=(base)=>_CURRENT_UID==="u1"?base:`${base}__${_CURRENT_UID}`;
const switchUser=id=>{ _CURRENT_UID=id; setCurrentUserId(id); };

// 内部キーは常に「算数」で統一（ストック・統計・科目リスト共通）
// 学年別科目: 小1-2は国算のみ / 小3-4は理科社会追加 / 小5以降で英語追加
const calcSubjects = (grade) => {
  if (!grade) return ["国語", "算数", "英語", "社会", "理科"];
  if (grade.startsWith("小学1") || grade.startsWith("小学2")) return ["国語", "算数"];
  if (grade.startsWith("小学3") || grade.startsWith("小学4")) return ["国語", "算数", "社会", "理科"];
  return ["国語", "算数", "英語", "社会", "理科"];
};
const SUBJECTS = ["国語", "算数", "英語", "社会", "理科"]; // 全集合（DAM初期化等で使う）

// ─── お試しサンプル問題（APIキー不要） ──────────────────────────────
const SAMPLE_QUESTIONS=[
  {topic_tag:"たし算・ひき算",subject:"算数",
    question:"53 − 28 = ?",
    choices:["25","35","15","24"],correct:0,
    correct_feedback:"53−28は、まず3−8ができないから10借りて13−8=5、4−2=2で25。",
    mistake_type:"桁ミス",short_feedback:"繰り下がりは上の桁から1借りるのを忘れずに",
    hint:"一の位が引けないとき、十の位から1借りる（繰り下がり）",
    wrong_analysis:[
      {index:1,why_chosen:"繰り下がりを忘れて単純に引く",why_wrong:"5−2=3、3−8=…と無理に計算して桁が破綻"},
      {index:2,why_chosen:"28を足してしまう",why_wrong:"ひき算なのに足してしまっている"},
      {index:3,why_chosen:"繰り下がりを2回してしまう",why_wrong:"一の位だけ借りればよく、十の位はそのまま"},
    ]},
  {topic_tag:"漢字の読み",subject:"国語",
    question:"「重要な書類」の「重要」の読み方は？",
    choices:["じゅうよう","じゅよう","ちょうよう","じょうよう"],correct:0,
    correct_feedback:"「重」は音読みで「ジュウ」、「要」は「ヨウ」と読みます。",
    mistake_type:"用語逆転",short_feedback:"「重」は「ジュウ（重い）」、「ちょう」と読む熟語もあるが「重要」は「ジュウ」",
    hint:"「重」には「ジュウ・チョウ・おも(い)・かさ(ねる)」の読み方があります",
    wrong_analysis:[
      {index:1,why_chosen:"「じゅう」を短く読んでしまう",why_wrong:"「重」は「じゅう」と長音で読む"},
      {index:2,why_chosen:"「重」を「ちょう」と読む熟語と混同",why_wrong:"「重複(ちょうふく)」と混ぜている"},
      {index:3,why_chosen:"音をぼかして覚えている",why_wrong:"「じょう」ではなく「じゅう」"},
    ]},
  {topic_tag:"be動詞",subject:"英語",
    question:"次の文の(  )に入る語は？  She (  ) a student.",
    choices:["is","am","are","be"],correct:0,
    correct_feedback:"主語が She（三人称単数）なので be動詞は is。",
    mistake_type:"規則の過剰適用",short_feedback:"主語に合わせて be動詞を変える（I→am, you/we/they→are, he/she/it→is）",
    hint:"be動詞は主語によって形が変わります",
    wrong_analysis:[
      {index:1,why_chosen:"I am との混同",why_wrong:"am は I のときだけ"},
      {index:2,why_chosen:"複数形と混同",why_wrong:"are は you/we/they のとき"},
      {index:3,why_chosen:"原形のまま使ってしまう",why_wrong:"主語があるときは活用形を使う"},
    ]},
  {topic_tag:"地理・都道府県",subject:"社会",
    question:"日本でいちばん大きい湖はどれ？",
    choices:["琵琶湖","霞ヶ浦","サロマ湖","猪苗代湖"],correct:0,
    correct_feedback:"琵琶湖（滋賀県）が日本最大の湖。約670km²の面積があります。",
    mistake_type:"用語逆転",short_feedback:"「日本最大の湖＝琵琶湖（滋賀県）」と覚える",
    hint:"日本三大湖は 琵琶湖・霞ヶ浦・サロマ湖。順位を覚えましょう。",
    wrong_analysis:[
      {index:1,why_chosen:"2番目の霞ヶ浦と混同",why_wrong:"霞ヶ浦は2位（茨城県）"},
      {index:2,why_chosen:"3番目のサロマ湖と混同",why_wrong:"サロマ湖は3位（北海道）"},
      {index:3,why_chosen:"福島の有名な湖と混同",why_wrong:"猪苗代湖は4位"},
    ]},
  {topic_tag:"光と音",subject:"理科",
    question:"雷が光ってから音が聞こえるまで時間がかかるのはなぜ？",
    choices:["音の方が光より遅いから","光の方が音より遅いから","音と光は同時だが耳が遅れるから","距離が遠いと光が曲がるから"],correct:0,
    correct_feedback:"光の速さ(秒速30万km)は音の速さ(秒速340m)よりずっと速いため、先に光が届きます。",
    mistake_type:"因果逆転",short_feedback:"光は一瞬で届く・音は遅れて届く、と覚える",
    hint:"光の速さと音の速さを比べると、光は約88万倍速い",
    wrong_analysis:[
      {index:1,why_chosen:"逆に覚えている",why_wrong:"音より光のほうが圧倒的に速い"},
      {index:2,why_chosen:"耳の反応の話だと思った",why_wrong:"耳の反応ではなく音そのものが遅い"},
      {index:3,why_chosen:"光は直進するという知識を誤適用",why_wrong:"光は曲がらず直進する。これは時間差の原因ではない"},
    ]},
];

// 表示用変換: 中学・高校生には「算数」→「数学」と表示する
const displaySubject = (subj, grade) =>
  subj === "算数" && grade && (grade.startsWith("中") || grade.startsWith("高"))
    ? "数学"
    : subj;

// ─── SYSTEM PROMPT ────────────────────────────────────────────────
// 設計方針：
//   1. 正解を教えるのではなく「思考のズレ」を選択肢に仕込んで気づかせる
//   2. 誤答3つは A.手順の途中欠落 / B.似たルール混同 / C.条件読み落とし の3類型を埋める
//   3. wrong_analysis は「観測できる思考のズレ」のみ書く（性格・不注意は禁止）
//   4. 難易度（easy/standard/hard）で語彙・選択肢の鋭さを変える
//   5. 出力先頭に "thought_process" を強制し、論理破綻によるハルシネーションを抑制する
//   6. 出力末尾の自己検閲で、正解の唯一性と事実誤認をAI自身に確認させる
const SYSTEM_PROMPT_BASE = `あなたは日本の学習コーチ「まちがいラボ」。
ゴールは「ミスの再発防止」。正解の暗記ではなく、子どもがよく
やる「思考のズレ」を選択肢に仕込み、気づかせて修正させる。

━━━ 出題の設計原則 ━━━
1. 1問で確認することは1つだけ（複合問題は禁止）
2. 学習指導要領に準拠。学年・現在月までの既習範囲のみ
3. テキストだけで完結（図・グラフ・表・イラスト・地図・実験器具・画像への参照は一切禁止）
4. 未習漢字はひらがな。問題文は200文字以内
5. 英語問題でも指示文は日本語
6. 国語では文法の分類目的の不自然な問いは作らない

━━━ 選択肢の作り方（最重要） ━━━
正解1つ + 認知ミスを仕込んだ誤答3つ。
誤答3つは原則「異なる型」で埋める：

  A. 手順の途中欠落系
     例: 53−28 → 35（繰り下がりを忘れた）
  B. 似たルール・似た用語との混同系
     例: 「重要」→「ちょうふく」と読み間違える系
  C. 条件読み落とし系
     例: 「3の倍数で5の倍数でないもの」を「3の倍数」と読む

【鉄則】
・各誤答が「なぜ選ばれがちか」は必ず別の理由にする
・選択肢の文字数を揃える（長さで正解がバレないように）
・選択肢は100文字以内、重複禁止
・「上記の全て」「以上の全て」など並び依存表現は禁止
・無関係な数字・語を入れる雑な誤答は禁止

━━━ wrong_analysis の書き方 ━━━
誤答3つに対して：
  index: choices内のインデックス（正解以外）
  why_chosen: 「どんな思考でその誤答に辿り着くか」を1文で
              ★性格・不注意・うっかりを理由にしない
              ★観測できる「思考のズレ」だけを書く
  why_wrong: 「その思考のどこがズレているか」を1文で
              ★「不正解だから」「違うから」は禁止

良い例:
  why_chosen「繰り下がりを忘れて上の桁だけそのまま引いた」
  why_wrong「一の位が引けないときは十の位から1借りる必要がある」

━━━ ミスの型分類（mistake_type） ━━━
以下から最適なものを選ぶ：
符号ミス / 条件読み落とし / 公式混同 / 時制混同 /
用語逆転 / 因果逆転 / 単位変換ミス / 桁ミス /
助詞混同 / 前置詞混同 / 規則の過剰適用 / 例外の見落とし

━━━ hint（前提ヒント） ━━━
「このルールを知っていれば解ける」という1〜2行。
まだ習っていない人にも、必要な前提知識だけ書けば解けるように。

━━━ short_feedback（ミス防止コーチング） ━━━
次回ミスを防ぐ1つのコツを端的に1行で。
例:「繰り下がりは上の桁から1借りるのを忘れずに」

━━━ correct_feedback（正解の説明） ━━━
なぜそれが正解か、1文で簡潔に。子どもが「そうか！」と
納得する核心だけ書く。冗長な解説は禁止。

━━━ 思考プロセス（thought_process）— ハルシネーション抑制の要 ━━━
いきなり問題を書き出すのではなく、各問の "thought_process" フィールドに
以下を必ず日本語で書く。これにより内部の整合性を担保する：
  1. この問題で確認する1点（学習目標）
  2. 正解に至る論理的根拠（手順を箇条書き・3〜5項目）
  3. 各誤答がなぜ誤りか（事実・規則の観点で）
  4. 学年・既習範囲を逸脱していないことの自己確認

thought_process は 4 項目を含む 300〜600 文字程度。
読み手向けではなく、AI 自身の論理チェック用に書くこと。

━━━ 自己検閲（self_check）— 出力前の最終確認 ━━━
各問の最後に "self_check" を必ず書く。次の3点を AI 自身が確認した結果：
  ・unique_correct: 正解が選択肢中に唯一であり、他に正解と取りうる解釈がない
  ・no_fact_error: 解説（correct_feedback・hint・wrong_analysis）に事実誤認がない
  ・within_scope: 学年・現在月の既習範囲を逸脱していない
形式: {"unique_correct":true,"no_fact_error":true,"within_scope":true,"notes":"問題なし"}
1つでも false がある場合、その問題は出力しないこと（不安な問題を世に出さない）。

━━━ 出力に関する補足 ━━━
出力 JSON のフィールド構造・型・必須項目は API 側スキーマで強制される。
内容面のみ以下を守る：
・フィールド順は thought_process → 問題本体 → self_check
・correct は choices の正解インデックス（0始まり）
・wrong_analysis の index は正解以外の3つの choices インデックス
・前置き・コードフェンス・説明文の付加は禁止（純粋な JSON 配列のみ）
`;

// ─── ミス型 → 認知的勘違いの短い補足 ─────────────────────────────────
// AI に「型ラベル」だけを渡すと表層マッチで終わりがちなので、
// 「その型が生まれる思考のズレ」を一言添えてやることで、
// 本質的な勘違いを突いた誤答選択肢を作りやすくする。
const MISTAKE_TYPE_HINTS = {
  "符号ミス":"正負・プラスマイナスの処理を反転してしまう（−×−を−のままにする等）",
  "条件読み落とし":"修飾語・条件節を読み飛ばし、より広い対象を答えてしまう",
  "公式混同":"面積/周長・速さ/時間など、似た公式を取り違える",
  "時制混同":"過去/現在/未来や完了/進行など、時間の枠を取り違える",
  "用語逆転":"対概念（主語↔目的語・分子↔分母など）を逆に取る",
  "因果逆転":"「Aだから B」を「Bだから A」と読む向きの反転",
  "単位変換ミス":"100倍/1000倍などスケールを誤る、cm⇄m などの換算抜け",
  "桁ミス":"0の数や位取りを取り違えて1桁ずれる",
  "助詞混同":"「が/を/に/で」など意味を変える助詞を取り違える",
  "前置詞混同":"at/in/on/to/for などの使い分けを取り違える",
  "規則の過剰適用":"例外があるのに一般則を機械的に当てはめる",
  "例外の見落とし":"特殊ケースに気づかず通常規則で処理してしまう",
};

// ─── buildSystemPrompt ────────────────────────────────────────────
// difficulty: "easy" | "standard" | "hard"
// grade / month: 既習範囲を厳密化する（"小学3年生" "5月" など）。曖昧な「現在月までの既習」を排除。
const monthNameJa=(m)=>["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"][((m||1)-1+12)%12];
const buildSystemPrompt = (difficulty, opts={}) => {
  const {grade,month,topMistakes}=opts;
  let scope="";
  if(grade && month){
    scope=`\n━━━ 既習範囲（厳守）━━━\n対象学年: ${grade}\n現在月: ${monthNameJa(month)}\n→ ${grade}の学習指導要領のうち、${monthNameJa(month)}までに学校で学ぶ単元・語彙のみ使用する。\n→ それ以降の単元・漢字・公式を使用しないこと。`;
  }else if(grade){
    scope=`\n━━━ 既習範囲（厳守）━━━\n対象学年: ${grade}（月情報なしのため当年度内の範囲）`;
  }
  // 学習者の重点ミス型（直近の不正解傾向）を狙い撃ちさせる
  let weakness="";
  if(Array.isArray(topMistakes)&&topMistakes.length){
    const list=topMistakes.slice(0,3).map(([t,n])=>{
      const cog=MISTAKE_TYPE_HINTS[t];
      return cog?`・${t}（直近${n}回）── ${cog}`:`・${t}（直近${n}回）`;
    }).join("\n");
    weakness="\n━━━ 学習者の重点ミス型（狙い撃ち）━━━\n"
      +"この学習者は最近、以下の型で誤答しています。各型の後ろに『どんな思考のズレで起きるか』を併記：\n"
      +list+"\n"
      +"→ 今回の出題のうち約3割（最低1問）は、上記の『思考のズレ』そのものを誤答選択肢として仕込む。\n"
      +"→ 表層的に型名に合うだけでなく、併記した認知メカニズムを実際に再現する誤答にすること。\n"
      +"→ 該当問題の mistake_type には上記のいずれかを正確に設定する。\n"
      +"→ 残りの問題は通常通り A/B/C 3類型でバランスを取る。";
  }
  return SYSTEM_PROMPT_BASE + (DIFFICULTY_HINTS[difficulty] || "") + scope + weakness;
};

// ─── Gemini API 呼び出し（モデル自動フォールバック） ────────────────
// 無料枠の 1日上限（429 / RESOURCE_EXHAUSTED）に当たったら次モデルへ自動切替。
// 503/500/network/404 等の一時障害・モデル未提供時も次候補へリトライ。
// 4xx クライアントエラー（400 など本体不正）は即座に失敗を返す（リトライしても無意味）。
const GEMINI_MODELS=["gemini-3-flash-preview","gemini-2.5-flash","gemini-2.5-flash-lite"];
// プロセス内メモリ：直近の 429 を受けたモデルを一定時間スキップする（無駄打ち削減）
const _geminiCooldown={}; // {modelName: cooldownUntilEpochMs}
const GEMINI_COOLDOWN_MS=60*1000; // 1分はそのモデルへの再試行を抑制
const _isFallbackStatus=s=>s===429||s===500||s===502||s===503||s===504||s===404;
const _isFallbackError=err=>{
  if(!err)return false;
  const code=err.code;const status=(err.status||"").toString();
  return code===429||code===503||code===500||status==="RESOURCE_EXHAUSTED"||status==="UNAVAILABLE"||status==="INTERNAL";
};
const callGeminiAPI=async(key,body)=>{
  const now=Date.now();
  let lastFail=null;
  for(let i=0;i<GEMINI_MODELS.length;i++){
    const model=GEMINI_MODELS[i];
    // クールダウン中のモデルはスキップ（ただし最後の候補だけは必ず試す）
    if(i<GEMINI_MODELS.length-1 && _geminiCooldown[model] && _geminiCooldown[model]>now)continue;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){
        if(_isFallbackStatus(res.status)){
          if(res.status===429)_geminiCooldown[model]=Date.now()+GEMINI_COOLDOWN_MS;
          lastFail={status:res.status,model};
          try{console.warn(`[gemini] ${model} HTTP ${res.status} → fallback`);}catch(e){}
          continue;
        }
        return{ok:false,status:res.status,data:null,model};
      }
      const data=await res.json();
      if(data.error){
        if(_isFallbackError(data.error)){
          if(data.error.code===429||data.error.status==="RESOURCE_EXHAUSTED")_geminiCooldown[model]=Date.now()+GEMINI_COOLDOWN_MS;
          lastFail={status:data.error.code||500,model,error:data.error};
          try{console.warn(`[gemini] ${model} ${data.error.status||data.error.code} → fallback`);}catch(e){}
          continue;
        }
        return{ok:false,status:data.error.code||500,data,model,error:data.error};
      }
      return{ok:true,status:200,data,model};
    }catch(e){
      // ネットワーク障害は次候補へ
      lastFail={status:0,model,error:e};
      try{console.warn(`[gemini] ${model} network error → fallback`,e);}catch(_){}
      continue;
    }
  }
  return{ok:false,status:lastFail?.status||0,data:null,model:lastFail?.model,error:lastFail?.error,exhausted:true};
};



// ─── DAM ─────────────────────────────────────────────────────────
// 構造: { 科目: { easy:[...], standard:[...], hard:[...] } }
// 各科目×3難易度=15バケット。1バケット最大40問。Safari の 5MB localStorage を意識して全体600問上限。
const DAM_KEY_BASE="manabi_dam_v4";
const DAM_MAX=40;            // 1バケット(科目×難易度)最大問題数
const DAM_BATCH=5;
const DIFFS=["easy","standard","hard"];
const DAM_KEY=()=>userKey(DAM_KEY_BASE);
const getDam=()=>{try{return JSON.parse(_safeLS.get(DAM_KEY())||"{}");}catch(e){return{};}};
const saveDam=d=>{ _safeLS.set(DAM_KEY(),JSON.stringify(d)); };
// 旧 v3 構造（科目→配列）から v4 構造（科目→難易度→配列）へのマイグレーション
(function migrateDam(){
  try{
    const oldRaw=_safeLS.get("manabi_dam_v3");
    if(!oldRaw)return;
    if(_safeLS.get(DAM_KEY()))return; // すでにv4ある
    const old=JSON.parse(oldRaw);const nu={};
    for(const s of Object.keys(old)){nu[s]={easy:[],standard:old[s].slice(0,DAM_MAX),hard:[]};}
    _safeLS.set(DAM_KEY(),JSON.stringify(nu));
    _safeLS.remove("manabi_dam_v3");
  }catch(e){}
})();
// 重複判定キー
const dupKey=q=>`${(q.question||"")}|${(q.correct??"")}|${(q.choices||[]).slice(0,2).join("|")}`;
const _ensureBucket=(dam,subj,diff)=>{
  if(!dam[subj])dam[subj]={easy:[],standard:[],hard:[]};
  if(!Array.isArray(dam[subj][diff]))dam[subj][diff]=[];
  return dam[subj][diff];
};
const addToDam=(subj,diff,qs)=>{const dam=getDam();const ex=_ensureBucket(dam,subj,diff);const keys=new Set(ex.map(dupKey));dam[subj][diff]=[...ex,...qs.filter(q=>!keys.has(dupKey(q)))].slice(-DAM_MAX);saveDam(dam);};
const addToDamFront=(subj,diff,qs)=>{const dam=getDam();const ex=_ensureBucket(dam,subj,diff);const keys=new Set(ex.map(dupKey));const fresh=qs.filter(q=>!keys.has(dupKey(q)));if(!fresh.length)return;dam[subj][diff]=[...fresh,...ex].slice(0,DAM_MAX);saveDam(dam);};
// 指定難易度から取り出し。空なら隣接難易度（standard→easy→hard の順）にフォールバック
const popFromDam=(subj,diff="standard",n=1)=>{
  const dam=getDam();
  const order=diff==="easy"?["easy","standard","hard"]:diff==="hard"?["hard","standard","easy"]:["standard","easy","hard"];
  for(const d of order){
    const b=_ensureBucket(dam,subj,d);
    if(b.length){
      const take=Math.min(n,b.length);const r=b.slice(0,take);
      dam[subj][d]=b.slice(take);saveDam(dam);return r;
    }
  }
  return[];
};
const getDamBucketCount=(subj,diff)=>{const dam=getDam();return (dam[subj]?.[diff]||[]).length;};
const getDamSubjTotal=(subj)=>{const dam=getDam();const b=dam[subj]||{};return (b.easy?.length||0)+(b.standard?.length||0)+(b.hard?.length||0);};
const getDamStats=(subjects=SUBJECTS)=>subjects.reduce((a,s)=>({...a,[s]:getDamSubjTotal(s)}),{});
const getDamTotal=(subjects=SUBJECTS)=>subjects.reduce((t,s)=>t+getDamSubjTotal(s),0);
// 補充ターゲット: 不足が最も大きい(科目, 難易度)ペアの上位N個
const lowestBuckets=(n=1,subjects=SUBJECTS)=>{
  const dam=getDam();const all=[];
  for(const s of subjects){for(const d of DIFFS){all.push({subj:s,diff:d,cnt:(dam[s]?.[d]||[]).length});}}
  return all.sort((a,b)=>a.cnt-b.cnt).slice(0,n);
};

const calcGrade=birth=>{if(!birth)return"一般";const b=new Date(birth+"T00:00:00"),now=new Date();let sy=now.getFullYear();if(now.getMonth()<3)sy--;let ent=b.getFullYear()+7;if(b.getMonth()<3)ent--;const y=sy-ent+1;if(y>=1&&y<=6)return`小学${y}年生`;if(y>=7&&y<=9)return`中学${y-6}年生`;if(y>=10&&y<=12)return`高校${y-9}年生`;return"一般";};

const jstYesterday=()=>{const d=new Date(new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'}));d.setDate(d.getDate()-1);return d.toLocaleDateString('sv-SE');};
let _ki=0;

// ─── CHOICE SHUFFLE ───────────────────────────────────────────────
const shuffleChoices=q=>{
  if(!q.choices||q.choices.length!==4)return q;
  const orig=typeof q.correct==="number"?q.correct:0;
  const ix=q.choices.map((c,i)=>({c,i}));
  for(let i=ix.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]];}
  const newCorrect=ix.findIndex(x=>x.i===orig);
  const indexMap={};ix.forEach((x,ni)=>{indexMap[x.i]=ni;});
  const newWrong=(q.wrong_analysis||[]).map(wa=>({...wa,index:typeof wa.index==="number"?(indexMap[wa.index]??wa.index):wa.index}));
  return{...q,choices:ix.map(x=>x.c),correct:newCorrect>=0?newCorrect:0,wrong_analysis:newWrong};
};
const shuffleAllSteps=q=>shuffleChoices(q);

// ─── バリデーション（最小限・クラッシュ防止のみ） ─────────────────
// 4択の構造（choices配列×4、重複なし、correct 0-3）だけ確認する。
// 意味チェック・self_check・図表参照・科目ホワイトリスト・wrong_analysis.index
// 整合性などは撤廃し、Geminiの出力を最大限受け入れる。
const hasValidQuiz=q=>{
  if(!q||!Array.isArray(q.choices)||q.choices.length!==4)return false;
  if(q.choices.some(c=>typeof c!=="string"))return false;
  if(new Set(q.choices.map(c=>c.trim())).size!==4)return false;
  if(typeof q.correct!=="number"||!Number.isInteger(q.correct)||q.correct<0||q.correct>3)return false;
  return true;
};

const calcMistakeTypes=(history)=>{
  const counts={};
  for(const r of(history||[])){
    if(!r.correct&&r.mistake_type){
      counts[r.mistake_type]=(counts[r.mistake_type]||0)+1;
    }
  }
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
};

// ─── 復習スケジューリング（SM-2 簡易版） ──────────────────────────────
// reps=0→1日後、reps=1→3日後、reps=2→7日後、reps=3→14日後、reps=4以降で卒業（削除）
const SM2_INTERVALS=[1,3,7,14];
const addDaysISO=(dateStr,n)=>{const d=new Date((dateStr||today())+"T00:00:00");d.setDate(d.getDate()+n);return d.toLocaleDateString('sv-SE');};
const advanceReviewItem=(item)=>{
  const reps=(item.reps||0)+1;
  if(reps>SM2_INTERVALS.length)return null; // 卒業 → キューから永続削除
  return {...item,reps,dueDate:addDaysISO(today(),SM2_INTERVALS[reps-1]),lastReview:today()};
};
const isReviewDue=(item)=>!item.dueDate||item.dueDate<=today();
// 優先順: ①思い込みアラート(priority=true) → ②期日到来順
const sortReviewQueue=(queue)=>[...(queue||[])].sort((a,b)=>{
  if(!!a.priority!==!!b.priority)return a.priority?-1:1;
  return (a.dueDate||"").localeCompare(b.dueDate||"");
});
const firstDueReview=(queue)=>sortReviewQueue(queue).find(isReviewDue)||null;

// ─── 週次ミスパターン（今週 vs 先週）─────────────────────────────────
const calcWeeklyMistakeSummary=(history)=>{
  if(!history||!history.length)return null;
  const td=today();const now=new Date(td+"T00:00:00");
  const thisStart=new Date(now);thisStart.setDate(now.getDate()-6); // 直近7日（今日含む）
  const lastStart=new Date(now);lastStart.setDate(now.getDate()-13); // 先週7日
  const thisStr=thisStart.toLocaleDateString('sv-SE');
  const lastStr=lastStart.toLocaleDateString('sv-SE');
  const thisCnt={},lastCnt={};
  for(const r of history){
    if(r.correct||!r.mistake_type||!r.date)continue;
    if(r.date>=thisStr&&r.date<=td)thisCnt[r.mistake_type]=(thisCnt[r.mistake_type]||0)+1;
    else if(r.date>=lastStr&&r.date<thisStr)lastCnt[r.mistake_type]=(lastCnt[r.mistake_type]||0)+1;
  }
  const top=Object.entries(thisCnt).sort((a,b)=>b[1]-a[1])[0];
  if(!top)return null;
  const [type,cnt]=top;
  const prev=lastCnt[type]||0;
  return {type,thisCnt:cnt,prevCnt:prev,diff:cnt-prev,totalThis:Object.values(thisCnt).reduce((a,b)=>a+b,0)};
};

// ─── 直近の不正解ミス型（プライム表示用） ─────────────────────────────
const lastMistakeFromHistory=(history)=>{
  if(!history||!history.length)return null;
  for(let i=history.length-1;i>=0;i--){
    const r=history[i];if(!r.correct&&r.mistake_type)return r.mistake_type;
  }
  return null;
};

const calcRecent100=h=>{if(!h||!h.length)return null;const last=h.slice(-100),c=last.filter(r=>r.correct).length;return{rate:Math.round(c/last.length*100),count:last.length};};
const calcSubjRates=h=>{if(!h||!h.length)return{};const m={};for(const r of h.slice(-100)){if(!m[r.subject])m[r.subject]={q:0,c:0};m[r.subject].q++;if(r.correct)m[r.subject].c++;}return m;};

// ─── 自動難易度判定 ───────────────────────────────────────────────
// 直近10問（指定科目）の正解率で easy / standard / hard を切り替える。
// 80% 以上 → 上げる / 40% 未満 → 下げる / それ以外は維持。
const getAutoDifficulty=(subj,logs)=>{
  const cur=(logs?.subjectDifficulty||{})[subj]||"standard";
  const recent=(logs?.recentHistory||[]).filter(r=>r.subject===subj).slice(-10);
  if(recent.length<5)return cur; // データ不足は維持
  const rate=recent.filter(r=>r.correct).length/recent.length;
  const order=["easy","standard","hard"];
  let idx=order.indexOf(cur);if(idx<0)idx=1;
  if(rate>=0.8&&idx<2)return order[idx+1];
  if(rate<0.4&&idx>0)return order[idx-1];
  return cur;
};

// ─── 成長スコア（旧「本日スコア」）計算 ──────────────────────────
// 「今日伸びた能力」(dailyStatGains[today] + 単元力 today) の合計。
// 20問連続正解で200点 / 全問不正解でも80点 になるよう calcStatGainsForAnswer 側で調整済み。上限なし。
const calcTodayScore=(logs)=>{
  const td=today();
  const dg=logs?.dailyStatGains?.[td]||{};
  let score=0;
  for(const k of STAT_ORDER){score+=(dg[k]||0);}
  const ug=logs?.dailyUnitGains?.[td]||0;
  score+=ug;
  return{score:Math.floor(score),combo:0};
};

// ─── 累積ステータス（基本10項目） ─────────────────────────────────
// 基本ステータス。各科目の単元力（subjectUnitStats）と合わせて 1+5=6 カテゴリで表示する。
const STAT_LABELS={
  retryPower:       {name:"復帰力",   icon:"💪"},
  consistency:      {name:"継続力",   icon:"📅"},
  startingPower:    {name:"開始力",   icon:"🚀"},
  focus:            {name:"集中力",   icon:"🧠"},
  attention:        {name:"注意力",   icon:"👀"},
  verificationPower:{name:"確認力",   icon:"🔍"},
  retryAgain:       {name:"再挑戦力", icon:"🔁"},
  stability:        {name:"安定力",   icon:"⚖️"},
  readingAccuracy:  {name:"読解力",   icon:"👁"},
  logicalReasoning: {name:"論理整理", icon:"🧩"},
};
const STAT_ORDER=["retryPower","consistency","startingPower","focus","attention","verificationPower","retryAgain","stability","readingAccuracy","logicalReasoning"];
// 旧 signControl キーは attention にマイグレーション
// ミスの型 → 対応ステータス
const mistakeToStat=mt=>{
  if(!mt)return"readingAccuracy";
  if(mt.includes("符号")||mt.includes("単位")||mt.includes("桁"))return"attention";
  if(mt.includes("条件")||mt.includes("助詞")||mt.includes("読み落とし")||mt.includes("前置詞"))return"readingAccuracy";
  if(mt.includes("因果")||mt.includes("用語逆転"))return"logicalReasoning";
  if(mt.includes("公式")||mt.includes("用語"))return"focus";
  return"readingAccuracy";
};
// 正解時に伸びるステータス。値は絶対に減らない（モチベ維持）
// ★スコア設計（v14）: 20問連続正解で「成長スコア」合計が200点、全問不正解（20問）でも80点伸びる。
//   成長スコア = 基本ステータス gains + 単元力 gains
//   単元力: 正解+6 / 不正解+2 （要望仕様）
//   1問あたり目標:
//     correct → 単元+6, 基本+4 → 計+10 → 20問で200点
//     wrong   → 単元+2, 基本+2 → 計+4  → 20問で80点
const calcStatGainsForAnswer=(correct,mistakeType,opts={})=>{
  const {wasRetry=false,confidence=null,prevWrong=false,streak=0}=opts;
  const g={};STAT_ORDER.forEach(k=>g[k]=0);
  const stat=mistakeToStat(mistakeType);
  if(correct){
    // 基本目標: 合計+4
    g.focus+=2;
    g[stat]+=2;
    // 連続ボーナス: 2連目以降、安定力に少しずつ加算（最大2点まで＝基本目標を超えない）
    if(streak>=2)g.stability+=Math.min(2,Math.floor(streak/3));
    // 頑張りボーナス（基本+4 とは別腹、上限なし設計）
    if(wasRetry)g.retryAgain+=2;
    if(prevWrong)g.retryPower+=2;
    if(confidence===3)g.verificationPower+=2;
  }else{
    // 不正解でも基本+2 は確保（注意力1 + 関連スタッツ1）。20問全不正解で 単元+2*20=40 / 基本+2*20=40 → 計80
    g.attention+=1;
    g[stat]+=1;
  }
  return g;
};
// 単元力（subjectUnitStats）の更新ポイント
//   correct: +6 / wrong: +2  （v14: 要望に合わせ更新）
const unitGainForAnswer=correct=>correct?6:2;

.key-row input{margin-bottom:0;flex:1}
.key-status{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
.key-status.ok{background:#dcfce7;color:#166534}
.key-status.empty{background:#f0edff;color:#9990cc}
.report-btn{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:8px;font-size:11px;color:#ef4444;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:6px}
.report-btn:hover{background:rgba(239,68,68,.1)}

/* ─── クイズカード ─── */
.quiz-card{background:#fff;border:2px solid #ddd6fe;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 16px rgba(91,63,248,.1)}
.q-text{background:#f0edff;border:1px solid #ddd6fe;border-radius:14px;padding:14px;margin-bottom:14px;font-size:16px;font-weight:800;color:#1e1e3a;line-height:1.75}
.choice-btn{background:#fff;border:2px solid #e8e3ff;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:700;color:#1e1e3a;cursor:pointer;width:100%;text-align:left;margin-bottom:8px;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:10px}
.choice-btn:hover:not(:disabled){border-color:#5b3ff8;background:#f0edff}
.choice-btn.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
.choice-btn.wrong{border-color:#ef4444;background:#fff7f7;color:#991b1b}
.choice-btn.dim{opacity:.3;cursor:default}
.choice-label{min-width:28px;height:28px;border-radius:7px;background:#ede9ff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#5b3ff8;flex-shrink:0}
.choice-btn.correct .choice-label{background:#dcfce7;color:#166534}
.choice-btn.wrong .choice-label{background:#fee2e2;color:#991b1b}
.not-learned-btn{background:#fafafa;border:2px dashed #d1d5db;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer;width:100%;text-align:left;margin-bottom:4px;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:10px}
.not-learned-btn:hover{border-color:#9ca3af;background:#f3f4f6}
.not-learned-btn .choice-label{background:#f3f4f6;color:#6b7280}
.hint-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#78350f;font-weight:600;line-height:1.7}
.hint-label{font-size:10px;font-weight:900;color:#d97706;letter-spacing:.06em;margin-bottom:4px}
.mistake-tag{display:inline-block;background:#fff7f7;border:1.5px solid #fca5a5;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:900;color:#991b1b;margin-bottom:8px}
.result-wrong-box{background:#fff7f7;border:1.5px solid #fca5a5;border-radius:14px;padding:14px;margin-bottom:14px}
.result-wrong-type{font-size:10px;font-weight:900;color:#ef4444;letter-spacing:.06em;margin-bottom:4px}
.result-wrong-name{font-size:15px;font-weight:900;color:#991b1b;margin-bottom:8px}
.result-wrong-fb{font-size:13px;color:#7f1d1d;font-weight:600;line-height:1.65}
.result-ok-box{background:#f0fdf4;border:2px solid #86efac;border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.result-ok-icon{font-size:36px;margin-bottom:4px;animation:bounce .5s cubic-bezier(.34,1.56,.64,1) both}
.result-ok-fb{font-size:13px;color:#166534;font-weight:600;line-height:1.65;margin-top:8px;text-align:left}
.why-wrong-btn{background:#ede9ff;color:#5b3ff8;border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;transition:all .18s;text-align:left}
.why-wrong-btn:hover{background:#ddd6fe}
.why-wrong-panel{background:#f8f7ff;border:1.5px solid #ddd6fe;border-radius:14px;padding:12px;margin-bottom:10px}
.why-wrong-item{border-bottom:1px solid #ede9ff;padding:10px 0;font-size:12px;color:#4c1d95;line-height:1.7}
.why-wrong-item:last-child{border-bottom:none;padding-bottom:0}
.why-wrong-choice{font-size:13px;font-weight:800;color:#1e1e3a;margin-bottom:4px}
.rank-one-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:900;color:#92400e;cursor:pointer;transition:all .18s}
.rank-one-badge.on{background:linear-gradient(135deg,#5b3ff8,#9b59f8);border-color:#5b3ff8;color:#fff}
.btn-retry{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;transition:all .18s}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(239,68,68,.3)}
.an-next{background:linear-gradient(135deg,#5b3ff8,#9b59f8);color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-top:6px;transition:all .18s}
.an-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,63,248,.3)}
.an-complete{text-align:center;padding:20px 16px}
.an-complete-icon{font-size:52px;display:block;margin-bottom:10px;animation:bounce .7s cubic-bezier(.34,1.56,.64,1) both}
@keyframes bounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.an-score-row{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.an-score-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
.an-score-dot.ok{background:#dcfce7;color:#166534}
.an-score-dot.ng{background:#fee2e2;color:#991b1b}
.an-stat-row{display:flex;gap:8px;margin-bottom:12px}
.an-stat{background:#f0edff;border:1px solid #ddd6fe;border-radius:12px;padding:10px 8px;text-align:center;flex:1}
.an-stat-n{font-size:17px;font-weight:900;color:#5b3ff8}
.an-stat-l{font-size:10px;color:#7c6fb0;margin-top:2px}

/* 分析履歴 */
.anhist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0edff;font-size:12px}
.anhist-subj{font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px;background:#ede9ff;color:#5b3ff8}
.anhist-score{display:flex;gap:3px}
.anhist-dot{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px}
.anhist-dot.ok{background:#dcfce7;color:#166534}
.anhist-dot.ng{background:#fee2e2;color:#991b1b}

/* ① 正解バースト */
@keyframes burst-expand{0%{transform:translate(-50%,-50%) scale(0);opacity:.9}100%{transform:translate(-50%,-50%) scale(3);opacity:0}}
.correct-burst{position:fixed;top:50%;left:50%;width:72px;height:72px;border-radius:50%;border:5px solid #22c55e;pointer-events:none;z-index:2000;animation:burst-expand .6s ease-out both}
.correct-burst-2{position:fixed;top:50%;left:50%;width:72px;height:72px;border-radius:50%;border:4px solid #86efac;pointer-events:none;z-index:2000;animation:burst-expand .6s .12s ease-out both}
/* ⑥⑦⑨⑪ トースト共通 */
@keyframes toast-in{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast-base{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:996;border-radius:18px;padding:12px 22px;font-weight:800;font-size:13px;text-align:center;animation:toast-in .4s cubic-bezier(.34,1.56,.64,1) both;max-width:calc(100vw - 32px);box-sizing:border-box;box-shadow:0 4px 20px rgba(0,0,0,.13)}
/* ② あと1問ハイライト */
@keyframes norma-pulse{0%,100%{opacity:1}50%{opacity:.55}}
.norma-last{background:linear-gradient(135deg,#fef3c7,#fde68a)!important;border-color:#f59e0b!important;animation:norma-pulse 1s ease-in-out infinite}
/* ⑧ ボーナスボタン */
.btn-bonus{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#166534;border:2px solid #86efac;border-radius:14px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;transition:all .18s}
.btn-bonus:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(34,197,94,.25)}

/* ── 復帰モード ── */
.comeback-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.comeback-timer-num{font-size:28px;font-weight:900;color:#92400e;line-height:1;min-width:54px;text-align:center}
.comeback-bar-wrap{flex:1;height:6px;background:rgba(245,158,11,.2);border-radius:4px;overflow:hidden}
.comeback-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:4px;transition:width 1s linear}
.comeback-end-btn{background:rgba(239,68,68,.1);border:1.5px solid #ef4444;color:#ef4444;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── 累積ステータス ── */
.stat-params{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.stat-param-card{background:#f8f7ff;border:1.5px solid #e8e3ff;border-radius:12px;padding:8px 10px}
.stat-param-name{font-size:10px;font-weight:800;color:#9990cc;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.stat-param-val{font-size:18px;font-weight:900;color:#5b3ff8;line-height:1.1}
.stat-param-bar{height:4px;background:#e8e3ff;border-radius:2px;overflow:hidden;margin-top:5px}
.stat-param-fill{height:100%;background:linear-gradient(90deg,#5b3ff8,#9b59f8);border-radius:2px;transition:width .5s}

/* ── 今日伸びた能力 ── */
.today-gains{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.gain-pill{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;color:#166534}

/* ── 自信度セレクター ── */
.confidence-wrap{margin:10px 0 2px;border-top:1px solid #f0edff;padding-top:10px}
.confidence-label-txt{font-size:10px;font-weight:800;color:#9990cc;letter-spacing:.04em;margin-bottom:6px}
.confidence-row{display:flex;gap:5px}
.confidence-btn{flex:1;background:#f8f7ff;border:2px solid #e8e3ff;border-radius:10px;padding:9px 6px;font-size:12px;font-weight:800;color:#9990cc;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;line-height:1.5}
.confidence-btn:hover{border-color:#5b3ff8;color:#5b3ff8;background:#ede9ff}
.confidence-btn.c1.selected{background:#fff7f7;border-color:#ef4444;color:#991b1b}
.confidence-btn.c2.selected{background:#fffbeb;border-color:#f59e0b;color:#92400e}
.confidence-btn.c3.selected{background:#f0fdf4;border-color:#22c55e;color:#166534}

/* ─── ヘッダー再設計 ─── */
.hdr-card{padding:12px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.hdr-meta{display:flex;align-items:center;gap:6px}
.hdr-grade{font-size:11px;color:#9990cc;font-weight:700}
.hdr-fire{display:inline-flex;align-items:center;gap:2px;letter-spacing:-2px;font-size:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fde68a;border-radius:99px;padding:2px 8px}
.hdr-fire-n{margin-left:4px;letter-spacing:0;font-size:10px;font-weight:900;color:#92400e}
.hdr-mode-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-refill{font-size:10px;color:#9990cc;display:flex;align-items:center;gap:3px;font-weight:700}
.hdr-subject-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hdr-subject{font-size:22px;font-weight:900;color:#1e1e3a;letter-spacing:.02em;line-height:1.2}
.hdr-pills{display:flex;gap:5px;flex-wrap:wrap}
.hdr-stats{display:flex;gap:5px}
.pill-ok{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.pill-ng{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.pill-norma{background:#fef3c7;color:#92400e;border:1px solid #fde68a}

/* ─── 難易度ピル（ヘッダー） ─── */
.diff-pill{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:900;cursor:pointer;transition:all .18s;font-family:inherit;border-width:1.5px;border-style:solid}
.diff-pill.diff-easy{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e;color:#166534}
.diff-pill.diff-standard{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;color:#92400e}
.diff-pill.diff-hard{background:linear-gradient(135deg,#dc2626,#ef4444);border-color:#dc2626;color:#fff}

/* ─── 難易度セレクター（設定タブ） ─── */
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.diff-btn{background:#fff;border:2px solid #e8e3ff;border-radius:14px;padding:12px 6px;cursor:pointer;font-family:inherit;color:#9990cc;transition:all .18s;text-align:center}
.diff-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.diff-btn.on{box-shadow:0 4px 14px rgba(91,63,248,.12);transform:translateY(-1px)}

/* ─── 結果フェーズの強化 ─── */
.result-big-ok{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:2px solid #22c55e;border-radius:18px;padding:20px 16px;margin-bottom:12px;text-align:center;box-shadow:0 4px 18px rgba(34,197,94,.15)}
.result-big-ng{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:18px;padding:18px 16px;margin-bottom:12px;box-shadow:0 4px 18px rgba(245,158,11,.12)}
.result-big-icon{font-size:44px;margin-bottom:4px;animation:bounce .55s cubic-bezier(.34,1.56,.64,1) both}
.result-big-title{font-size:22px;font-weight:900;line-height:1.1}
.result-big-sub{font-size:12px;font-weight:700;opacity:.85;margin-top:4px}
.encourage-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#166534;font-weight:700;line-height:1.6}

/* ─── ノルマ3段階ドット ─── */
.norma-dots{display:flex;align-items:center;gap:6px;justify-content:center;margin:8px 0}
.norma-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;border:2px solid;transition:all .25s}
.norma-dot.done{background:#22c55e;border-color:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.3)}
.norma-dot.now{background:#fef3c7;border-color:#f59e0b;color:#92400e;animation:norma-pulse 1.2s ease-in-out infinite}
.norma-dot.todo{background:#fff;border-color:#fde68a;color:#fde68a}
.norma-line{flex:1;height:3px;background:#fde68a;border-radius:2px;max-width:32px;transition:background .3s}
.norma-line.done{background:#22c55e}

/* ─── 学習タブ：難易度ベース調整 ─── */
.diff-easy-soft .choice-btn{font-size:15px;padding:14px 16px;min-height:52px}
.diff-easy-soft .q-text{font-size:17px;line-height:1.85;padding:16px}

/* ─── 成長スコア演出 ────────────────────────────────── */
/* 成長ホップ: 1項目 0.4秒で順に跳ねる */
@keyframes growth-hop{0%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(34,197,94,0)}30%{transform:translateY(-10px) scale(1.06);box-shadow:0 8px 22px rgba(34,197,94,.35)}60%{transform:translateY(-2px) scale(1.02)}100%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(34,197,94,0)}}
.hop-anim{animation:growth-hop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes value-tick{0%{transform:scale(1);color:#5b3ff8}40%{transform:scale(1.25);color:#22c55e}100%{transform:scale(1)}}
.tick-anim{animation:value-tick .55s ease-out both;display:inline-block}

/* スコアカード: 1行表示にも対応 */
.stat-params-1col{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.stat-line{display:flex;align-items:center;gap:10px;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:12px;padding:8px 12px}
.stat-line .stat-line-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.stat-line .stat-line-name{font-size:12px;font-weight:800;color:var(--text-soft);min-width:62px;flex-shrink:0}
.stat-line .stat-line-bar{flex:1;height:6px;background:var(--input-border);border-radius:3px;overflow:hidden}
.stat-line .stat-line-bar > div{height:100%;background:linear-gradient(90deg,#5b3ff8,#9b59f8);border-radius:3px;transition:width .5s}
.stat-line .stat-line-val{font-size:15px;font-weight:900;color:var(--primary);min-width:36px;text-align:right}
.stat-line .rank-no{font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:99px;padding:1px 7px;flex-shrink:0;letter-spacing:.04em}
.stat-line .rank-no.r1{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.stat-line .rank-no.r2{background:linear-gradient(135deg,#cbd5e1,#94a3b8)}
.stat-line .rank-no.r3{background:linear-gradient(135deg,#fdba74,#c2410c)}
[data-theme="dark"] .stat-line{background:#1f1f35;border-color:#3a3a55}
[data-theme="dark"] .stat-line .stat-line-name{color:#aba6cf}
[data-theme="dark"] .stat-line .stat-line-val{color:#c4b5fd}

/* ランクイン演出: TOP5入りトースト */
@keyframes rankin-pop{0%{transform:translate(-50%,-30px) scale(.6);opacity:0}50%{transform:translate(-50%,4px) scale(1.1);opacity:1}100%{transform:translate(-50%,0) scale(1);opacity:1}}
@keyframes celebration-pop{0%{transform:translateY(-12px) scale(.92);opacity:0}60%{transform:translateY(3px) scale(1.03);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
.rankin-toast{position:fixed;top:24px;left:50%;z-index:998;background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:18px;padding:12px 22px;font-weight:900;color:#92400e;box-shadow:0 8px 28px rgba(245,158,11,.45);animation:rankin-pop .55s cubic-bezier(.34,1.56,.64,1) both;font-size:13px;text-align:center;max-width:calc(100vw - 32px);box-sizing:border-box}
.rankin-toast .rankin-big{font-size:20px;font-weight:900;display:block;margin-bottom:2px}
.rankin-toast .rankin-spark{display:inline-block;animation:spark-spin 1.2s linear infinite}
@keyframes spark-spin{to{transform:rotate(360deg)}}

/* ─── タイトル・ヒーロー（説得力強化）────────────── */
.hero-title{position:relative;text-align:center;padding:8px 0 4px}
.hero-logo{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#5b3ff8,#9b59f8);box-shadow:0 12px 32px rgba(91,63,248,.35),inset 0 1px 0 rgba(255,255,255,.4);margin-bottom:10px;position:relative;overflow:hidden}
.hero-logo::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.5) 0%, transparent 50%);pointer-events:none}
.hero-logo span{font-size:42px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.18))}
.hero-h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,#5b3ff8,#9b59f8 60%,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;letter-spacing:.01em;margin-bottom:4px}
.hero-sub{font-size:12px;font-weight:800;color:#9990cc;line-height:1.6;margin-bottom:4px}
.hero-tag{display:inline-block;background:rgba(91,63,248,.08);border:1px solid rgba(91,63,248,.18);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:800;color:#5b3ff8;margin-top:6px}

/* ─── APIキー＆ユーザー行 ────────────────────────── */
.kv-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.kv-row > input{margin-bottom:0 !important;flex:1;min-width:0}

// ─── RecallQuiz: 正解時に1問だけ「なぜ他は違うか」をアクティブリコール出題 ──
// 受動的閲覧（why-wrong パネルを開くだけ）を能動的想起へ変換するためのミニクイズ
const RecallQuiz=React.memo(({quiz})=>{
  // 出題内容を問題変更時のみ確定（再レンダーで質問が変わらないように）
  const data=useMemo(()=>{
    const wa=Array.isArray(quiz?.wrong_analysis)?quiz.wrong_analysis.filter(x=>x&&typeof x.index==="number"&&typeof x.why_wrong==="string"):[];
    if(wa.length<2)return null;
    // 正解選択肢の why_wrong と、別の誤答の why_wrong を 2 択で並べる
    const targetIdx=Math.floor(Math.random()*wa.length);
    const target=wa[targetIdx];
    const others=wa.filter((_,i)=>i!==targetIdx);
    const distractor=others[Math.floor(Math.random()*others.length)];
    // 2択をシャッフル
    const opts=[{text:target.why_wrong,correct:true},{text:distractor.why_wrong,correct:false}];
    if(Math.random()<0.5)opts.reverse();
    return{target,opts};
  },[quiz]);
  const [picked,setPicked]=useState(null);
  // 問題が変わったら回答もリセット
  useEffect(()=>{setPicked(null);},[quiz]);
  if(!data)return null;
  const labels=["A","B","C","D"];
  const choiceText=(quiz.choices||[])[data.target.index]||"";
  return(
    <div className="recall-card">
      <div className="recall-label">🧠 アクティブリコール — 想起トレーニング</div>
      <div className="recall-q">
        <b>{labels[data.target.index]}: {choiceText}</b> が違う理由は？
      </div>
      <div className="recall-opts">
        {data.opts.map((o,i)=>{
          const isPicked=picked!==null&&picked===i;
          const showState=picked!==null;
          const cls=`recall-opt${showState?(o.correct?" correct":(isPicked?" wrong":"")):""}`;
          return(
            <button key={i} className={cls} disabled={showState} onClick={()=>setPicked(i)}>
              {showState&&o.correct?"✓ ":showState&&isPicked&&!o.correct?"✗ ":""}{o.text}
            </button>
          );
        })}
      </div>
      {picked!==null&&(
        <div className={`recall-result ${data.opts[picked].correct?"ok":"ng"}`}>
          {data.opts[picked].correct?"🎯 完璧！消去法もバッチリ":"💡 落ち着いて。正しい理由は緑のボタンの方"}
        </div>
      )}
    </div>
  );
});

const CHOICE_LABELS=["A","B","C","D"];
const QuizPanel=React.memo(({quiz,quizPhase,selectedChoice,rankOneMode,easyMode,hintSource,showWhyWrong,onChoice,onNotLearnedYet,onRetry,onNext,onToggleWhyWrong,onShowHint,isReview,isNorma,todaySess,onReport,confidenceRating,onConfidenceRate,timeLimit,timeLimitMax,hiddenChoice,lifelineUsed,onLifeline,isTrial,timeAttackEnabled,lifelineEnabled,hintPanelOpen,onToggleHintPanel,primeMistakeType,isPriorityReview})=>{

  },[quizPhase]);
  // ⑯ 自信度セレクター

    <div className="confidence-wrap">
      <div className="confidence-label-txt">この問題、どれくらいわかった？</div>
      <div className="confidence-row">
        <button className={`confidence-btn c1${confidenceRating===1?" selected":""}`} onClick={()=>onConfidenceRate(1)}>🎲<br/>勘</button>
        <button className={`confidence-btn c2${confidenceRating===2?" selected":""}`} onClick={()=>onConfidenceRate(2)}>🤔<br/>半分わかった</button>
        <button className={`confidence-btn c3${confidenceRating===3?" selected":""}`} onClick={()=>onConfidenceRate(3)}>✅<br/>説明できる</button>
      </div>

  );
  const ModeBanner=()=>{
    if(isReview&&isNorma)return(
      <React.Fragment>
        <div style={{background:"linear-gradient(135deg,#ede9ff,#ddd6fe)",border:"1.5px solid #a78bfa",borderRadius:12,padding:"8px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>🎯</span>
          <div><div style={{fontSize:12,fontWeight:900,color:"#5b3ff8"}}>ノルマ問題 {todaySess+1} / 3</div><div style={{fontSize:11,color:"#4c1d95"}}>3問正解でノルマ達成！</div></div>
        </div>
        <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>📝</span>
          <div><div style={{fontSize:12,fontWeight:900,color:"#92400e"}}>復習問題</div><div style={{fontSize:11,color:"#78350f"}}>以前まちがえた問題に再チャレンジ！</div></div>
        </div>
      </React.Fragment>
    );
    if(isReview)return(
      <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📝</span>
        <div><div style={{fontSize:12,fontWeight:900,color:"#92400e"}}>復習問題</div><div style={{fontSize:11,color:"#78350f"}}>以前まちがえた問題に再チャレンジ！</div></div>
      </div>
    );
    if(isNorma)return(
      <div style={{background:"linear-gradient(135deg,#ede9ff,#ddd6fe)",border:"1.5px solid #a78bfa",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🎯</span>
        <div><div style={{fontSize:12,fontWeight:900,color:"#5b3ff8"}}>ノルマ問題 {todaySess+1} / 3</div><div style={{fontSize:11,color:"#4c1d95"}}>3問正解でノルマ達成！</div></div>
      </div>
    );
    return null;
  };

  // ─ 問題フェーズ ─
  if(quizPhase==="question"){
    return(
      <div ref={quizCardRef} className={`quiz-card${easyMode?" diff-easy-soft":""}`}>
        {isTrial&&(
          <div style={{background:"linear-gradient(135deg,#fff7ed,#fed7aa)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:800,color:"#92400e"}}>
            <span style={{fontSize:16}}>🎁</span>
            <span>お試しモード — APIキーなしで体験中</span>
          </div>
        )}
        <ModeBanner/>
        {/* 思い込みアラート（自信3で不正解だった問題の再復習） */}
        {isPriorityReview&&(
          <div className="priority-banner">
            <span className="pb-icon">⚠️</span>
            <span>思い込みアラート — 自信ありで間違えた問題。今度こそ慎重に！</span>

          <React.Fragment>
            <div className="q-text">{quiz.question}</div>
            {quiz.choices.map((c,i)=>{
              const isHidden=hiddenChoice===i;
              return(
                <button key={i} className={`choice-btn${isHidden?" dim":""}`} onClick={()=>!isHidden&&onChoice(i)} disabled={isHidden} style={isHidden?{textDecoration:"line-through",opacity:.35,cursor:"not-allowed"}:undefined}>
                  <span className="choice-label">{CHOICE_LABELS[i]}</span>
                  {isHidden?"（消去済み）":c}
                </button>
              );
            })}
            {/* ⑧ 消去法ライフライン（advancedMode.lifeline ON時のみ） */}
            {lifelineEnabled&&!lifelineUsed&&(
              <button className="btn btn-ghost" style={{marginBottom:8,background:"linear-gradient(135deg,#fef3c7,#fde68a)",color:"#92400e",border:"1.5px solid #f59e0b"}} onClick={onLifeline}>
                💡 ライフライン：間違いを1つ消す
              </button>
            )}
            {/* 学習サポート: 詰まったときの前提ヒント（「まだ習ってない」より低ハードルな入り口） */}
            {quiz.hint&&(
              <button className="btn btn-ghost" style={{marginBottom:8,background:"#f0f9ff",color:"#1e40af",border:"1.5px solid #93c5fd"}} onClick={()=>onShowHint("hintBtn")}>
                💭 前提ヒントを見る（覚えていなくてOK）
              </button>
            )}
            <button className="not-learned-btn" onClick={onNotLearnedYet}>
              <span className="choice-label" style={{background:"#f3f4f6",color:"#6b7280"}}>E</span>
              まだ習ってない
            </button>
          </React.Fragment>
        )}
      </div>
    );
  }

  // ─ 結果フェーズ：不正解 ─
  // 並び方針: ①ミスタイプ大見出し → ②選んだ選択肢の分析 → ③問題と答え合わせ → ④自信度 → ⑤行動ボタン
  if(quizPhase==="result"&&!isCorrect){
    // 選んだ選択肢のwrong_analysisエントリを取得
    const chosenAnalysis=(quiz.wrong_analysis||[]).find(wa=>wa.index===selectedChoice);
    return(
      <div ref={quizCardRef} className={`quiz-card${easyMode?" diff-easy-soft":""}`}>
        <ModeBanner/>
        {/* ① 学びのチャンス！を最初に大きく見せる */}
        <div className="result-big-ng">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div className="result-big-icon" style={{fontSize:36,marginBottom:0}}>💡</div>
            <div>
              <div style={{fontSize:10,fontWeight:900,color:"#92400e",letterSpacing:".06em"}}>このミスの型</div>
              <div style={{fontSize:18,fontWeight:900,color:"#78350f",lineHeight:1.2}}>{quiz.mistake_type}</div>
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,.6)",borderRadius:10,padding:"10px 12px",fontSize:13,color:"#7f1d1d",fontWeight:700,lineHeight:1.65}}>
            👉 {quiz.short_feedback}
          </div>
        </div>
        {/* ② 選んだ選択肢の分析を大見出しで（「あなたは〜と考えた」統一） */}
        {chosenAnalysis&&selectedChoice!==null&&(
          <div className="thought-quote">
            <div className="thought-label">🤔 あなたの考え（思考のズレ）— {CHOICE_LABELS[selectedChoice]}: {quiz.choices[selectedChoice]}</div>
            <div className="thought-text">
              あなたは<span className="qmark">「</span>{chosenAnalysis.why_chosen}<span className="qmark">」</span>と考えた
            </div>
            <div className="thought-why-wrong">✗ {chosenAnalysis.why_wrong}</div>
          </div>
        )}
        {/* ③ 励まし（easyMode のみ） */}
        {easyMode&&(
          <div className="encourage-box">
            🌱 まちがいは「いまの自分の弱点」が見えた瞬間。これがいちばん成長する！
          </div>
        )}
        {/* ④ 問題＋答え合わせ */}
        <div className="q-text">{quiz.question}</div>
        {quiz.choices.map((c,i)=>{
          let cls="choice-btn";
          if(i===quiz.correct)cls+=" correct";
          else if(i===selectedChoice)cls+=" wrong";
          else cls+=" dim";
          return(
            <div key={i} className={cls} style={{cursor:"default"}}>
              <span className="choice-label">{CHOICE_LABELS[i]}</span>{c}
            </div>
          );
        })}
        {/* ④.5 正解の説明 */}
        <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"10px 12px",marginTop:6,marginBottom:10,fontSize:13,color:"#166534",fontWeight:700,lineHeight:1.65}}>
          ✅ {quiz.correct_feedback}
        </div>
        {/* ⑤ なぜ他は違うか（常時表示・モード切替なし） */}
        <button className="why-wrong-btn" onClick={onToggleWhyWrong}>
          {showWhyWrong?"▲ 他の選択肢の理由を閉じる":"👁️ なぜ他は違うか分析する"}
        </button>
        {showWhyWrong&&Array.isArray(quiz.wrong_analysis)&&(
          <div className="why-wrong-panel">
            <div style={{fontSize:10,fontWeight:900,color:"#7c6fb0",letterSpacing:".04em",marginBottom:8}}>消去法の精度を上げる</div>
            {quiz.wrong_analysis.map((wa,i)=>{
              const idx=typeof wa.index==="number"?wa.index:null;
              const choiceText=idx!==null?quiz.choices[idx]:"";
              return(
                <div key={i} className="why-wrong-item">
                  <div className="why-wrong-choice">{idx!==null?CHOICE_LABELS[idx]:""} {choiceText}</div>
                  <div style={{color:"#d97706",marginBottom:2}}>🤔 {wa.why_chosen}</div>
                  <div style={{color:"#991b1b"}}>✗ {wa.why_wrong}</div>
                </div>
              );
            })}
          </div>
        )}
        {/* ⑥ 自信度 */}
        <ConfidenceSelector/>
        {/* ⑦ 行動: もう一回解く → ヒント（インライン展開）→ 次へ */}
        <button className="btn-retry" onClick={onRetry}>🔄 もう一回解く</button>
        {!easyMode&&quiz.hint&&(
          <React.Fragment>
            <button className="btn btn-ghost" onClick={onToggleHintPanel} style={{marginBottom:8}}>
              {hintPanelOpen?"▲ ヒントを閉じる":"💡 ヒントを見る（前提知識）"}
            </button>
            {hintPanelOpen&&(
              <div className="hint-box" style={{marginBottom:8}}>
                <div className="hint-label">💡 前提ヒント</div>
                <div>{quiz.hint}</div>
                <div style={{marginTop:6,fontSize:11,color:"#a16207",lineHeight:1.5}}>
                  → 次の同じ型の問題で使えます。<b>もう一回解く</b>で身につけよう。
                </div>
              </div>
            )}
          </React.Fragment>
        )}
        <button className="an-next" onClick={onNext}>次の問題へ →</button>
        <button className="report-btn" onClick={onReport}>⚠️ この問題の内容がおかしい</button>
      </div>
    );
  }

  // ─ 結果フェーズ：正解 ─
  if(quizPhase==="result"&&isCorrect){
    return(
      <div ref={quizCardRef} className={`quiz-card${easyMode?" diff-easy-soft":""}`}>
        <ModeBanner/>
        {/* 大きな正解表示 */}
        <div className="result-big-ok">
          <div className="result-big-icon">✅</div>
          <div className="result-big-title" style={{color:"#166534"}}>正解！</div>
          {easyMode&&<div className="result-big-sub" style={{color:"#166534"}}>その調子！🌟</div>}
        </div>
        {/* 正解の説明 */}
        <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"12px 14px",marginBottom:10,fontSize:13,color:"#166534",fontWeight:700,lineHeight:1.65}}>
          {quiz.correct_feedback}
        </div>
        {/* アクティブリコール: 正解時にランダムな誤答を1つピックし「なぜ違う？」を2択で出題 */}
        <RecallQuiz quiz={quiz}/>
        {/* なぜ他は違うか（常時表示・モード切替なし） */}
        <button className="why-wrong-btn" onClick={onToggleWhyWrong}>
          {showWhyWrong?"▲ 他の選択肢の理由を閉じる":"👁️ なぜ他は違うか分析する"}
        </button>
        {showWhyWrong&&Array.isArray(quiz.wrong_analysis)&&(
          <div className="why-wrong-panel">
            <div style={{fontSize:10,fontWeight:900,color:"#7c6fb0",letterSpacing:".04em",marginBottom:8}}>消去法の精度を上げる</div>
            {quiz.wrong_analysis.map((wa,i)=>{
              const idx=typeof wa.index==="number"?wa.index:null;
              const choiceText=idx!==null?quiz.choices[idx]:"";
              return(
                <div key={i} className="why-wrong-item">
                  <div className="why-wrong-choice">{idx!==null?CHOICE_LABELS[idx]:""} {choiceText}</div>
                  <div style={{color:"#d97706",marginBottom:2}}>🤔 {wa.why_chosen}</div>
                  <div style={{color:"#991b1b"}}>✗ {wa.why_wrong}</div>
                </div>
              );
            })}
          </div>
        )}
        <ConfidenceSelector/>
        <button className="btn-green" onClick={onNext}>次の問題へ →</button>
        <button className="report-btn" onClick={onReport}>⚠️ この問題の内容がおかしい</button>
      </div>
    );
  }
  return null;
});

  // 各種お祝いカード

  const [longTimeMsg,setLongTimeMsg]=useState("");     // 久々成長
  const [growthTypeMsg,setGrowthTypeMsg]=useState(""); // 今日の成長タイプ
  const [aiReviewMsg,setAiReviewMsg]=useState("");     // 今日はここが良かった AI 総評
  const [subject,setSubject]=useState("");
  const [gs,setGs]=useState({streak:0,best:0,wrong:0,qNum:1});

  const [welcomeMsg,setWelcomeMsg]=useState("");
  // ⑨ 苦手科目改善メッセージ
  const [subjectImprovedMsg,setSubjectImprovedMsg]=useState("");
  // ⑪ 休み明けメッセージ
  const [showRestartMsg,setShowRestartMsg]=useState(false);

  const [subjectSlideMsg,setSubjectSlideMsg]=useState("");
  // 報告完了メッセージ
  const [reportMsg,setReportMsg]=useState("");
  const normaQueueR=useRef([]);
  const prevRatesRef=useRef({});
  const welcomeShownRef=useRef(false);
  // 初期値は -1。loadLogs 後の初回 useEffect ではバナーを出さず、その回で current を確定する。
  const prevSessionsRef=useRef(-1);
  const [autoRefill,setAutoRefill]=useState(()=>{try{return JSON.parse(_safeLS.get(userKey("manabi_autorefill"))??'true');}catch(e){return true;}});
  // ── テーマ（light / dark）──
  const [theme,setTheme]=useState(()=>{try{return _safeLS.get("manabi_theme")||"light";}catch(e){return"light";}});
  useEffect(()=>{
    try{
      document.documentElement.setAttribute("data-theme",theme);
      _safeLS.set("manabi_theme",theme);
    }catch(e){}
  },[theme]);
  const [importMsg,setImportMsg]=useState("");
  // エラー後リトライのクールダウン（秒）。0 = ボタン有効
  const [retryCooldown,setRetryCooldown]=useState(0);
  const retryCooldownRef=useRef(0);
  const retryTimerRef=useRef(null);
  const [rejectCount,setRejectCount]=useState(()=>{try{return parseInt(_safeLS.get(userKey("manabi_reject_count"))||"0",10);}catch(e){return 0;}});
  // ── 復帰モード ──
  const [comebackMode,setComebackMode]=useState(false);
  const [comebackTimer,setComebackTimer]=useState(0);
  // ── 自信度 ──
  const [confidenceRating,setConfidenceRating]=useState(null);
  const confidenceRatingR=useRef(null);
  useEffect(()=>{confidenceRatingR.current=confidenceRating;},[confidenceRating]);
  // ── ⑦ タイムアタック ──
  const TIME_LIMIT_MAX=30;
  const [timeLimit,setTimeLimit]=useState(null);
  // ── ⑧ 消去法ライフライン ──
  const [lifelineUsed,setLifelineUsed]=useState(false);
  const [hiddenChoice,setHiddenChoice]=useState(null);
  // ── 単元パネル科目フィルター ──
  const [topicFilterSubj,setTopicFilterSubj]=useState("");
  // ── お試しモード ──
  const [trialMode,setTrialMode]=useState(false);
  const trialModeR=useRef(false);
  useEffect(()=>{trialModeR.current=trialMode;},[trialMode]);
  const [trialIndex,setTrialIndex]=useState(0);
  const trialIndexR=useRef(0);
  useEffect(()=>{trialIndexR.current=trialIndex;},[trialIndex]);
  // ── 直前の回答情報（confidence 遅延保存用）──
  // handleChoice 時点では confidenceRating は null なので、次へ押した瞬間に保存する
  const prevAnswerR=useRef(null); // {correct, subject, wrongItem} | null
  // ── リトライ追跡 ──
  const wasRetryR=useRef(false);
  const [waitingForStock,setWaitingForStock]=useState(null); // null | 科目名
  const waitingForStockR=useRef(null);
  useEffect(()=>{waitingForStockR.current=waitingForStock;},[waitingForStock]);
  // polling 無効化トークン。setWaitingForStock を呼ぶ直前にインクリメントすることで、
  // React commit 遅延に依らず次の tick を即キャンセルできる。
  const pollingCancelRef=useRef(0);
  // 緊急生成（ストック空時に即座に3問生成）
  const emergencyGenLk=useRef(false);
  const [isEmergencyGen,setIsEmergencyGen]=useState(false);
  const autoRefillR=useRef(autoRefill);

  // 学年に応じた科目リスト（gradeが変わると自動更新）
  const subjects = calcSubjects(grade);
  const subjectsR = useRef(subjects);
  useEffect(()=>{ subjectsR.current = calcSubjects(grade); setDamStats(getDamStats(calcSubjects(grade))); },[grade]);
  useEffect(()=>{autoRefillR.current=autoRefill;try{_safeLS.set(ARFL(),JSON.stringify(autoRefill));}catch(e){};},[autoRefill]);

  // ストック待機中: 補充されたら自動で問題を表示（全科目チェック、あればズレて出題）
  useEffect(()=>{
    if(!waitingForStock)return;
    // 科目・学年・トークンをeffect起動時にスナップショット固定。
    // pollingCancelRef は setWaitingForStock を呼ぶ直前に必ずインクリメントされるため、
    // React commit 遅延に依らず次の tick で即キャンセルできる。
    const snapshotSubj=waitingForStock;
    const currentGrade=gradeR.current;
    const myToken=pollingCancelRef.current; // 自分のトークン番号を記憶
    const timer=setInterval(()=>{
      // トークン不一致 = 外部から cancelPolling() が呼ばれた → 即停止
      if(pollingCancelRef.current!==myToken)return;
      // nextLk/fetchLk が立っている間（handleNext・fetchQ処理中）は上書きしない
      if(nextLk.current||fetchLk.current)return;
      const subs=subjectsR.current;
      // 緊急生成した3問は指定科目専用なので、他科目へはズレない
      const pollDiff=getAutoDifficulty(snapshotSubj,logsR.current);
      const q=popFromDam(snapshotSubj,pollDiff,1);
      if(q.length){
        pollingCancelRef.current++; // 自分を含む旧tickを全て無効化してからsetState
        setWaitingForStock(null);
        // 復習待機中に問題が来てもキュー削除はしない（分析完了後にIDで削除）
        setQuiz(q[0]);
        setDamStats(getDamStats(subs));
      }
    },3000);
    return()=>{clearInterval(timer);};
  },[waitingForStock]);

  // ── クイズステート（フラット） ──
  const [quizPhase,setQuizPhase]=useState(null); // null | "question" | "result"
  const [selectedChoice,setSelectedChoice]=useState(null); // null | 0-3
  const [hintSource,setHintSource]=useState(null); // null | "notLearned" | "hintBtn"
  const [showWhyWrong,setShowWhyWrong]=useState(false);
  const [answerCorrect,setAnswerCorrect]=useState(null);
  // v14: 上級者モード（タイムアタック/ライフライン）。設定タブのトグルで個別ON/OFF。
  const rankOneMode=!!(advancedMode.timeAttack||advancedMode.lifeline);
  // 難易度は手動選択ではなく自動。easyMode/hardMode は科目ごとの自動難易度に紐付けて表示用にのみ使う。

  // ユーザー切替時に呼ぶ：個別スコープのキーから state を再ロード。

  useEffect(()=>{

    loadLogs();setDamStats(getDamStats(subjectsR.current));

  // ─── 旧データの "数学" → 内部キー "算数" 正規化 ────────────────────
  // loadLogs / importData でロード直後に呼ぶ。in-memory を常にクリーンに保つ。
  const normalizeSubjectsInLogs=logs=>{
    const out={...logs};
    // reviewQueue: 科目正規化 + idなし旧エントリに id を補完
    // id がないと updateAnalysisStats の topic fallback 削除が誤爆するため、
    // ロード時に一括で id を付与して id ベース削除に一本化する。
    if(Array.isArray(out.reviewQueue)){
      out.reviewQueue=out.reviewQueue.map(q=>{
        const normalized=q.subject==="数学"?{...q,subject:"算数"}:q;
        const withId=normalized.id?normalized:{...normalized,id:crypto.randomUUID()};
        // SM-2 マイグレーション: dueDate がない旧データは今日扱いで即出題対象に
        if(withId.dueDate&&typeof withId.reps==="number")return withId;
        return {...withId,reps:withId.reps||0,dueDate:withId.dueDate||today()};
      });
    }
    // debugHistory
    if(Array.isArray(out.debugHistory)){

      );
    }

    if(Array.isArray(out.recentHistory)){
      out.recentHistory=out.recentHistory.map(r=>
        r.subject==="数学"?{...r,subject:"算数"}:r
      );
    }
    // subjectStats: "数学" キーがあれば "算数" にマージして削除
    if(out.subjectStats?.["数学"]){
      const m=out.subjectStats["数学"];
      const a=out.subjectStats["算数"]||{q:0,c:0};
      out.subjectStats={...out.subjectStats,"算数":{q:a.q+m.q,c:a.c+m.c}};
      delete out.subjectStats["数学"];
    }
    // dailyLog の subjects 配列
    if(out.dailyLog){
      const dl={};
      for(const [k,v] of Object.entries(out.dailyLog)){
        dl[k]=Array.isArray(v.subjects)
          ?{...v,subjects:v.subjects.map(s=>s==="数学"?"算数":s)}
          :v;
      }
      out.dailyLog=dl;
    }
    return out;
  };

  // ─── localStorage 肥大化防止 ──────────────────────────────────────
  // 保存前に呼ぶ。in-memory の state は触らず、書き込み用オブジェクトだけ刈る。
  // Safari の 5MB 制限を意識して各種上限を絞っている。
  const pruneLogs=nl=>{
    const out={...nl};
    // topicMastery: 150件上限（旧300から削減）
    const tm={...(out.topicMastery||{})};
    const tmKeys=Object.keys(tm);
    if(tmKeys.length>150){
      tmKeys.sort((a,b)=>(tm[a].attempts||0)-(tm[b].attempts||0));
      tmKeys.slice(0,tmKeys.length-150).forEach(k=>delete tm[k]);
      out.topicMastery=tm;
    }
    // dailyLog: 180日上限（旧365から削減）
    const dl={...(out.dailyLog||{})};
    const dlKeys=Object.keys(dl).sort();
    if(dlKeys.length>180){
      dlKeys.slice(0,dlKeys.length-180).forEach(k=>delete dl[k]);
      out.dailyLog=dl;
    }
    // subjectUnitStats: 各科目最大20単元（ポイント低い順に削除）
    const sus={...(out.subjectUnitStats||{})};
    for(const subj of Object.keys(sus)){
      const m=sus[subj]||{};
      const keys=Object.keys(m);
      if(keys.length>20){
        keys.sort((a,b)=>(m[a]||0)-(m[b]||0));
        const trimmed={};
        keys.slice(keys.length-20).forEach(k=>{trimmed[k]=m[k];});
        sus[subj]=trimmed;
      }
    }
    out.subjectUnitStats=sus;
    // recentHistory: 直近100問だけ保持（旧200から削減）
    if(Array.isArray(out.recentHistory)&&out.recentHistory.length>100){
      out.recentHistory=out.recentHistory.slice(-100);
    }
    // debugHistory: 直近50件まで（旧100から削減）
    if(Array.isArray(out.debugHistory)&&out.debugHistory.length>50){
      out.debugHistory=out.debugHistory.slice(0,50);
    }
    // dailyStatGains / dailyUnitGains: 直近30日まで
    for(const k of ["dailyStatGains","dailyUnitGains"]){
      const m={...(out[k]||{})};
      const ks=Object.keys(m).sort();
      if(ks.length>30)ks.slice(0,ks.length-30).forEach(kk=>delete m[kk]);
      out[k]=m;
    }
    return out;
  };

  const loadLogs=()=>{
    try{
      const r=_safeLS.get(STORE());
      if(r){
        const p=JSON.parse(r);
        if(!p.debugStats)p.debugStats={completed:0,perfect:0};
        if(!p.topicMastery)p.topicMastery={};
        if(!p.debugHistory)p.debugHistory=[];
        if(!p.bestLoginStreak)p.bestLoginStreak=0;
        if(!p.bestDayScore)p.bestDayScore=0;
        if(!p.cumulativeStats)p.cumulativeStats={};
        // 旧 signControl キーは attention にマージ
        if(p.cumulativeStats.signControl){
          p.cumulativeStats.attention=(p.cumulativeStats.attention||0)+p.cumulativeStats.signControl;
          delete p.cumulativeStats.signControl;
        }
        // 新規ステータスキーを既存データにマージ
        p.cumulativeStats={..._zeroStats(),...p.cumulativeStats};
        if(!p.dailyStatGains)p.dailyStatGains={};
        if(!p.dailyUnitGains)p.dailyUnitGains={};
        if(!p.subjectUnitStats)p.subjectUnitStats={};
        if(!p.subjectDifficulty)p.subjectDifficulty={};

        for(const dk of Object.keys(p.dailyStatGains)){

        // ⑪ 1日以上空いた場合の休み明けメッセージ（loginBonusと排他）
        if(isGap){

              setWelcomeBackMsg(`久しぶり！${days}日ぶりに戻ってきてくれて嬉しい。少しずつ取り戻そう。`);
            }else if(days===2){

            }

        }
        setLogs(normalizeSubjectsInLogs(p));
      }
    }catch(e){}
  };
  const saveLogs=nl=>{try{_safeLS.set(STORE(),JSON.stringify(pruneLogs(nl)));}catch(e){}};

  const checkBadges=(next)=>{
    const subs=subjectsR.current;
    const earned=BADGES.filter(b=>!next.earnedBadges.includes(b.id)&&b.cond(next,subs));
    if(earned.length){next.earnedBadges=[...next.earnedBadges,...earned.map(b=>b.id)];setNewBadges(earned);setTimeout(()=>setNewBadges([]),3500);}
  };

  const updateLogs=useCallback((correct,subj,wrongItem,newBest,sessionComplete,wasRetry=false)=>{
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));const td=today();
      if(!next.subjectStats[subj])next.subjectStats[subj]={q:0,c:0};
      next.subjectStats[subj].q++;if(correct)next.subjectStats[subj].c++;
      if(!next.dailyLog[td])next.dailyLog[td]={q:0,c:0,subjects:[],sessions:0};
      next.dailyLog[td].q++;if(correct)next.dailyLog[td].c++;
      if(sessionComplete)next.dailyLog[td].sessions++; // 3/3正解のセッションのみノルマカウント
      if(!next.dailyLog[td].subjects.includes(subj))next.dailyLog[td].subjects.push(subj);
      next.totalQ++;if(correct)next.totalCorrect++;
      if(newBest!==undefined)next.bestStreak=Math.max(next.bestStreak||0,newBest);
      if(!next.recentHistory)next.recentHistory=[];
      next.recentHistory.push({correct,subject:subj,date:td,mistake_type:(!correct&&quiz?.mistake_type)||undefined,confidence:confidenceRatingR.current??undefined});
      if(next.recentHistory.length>200)next.recentHistory=next.recentHistory.slice(-200);
      if(!correct&&wrongItem){if(!next.reviewQueue)next.reviewQueue=[];if(next.reviewQueue.length<20)next.reviewQueue.push(wrongItem);}
      // ── 継続力: 新しい日かチェック（loginStreak更新前に確認）──
      const isNewDay=(next.lastLogin!==td);
      if(next.lastLogin!==td){const ys=jstYesterday();next.loginStreak=(next.lastLogin===ys)?(next.loginStreak||0)+1:1;next.lastLogin=td;next.bestLoginStreak=Math.max(next.bestLoginStreak||0,next.loginStreak);}
      // 当日スコアの自己最高記録（伸びた能力合計）
      const {score:dayScore}=calcTodayScore(next);
      if(!next.bestDayScore)next.bestDayScore=0;
      if(dayScore>next.bestDayScore)next.bestDayScore=dayScore;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic){
        if(!next.topicMastery[topic])next.topicMastery[topic]={subj,attempts:0,correct:0,debugDone:0,mastered:false};
        const tm=next.topicMastery[topic];tm.attempts++;if(correct)tm.correct++;
        if(!tm.mastered&&tm.attempts>=5&&tm.correct/tm.attempts>=.8)tm.mastered=true;
      }
      // ── 累積ステータス & 今日伸びた能力 ─────────────────────────────
      next.cumulativeStats={..._zeroStats(),...(next.cumulativeStats||{})};
      if(!next.dailyStatGains)next.dailyStatGains={};
      if(!next.dailyStatGains[td])next.dailyStatGains[td]=_zeroStats();
      else next.dailyStatGains[td]={..._zeroStats(),...next.dailyStatGains[td]};
      // 直前が不正解だったかチェック（復帰力用）
      const prevRec=prev.recentHistory&&prev.recentHistory.length?prev.recentHistory[prev.recentHistory.length-1]:null;
      const prevWrong=!!(prevRec&&!prevRec.correct);
      // 連続正解数（安定力用）
      const newStreak=correct?(((prevRec&&prevRec.correct)?(prev._streak||1):0)+1):0;
      next._streak=newStreak;
      const stGains=calcStatGainsForAnswer(correct,quiz?.mistake_type,{wasRetry,confidence:confidenceRatingR.current,prevWrong,streak:newStreak});
      for(const k of Object.keys(stGains)){
        next.cumulativeStats[k]=(next.cumulativeStats[k]||0)+stGains[k];
        next.dailyStatGains[td][k]=(next.dailyStatGains[td][k]||0)+stGains[k];
      }
      // 継続力: 新しい日ログイン時に+5
      if(isNewDay){
        next.cumulativeStats.consistency=(next.cumulativeStats.consistency||0)+5;
        next.dailyStatGains[td].consistency=(next.dailyStatGains[td].consistency||0)+5;
      }
      // 開始力: ノルマセッション達成時 (sessionComplete=true & まだ3未満→3達成)
      if(sessionComplete){
        next.cumulativeStats.startingPower=(next.cumulativeStats.startingPower||0)+2;
        next.dailyStatGains[td].startingPower=(next.dailyStatGains[td].startingPower||0)+2;
      }
      // ── 単元力（科目別 topic_tag 単位の成長）──────────────────────
      const unitName=quiz?.topic_tag||quiz?.question?.slice(0,12)||"";
      if(unitName&&subj){
        if(!next.subjectUnitStats)next.subjectUnitStats={};
        if(!next.subjectUnitStats[subj])next.subjectUnitStats[subj]={};
        const ug=unitGainForAnswer(correct);
        next.subjectUnitStats[subj][unitName]=(next.subjectUnitStats[subj][unitName]||0)+ug;
        // 20件を超えたらポイントが最も低いものから削除
        const m=next.subjectUnitStats[subj];const ks=Object.keys(m);
        if(ks.length>20){
          ks.sort((a,b)=>m[a]-m[b]);
          ks.slice(0,ks.length-20).forEach(k=>delete m[k]);
        }
        if(!next.dailyUnitGains)next.dailyUnitGains={};
        next.dailyUnitGains[td]=(next.dailyUnitGains[td]||0)+ug;
      }
      // dailyStatGains / dailyUnitGains は30日上限
      for(const dkey of ["dailyStatGains","dailyUnitGains"]){
        const m=next[dkey]||{};const ks=Object.keys(m).sort();
        if(ks.length>30)ks.slice(0,ks.length-30).forEach(k=>delete m[k]);
        next[dkey]=m;
      }
      // 自動難易度を更新（次回出題時に反映）
      if(!next.subjectDifficulty)next.subjectDifficulty={};
      next.subjectDifficulty[subj]=getAutoDifficulty(subj,next);
      // v14: ランクイン検出（前回スナップショットと比較し、TOP5入りした基本ステータスを通知）
      try{
        const prevSnap=prev.statRankSnapshot||{};
        const cur=next.cumulativeStats||{};
        const sorted=STAT_ORDER.map(k=>({k,v:cur[k]||0})).sort((a,b)=>b.v-a.v);
        const newRank={};sorted.forEach((x,i)=>{ newRank[x.k]=i+1; });
        for(const item of sorted.slice(0,5)){
          const prevR=prevSnap[item.k]||999;
          if(prevR>5 && newRank[item.k]<=5 && item.v>0){
            // ランクイン！
            setRankInToast({label:STAT_LABELS[item.k].name,rank:newRank[item.k]});
            setTimeout(()=>setRankInToast(null),3200);
            break;
          }
        }
        next.statRankSnapshot=newRank;
      }catch(e){}
      checkBadges(next);saveLogs(next);
      // 成長ホップ再生（0.4s/item で順次跳ねる）
      setHopKey(k=>k+1);
      setTimeout(()=>setHopKey(0),2600); // 5項目 × 0.4s + 余裕 0.6s
      return next;
    });
  },[quiz]);

  const updateAnalysisStats=useCallback((results,subj)=>{
    const perfect=results.every(Boolean);
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next.debugStats)next.debugStats={completed:0,perfect:0};
      next.debugStats.completed++;if(perfect)next.debugStats.perfect++;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      // 問題ID単位で削除。旧データは normalizeSubjectsInLogs でロード時に id を補完済みなので
      // topic fallback は不要。id がない場合は削除しない（安全側に倒す）。
      // SM-2: 復習を正解できたら次の間隔へ繰り上げ（卒業すれば削除）。
      //       不正解なら現アイテムを削除（updateLogs 側で reps=0 の新規 wrongItem が積まれる）。
      const reviewId=currentReviewItemIdR.current;
      const reviewCorrect=results.every(Boolean);
      if(reviewId){
        if(reviewCorrect){
          next.reviewQueue=(next.reviewQueue||[]).map(q=>{
            if(q.id!==reviewId)return q;
            return advanceReviewItem(q); // null なら卒業
          }).filter(q=>q!=null);
        }else{
          next.reviewQueue=(next.reviewQueue||[]).filter(q=>q.id!==reviewId);
        }
      }
      if(topic&&next.topicMastery[topic]){
        next.topicMastery[topic].debugDone++;
      }
      if(!next.debugHistory)next.debugHistory=[];
      next.debugHistory.unshift({date:today(),subj,topic:topic||"—",results});
      if(next.debugHistory.length>100)next.debugHistory=next.debugHistory.slice(0,100);
      checkBadges(next);saveLogs(next);return next;

  },[quiz]);

  const getFireLevel=n=>{if(n>=30)return 5;if(n>=14)return 4;if(n>=7)return 3;if(n>=3)return 2;if(n>=1)return 1;return 0;};
  const pickSubject=cur=>{
    const subs=subjectsR.current;
    const rates=calcSubjRates(cur.recentHistory);
    const ws=subs.map(s=>{const r=rates[s];if(!r||r.q===0)return{s,w:5};if(r.q<3)return{s,w:3};const rt=r.c/r.q;return{s,w:rt<.5?4:rt<.7?2:1};});
    const tot=ws.reduce((a,b)=>a+b.w,0);let r=Math.random()*tot;
    for(const x of ws){r-=x.w;if(r<=0)return x.s;}return subs[0];
  };

  const buildNormaQueue=cur=>{
    const subs=subjectsR.current;
    const done=cur.dailyLog?.[today()]?.sessions||0;
    const needed=Math.max(0,3-done);
    if(!needed)return[];
    const rates=calcSubjRates(cur.recentHistory);
    const result=[];const used=new Set();
    // 優先1: 復習キューの科目（思い込みアラート優先 → 期日到来順）
    // SM-2: 期日が今日以前のアイテムだけを対象にする
    const reviewItem0=firstDueReview(cur.reviewQueue);
    if(reviewItem0&&result.length<needed&&!used.has(reviewItem0.subject)){
      const reason=reviewItem0.priority?"思い込み復習！":"復習タイム！";
      result.push({subj:reviewItem0.subject,reason,reviewItemId:reviewItem0.id});
      used.add(reviewItem0.subject);
    }
    // 優先2: 未挑戦・苦手順
    const sorted=subs.filter(s=>!used.has(s))
      .map(s=>{const r=rates[s];const rate=(r&&r.q>=3)?r.c/r.q:null;return{s,rate,q:r?.q||0};})
      .sort((a,b)=>{
        if(a.rate===null&&b.rate===null)return a.q-b.q;
        if(a.rate===null)return-1;if(b.rate===null)return 1;
        return a.rate-b.rate;
      });
    for(const{s,rate,q}of sorted){
      if(result.length>=needed)break;
      const reason=q===0?"まだ未挑戦！":rate===null?"挑戦中！":rate<0.5?"苦手科目！":rate<0.7?"もう少し！":"バランス調整";
      result.push({subj:s,reason});used.add(s);
    }
    return result;
  };

  const startWithNorma=(cur,g)=>{
    const nq=buildNormaQueue(cur);
    if(nq.length){
      const[first,...rest]=nq;
      setNormaQueue(rest);normaQueueR.current=rest;
      setNormaReason(first.reason);
      // ノルマ1問目が復習由来かどうかチェック
      // reviewItemId は buildNormaQueue 時点で確定済み → logsR を再参照しない
      if(first.reason==="復習タイム！"&&first.reviewItemId){
        setCurrentReviewItemId(first.reviewItemId);
        currentReviewItemIdR.current=first.reviewItemId;
        setIsReview(true);
        isReviewR.current=true;
      }
      resetFetch(first.subj,g);
    }else{
      setNormaReason("");
      // ノルマ達成済み → 期日到来の復習キュー（優先度順）があれば復習モードで開始
      const item=firstDueReview(cur.reviewQueue);
      if(item){
        setCurrentReviewItemId(item.id);
        currentReviewItemIdR.current=item.id;
        setIsReview(true);
        isReviewR.current=true;
        resetFetch(item.subject,g);

        resetFetch(pickSubject(cur),g);
      }
    }
  };

  const resetState=()=>{
    setQuiz(null);
    setQuizPhase(null);setSelectedChoice(null);setHintSource(null);setShowWhyWrong(false);setAnswerCorrect(null);
    setAnalysisStep(null);setStepAns(null);
    stepResultsR.current=[null,null,null];

    setConfidenceRating(null);
    wasRetryR.current=false;
    setTimeLimit(null);setLifelineUsed(false);setHiddenChoice(null);

  };

  // ⑦ タイムアタック: advancedMode.timeAttack ON で問題表示中のみ作動（easyModeでは無効化）
  // handleChoice は後で定義されるため ref 経由で参照する
  const handleChoiceR=useRef(null);
  useEffect(()=>{
    if(!advancedMode.timeAttack||easyMode||quizPhase!=="question"||hintSource||!quiz){
      // 途中で OFF にしたときバーが残らないよう明示的にクリア
      setTimeLimit(null);
      return;
    }

    const t=setInterval(()=>{
      setTimeLimit(prev=>{
        if(prev===null)return null;

    return()=>clearInterval(t);
  },[quizPhase,quiz,advancedMode.timeAttack,easyMode,hintSource]);

  // ⑧ ライフライン: 間違い1つをランダムに消す
  const handleLifeline=useCallback(()=>{
    if(!quiz||lifelineUsed)return;

  // ライフラインを途中で OFF にしたとき、消去済み選択肢を復活させる
  useEffect(()=>{
