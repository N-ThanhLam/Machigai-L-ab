  },[advancedMode.lifeline]);

  // バックグラウンド補充
  useEffect(()=>{
    if(screen!=="app")return;
    let cancelled=false;
    const doRefill=async()=>{
      if(cancelled||refillLk.current)return false;
      // 緊急生成と同時実行しない（同じ科目への二重API呼び出しを防ぐ）
      if(emergencyGenLk.current)return false;
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)return false;
      const g=gradeR.current||calcGrade(bdR.current);
      const curSubjects=calcSubjects(g);
      // (科目, 難易度) ペア単位で不足バケットを補充対象にする
      const sorted=lowestBuckets(curSubjects.length*DIFFS.length,curSubjects);
      const lacking=sorted.filter(t=>t.cnt<DAM_MAX);
      const filtered=lacking.length>0?lacking:(autoRefillR.current?sorted.slice(0,1):[]);
      if(!filtered.length)return true;
      refillLk.current=true;setIsRefilling(true);
      try{
        // ─ 生成 ──────────────────────────────────────────────────
        const genResults=[];
        for(let i=0;i<filtered.length;i++){
          if(cancelled)break;
          const target=filtered[i];
          const key=keys[i%keys.length];
          const damSubj=getDam()[target.subj]||{};
          const allDamQs=[...(damSubj.easy||[]),...(damSubj.standard||[]),...(damSubj.hard||[])];
          const damTopics=[...new Set(allDamQs.map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
          // 中学・高校の場合「算数」キーでも「数学」としてGeminiに要求する
          const promptSubj=(target.subj==="算数"&&(g.startsWith("中")||g.startsWith("高")))?"数学":target.subj;
          const _curMonth=new Date().getMonth()+1;
          // 学習者の直近ミス型 TOP3 を狙い撃ちさせる
          const _topMistakes=calcMistakeTypes(logsR.current.recentHistory||[]).slice(0,3);
          const body={systemInstruction:{parts:[{text:buildSystemPrompt(target.diff,{grade:g,month:_curMonth,topMistakes:_topMistakes})}]},contents:[{role:"user",parts:[{text:`【科目固定】「${promptSubj}」の4択問題を${DAM_BATCH}問。\n出力JSONの"subject"フィールドには必ず「${promptSubj}」をそのまま書くこと（他の科目名・略称・英語表記は禁止）。\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",responseSchema:QUIZ_RESPONSE_SCHEMA,temperature:.4,topP:.9,topK:20}};
          try{
            const apiRes=await callGeminiAPI(key,body);
            if(!apiRes.ok){genResults.push({subj:target.subj,diff:target.diff,valid:[]});continue;}
            const data=apiRes.data;
            const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text){genResults.push({subj:target.subj,diff:target.diff,valid:[]});continue;}
            let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){genResults.push({subj:target.subj,valid:[]});continue;}
            if(!Array.isArray(parsed))parsed=[parsed];
            const valid=parsed.filter(hasValidQuiz).map(q=>{
              // subjectの前後空白を正規化（全角スペース含む）
              const normSubj=(q.subject||"").replace(/^[\s\u3000]+|[\s\u3000]+$/g,"");
              // 中学・高校では「数学」を「算数」として扱う（Geminiが「数学」と返す場合の吸収）
              if(target.subj==="算数"&&normSubj==="数学")return{...q,subject:"算数"};
              // 「理科」の別表記を吸収（Geminiが「科学」「自然科学」「自然」等を返す場合）
              if(target.subj==="理科"&&["科学","自然科学","自然","理科学","サイエンス"].includes(normSubj))return{...q,subject:"理科"};
              return{...q,subject:normSubj};
            }).filter(q=>q.subject===target.subj);
            genResults.push({subj:target.subj,diff:target.diff,valid});
          }catch(e){genResults.push({subj:target.subj,diff:target.diff,valid:[]});}
        }
        if(cancelled)return false;
        // ─ ストア（バリデーション撤廃: hasValidQuiz の構造チェックのみ通過済み） ──
        let anyPassed=false;
        genResults.forEach(({subj,diff,valid})=>{
          if(!valid.length||cancelled)return;
          try{console.info(`[refill] ${subj}/${diff}: ${valid.length}問通過`);}catch(e){}
          if(cancelled)return;
          const toStore=valid.map(q=>shuffleAllSteps({...q,mistake_type:q.mistake_type||"不明",_subject:subj,_difficulty:diff}));
          if(toStore.length&&!cancelled){
            const isReviewSubj=(logsR.current.reviewQueue||[]).some(q=>q.subject===subj);
            if(isReviewSubj)addToDamFront(subj,diff,toStore);
            else addToDam(subj,diff,toStore);
            anyPassed=true;
          }
        });
        if(!cancelled)setDamStats(getDamStats(subjectsR.current));
        return anyPassed;
      }catch(e){}finally{refillLk.current=false;if(!cancelled)setIsRefilling(false);}
      return false;
    };
    // 補充ループ: 学習活動・残量・復習待ちで適応的に間隔を変える
    //   待機中:       15秒（即座に補充）
    //   ストック<20%: 20秒（緊急水準）
    //   ストック<50%: 45秒（活動量に応じて積む）
    //   復習キューあり: 60秒
    //   通常:          120秒
    const loop=async()=>{
      let delay=8000; // 初回は8秒後にウォームアップ補充
      while(!cancelled){
        await new Promise(r=>setTimeout(r,delay));
        if(cancelled)break;
        const ok=await doRefill();
        if(cancelled)break;
        const hasReview=(logsR.current.reviewQueue||[]).length>0;
        const isWaiting=!!waitingForStockR.current;
        const curSubs=subjectsR.current;
        const total=getDamTotal(curSubs);
        const cap=DAM_MAX*curSubs.length;
        const fillRate=cap>0?total/cap:1;
        if(isWaiting)         delay=15000;
        else if(fillRate<0.2) delay=20000;
        else if(fillRate<0.5) delay=45000;
        else if(hasReview)    delay=60000;
        else if(ok)           delay=120000;
        else                  delay=90000;
      }
    };
    loop();
    return()=>{cancelled=true;if(retryTimerRef.current)clearInterval(retryTimerRef.current);};
  },[screen]);

  // ─── ⑤ 復帰モード タイマー ──────────────────────────────────────────
  useEffect(()=>{

    return()=>clearInterval(id);
  },[comebackMode]);

  // ─── 緊急生成: ストックが空のとき即座に3問生成してDAMに積む ──────────
  const generateEmergency=useCallback(async(subj,g)=>{
    if(emergencyGenLk.current)return null;

    // → null を返すと waiting 状態へ移行し、補充完了後にポーリングで拾う
    if(refillLk.current)return null;
    const keys=keysR.current.filter(k=>k.trim());
    if(!keys.length)return null;
    emergencyGenLk.current=true;setIsEmergencyGen(true);
    // キーローテーション: バックグラウンド補充と同じ方式で偏りを防ぐ
    const key=keys[_ki%keys.length];_ki++;
    try{
      const currentGrade=g||gradeR.current;
      const promptSubj=(subj==="算数"&&(currentGrade.startsWith("中")||currentGrade.startsWith("高")))?"数学":subj;
      // 自動難易度: 該当科目の現在難易度でプロンプト生成
      const emergencyDiff=getAutoDifficulty(subj,logsR.current);
      const damSubj=getDam()[subj]||{};
      const allDamQs=[...(damSubj.easy||[]),...(damSubj.standard||[]),...(damSubj.hard||[])];
      const damTopics=[...new Set(allDamQs.map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
      const _curMonth=new Date().getMonth()+1;
      // 学習者の直近ミス型 TOP3 を狙い撃ちさせる
      const _topMistakes=calcMistakeTypes(logsR.current.recentHistory||[]).slice(0,3);
      const body={systemInstruction:{parts:[{text:buildSystemPrompt(emergencyDiff,{grade:currentGrade,month:_curMonth,topMistakes:_topMistakes})}]},contents:[{role:"user",parts:[{text:`【科目固定】「${promptSubj}」の4択問題を3問。\n出力JSONの"subject"フィールドには必ず「${promptSubj}」をそのまま書くこと（他の科目名・略称・英語表記は禁止）。\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",responseSchema:QUIZ_RESPONSE_SCHEMA,temperature:.4,topP:.9,topK:20}};
      const apiRes=await callGeminiAPI(key,body);
      if(!apiRes.ok)return null;
      const data=apiRes.data;

      if(!Array.isArray(parsed))parsed=[parsed];

      // doRefill と同様に復習対象科目は先頭挿入して優先出題

  const fetchQ=useCallback(async(g,subj)=>{
    if(fetchLk.current)return;fetchLk.current=true;

  const resetFetch=useCallback((subj,sg)=>{

    fetchLk.current=false;nextLk.current=false;

  // 選択肢を選んだとき
  const handleChoice=useCallback(idx=>{
    if(selectedChoice!==null||quizPhase!=="question")return;

      // まだ習ってない → ヒントを表示して同じ問題に戻る
      setHintSource("notLearned");
      return;
    }

    const timedOut=idx===-1;
    const correct=!timedOut&&idx===quiz.correct;
    setSelectedChoice(timedOut?null:idx);setAnswerCorrect(correct);
    setQuizPhase("result");
    setTimeLimit(null); // ⑦ タイマー停止
    if(correct){setShowCorrectBurst(true);setTimeout(()=>setShowCorrectBurst(false),750);}
    // ⑥ 連続正解が途切れたとき
    if(!correct&&gs.streak>=3){
      setStreakBrokenMsg(`🔥 ${gs.streak}連続まで行ったね！惜しい！`);
      setTimeout(()=>setStreakBrokenMsg(""),3500);
    }
    const wrongItem=!correct?{
      id:crypto.randomUUID(),
      topic:quiz.topic_tag||quiz.question.slice(0,20),
      subject,
      mistakeType:quiz.mistake_type||"不明",
      // SM-2: 不正解→翌日が初回期日、reps=0 から開始
      reps:0,
      dueDate:addDaysISO(today(),1),
      createdAt:today(),
    }:null;
    const nextStr=correct?gs.streak+1:0;
    const newBest=Math.max(gs.best,nextStr);
    const currentWasRetry=wasRetryR.current;
    wasRetryR.current=false;
    // 直前の回答情報を記録（handleNext で confidence との照合に使う）
    // wrongItemId も保存: handleConfidenceRate で思い込みアラートを付与する対象を特定
    prevAnswerR.current={correct,subject,quiz:{...quiz},wrongItemId:wrongItem?.id||null};
    // お試しモードは記録に残さない（ゲストプレイ扱い）
    if(!trialModeR.current){
      updateLogs(correct,subject,wrongItem,newBest,correct,currentWasRetry);

  const handleConfidenceRate=useCallback(rating=>{

      if(last.correct&&rating===3&&prevConf!==3){
        next.cumulativeStats={..._zeroStats(),...(next.cumulativeStats||{})};
        if(!next.dailyStatGains)next.dailyStatGains={};
        if(!next.dailyStatGains[td])next.dailyStatGains[td]=_zeroStats();

      // 最も危険な誤概念（自信があるのに間違える=理解の歪み）を集中攻略する
      if(!last.correct&&rating===3){

    setCurrentReviewItemId(null);currentReviewItemIdR.current=null;

      const dueItem=firstDueReview(cur.reviewQueue);

        const fromDamReview=popFromDam(dueItem.subject,reviewDiff,1);

          setQuiz(fromDamReview[0]);return;

        setCurrentReviewItemId(dueItem.id);
        setSubject(dueItem.subject);setIsReview(true);

          const generated=await generateEmergency(dueItem.subject,currentGrade);

        return;

      const fromDam=popFromDam(cand,candDiff,1);
      if(fromDam.length){
        setIsReview(false);setDamStats(getDamStats(subjectsR.current));

                  </summary>
                  <div style={{marginTop:8}}><div className="bar-wrap" style={{height:7}}><div className="bar" style={{width:`${Math.min(100,damTotal/(DAM_MAX*subjects.length*DIFFS.length)*100)}%`,background:damTotal>(DAM_MAX*subjects.length*DIFFS.length*0.6)?"#22c55e":damTotal>(DAM_MAX*subjects.length*DIFFS.length*0.3)?"#f59e0b":"#ef4444"}}></div></div></div>
                  {subjects.map(s=>{
                    const cnt=damStats[s]||0;
                    const max=DAM_MAX*DIFFS.length;
                    const pct=Math.min(100,cnt/max*100);
                    const c=pct>60?"#22c55e":pct>30?"#f59e0b":"#ef4444";
                    return(
                      <div key={s} className="dam-row">
                        <span className="dam-label">{displaySubject(s,grade)}</span>
                        <div className="dam-bw" style={{display:"flex",gap:1}}>
                          {DIFFS.map(d=>{
                            const dcnt=getDamBucketCount(s,d);
                            const dpct=Math.min(100,dcnt/DAM_MAX*100);
                            const dcol=d==="easy"?"#22c55e":d==="hard"?"#ef4444":"#f59e0b";
                            return <div key={d} style={{flex:1,height:"100%",background:"#e8e3ff",borderRadius:2,overflow:"hidden"}}><div style={{width:`${dpct}%`,height:"100%",background:dcol}}/></div>;
                          })}
                        </div>
                        <span style={{fontSize:11,fontWeight:900,minWidth:50,textAlign:"right",color:c}}>{cnt}/{max}</span>
                      </div>
                    );
                  })}
                  <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:6,fontSize:9,color:"#9990cc",fontWeight:700}}>
                    <span>🟢 やさしい</span><span>🟡 ふつう</span><span>🔴 むずい</span>
                  </div>
                  <div style={{fontSize:10,color:"#bbb",marginTop:6,textAlign:"center"}}>{isEmergencyGen?"⚡ 緊急生成中...（3問をすぐ作っています）":isRefilling?`⚡ ${autoRefill?"問題を入れ替え中...":"ストックを補充中..."}`:waitingForStock?"⏳ 問題を待機中...（バックグラウンドで補充します）":`✓ ${autoRefill?"自動更新ON（常に最新）":"自動更新ON（ストックが満たされたら停止）"}`}</div>
                </details>
              </React.Fragment>
            )}

            {/* ── SETTINGS ── */}
            {tab==="settings"&&(
              <React.Fragment>
                <div className="card">
                  <div className="section-title">プロフィール設定</div>

                  {/* ① APIキー */}
                  <div className="setting-row">
                    <span className="setting-label">🔑 Gemini APIキー（最大4つまで・行追加/削除可）</span>
                    {apiKeys.map((k,i)=>(
                      <div key={i} className="kv-row">
                        <input type="password" value={k} onChange={e=>{const nk=[...apiKeys];nk[i]=e.target.value;setApiKeys(nk);}} placeholder={`APIキー ${i+1}（任意）`}/>
                        <span className={`key-status ${k.trim()?"ok":"empty"}`} style={{flexShrink:0,alignSelf:"center"}}>{k.trim()?"✓":"—"}</span>
                        {apiKeys.length>1&&(
                          <button className="kv-icon-btn del" style={{height:38}} title="この行を削除" onClick={()=>{const nk=apiKeys.filter((_,j)=>j!==i);setApiKeys(nk.length?nk:[""]);}}>✕</button>
                        )}
                      </div>
                    ))}
                    <div className="kv-add-row">
                      <button className="kv-icon-btn add" disabled={apiKeys.length>=4} onClick={()=>setApiKeys([...apiKeys,""])}>＋ 1つ追加</button>
                      <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style={{marginLeft:10,fontSize:11,color:"#5b3ff8",fontWeight:700,textDecoration:"none"}}>無料で取得 →</a>
                    </div>
                  </div>

                  {/* ② ユーザー名 */}
                  <div className="setting-row" style={{paddingTop:14}}>
                    <span className="setting-label">👥 ユーザー名（最大4人・タップで切替・もう一度タップで編集）</span>
                    <div className="user-switch-wrap" style={{marginTop:6}}>
                      {users.map(u=>(
                        <button key={u.id} className={`user-chip${u.id===currentUid?" on":""}`}
                          onClick={()=>{
                            if(u.id===currentUid){ setShowUserEdit({mode:"edit",user:u}); return; }
                            pollingCancelRef.current++;
                            setWaitingForStock(null);setQuiz(null);setQuizPhase(null);
                            switchUser(u.id);setCurrentUid(u.id);
                            setTimeout(()=>{reloadProfile();reloadUserScopedSettings();loadLogs();setDamStats(getDamStats(subjectsR.current));setGs({streak:0,best:0,wrong:0,qNum:1});},0);
                          }}>
                          <span className="uc-icon">{u.icon||"😀"}</span>{u.name}
                        </button>
                      ))}
                      <button className="user-chip-add" disabled={users.length>=4} onClick={()=>setShowUserEdit({mode:"add"})}>＋ 追加</button>
                    </div>
                  </div>

                  {/* ③ 生年月日 */}
                  <div className="setting-row" style={{paddingTop:14}}>
                    <span className="setting-label">🎂 生年月日（学年自動計算）</span>
                    <input type="date" value={birthday} onChange={e=>setBirthday(e.target.value)} min="2000-01-01" max={today()} style={{marginBottom:0}}/>
                    <div style={{fontSize:12,color:"#5b3ff8",fontWeight:700,marginTop:4}}>→ {calcGrade(birthday)}</div>
                  </div>

                  <div style={{marginTop:16}}>
                    <button className="btn btn-primary" onClick={saveSettings}>
                      {settingsSaved?"✓ 保存しました！":"設定を保存する"}
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">🎨 表示モード</div>
                  <div className="setting-row" style={{borderBottom:"none",paddingBottom:0}}>
                    <span className="setting-label">ライト / ダーク</span>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:6}}>
                      {[
                        {key:"light",icon:"☀️",label:"ライト",bg:"#fffbeb",bd:"#fde68a",col:"#92400e"},
                        {key:"dark",icon:"🌙",label:"ダーク",bg:"#1f1f35",bd:"#3a3a55",col:"#c4b5fd"},
                      ].map(o=>{
                        const on=theme===o.key;
                        return(
                          <button key={o.key} onClick={()=>setTheme(o.key)}
                            style={{background:on?o.bg:"transparent",border:`2px solid ${on?o.bd:"var(--input-border)"}`,borderRadius:12,padding:"10px 8px",cursor:"pointer",fontFamily:"inherit",color:on?o.col:"var(--text-soft)",fontWeight:900,textAlign:"center",transition:"all .2s"}}>
                            <div style={{fontSize:22}}>{o.icon}</div>
                            <div style={{fontSize:12,marginTop:2}}>{o.label}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">問題ストック設定</div>
                  <div className="setting-row" style={{borderBottom:"none",paddingBottom:0}}>
                    <span className="setting-label">📦 ストック自動更新</span>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                      <button
                        onClick={()=>setAutoRefill(v=>!v)}
                        style={{
                          width:52,height:28,borderRadius:14,border:"none",cursor:"pointer",
                          background:autoRefill?"linear-gradient(135deg,#5b3ff8,#9b59f8)":"#e8e3ff",
                          position:"relative",transition:"all .2s",flexShrink:0,padding:0
                        }}
                      >
                        <span style={{
                          position:"absolute",top:3,left:autoRefill?26:3,
                          width:22,height:22,borderRadius:"50%",background:"#fff",
                          boxShadow:"0 1px 4px rgba(0,0,0,.2)",transition:"left .2s",display:"block"
                        }}/>
                      </button>
                      <span style={{fontSize:13,fontWeight:700,color:autoRefill?"#5b3ff8":"#9990cc"}}>
                        {autoRefill?"ON（最新問題に入れ替え中）":"OFF（問題数が満たされるまで補充）"}
                      </span>
                    </div>
                   </div>
                 </div>

                <div className="card">
                  <div className="section-title">🎚️ 難易度（自動調整）</div>
                  <div className="setting-row" style={{borderBottom:"none",paddingBottom:0}}>
                    <span className="setting-label">直近10問の正解率に応じて科目ごとに自動切替</span>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
                      {subjects.map(s=>{
                        const d=getAutoDifficulty(s,logs);
                        const meta=d==="easy"?{icon:"🌱",label:"やさしい",bg:"#f0fdf4",bd:"#86efac",col:"#166534"}
                                  :d==="hard"?{icon:"🔥",label:"むずかしい",bg:"#fff5f5",bd:"#fca5a5",col:"#991b1b"}
                                  :{icon:"📝",label:"ふつう",bg:"#f0edff",bd:"#c4b5fd",col:"#5b3ff8"};
                        return(
                          <div key={s} style={{background:meta.bg,border:`1.5px solid ${meta.bd}`,borderRadius:12,padding:"8px 10px"}}>
                            <div style={{fontSize:11,fontWeight:800,color:meta.col,marginBottom:2}}>{displaySubject(s,grade)}</div>
                            <div style={{fontSize:13,fontWeight:900,color:meta.col}}>{meta.icon} {meta.label}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{marginTop:10,background:"#f8f7ff",border:"1px solid #e8e3ff",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#7c6fb0",fontWeight:700,lineHeight:1.6}}>
                      80%以上で上がる / 40%未満で下がる。各科目に3段階のストックを用意し、自動で切り替えます。
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">エクスポート / インポート</div>
                  <button className="btn btn-ghost" style={{marginBottom:8}} onClick={exportData}>
                    📤 学習データをエクスポート
                  </button>
                  <label style={{display:"block",background:"#f0edff",color:"#5b3ff8",border:"none",borderRadius:14,padding:"13px 20px",fontSize:15,fontWeight:800,fontFamily:"inherit",cursor:"pointer",width:"100%",textAlign:"center",boxSizing:"border-box",marginBottom:importMsg?8:0,transition:"all .18s"}}>
                    📥 学習データをインポート
                    <input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
                  </label>
                  {importMsg&&(
                    <div style={{fontSize:12,fontWeight:700,borderRadius:10,padding:"8px 12px",marginBottom:4,
                      color:importMsg.startsWith("✓")?"#166534":"#991b1b",
                      background:importMsg.startsWith("✓")?"#dcfce7":"#fee2e2"}}>
                      {importMsg}
                    </div>
                  )}
                  <div style={{fontSize:11,color:"#bbb",marginTop:6}}>APIキーはエクスポートされません。ファイル名に学年・日付が入ります。</div>
                </div>

                <div className="card">
                  <div className="section-title">データ管理</div>
                  <div className="danger-zone">
                    <div style={{fontSize:12,fontWeight:800,color:"#991b1b",marginBottom:10}}>⚠️ 削除操作は取り消せません</div>
                    <button className="danger-btn" onClick={clearLogs}>
                      📊 学習記録・バッジをリセット
                    </button>
                    <button className="danger-btn" onClick={clearStock}>
                      📦 ストック問題をすべて削除
                    </button>
                    <button className="danger-btn secondary" onClick={clearAllData}>
                      🗑️ すべてのデータを削除
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">アプリについて</div>
                  <div style={{fontSize:13,color:"var(--text-soft)",lineHeight:1.8}}>
                    <div>📚 まちがいラボ v18 — Conviction Edition</div>
                    <div>🎯 4択問題 × ミス削減エンジン × 思考プロセス強制言語化</div>
                    <div>🌱 やさしい / 📝 ふつう / 🔥 むずかしい の自動難易度</div>
                    <div>👥 マルチユーザー（最大4人） · 各データ独立保存</div>
                    <div>📱 PWA対応 · ホーム画面追加可能</div>
                    <div>🛡 Safari ITP対策 · IndexedDBミラー</div>
                    <div>⚡ Gemini 3 Flash → 2.5 Flash → 2.5 Flash-Lite 自動フォールバック</div>
                  </div>
                  <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--input-border)",fontSize:11,color:"var(--text-soft)",lineHeight:1.7}}>
                    <div style={{fontWeight:800,marginBottom:6,color:"#7a6fa8"}}>ご利用にあたって</div>
                    <div>・本アプリは Google が提供する Gemini API を利用しています。Google 側の仕様変更・料金体系の改定・サービス提供条件の変更により、将来にわたって同じ動作・無料での利用継続を保証することはできません。</div>
                    <div style={{marginTop:4}}>・AI が自動生成する問題・解説には誤りが含まれる場合があります。最終的な学習内容の正誤判断は、教科書や指導者にご確認ください。</div>
                    <div style={{marginTop:4}}>・学習データは端末（ブラウザ）にのみ保存されます。機種変更・ブラウザのデータ削除等で消失する可能性があるため、定期的なエクスポートを推奨します。</div>
                    <div style={{marginTop:4}}>・本アプリの利用によって生じたいかなる損害についても、開発者は責任を負いかねます。自己責任にてご利用ください。</div>
                  </div>
                </div>
              </React.Fragment>
            )}

          </div>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
