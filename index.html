    const { useState, useEffect, useCallback, useRef } = React;

    const SUBJECTS = ["国語", "算数", "英語", "社会", "理科"];
    const LEVELS = [1, 2, 3];

    const SYSTEM_PROMPT = `あなたは日本の最優秀AI学習コーチです。Growth Mindsetを体現し、子どもの学力を最大化することが使命です。

【問題作成の絶対ルール】
1. 学年・科目・レベル・日本の学習指導要領（文部科学省）に完全準拠すること。
2. テキストのみで完結すること。視覚情報（地図記号、図形、都道府県の形、天体の位置関係など）が必要な問題は作成禁止。
3. 未習漢字の使用禁止。指定学年で習っていない漢字は必ずひらがなで表記すること（例：小1なら「もんだい」「つぎ」）。
4. 特殊記号・絵文字・機種依存文字は使用禁止（箇条書きは「・」や「ー」を使用）。
5. 選択肢は4つで必ず重複なくユニークにし、正解は必ず1つのみとすること。
6. 文章完成問題の場合、正解を入れた文は自然な日本語になり、不正解を入れた文は明確に不自然になるよう内部で検証すること。複数の選択肢で自然な文になる問題は禁止。
7. 英語の問題を作成する場合、問題文（指示や説明）は必ず「日本語」にすること。
8. 高品質なディストラクター：不正解はデタラメではなく、その学年で間違いやすい「納得感のある間違い（似た漢字、計算手順の勘違い、時制ミスなど）」にすること。
9. 出力前に内部検算（事実確認、字面での事実捏造防止、数字・固有名詞の裏付け）を必ず行い、不確かな場合やテキスト解説が困難な場合は、一般的な語彙問題などに差し替えること。

必ず以下のJSON形式の配列のみで回答してください。Markdownのコードブロックや余分なテキストは一切不要です。一度に指定された数の問題を生成し、[ { }, { }, ... ] の形で返してください。

出力フォーマット（配列の1要素）:
{
  "self_check_fact": "テーマの事実確認、視覚情報への依存有無、内部検算の結果を短く記載。",
  "start_message": "導入メッセージ（Growth Mindsetで1文）",
  "question": "問題文",
  "choices": ["A", "B", "C", "D"],
  "answer": 0,
  "hint": "Growth Mindsetでヒント（答えは直接言わない）",
  "correct_feedback": "Growth Mindsetによる正解時フィードバック。（合計2〜3文）",
  "incorrect_feedback": "Growth Mindsetによる不正解時フィードバック。（合計2〜3文）",
  "learning_tip": "この問題から得られる最も重要な学習ポイント（1文で記憶に残るように）",
  "topic_tag": "問題のテーマ（例：分数の足し算、接続詞、江戸時代）"
}`;

    // =====================================================================
    // ダム（在庫管理）システム
    // 5科目 × 3レベル = 15バケット、各50問、合計750問
    // =====================================================================
    const DAM_KEY = "manabi_dam_v1";
    const DAM_MAX_PER_BUCKET = 50;
    const DAM_REFILL_BATCH = 10;

    const getDam = () => {
      try { return JSON.parse(localStorage.getItem(DAM_KEY) || "{}"); } catch { return {}; }
    };
    const saveDam = (d) => {
      try { localStorage.setItem(DAM_KEY, JSON.stringify(d)); } catch {}
    };
    const damBKey = (subj, lv) => `${subj}_${lv}`;

    /** 問題をバケットへ追加（重複排除つき） */
    const addToDam = (subj, lv, questions) => {
      const dam = getDam();
      const bk = damBKey(subj, lv);
      const existing = dam[bk] || [];
      const existKeys = new Set(existing.map(q => (q.question || "").slice(0, 30)));
      const fresh = questions.filter(q => !existKeys.has((q.question || "").slice(0, 30)));
      dam[bk] = [...existing, ...fresh].slice(0, DAM_MAX_PER_BUCKET);
      saveDam(dam);
    };

    /** バケットからcount件ポップ（隣レベルへのフォールバックあり） */
    const popBatchFromDam = (subj, lv, count = 10) => {
      const dam = getDam();
      const lvOrder = lv === 1 ? [1, 2, 3] : lv === 2 ? [2, 1, 3] : [3, 2, 1];
      const result = [];
      for (const l of lvOrder) {
        if (result.length >= count) break;
        const bk = damBKey(subj, l);
        const bucket = dam[bk] || [];
        const take = Math.min(count - result.length, bucket.length);
        if (take > 0) {
          result.push(...bucket.slice(0, take).map(q => ({ ...q, _level: l })));
          dam[bk] = bucket.slice(take);
        }
      }
      if (result.length > 0) saveDam(dam);
      return result;
    };

    /** 全15バケットの在庫数を返す */
    const getDamStats = () => {
      const dam = getDam();
      return SUBJECTS.reduce((acc, subj) => {
        acc[subj] = LEVELS.reduce((la, lv) => {
          la[lv] = (dam[damBKey(subj, lv)] || []).length;
          return la;
        }, {});
        return acc;
      }, {});
    };

    /** 在庫率が最低のバケットを返す（補充エンジン用） */
    const findLowestBucket = () => {
      const dam = getDam();
      let target = null, lowestCnt = Infinity;
      for (const subj of SUBJECTS) {
        for (const lv of LEVELS) {
          const cnt = (dam[damBKey(subj, lv)] || []).length;
          if (cnt < DAM_MAX_PER_BUCKET && cnt < lowestCnt) {
            lowestCnt = cnt;
            target = { subj, lv, cnt };
          }
        }
      }
      return target;
    };

    /** 全在庫合計 */
    const getDamTotal = () => {
      const dam = getDam();
      return SUBJECTS.reduce((total, subj) =>
        total + LEVELS.reduce((t, lv) => t + (dam[damBKey(subj, lv)] || []).length, 0), 0);
    };
    // =====================================================================

    function calcGrade(birth) {
      if (!birth) return "一般";
      const b = new Date(birth), now = new Date();
      let sy = now.getFullYear();
      if (now.getMonth() < 3) sy--;
      let ent = b.getFullYear() + 7;
      if (b.getMonth() < 3) ent--;
      const y = sy - ent + 1;
      if (y >= 1 && y <= 6) return `小学${y}年生`;
      if (y >= 7 && y <= 9) return `中学${y - 6}年生`;
      if (y >= 10 && y <= 12) return `高校${y - 9}年生`;
      return "一般";
    }

    function today() { return new Date().toISOString().slice(0, 10); }

    function calcRecent100Rate(recentHistory) {
      if (!recentHistory || recentHistory.length === 0) return null;
      const last100 = recentHistory.slice(-100);
      const correct = last100.filter(r => r.correct).length;
      return { rate: Math.round(correct / last100.length * 100), count: last100.length };
    }

    function calcRecentSubjectRates(recentHistory) {
      if (!recentHistory || recentHistory.length === 0) return {};
      const last100 = recentHistory.slice(-100);
      const map = {};
      for (const r of last100) {
        if (!map[r.subject]) map[r.subject] = { q: 0, c: 0 };
        map[r.subject].q++;
        if (r.correct) map[r.subject].c++;
      }
      return map;
    }

    const BADGES = [
      { id: "first",      label: "はじめの一歩",   desc: "初めて問題を解いた",       icon: "🌱", cond: s => s.totalQ >= 1 },
      { id: "streak3",    label: "3連続！",         desc: "3問連続正解",              icon: "🔥", cond: s => s.bestStreak >= 3 },
      { id: "perfect5",   label: "完璧な5問",       desc: "5問連続正解",              icon: "✨", cond: s => s.bestStreak >= 5 },
      { id: "q10",        label: "10問達成",        desc: "合計10問を解いた",         icon: "📖", cond: s => s.totalQ >= 10 },
      { id: "streak7",    label: "7連続！！",       desc: "7問連続正解",              icon: "⚡", cond: s => s.bestStreak >= 7 },
      { id: "q50",        label: "50問の壁",        desc: "合計50問を解いた",         icon: "🏆", cond: s => s.totalQ >= 50 },
      { id: "allsubject", label: "全科目制覇",      desc: "5科目すべてを経験",        icon: "🌈", cond: s => Object.keys(s.subjectStats || {}).length >= 5 },
      { id: "day3",       label: "3日連続",         desc: "3日連続で学習した",        icon: "📅", cond: s => s.loginStreak >= 3 },
      { id: "recent80",   label: "直近80%超え",     desc: "直近100問で正解率80%以上", icon: "🎯", cond: s => { const r = calcRecent100Rate(s.recentHistory); return r && r.count >= 100 && r.rate >= 80; } },
      { id: "genius",     label: "努力の天才",      desc: "累計300問を達成",          icon: "👑", cond: s => s.totalQ >= 300 },
      { id: "runner",     label: "不屈のランナー",   desc: "累計365日学習した",        icon: "⏳", cond: s => Object.keys(s.dailyLog || {}).length >= 365 },
      { id: "legend",     label: "レジェンド",      desc: "直近100問で正解率100%",    icon: "💎", cond: s => { const r = calcRecent100Rate(s.recentHistory); return r && r.count >= 100 && r.rate === 100; } },
    ];

    const css = `

    const initLogs = () => ({
      subjectStats: {},
      dailyLog: {},
      totalQ: 0,
      totalCorrect: 0,
      bestStreak: 0,
      loginStreak: 0,
      lastLogin: "",
      earnedBadges: [],
      reviewQueue: [],
      recentHistory: [],
    });

    function ManabiV3() {
      const [screen, setScreen] = useState("start");
      const [tab, setTab] = useState("learn");
      const [apiKeys, setApiKeys] = useState(["", "", "", ""]);
      const [birthday, setBirthday] = useState("");
      const [grade, setGrade] = useState("");
      const [subject, setSubject] = useState("");
      const [gs, setGs] = useState({ lv: 2, streak: 0, best: 0, wrong: 0, qNum: 1, retry: false, used: [] });

      const [qQueue, setQQueue] = useState([]);
      const [quiz, setQuiz] = useState(null);
      const [loading, setLoading] = useState(false);
      const [isCooldown, setIsCooldown] = useState(false);
      const [answered, setAnswered] = useState(null);
      const [error, setError] = useState("");
      const [showSubjectSelect, setShowSubjectSelect] = useState(false);
      const [damStats, setDamStats] = useState(() => getDamStats());
      const [isRefilling, setIsRefilling] = useState(false);

      const [logs, setLogs] = useState(initLogs());
      const [isReview, setIsReview] = useState(false);
      const [newBadges, setNewBadges] = useState([]);
      const storageKey = "manabi_logs_v3";
      const profileKey = "manabi_profile_v2";

      // refs for stale-closure防止
      const logsRef = useRef(logs);
      const gsRef = useRef(gs);
      const fetchLockRef = useRef(false);
      const subjectRef = useRef(subject);
      const apiKeysRef = useRef(apiKeys);
      const gradeRef = useRef(grade);
      const birthdayRef = useRef(birthday);
      const refillLockRef = useRef(false);
      const screenRef = useRef(screen);

      useEffect(() => { logsRef.current = logs; }, [logs]);
      useEffect(() => { gsRef.current = gs; }, [gs]);
      useEffect(() => { subjectRef.current = subject; }, [subject]);
      useEffect(() => { apiKeysRef.current = apiKeys; }, [apiKeys]);
      useEffect(() => { gradeRef.current = grade; }, [grade]);
      useEffect(() => { birthdayRef.current = birthday; }, [birthday]);
      useEffect(() => { screenRef.current = screen; }, [screen]);

      useEffect(() => {
        try {
          const p = localStorage.getItem(profileKey);
          if (p) {
            const d = JSON.parse(p);
            setBirthday(d.birthday || "");
            if (d.apiKeys && Array.isArray(d.apiKeys)) {
              setApiKeys(d.apiKeys);
            } else if (d.apiKey) {
              setApiKeys([d.apiKey, "", "", ""]);
            }
          }
        } catch {}
        loadLogs();
        setDamStats(getDamStats());
      }, []);

      const loadLogs = async () => {
        try {
          const r = localStorage.getItem(storageKey);
          if (r) setLogs(JSON.parse(r));
        } catch {}
      };

      const saveLogs = async (newLogs) => {
        try { localStorage.setItem(storageKey, JSON.stringify(newLogs)); } catch {}
      };

      const updateLogs = (correct, subj, wrongItem, newBest) => {
        setLogs(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const td = today();

          if (!next.subjectStats[subj]) next.subjectStats[subj] = { q: 0, c: 0 };
          next.subjectStats[subj].q++;
          if (correct) next.subjectStats[subj].c++;

          if (!next.dailyLog[td]) next.dailyLog[td] = { q: 0, c: 0, subjects: [] };
          next.dailyLog[td].q++;
          if (correct) next.dailyLog[td].c++;
          if (!next.dailyLog[td].subjects.includes(subj)) next.dailyLog[td].subjects.push(subj);

          next.totalQ++;
          if (correct) next.totalCorrect++;

          if (newBest !== undefined) {
            next.bestStreak = Math.max(next.bestStreak || 0, newBest);
          }

          if (!next.recentHistory) next.recentHistory = [];
          next.recentHistory.push({ correct, subject: subj, date: td });
          if (next.recentHistory.length > 200) next.recentHistory = next.recentHistory.slice(-200);

          if (!correct && wrongItem) {
            if (!next.reviewQueue) next.reviewQueue = [];
            if (next.reviewQueue.length < 20) next.reviewQueue.push(wrongItem);
          }

          if (next.lastLogin !== td) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().slice(0, 10);
            next.loginStreak = (next.lastLogin === yStr) ? (next.loginStreak || 0) + 1 : 1;
            next.lastLogin = td;
          }

          const earned = BADGES.filter(b => !next.earnedBadges.includes(b.id) && b.cond(next));
          if (earned.length > 0) {
            next.earnedBadges = [...next.earnedBadges, ...earned.map(b => b.id)];
            setNewBadges(earned);
            setTimeout(() => setNewBadges([]), 3500);
          }

          saveLogs(next);
          return next;
        });
      };

      const pickSubject = (currentLogs) => {
        const recentRates = calcRecentSubjectRates(currentLogs.recentHistory);
        const rates = SUBJECTS.map(s => {
          const rt = recentRates[s];
          if (!rt || rt.q < 3) return { s, w: 3 };
          const rate = rt.c / rt.q;
          return { s, w: rate < 0.5 ? 4 : rate < 0.7 ? 2 : 1 };
        });
        const total = rates.reduce((a, b) => a + b.w, 0);
        let r = Math.random() * total;
        for (const item of rates) { r -= item.w; if (r <= 0) return item.s; }
        return SUBJECTS[0];
      };

      const buildBatchPrompt = (g, subj, s, review, reviewItem, currentLogs) => {
        const recentRates = calcRecentSubjectRates(currentLogs.recentHistory);
        const weakSubjects = SUBJECTS.filter(sub => {
          const rt = recentRates[sub];
          return rt && rt.q >= 3 && rt.c / rt.q < 0.6;
        });

        let instruction = `学年: ${g}\n科目: ${subj}\nレベル: ${s.lv}（1=やさしい、2=ふつう、3=むずかしい）\n`;
        instruction += `直近テーマ（重複避ける）: ${s.used.slice(-3).join("、") || "なし"}\n`;
        instruction += `直近100問での苦手科目: ${weakSubjects.join("、") || "なし"}\n`;

        if (review && reviewItem) {
          instruction += `【重要】今回は復習モードです。過去に間違えたテーマ: ${reviewItem.topic} を中心に、類似問題を10問生成してください。`;
        } else {
          instruction += `様々な単元から、合計10問生成してください。`;
        }
        return instruction;
      };

      // =====================================================================
      // 補充エンジン（リフィル・エンジン）
      // バックグラウンドで最低在庫バケットを自動補充する
      // =====================================================================
      useEffect(() => {
        if (screen !== "app") return;
        let cancelled = false;

        const doRefill = async () => {
          if (cancelled || refillLockRef.current) return false;
          const validKeys = apiKeysRef.current.filter(k => k.trim());
          if (validKeys.length === 0) return false;

          const target = findLowestBucket();
          if (!target) return true; // 全バケット満タン

          refillLockRef.current = true;
          setIsRefilling(true);
          try {
            const g = gradeRef.current || calcGrade(birthdayRef.current);
            const { subj, lv } = target;

            const bodyObj = {
              systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
              contents: [{
                role: "user",
                parts: [{ text: `学年: ${g}\n科目: ${subj}\nレベル: ${lv}（1=やさしい、2=ふつう、3=むずかしい）\n様々な単元から、合計${DAM_REFILL_BATCH}問生成してください。` }]
              }],
              generationConfig: {
                responseMimeType: "application/json",
                temperature: 0.4,
                topP: 0.9,
                topK: 20
              }
            };

            const controller = new AbortController();
            const requests = validKeys.map(key =>
              fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(bodyObj),
                signal: controller.signal
              }).then(async res => {
                if (!res.ok) throw new Error(String(res.status));
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                return data;
              })
            );

            const data = await Promise.any(requests);
            controller.abort();

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) return false;

            const jsonText = text.replace(/```json/g, "").replace(/```/g, "").trim();
            let parsed;
            try { parsed = JSON.parse(jsonText); } catch { return false; }
            if (!Array.isArray(parsed)) parsed = [parsed];

            const valid = parsed.filter(q =>
              q.choices && Array.isArray(q.choices) && q.choices.length === 4 &&
              new Set(q.choices.map(c => String(c).trim())).size === 4
            );

            if (valid.length > 0) {
              addToDam(subj, lv, valid.map(q => ({ ...q, _subject: subj, _level: lv })));
              if (!cancelled) setDamStats(getDamStats());
              return true; // 成功
            }
          } catch (_e) {
            // 503/429 はサイレント無視 → タイマーリセットして次回待機
          } finally {
            refillLockRef.current = false;
            if (!cancelled) setIsRefilling(false);
          }
          return false;
        };

        // 成功報酬型ループ：成功→120秒待機、失敗→90秒待機
        const loop = async (delay) => {
          await new Promise(r => setTimeout(r, delay));
          if (cancelled) return;
          const success = await doRefill();
          if (!cancelled) loop(success ? 120000 : 90000);
        };

        loop(15000); // 起動15秒後に初回補充開始

        return () => { cancelled = true; };
      }, [screen]); // screen が "app" になったら起動

      // =====================================================================
      // 問題取得（ダム優先 → API フォールバック）
      // =====================================================================
      const fetchQuestionsBatch = useCallback(async (s, g, subj, review, reviewItem) => {
        if (fetchLockRef.current) return;
        fetchLockRef.current = true;

        setAnswered(null); setError("");

        // ① ダムに在庫があれば即座に提供（ローディング不要）
        if (!review) {
          const batch = popBatchFromDam(subj, s.lv);
          if (batch.length > 0) {
            setIsCooldown(false);
            setQuiz(null);
            const firstQ = batch[0];
            setQuiz(firstQ);
            setQQueue(batch.slice(1));
            setGs(prev => {
              const used = [...prev.used, (firstQ.question || "").slice(0, 20)];
              if (used.length > 5) used.shift();
              return { ...prev, used };
            });
            setDamStats(getDamStats());
            fetchLockRef.current = false;
            return;
          }
        }

        // ② ダム在庫なし → API にフォールバック
        setLoading(true); setQuiz(null);

        const models = ["gemini-2.5-flash"];
        const currentLogs = logsRef.current;
        const validKeys = apiKeys.filter(k => k.trim());

        const tryFetch = async (modelIdx, currentRetry) => {
          if (modelIdx >= models.length || validKeys.length === 0) {
            // API 全滅 → ダムの残り（クールダウン表示）
            const fallback = popBatchFromDam(subj, s.lv);
            if (fallback.length > 0) {
              setIsCooldown(true);
              const firstQ = fallback[0];
              setQuiz(firstQ);
              setQQueue(fallback.slice(1));
              setGs(prev => {
                const used = [...prev.used, (firstQ.question || "").slice(0, 20)];
                if (used.length > 5) used.shift();
                return { ...prev, used };
              });
              setDamStats(getDamStats());
              return true;
            }
            throw new Error(
              validKeys.length === 0
                ? "APIキーが入力されていません。"
                : "API制限中で、ストック問題もありません。少し休憩してから試してね。"
            );
          }

          const model = models[modelIdx];
          try {
            const bodyObj = {
              systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
              contents: [{ role: "user", parts: [{ text: buildBatchPrompt(g, subj, s, review, reviewItem, currentLogs) }] }],
              generationConfig: {
                responseMimeType: "application/json",
                temperature: 0.3,
                topP: 0.9,
                topK: 20
              }
            };

            const controller = new AbortController();
            const requests = validKeys.map(key =>
              fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(bodyObj),
                signal: controller.signal
              }).then(async res => {
                if (res.status === 429) throw new Error("429");
                if (!res.ok) throw new Error("Fetch failed");
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                return data;
              })
            );

            const data = await Promise.any(requests);
            controller.abort();

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("レスポンスが空です");

            const jsonText = text.replace(/```json/g, "").replace(/```/g, "").trim();
            let parsed;
            try {
              parsed = JSON.parse(jsonText);
            } catch (e) {
              console.error("JSON Parse Error:", jsonText);
              throw new Error("データの解析に失敗しました。もう一度試してね。");
            }

            if (!Array.isArray(parsed)) parsed = [parsed];
            parsed = parsed.filter(q => {
              if (!q.choices || !Array.isArray(q.choices) || q.choices.length !== 4) return false;
              return new Set(q.choices.map(c => String(c).trim())).size === 4;
            });

            if (parsed.length > 0) {
              setIsCooldown(false);
              const enriched = parsed.map(q => ({ ...q, _subject: subj, _level: s.lv }));

              if (subj !== subjectRef.current) return true;

              const firstQ = enriched[0];
              setQuiz(firstQ);
              setQQueue(enriched.slice(1));
              setGs(prev => {
                const used = [...prev.used, (firstQ.question || "").slice(0, 20)];
                if (used.length > 5) used.shift();
                return { ...prev, used };
              });
              return true;
            } else {
              return await tryFetch(modelIdx + 1, 0);
            }
          } catch (e) {
            if (currentRetry < 2) {
              const waitTime = Math.pow(2, currentRetry) * 10000;
              setIsCooldown(true);
              await new Promise(resolve => setTimeout(resolve, waitTime));
              return await tryFetch(modelIdx, currentRetry + 1);
            } else {
              return await tryFetch(modelIdx + 1, 0);
            }
          }
        };

        try {
          await tryFetch(0, 0);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
          fetchLockRef.current = false;
        }
      }, [apiKeys]);

      const resetAndFetch = useCallback((subj, specificGrade) => {
        const initGs = { lv: 2, streak: 0, best: 0, wrong: 0, qNum: 1, retry: false, used: [] };
        setAnswered(null);
        setQuiz(null);
        setQQueue([]);
        setGs(initGs);
        setSubject(subj);
        const targetGrade = specificGrade || grade;
        requestAnimationFrame(() => {
          fetchQuestionsBatch(initGs, targetGrade, subj, false, null);
        });
      }, [grade, fetchQuestionsBatch]);

      const handleStart = () => {
        const validKeys = apiKeys.filter(k => k.trim());
        if (validKeys.length === 0) { setError("APIキーを1つ以上入力してください"); return; }
        if (!birthday) { setError("生年月日を入力してください"); return; }
        try { localStorage.setItem(profileKey, JSON.stringify({ birthday, apiKeys })); } catch {}

        const g = calcGrade(birthday);
        setGrade(g);
        setScreen("app");
        setTab("learn");
        setDamStats(getDamStats());

        const subj = pickSubject(logsRef.current);
        resetAndFetch(subj, g);
      };

      const handleForceUpdate = () => {
        const baseUrl = window.location.origin + window.location.pathname;
        const cacheBuster = new Date().getTime();
        window.location.href = `${baseUrl}?update=${cacheBuster}`;
      };

      const handleSubjectSelect = (newSubj) => {
        setShowSubjectSelect(false);
        resetAndFetch(newSubj);
      };

      const handleWeakSubject = () => {
        const currentLogs = logsRef.current;
        const recentRates = calcRecentSubjectRates(currentLogs.recentHistory);
        const untouched = SUBJECTS.filter(s => !recentRates[s] || recentRates[s].q === 0);
        if (untouched.length > 0 && Math.random() < 0.7) {
          resetAndFetch(untouched[Math.floor(Math.random() * untouched.length)]);
          return;
        }
        let weakSubj = SUBJECTS[0], minRate = Infinity, found = false;
        for (const s of SUBJECTS) {
          const rt = recentRates[s];
          if (rt && rt.q >= 3) {
            const rate = rt.c / rt.q;
            if (rate < minRate) { minRate = rate; weakSubj = s; found = true; }
          }
        }
        if (!found) {
          const qCounts = SUBJECTS.map(s => ({ s, q: recentRates[s]?.q || 0 }));
          qCounts.sort((a, b) => a.q - b.q);
          weakSubj = qCounts[0].s;
        }
        resetAndFetch(weakSubj);
      };

      const handleAnswer = (idx) => {
        if (answered !== null || !quiz) return;
        setAnswered(idx);
        const correct = idx === quiz.answer;
        const wrongItem = !correct ? { topic: quiz.topic_tag || quiz.question.slice(0, 20), subject } : null;
        const nextStreak = correct ? gsRef.current.streak + 1 : 0;
        const newBest = Math.max(gsRef.current.best, nextStreak);

        updateLogs(correct, subject, wrongItem, newBest);

        setGs(prev => ({
          ...prev, streak: nextStreak, best: newBest,
          wrong: correct ? prev.wrong : prev.wrong + 1,
          lv: correct ? Math.min(3, prev.lv + 1) : Math.max(1, prev.lv - 1),
          retry: !correct, qNum: correct ? prev.qNum + 1 : prev.qNum,
        }));
      };

      const handleNext = () => {
        const currentLogs = logsRef.current;
        const isQueueEmpty = qQueue.length === 0;
        const hasReview = isQueueEmpty && currentLogs.reviewQueue?.length > 0;

        if (!isQueueEmpty && !hasReview) {
          const nextQ = qQueue[0];
          if (nextQ._subject !== subject) {
            setQQueue([]);
            fetchQuestionsBatch(gsRef.current, grade, subject, false, null);
            return;
          }
          setQQueue(prev => prev.slice(1));
          setQuiz(nextQ);
          setAnswered(null);
          setIsReview(false);
          setGs(prev => {
            const used = [...prev.used, (nextQ.question || "").slice(0, 20)];
            if (used.length > 5) used.shift();
            return { ...prev, used };
          });
          return;
        }

        if (hasReview) {
          const item = currentLogs.reviewQueue[0];
          setLogs(prev => { const n = { ...prev, reviewQueue: prev.reviewQueue.slice(1) }; saveLogs(n); return n; });
          setIsReview(true);
          fetchQuestionsBatch(gsRef.current, grade, subject, true, item);
        } else {
          setIsReview(false);
          const nextSubj = gsRef.current.qNum % 3 === 0 ? pickSubject(currentLogs) : subject;
          if (nextSubj !== subject) setSubject(nextSubj);
          fetchQuestionsBatch(gsRef.current, grade, nextSubj, false, null);
        }
      };

      // === 派生値 ===
      const recent100 = calcRecent100Rate(logs.recentHistory);
      const recentSubjectRates = calcRecentSubjectRates(logs.recentHistory);
      const subjectRates = SUBJECTS.map(s => {
        const rt = recentSubjectRates[s];
        if (!rt || rt.q === 0) return { s, rate: null, q: 0 };
        return { s, rate: Math.round(rt.c / rt.q * 100), q: rt.q };
      });

      const recentDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - i));
        const key = d.toISOString().slice(0, 10);
        const log = logs.dailyLog?.[key];
        return { key, label: `${d.getMonth() + 1}/${d.getDate()}`, q: log?.q || 0, c: log?.c || 0 };
      });

      const rateColor = recent100 ? (recent100.rate >= 80 ? "#22c55e" : recent100.rate >= 60 ? "#f59e0b" : "#ef4444") : "#9990cc";
      const rateBg = recent100 ? (recent100.rate >= 80 ? "#f0fdf4" : recent100.rate >= 60 ? "#fffbeb" : "#fff7f7") : "#f8f7ff";
      const rateBorder = recent100 ? (recent100.rate >= 80 ? "#86efac" : recent100.rate >= 60 ? "#fde68a" : "#fca5a5") : "#e8e3ff";

      const damTotal = getDamTotal();

      return (
        <React.Fragment>
          <style>{css}</style>
          <div className="root">
            {newBadges.length > 0 && (
              <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 999, background: "#5b3ff8", color: "#fff", borderRadius: 16, padding: "12px 20px", fontWeight: 800, fontSize: 14, boxShadow: "0 4px 20px rgba(91,63,248,.4)", textAlign: "center", whiteSpace: "nowrap" }}>
                🏆 新しいバッジ: {newBadges.map(b => b.icon + b.label).join(" · ")}
              </div>
            )}

            {screen === "start" && (
              <div style={{ maxWidth: 440, margin: "40px auto" }}>
                <div className="card" style={{ textAlign: "center", padding: "32px 24px" }}>
                  <div style={{ fontSize: 48, marginBottom: 10 }}>📚</div>
                  <h1 style={{ fontSize: 26, fontWeight: 900, color: "#5b3ff8", marginBottom: 4 }}>まなびサポート</h1>
                  <p style={{ color: "#9990cc", fontSize: 13, marginBottom: 28 }}>AIが苦手を分析して最適な問題を出すよ</p>
                  {error && <div className="err">{error}</div>}

                  <label style={{ fontSize: 13, color: "#9990cc", display: "block", textAlign: "left", marginBottom: 6, fontWeight: 700 }}>Gemini APIキー（最大4つ・並列レース処理）</label>

                  {apiKeys.map((key, i) => (
                    <input
                      key={i}
                      type="password"
                      value={key}
                      onChange={e => {
                        const newKeys = [...apiKeys];
                        newKeys[i] = e.target.value;
                        setApiKeys(newKeys);
                      }}
                      placeholder={`APIキー ${i + 1}${i === 0 ? " (必須)" : " (任意)"}`}
                    />
                  ))}

                  <label style={{ fontSize: 13, color: "#9990cc", display: "block", textAlign: "left", marginBottom: 6, marginTop: 8, fontWeight: 700 }}>生年月日</label>
                  <input type="date" value={birthday} onChange={e => setBirthday(e.target.value)} min="2000-01-01" max="2026-12-31" />

                  <button className="btn btn-primary" onClick={handleStart} style={{ marginTop: 12 }}>学習をはじめる →</button>
                  <button
                    className="btn btn-ghost"
                    onClick={handleForceUpdate}
                    style={{ marginTop: 12, fontSize: 12, color: "#ef4444", background: "transparent" }}
                  >
                    ↻ システムを最新に更新する
                  </button>
                </div>
              </div>
            )}

            {screen === "app" && (
              <div style={{ maxWidth: 500, margin: "0 auto" }}>
                <div className="card" style={{ padding: "14px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <div>
                      <div style={{ fontSize: 11, color: "#9990cc", fontWeight: 700 }}>{grade}</div>
                      <div style={{ fontSize: 20, fontWeight: 900 }}>
                        {subject}
                        {isReview && <span className="pill pill-review" style={{ marginLeft: 8, fontSize: 11 }}>復習</span>}
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {isRefilling && (
                        <div style={{ fontSize: 10, color: "#9990cc", display: "flex", alignItems: "center" }}>
                          <span className="dam-refill-dot"></span>補充中
                        </div>
                      )}
                      <span className="pill pill-lv">Lv.{gs.lv}</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <div className="stat"><div className="stat-n" style={{ color: "#f59e0b" }}>🔥{gs.streak}</div><div className="stat-l">連続</div></div>
                    <div className="stat"><div className="stat-n" style={{ color: "#5b3ff8" }}>{gs.best}</div><div className="stat-l">最高</div></div>
                    <div className="stat"><div className="stat-n" style={{ color: "#ef4444" }}>{gs.wrong}</div><div className="stat-l">ミス</div></div>
                    <div className="stat"><div className="stat-n">#{gs.qNum}</div><div className="stat-l">問題</div></div>
                  </div>
                </div>

                <div className="tabs">
                  <button className={`tab${tab === "learn" ? " active" : ""}`} onClick={() => setTab("learn")}>📚 学習</button>
                  <button className={`tab${tab === "log"   ? " active" : ""}`} onClick={() => setTab("log")}>📊 きろく</button>
                  <button className={`tab${tab === "badge" ? " active" : ""}`} onClick={() => setTab("badge")}>🏆 実績</button>
                </div>

                {tab === "learn" && (
                  <React.Fragment>
                    {loading && (
                      <div className="card" style={{ textAlign: "center", padding: "36px 20px" }}>
                        <div className="spin" style={{ marginBottom: 14 }}></div>
                        <div style={{ color: "#9990cc", fontSize: 14, fontWeight: 700 }}>
                          {isCooldown ? "AIが休憩中です。少し待ってね... ☕" : "複数のAIが問題を考え中... 🚀"}
                        </div>
                      </div>
                    )}
                    {error && !loading && (
                      <div className="card">
                        <div className="err">{error}</div>
                        <button className="btn btn-primary" onClick={handleNext}>もう一度</button>
                      </div>
                    )}

                    {!loading && quiz && isCooldown && (
                      <div style={{ background: "#fffbeb", borderLeft: "3px solid #f59e0b", padding: "10px 14px", marginBottom: "16px", borderRadius: "0 10px 10px 0", fontSize: 13, color: "#92400e", fontWeight: 700 }}>
                        ☕ AIが休憩中のため、ストックから出題しています。
                      </div>
                    )}

                    {quiz && !loading && (
                      <div className="card">
                        <div className="start-msg">{quiz.start_message}</div>
                        {gs.retry && <div className="hint">💡 {quiz.hint}</div>}
                        <p style={{ fontSize: 17, fontWeight: 800, lineHeight: 1.75, marginBottom: 18 }}>{quiz.question}</p>
                        <div>
                          {quiz.choices.map((c, i) => {
                            let cls = "choice";
                            if (answered !== null) {
                              if (i === quiz.answer) cls += " correct";
                              else if (i === answered) cls += " wrong";
                              else cls += " dim";
                            }
                            return (
                              <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={answered !== null}>
                                <span className="num">{i + 1}</span>{c}
                              </button>
                            );
                          })}
                        </div>
                        {answered !== null && (
                          <React.Fragment>
                            <div className={`fb ${answered === quiz.answer ? "ok" : "ng"}`}>
                              <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 8, color: answered === quiz.answer ? "#166534" : "#9a3412" }}>
                                {answered === quiz.answer ? "🎉 正解！" : "🌱 もう少し！"}
                              </div>
                              <div style={{ fontSize: 14, lineHeight: 1.85, color: "#374151" }}>
                                {answered === quiz.answer ? quiz.correct_feedback : quiz.incorrect_feedback}
                              </div>
                            </div>
                            {quiz.learning_tip && (
                              <div className="tip-box">
                                <span style={{ fontSize: 16 }}>💡</span>
                                <span>{quiz.learning_tip}</span>
                              </div>
                            )}

                            <button
                              className="btn btn-ghost"
                              style={{ marginTop: 12, color: "#ef4444", fontSize: 11, background: "rgba(239, 68, 68, 0.05)" }}
                              onClick={() => {
                                setLogs(prev => {
                                  const next = JSON.parse(JSON.stringify(prev));
                                  next.reviewQueue = next.reviewQueue.filter(q => q.topic !== (quiz.topic_tag || quiz.question.slice(0, 20)));
                                  saveLogs(next);
                                  return next;
                                });
                                alert("「この問題はおかしい」と報告しました。復習リストから削除されます。");
                              }}
                            >
                              ⚠️ 問題の内容がまちがっている
                            </button>

                            <div style={{ height: 12 }}></div>
                            <button className="btn btn-primary" onClick={handleNext}>次の問題へ →</button>
                          </React.Fragment>
                        )}
                      </div>
                    )}

                    {showSubjectSelect ? (
                      <div className="card" style={{ marginTop: 4, padding: "16px", background: "#f8f7ff" }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: "#5b3ff8", marginBottom: 10, textAlign: "center" }}>勉強したい科目を選んでね！</div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                          {SUBJECTS.map(s => (
                            <button key={s} className="btn btn-primary" style={{ padding: "10px 8px", fontSize: 14 }} onClick={() => handleSubjectSelect(s)} disabled={loading}>{s}</button>
                          ))}
                          <button className="btn btn-ghost" style={{ padding: "10px 8px", fontSize: 14, background: "#e8e3ff" }} onClick={() => setShowSubjectSelect(false)} disabled={loading}>もどる</button>
                        </div>
                      </div>
                    ) : (
                      <div className="row2" style={{ marginTop: 4 }}>
                        <button className="btn btn-ghost" onClick={() => setShowSubjectSelect(true)} disabled={loading}>科目選択</button>
                        <button className="btn btn-ghost" onClick={handleWeakSubject} disabled={loading}>苦手科目</button>
                        <button className="btn btn-ghost" onClick={() => setScreen("start")} disabled={loading}>設定変更</button>
                      </div>
                    )}
                  </React.Fragment>
                )}

                {tab === "log" && (
                  <React.Fragment>
                    <div className="login-streak">
                      <div style={{ fontSize: 28, fontWeight: 900 }}>{logs.loginStreak || 0}日連続</div>
                      <div style={{ fontSize: 13, opacity: .85, marginTop: 4 }}>学習中！この調子で続けよう 🔥</div>
                    </div>

                    <div className="recent-rate-card" style={{ background: rateBg, borderColor: rateBorder }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 800, color: "#9990cc", marginBottom: 4 }}>過去直近100問の正解率</div>
                          {recent100 ? (
                            <React.Fragment>
                              <div style={{ fontSize: 38, fontWeight: 900, color: rateColor, lineHeight: 1 }}>{recent100.rate}%</div>
                              <div className="rate-note" style={{ color: rateColor }}>
                                {recent100.count < 100 ? `（まだ${recent100.count}問分のデータ）` : "直近100問の結果"}
                              </div>
                            </React.Fragment>
                          ) : (
                            <div style={{ fontSize: 20, fontWeight: 800, color: "#9990cc" }}>まだデータなし</div>
                          )}
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 11, color: "#9990cc", marginBottom: 4 }}>累計</div>
                          <div style={{ fontSize: 18, fontWeight: 900, color: "#5b3ff8" }}>{logs.totalQ}問</div>
                          <div style={{ fontSize: 11, color: "#9990cc", marginTop: 4 }}>最高連続</div>
                          <div style={{ fontSize: 18, fontWeight: 900, color: "#f59e0b" }}>{logs.bestStreak}問</div>
                        </div>
                      </div>
                      {recent100 && (
                        <div style={{ marginTop: 12 }}>
                          <div className="bar-wrap" style={{ height: 12 }}>
                            <div className="bar" style={{ width: `${recent100.rate}%`, background: rateColor }}></div>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="card">
                      <div className="section-title">科目別 正解率（直近100問より）</div>
                      {subjectRates.map(({ s, rate, q }) => (
                        <div key={s} className="subj-row">
                          <span className="subj-name">{s}</span>
                          <div style={{ flex: 1 }}>
                            <div className="bar-wrap">
                              <div className="bar" style={{
                                width: rate !== null ? `${rate}%` : "0%",
                                background: rate >= 70 ? "#22c55e" : rate >= 50 ? "#f59e0b" : "#ef4444"
                              }}></div>
                            </div>
                          </div>
                          <span className="subj-rate">{rate !== null ? `${rate}%` : "未挑戦"}</span>
                          <span style={{ fontSize: 11, color: "#bbb", minWidth: 30, textAlign: "right" }}>{q > 0 ? `${q}問` : ""}</span>
                        </div>
                      ))}
                      <div style={{ fontSize: 11, color: "#bbb", marginTop: 8 }}>※ 直近100問の中での科目別集計</div>
                    </div>

                    <div className="card">
                      <div className="section-title">直近7日間</div>
                      {recentDays.map(d => (
                        <div key={d.key} className="day-row">
                          <span style={{ fontWeight: 800, minWidth: 40, color: d.q > 0 ? "#5b3ff8" : "#bbb" }}>{d.label}</span>
                          <div style={{ flex: 1 }}>
                            <div className="bar-wrap">
                              <div className="bar" style={{ width: d.q > 0 ? `${Math.min(100, d.q * 5)}%` : "0%", background: "#5b3ff8" }}></div>
                            </div>
                          </div>
                          <span style={{ fontSize: 12, color: "#9990cc", minWidth: 50, textAlign: "right" }}>
                            {d.q > 0 ? `${d.c}/${d.q}問` : "お休み"}
                          </span>
                        </div>
                      ))}
                    </div>

                    {logs.reviewQueue?.length > 0 && (
                      <div className="card" style={{ background: "#fffbeb", border: "1.5px solid #fde68a" }}>
                        <div style={{ fontWeight: 800, color: "#92400e", marginBottom: 6 }}>📝 復習キュー: {logs.reviewQueue.length}件</div>
                        <div style={{ fontSize: 13, color: "#78350f" }}>次の学習で自動的に復習問題が出るよ</div>
                      </div>
                    )}

                    {/* ダム在庫ウィジェット */}
                    <div className="card" style={{ background: "#f8f7ff" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div className="section-title" style={{ margin: 0 }}>📦 問題ストック（ダム在庫）</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          {isRefilling && <span className="dam-refill-dot"></span>}
                          <span style={{ fontSize: 12, fontWeight: 900, color: damTotal > 300 ? "#22c55e" : damTotal > 100 ? "#f59e0b" : "#ef4444" }}>
                            {damTotal} / 750問
                          </span>
                        </div>
                      </div>
                      <div style={{ marginBottom: 6 }}>
                        <div className="bar-wrap" style={{ height: 8 }}>
                          <div className="bar" style={{
                            width: `${Math.min(100, (damTotal / 750) * 100)}%`,
                            background: damTotal > 300 ? "#22c55e" : damTotal > 100 ? "#f59e0b" : "#ef4444"
                          }}></div>
                        </div>
                      </div>
                      {SUBJECTS.map(subj => (
                        <div key={subj} style={{ marginBottom: 10 }}>
                          <div style={{ fontSize: 11, fontWeight: 800, color: "#5b3ff8", marginBottom: 3 }}>{subj}</div>
                          <div className="dam-grid">
                            {LEVELS.map(lv => {
                              const cnt = damStats[subj]?.[lv] || 0;
                              const pct = Math.min(100, (cnt / DAM_MAX_PER_BUCKET) * 100);
                              const color = pct > 60 ? "#22c55e" : pct > 30 ? "#f59e0b" : "#ef4444";
                              return (
                                <div key={lv} className="dam-bucket">
                                  <div className="dam-lv-label">Lv.{lv}</div>
                                  <div className="dam-count" style={{ color }}>{cnt}<span style={{ fontSize: 9, color: "#bbb" }}>/50</span></div>
                                  <div className="dam-minibar">
                                    <div className="dam-minibar-fill" style={{ width: `${pct}%`, background: color }}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                      <div style={{ fontSize: 10, color: "#bbb", marginTop: 4, textAlign: "center" }}>
                        {isRefilling ? "⚡ バックグラウンドで補充中..." : "✓ 自動補充エンジン稼働中（90秒間隔）"}
                      </div>
                    </div>
                  </React.Fragment>
                )}

                {tab === "badge" && (
                  <div className="card">
                    <div className="section-title">獲得バッジ {logs.earnedBadges?.length || 0} / {BADGES.length}</div>
                    <div className="badge-grid">
                      {BADGES.map(b => {
                        const earned = logs.earnedBadges?.includes(b.id);
                        return (
                          <div key={b.id} className={`badge ${earned ? "earned" : "locked"}`}>
                            <div className="badge-icon">{b.icon}</div>
                            <div className="badge-name">{b.label}</div>
                            <div className="badge-desc">{b.desc}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ManabiV3/>);
  </script>
</body>
</html>
