        setAppError("AIにつながれなかったよ！もう一度おしてみてね");
        // 15秒クールダウン開始
        if(retryTimerRef.current)clearInterval(retryTimerRef.current);
        retryCooldownRef.current=15;setRetryCooldown(15);
        retryTimerRef.current=setInterval(()=>{
          retryCooldownRef.current--;
          setRetryCooldown(retryCooldownRef.current);
          if(retryCooldownRef.current<=0)clearInterval(retryTimerRef.current);
        },1000);
      }
    }
    finally{fetchLk.current=false;}
  },[]);

  const resetFetch=useCallback((subj,sg)=>{
    // ノルマセッション切替時にも日跨ぎ判定を入れ、表示の整合を取る
    const cur=_rolloverGs(gsR.current);const init={...cur,qNum:1};
    // fetchLk/nextLkを明示リセット。rAF前に解放しないとfetchQ冒頭ガードで弾かれる。
    fetchLk.current=false;nextLk.current=false;
    resetState();setGs(init);setSubject(subj);pollingCancelRef.current++;setWaitingForStock(null);
    const g=sg||grade;requestAnimationFrame(()=>fetchQ(g,subj));
  },[grade,fetchQ]);

  // 選択肢を選んだとき
  const handleChoice=useCallback((idx,e)=>{
    if(selectedChoice!==null||quizPhase!=="question")return;
    // gs は依存配列から外し、最新値を ref から取得する。
    // 旧実装は deps に `gs` を入れていたため、1問解答ごとに setGs → handleChoice 再生成が起き、
    // 子の QuizPanel(memo) の参照等価が崩れて不要な再レンダーを誘発していた。
    // gsR.current は useEffect で常に最新化されており、ここで参照する値は closure 由来の gs と一致する。
    const gs=gsR.current;
    // クリック位置を保存（後段の timeAttack pop / 結果ポップのアンカーに使用）
    const clickAnchor=popAnchorFromEvent(e);
    if(idx===4){
      // まだ習ってない → ヒントを表示して同じ問題に戻る
      setHintSource("notLearned");
      return;
    }
    // ⑧ 3秒見直しモード ON & 通常選択 (idx>=0) かつヒント非表示 → 確認ステップへ
    //   pendingChoice に格納し、CountDown 経過 or 「決定」で本処理へ。
    if(advancedMode.threeSecCheck && idx>=0 && !pendingChoiceR.current){
      pendingChoiceR.current=true;
      setPendingChoice({idx,anchor:clickAnchor});
      return;
    }
    // タイムアウト(idx===-1)は不正解扱い
    const timedOut=idx===-1;
    const correct=!timedOut&&idx===quiz.correct;
    setSelectedChoice(timedOut?null:idx);setAnswerCorrect(correct);
    setQuizPhase("result");
    setTimeLimit(null); // ⑦ タイマー停止
    // ② 正解時はアクティブリコール (RecallQuiz) を先に出す方針へ統一。
    //    why-wrong パネルの自動展開はやめ、ユーザー操作で開く形に戻す。
    if(correct){setShowCorrectBurst(true);setTimeout(()=>setShowCorrectBurst(false),750);}
    // タイムアタック ON & 時間内に正解 → +1 安定力（同じ問題内で1回）
    if(correct && !timedOut && advancedMode.timeAttack && !bonusFiredR.current.timeAttack){
      bonusFiredR.current.timeAttack=true;
      addBonusPop({icon:"⏱️",name:"タイムアタック",statKey:"stability",amount:1,anchor:clickAnchor});
    }
    // ⑦ ヒントを見ずに正解 → 単元力 +1（望ましい困難で記憶定着）
    //    hint がそもそも無い問題は対象外。リトライ時は再カウントしない。
    if(correct && !timedOut && !wasRetryR.current && !hintUsedR.current && quiz?.hint){
      const _un=quiz?.topic_tag||quiz?.question?.slice(0,12)||"";
      const _sn=_un.length>8?_un.slice(0,7)+"…":_un;
      addBonusPop({icon:"🧠",name:`${_sn}力`,statKey:"__unit_hint",amount:1,anchor:clickAnchor});
      if(_un&&!trialModeR.current){
        setLogs(prev=>{
          const next=deepClone(prev);
          const td=today();
          if(!next.subjectUnitStats)next.subjectUnitStats={};
          if(subject&&!next.subjectUnitStats[subject])next.subjectUnitStats[subject]={};
          if(subject){next.subjectUnitStats[subject][_un]=(next.subjectUnitStats[subject][_un]||0)+1;}
          if(!next.dailyUnitGains)next.dailyUnitGains={};
          next.dailyUnitGains[td]=(next.dailyUnitGains[td]||0)+1;
          if(!next.dailyUnitGainsByName)next.dailyUnitGainsByName={};
          if(!next.dailyUnitGainsByName[td])next.dailyUnitGainsByName[td]={};
          next.dailyUnitGainsByName[td][_un]=(next.dailyUnitGainsByName[td][_un]||0)+1;
          saveLogs(next);return next;
        });
      }
    }
    // ⑥ 連続正解が途切れたとき
    if(!correct&&gs.streak>=3){
      setStreakBrokenMsg(`🔥 ${gs.streak}連続まで行ったね！惜しい！`);
      setTimeout(()=>setStreakBrokenMsg(""),3500);
    }
    const currentWasRetry=wasRetryR.current;
    wasRetryR.current=false;
    // ⑮ リトライ正解 → 復活バーストで派手に祝う（紙吹雪＋3連リング＋大型ヒーロー）
    // 学年に応じた文言。アプリ常駐負荷は無し（show=true の間だけ DOM が生え、終わると消える）
    if(correct&&currentWasRetry){
      const TXT=pickText(gradeR.current);
      const phrases=TXT.revivalCheers;
      setRevivalBurst({
        big:TXT.revivalBig,
        sub:TXT.revivalSub,
        phrase:phrases[Math.floor(Math.random()*phrases.length)],
      });
    }
    // 不正解→リトライでの reviewQueue 二重登録を防止：初回の不正解のみ wrongItem を作る
    // ※ wrongItem を `!correct && !currentWasRetry` のときだけ生成するのはバグではない。
    //   リトライ時（currentWasRetry=true）は updateLogs 側で wrongItem=null として渡し、
    //   reviewQueue への二重登録を防ぐ設計。初回不正解のみキューに積む。
    // 自信度=3（説明できる）で初回不正解 → 思い込みアラート扱い：priority=true・期日を今日に前倒し
    const _isPriorityMiss=(!correct&&!currentWasRetry&&confidenceRatingR.current===3);
    const wrongItem=(!correct && !currentWasRetry)?{
      id:safeUUID(),
      topic:quiz.topic_tag||quiz.question.slice(0,20),
      subject,
      mistakeType:quiz.mistake_type||"不明",
      // SM-2: 不正解→翌日が初回期日、reps=0 から開始
      reps:0,
      dueDate:_isPriorityMiss?today():addDaysISO(today(),1),
      createdAt:today(),
      ...(_isPriorityMiss?{priority:true,priorityReason:"思い込み(自信3で不正解)"}:{}),
    }:null;
    // 日跨ぎ（23:59→00:00で連続プレイ中など）に best/wrong をローテーション
    const gsRolled=_rolloverGs(gs);
    const nextStr=correct?gsRolled.streak+1:0;
    const newBest=Math.max(gsRolled.best,nextStr);
    // 直前の回答情報を記録（handleNext で confidence との照合に使う）
    prevAnswerR.current={correct,subject,quiz:{...quiz}};
    // お試しモードは記録に残さない（ゲストプレイ扱い）
    // ※ gainForGsRef.current を先に 0 にしておき、updateLogs の setLogs コールバック内で
    //   上書きする「ref 橋渡し」パターン。
    //   setLogs と setGs は両方非同期バッチで走るため、直接変数を共有できない。
    //   trialMode 時は updateLogs を呼ばないので 0 のまま setGs に渡る（意図通り）。
    gainForGsRef.current=0; // 試用モード時は加算しない。非試用なら updateLogs 内で上書きされる。
    if(!trialModeR.current){
      // sessionComplete: ノルマモード中（復習でも試用でもなく、未達成）かつ正解のときのみ true
      // ※ 旧実装では `correct` をそのまま渡していたため、ノルマ外の通常問題で正解しても
      //   dailyLog.sessions がカウントアップされ、ノルマ未達成のまま達成扱いになるバグがあった
      // [BUG FIX] dailyGoalMet と currentReviewItemId は useCallback deps 外のため stale closure。
      //   ノルマ達成直後の問題で dailyGoalMet=false（旧値）をキャプチャしたまま
      //   sessionComplete=true が誤発火 → dailyLog.sessions が過剰カウントされていた。
      //   logsR.current と currentReviewItemIdR.current を使って常に最新値を参照する。
      const _liveGoalMet=(logsR.current.dailyLog?.[today()]?.sessions||0)>=5;
      const sessionComplete=correct&&!currentReviewItemIdR.current&&!_liveGoalMet&&!trialModeR.current;
      updateLogs(correct,subject,wrongItem,newBest,sessionComplete,currentWasRetry);
      // updateAnalysisStats（debugStats / debugHistory / review SM-2）は
      // 同じ問題のリトライでは二重カウントしない。初回のみ実行。
      if(!currentWasRetry){
        updateAnalysisStats([correct],subject);
      }
    }
    // セッション内カウンタも「同じ問題の再挑戦」では二重カウントしない
    setGs(p=>{
      // 日跨ぎローテ後の値を基準に更新（setGs reducer 内でも同じ td を見るため p ではなく rolled を使う）
      const r=_rolloverGs(p);
      // ⑪ 連続ミス数（wrongStreak）：正解で 0 リセット、初回ミスで +1。
      // 3 以上で次の popFromDam が easy を強制する → 詰み感を防ぐ安全弁。
      const nextWrongStreak=correct?0:(currentWasRetry?r.wrongStreak||0:(r.wrongStreak||0)+1);
      return{
        ...r,
        streak:nextStr,
        best:newBest,
        wrong: (!correct && !currentWasRetry) ? r.wrong+1 : r.wrong,
        wrongStreak:nextWrongStreak,
        qNum: currentWasRetry ? r.qNum : r.qNum+1,
        todayScore: (r.todayScore||0)+gainForGsRef.current,
      };
    });
  },[selectedChoice,quizPhase,quiz,subject,updateLogs,updateAnalysisStats,advancedMode.timeAttack,addBonusPop]);
  useEffect(()=>{handleChoiceR.current=handleChoice;},[handleChoice]);

  // ⑧ 見直しカードが表示されたら（画面外のときだけ）瞬時スナップ＋プライマリにフォーカス
  // smooth はユーザーの指 / スクロールと競合して「変なタイミングで画面が動く」原因になるため auto。
  // タッチ端末では focus リングが視覚ノイズになるだけなのでスキップ。
  useEffect(()=>{
    if(!pendingChoice)return;
    const rafId=requestAnimationFrame(()=>{
      const el=threesecCardRef.current;
      if(!el)return;
      const rect=el.getBoundingClientRect();
      const vh=window.innerHeight||640;
      // 画面に収まっていれば動かさない（top:-8 まで許容、下端は画面内）
      const offscreen=rect.top<-8||rect.bottom>vh;
      if(offscreen){
        el.scrollIntoView({behavior:"auto",block:"center"});
      }
      // hover が無い = タッチ系端末ではフォーカスを当てない
      let isTouch=false;
      try{ isTouch=!!(window.matchMedia&&window.matchMedia("(hover:none)").matches); }catch(_){}
      if(!isTouch){
        // プライマリアクション（これで決定）にフォーカス。やめる ではない。
        const btn=el.querySelector(".threesec-go")||el.querySelector("button");
        if(btn)btn.focus({preventScroll:true});
      }
    });
    return()=>cancelAnimationFrame(rafId);
  },[!!pendingChoice]);

  // ⑧ 3秒見直し：自動確定なし。「これで決定」を押すまで待つ。
  // 「やめる」or 問題切り替えで pending をリセット
  useEffect(()=>{
    if(quizPhase!=="question"){
      pendingChoiceR.current=false;setPendingChoice(null);
    }
  },[quizPhase,quiz]);

  // 3秒見直しを「決定」/「やめる」
  const confirmPendingChoice=useCallback(()=>{
    if(!pendingChoice)return;
    const {idx,anchor}=pendingChoice;
    // pendingChoiceR を true のまま handleChoice を呼ぶ
    // （false にリセットすると handleChoice が threeSecCheck ブロックに再突入してしまうバグを防ぐ）
    // ※ pendingChoiceR.current=false を先にやらないのはバグではなく意図的な設計。
    //   handleChoice 内で `!pendingChoiceR.current` のとき threeSecCheck が再発動するため、
    //   ref を true に保ったまま呼ぶことで「確定済み→直接処理」の経路へ進む。
    //   handleChoice が quizPhase を "result" に変えると useEffect で
    //   pendingChoiceR.current=false / setPendingChoice(null) が走り後片付けされる。
    setPendingChoice(null);
    // [BUG FIX] anchor は popAnchorFromEvent が「clientX + scrollX」で変換済みの document 座標。
    // fakeEvt に clientX:anchor.x を入れて再度 popAnchorFromEvent に渡すと
    // scrollX がさらに加算されて pop 位置が二重にズレる。
    // handleChoice の第2引数 e は popAnchorFromEvent に渡されるが、
    // currentTarget/target をまず探しにいき、なければ clientX にフォールバックする。
    // そのため「すでに document 座標に変換済みの anchor」を直接使えるよう、
    // currentTarget が存在しない fakeEvt ではなく anchor を直渡しする専用 object を使う。
    // popAnchorFromEvent はフォールバック 3) で clientX を「+scrollX」してしまうため、
    // document 座標をそのまま返す __docAnchor プロパティを持たせ、
    // popAnchorFromEvent の冒頭で優先処理する方式に変更するのが理想だが、
    // 最小変更として：anchor が存在する場合は handleChoice 内の popAnchorFromEvent を
    // 迂回できるよう、fakeEvt に __anchorOverride を付与して handleChoice 側で直接使う。
    // ただし handleChoice は popAnchorFromEvent を内部で呼ぶため、
    // 最もシンプルな修正は「fakeEvt.clientX に scrollX を引いた viewport 座標を入れる」こと。
    const sx=window.scrollX||0, sy=window.scrollY||0;
    const fakeEvt=anchor
      ? {clientX:anchor.x-sx, clientY:anchor.y-sy}  // document 座標 → viewport 座標に戻す
      : {clientX:undefined, clientY:undefined};
    handleChoiceR.current&&handleChoiceR.current(idx,fakeEvt);
  },[pendingChoice]);
  const cancelPendingChoice=useCallback(()=>{
    pendingChoiceR.current=false;setPendingChoice(null);
  },[]);

  // まだ習ってないボタン
  const handleNotLearnedYet=useCallback(()=>{
    setHintSource("notLearned");
  },[]);

  // 自信度評価: 回答前に押されるため、ここでは「即時確定する単元力 +1」のみ行う。
  // 確認力ボーナスと思い込みアラート（reviewQueue priority）の付与は、
  // 正誤が確定する updateLogs / wrongItem 構築側に集約する。
  // ※ 旧実装は recentHistory[last] を書き換えていたが、回答前にボタンを押せる仕様では
  //   「1つ前の問題」を誤って書き換えるバグになるため除去した（confidence は updateLogs の
  //   recentHistory.push 時に confidenceRatingR.current から正しく記録される）。
  const handleConfidenceRate=useCallback((rating,e)=>{
    // ★ anchor 取得は最優先：setState などで currentTarget が解放される前に固定
    const anchor=popAnchorFromEvent(e);
    setConfidenceRating(rating);
    // 自信度選択そのものに単元力 +1（同じ問題内で1回）
    // quiz を deps に含めることで常に最新の topic_tag を参照する。
    // subject は subjR.current（ref）で安全に取得。
    if(!bonusFiredR.current.confidence){
      bonusFiredR.current.confidence=true;
      const _cu=quiz?.topic_tag||quiz?.question?.slice(0,12)||"";
      const _cs=_cu.length>8?_cu.slice(0,7)+"…":_cu;
      addBonusPop({icon:"🎯",name:`${_cs}力`,statKey:"__unit_conf",amount:1,anchor});
      if(_cu&&!trialModeR.current){
        const _subj=subjR.current||"";
        setLogs(prev=>{
          const next=deepClone(prev);
          const td=today();
          if(!next.subjectUnitStats)next.subjectUnitStats={};
          if(_subj&&!next.subjectUnitStats[_subj])next.subjectUnitStats[_subj]={};
          if(_subj){next.subjectUnitStats[_subj][_cu]=(next.subjectUnitStats[_subj][_cu]||0)+1;}
          if(!next.dailyUnitGains)next.dailyUnitGains={};
          next.dailyUnitGains[td]=(next.dailyUnitGains[td]||0)+1;
          if(!next.dailyUnitGainsByName)next.dailyUnitGainsByName={};
          if(!next.dailyUnitGainsByName[td])next.dailyUnitGainsByName[td]={};
          next.dailyUnitGainsByName[td][_cu]=(next.dailyUnitGainsByName[td][_cu]||0)+1;
          saveLogs(next);return next;
        });
      }
    }
  },[quiz,addBonusPop]);

  // リトライ（もう一回解く）
  const handleRetry=useCallback(()=>{
    setSelectedChoice(null);setAnswerCorrect(null);setHintSource(null);setShowWhyWrong(false);
    setAnswerGains(null);
    setQuizPhase("question");
    wasRetryR.current=true; // ⑱ リトライ追跡
    setConfidenceRating(null);
    setHintPanelOpen(false); // 不正解→ヒント展開状態はリトライでクリア
  },[]);

  // 他の選択肢の理由トグル
  // 「開く」操作のみ +1 論理整理（同じ問題内では1回まで＝連打抑止）
  const handleToggleWhyWrong=useCallback((e)=>{
    const anchor=popAnchorFromEvent(e);
    setShowWhyWrong(v=>{
      if(!v && !bonusFiredR.current.whyWrong){
        bonusFiredR.current.whyWrong=true;
        addBonusPop({icon:"🧩",name:"論理整理",statKey:"logicalReasoning",amount:1,anchor});
      }
      return !v;
    });
  },[addBonusPop]);

  // アクティブリコール回答: 正解時のみ「その問題の単元力 +1」
  // 不正解はスルー（ペナルティなし）。verificationPower は加算しない。
  const handleActiveRecallAnswered=useCallback((correct,e)=>{
    // ★ anchor 取得は最優先：state 更新で event が解放される前に固定
    const anchor=popAnchorFromEvent(e);
    if(bonusFiredR.current.recall)return;
    bonusFiredR.current.recall=true;
    if(!correct)return; // 不正解はポップなし・加点なし
    const unitName=quiz?.topic_tag||quiz?.question?.slice(0,12)||"";
    const shortName=unitName.length>8?unitName.slice(0,7)+"…":unitName;
    // 視覚ポップ（"分数力 +1" のように単元名で表示）
    // statKey を STAT_ORDER 外にすることで addBonusPop 内の永続化をスキップし、
    // 下の setLogs で手動更新する。
    addBonusPop({icon:"🎯",name:`${shortName}力`,statKey:"__unit_recall",amount:1,anchor});
    // 単元力を +1 更新（trial 中はスキップ）
    if(unitName&&!trialModeR.current){
      setLogs(prev=>{
        const next=deepClone(prev);
        const td=today();
        // [BUG FIX] 旧実装は recentHistory 末尾の subject を使っていたが、
        //   wasRetry 時など recentHistory に今問題が積まれていない場合に
        //   直前の別問題の subject を誤参照していた。
        //   subjR.current は常に現在出題中の科目を指すため確実。
        const subj=subjR.current||"";
        if(!next.subjectUnitStats)next.subjectUnitStats={};
        if(subj&&!next.subjectUnitStats[subj])next.subjectUnitStats[subj]={};
        if(subj){next.subjectUnitStats[subj][unitName]=(next.subjectUnitStats[subj][unitName]||0)+1;}
        if(!next.dailyUnitGains)next.dailyUnitGains={};
        next.dailyUnitGains[td]=(next.dailyUnitGains[td]||0)+1;
        if(!next.dailyUnitGainsByName)next.dailyUnitGainsByName={};
        if(!next.dailyUnitGainsByName[td])next.dailyUnitGainsByName[td]={};
        next.dailyUnitGainsByName[td][unitName]=(next.dailyUnitGainsByName[td][unitName]||0)+1;
        saveLogs(next);
        return next;
      });
    }
  },[addBonusPop,quiz]);

  // お試しモード開始（APIキー不要）
  const startTrialMode=useCallback(()=>{
    setTrialMode(true);trialModeR.current=true;
    setTrialIndex(0);trialIndexR.current=0;
    setIsReview(false);isReviewR.current=false;
    setCurrentReviewItemId(null);currentReviewItemIdR.current=null;
    setSubject(SAMPLE_QUESTIONS[0].subject);
    resetState();
    setQuiz(shuffleAllSteps({...SAMPLE_QUESTIONS[0]}));
  },[]);

  const handleNext=async()=>{
    if(nextLk.current)return;nextLk.current=true;
    // 結果→次へで前の問題の浮遊ポップ(bonusPops)が新しい問題に被るのを防ぐ。
    // タイマーは自然消滅で OK。state を即 [] にすれば描画は1フレームで消える。
    setBonusPops([]);
    // 復活バーストが残っていたら早めに片付ける（中央オーバーレイで新問題が見えない事故を防止）
    setRevivalBurst(null);
    // 次の問題が描画される前に上端へスクロール（瞬間移動 = アニメ無し＝軽量）。
    // window だけでなく documentElement.scrollTop も触る（iOS Safari の挙動差を吸収）。
    try{
      if(typeof window!=="undefined"&&window.scrollTo){window.scrollTo(0,0);}
      if(document.documentElement)document.documentElement.scrollTop=0;
      if(document.body)document.body.scrollTop=0;
    }catch(_){}
    // お試しモード: SAMPLE_QUESTIONSを順に出題、終了時にスタート画面に戻す
    if(trialModeR.current){
      const nextIdx=trialIndexR.current+1;
      resetState();
      if(nextIdx<SAMPLE_QUESTIONS.length){
        setTrialIndex(nextIdx);trialIndexR.current=nextIdx;
        setSubject(SAMPLE_QUESTIONS[nextIdx].subject);
        setQuiz(shuffleAllSteps({...SAMPLE_QUESTIONS[nextIdx]}));
        nextLk.current=false;
        return;
      }
      // お試し終了 → スタート画面へ誘導
      setTrialMode(false);trialModeR.current=false;
      setTrialIndex(0);trialIndexR.current=0;
      setScreen("start");
      setWelcomeMsg("お試し終了！APIキーを入れてもっと学習しよう 🚀");
      setTimeout(()=>setWelcomeMsg(""),5000);
      nextLk.current=false;
      return;
    }
    // ④ 「説明できる（confidence===3）」と答えたのに不正解だった場合 → DAMの先頭に再挿入
    // handleNext が呼ばれた時点で confidenceRatingR は最新値（リトライ後も含む）を保持している
    const prevAns=prevAnswerR.current;
    if(prevAns&&!prevAns.correct&&confidenceRatingR.current===3&&prevAns.quiz){
      // 難易度は再挿入時点の自動難易度に紐付け
      const reDiff=getAutoDifficulty(prevAns.subject,logsR.current);
      addToDamFront(prevAns.subject,reDiff,[prevAns.quiz]);
    }
    // ⑥ 直前が「リトライなし不正解」→ 次は同 mistake_type を即出題（DAM 内に在庫があれば）
    // 無ければ通常の取り出し。生成は走らせない（API ゼロ）。
    const preferMT=(prevAns&&!prevAns.correct&&prevAns.quiz?.mistake_type)?prevAns.quiz.mistake_type:null;
    prevAnswerR.current=null;
    // ⑦ handleNext開始時点の学年をスナップショット固定（途中の学年変更を無視）
    const currentGrade=gradeR.current;
    // 待機モード突入フラグ: finally でロック解放タイミングを切り替えるため
    let enteredWaiting=false;
    // 次の問題へ進む前に復習IDをリセット（次のsetIsReview/setCurrentReviewItemIdで上書きされる）
    setCurrentReviewItemId(null);currentReviewItemIdR.current=null;
    setIsReview(false);isReviewR.current=false;
    resetState();
    try{
      const cur=logsR.current;
      const doneSessions=cur.dailyLog?.[today()]?.sessions||0;
      const normaActive=doneSessions<5;
      if(normaActive){
        // ノルマモード: キューから次の科目を取り出す
        const q=normaQueueR.current;
        let ns,reason;
        if(q.length){
          const[next,...rest]=q;
          setNormaQueue(rest);normaQueueR.current=rest;
          ns=next.subj;reason=next.reason;
          // ノルマキューの次が復習由来なら reviewItemId をセット
          // buildNormaQueue 時点で確定した id を使う → logsR.reviewQueue[0] を再参照しない
          if((reason==="復習タイム！"||reason==="思い込み復習！")&&next.reviewItemId){
            setCurrentReviewItemId(next.reviewItemId);currentReviewItemIdR.current=next.reviewItemId;
            setIsReview(true);isReviewR.current=true;
          }
        }else{
          // キュー切れ（不正解続き）: バランスで補填
          ns=pickSubject(cur);reason="バランス調整";
        }
        setNormaReason(reason);setSubject(ns);
        // 指定科目のストックを確認、0なら緊急生成（他科目へはズレない）
        {
          const subs=subjectsR.current;
          // ⑪ 連続3ミスで easy を強制挿入（詰み感の防止）
          const _ws=(gsR.current&&gsR.current.wrongStreak)||0;
          const diff=_ws>=3?"easy":getAutoDifficulty(ns,logsR.current);
          // ⑥ 直前がミスなら同 mistake_type を優先（同科目に限る）
          const _pmt=preferMT&&prevAns&&prevAns.subject===ns?preferMT:null;
          const fromDam=popFromDam(ns,diff,1,_pmt);setDamStats(getDamStats(subs));
          if(fromDam.length){setQuiz(fromDam[0]);return;}
          // ストックなし → 緊急生成（3問）
          {
            const generated=await generateEmergency(ns,currentGrade);
            if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
            else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(ns);}
            return;
          }
        }
      }
      // フリーモード
      setNormaReason("");
      // SM-2: 期日到来かつ優先度順（思い込みアラート優先）の復習アイテムだけ拾う
      const dueItem=firstDueReview(cur.reviewQueue);
      if(dueItem){
        const reviewDiff=getAutoDifficulty(dueItem.subject,logsR.current);
        const fromDamReview=popFromDam(dueItem.subject,reviewDiff,1);
        if(fromDamReview.length){
          // 解消済みは分析完了後にIDで削除するため、ここでは削除しない
          setCurrentReviewItemId(dueItem.id);currentReviewItemIdR.current=dueItem.id;
          setSubject(dueItem.subject);setIsReview(true);isReviewR.current=true;setDamStats(getDamStats(subjectsR.current));

          setQuiz(fromDamReview[0]);return;
        }
        // 復習キューがあるのにストックが0 → 緊急生成（3問）
        setCurrentReviewItemId(dueItem.id);currentReviewItemIdR.current=dueItem.id;
        setSubject(dueItem.subject);setIsReview(true);isReviewR.current=true;
        {
          const generated=await generateEmergency(dueItem.subject,currentGrade);
          if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
          else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(dueItem.subject);}
        }
        return;
      }
      const cand=manualSubjectR.current?subjR.current:pickSubject(logsR.current);
      // フリーモードでも科目が変わったらヘッダーを更新する
      setSubject(cand);
      // ⑪ フリーモードでも 連続3ミス なら easy を強制
      const _ws2=(gsR.current&&gsR.current.wrongStreak)||0;
      const candDiff=_ws2>=3?"easy":getAutoDifficulty(cand,logsR.current);
      // ⑥ 同 mistake_type 優先（同科目に限る）
      const _pmt2=preferMT&&prevAns&&prevAns.subject===cand?preferMT:null;
      const fromDam=popFromDam(cand,candDiff,1,_pmt2);
      if(fromDam.length){
        setIsReview(false);setDamStats(getDamStats(subjectsR.current));
        setQuiz(fromDam[0]);return;
      }
      setIsReview(false);
      // ストック空 → 緊急生成（3問）。他科目へはズレない
      {
        const generated=await generateEmergency(cand,currentGrade);
        if(generated){setQuiz(generated);setDamStats(getDamStats(subjectsR.current));}
        else{enteredWaiting=true;pollingCancelRef.current++;setWaitingForStock(cand);}
      }
    }finally{
      // 待機モード突入時は polling にすぐ制御を渡すため即解放。
      // quiz取得成功時は連打防止のため 150ms 維持。
      if(enteredWaiting){nextLk.current=false;}
      else{setTimeout(()=>{nextLk.current=false;},150);}
    }
  };

  const saveSettings=()=>{

  const importData=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.app!=="まちがいラボ")throw new Error("invalid app");
        if(!d.logs||typeof d.logs!=="object")throw new Error("invalid logs");
        const restored=normalizeSubjectsInLogs({...initLogs(),...d.logs});
        if(!restored.debugStats)restored.debugStats={completed:0,perfect:0};
        if(!restored.topicMastery)restored.topicMastery={};
        if(!restored.debugHistory)restored.debugHistory=[];
        if(!restored.bestLoginStreak)restored.bestLoginStreak=0;
        if(!restored.bestDayScore)restored.bestDayScore=0;
        // 古いエクスポートに >20 件の reviewQueue が混じっていた場合のキャップ
        // （push 経路の length<20 ガードが効かないため、インポート時に明示的に切る）
        // ※ slice(-20) で末尾20件（＝より新しいアイテム）を残すのはバグではない。
        //   reviewQueue は push で末尾追加されるため、末尾ほど新しい。
        //   SM-2 の期日順ソートは sortReviewQueue が担うため、
        //   ここでの順序保持は問題ない。
        if(Array.isArray(restored.reviewQueue)&&restored.reviewQueue.length>20)restored.reviewQueue=restored.reviewQueue.slice(-20);
        setLogs(restored);saveLogs(restored);
        if(d.dam&&typeof d.dam==="object"){
          const current=getDam();
          const importSubjects=d.birthday?calcSubjects(calcGrade(d.birthday)):subjectsR.current;
          // v4 構造: {科目:{easy:[],standard:[],hard:[]}} / 旧 v3 構造: {科目:[...]} の両対応
          const allKeys=new Set([...importSubjects,"数学"]);
          for(const subj of allKeys){
            const targetSubj=(subj==="数学"&&!importSubjects.includes("数学"))?"算数":subj;
            const src=d.dam[subj];
            if(!src)continue;
            if(!current[targetSubj])current[targetSubj]={easy:[],standard:[],hard:[]};
            // 旧形式（配列）→ standard へマージ
            if(Array.isArray(src)){
              const existing=current[targetSubj].standard||[];
              const ex=new Set(existing.map(dupKey));
              const incoming=src.filter(q=>!ex.has(dupKey(q)));
              current[targetSubj].standard=[...existing,...incoming].slice(-DAM_MAX);
              continue;
            }
            // v4 形式（難易度別）
            for(const diff of DIFFS){
              const arr=src[diff];
              if(!Array.isArray(arr)||!arr.length)continue;
              const existing=current[targetSubj][diff]||[];
              const ex=new Set(existing.map(dupKey));
              const incoming=arr.filter(q=>!ex.has(dupKey(q)));
              current[targetSubj][diff]=[...existing,...incoming].slice(-DAM_MAX);
            }
          }
          saveDam(current);
          // 旧バージョンで生成された構造不備の問題はインポート時にも一掃
          try{cleanDam();}catch(_){}
          setDamStats(getDamStats(subjectsR.current));
        }
        if(d.birthday){
          setBirthday(d.birthday);
          const g=calcGrade(d.birthday);setGrade(g);
          try{_safeLS.set(PROF(),JSON.stringify({birthday:d.birthday,apiKeys}));}catch(ex){}
        }
        setImportMsg(`✓ インポート完了！ ${d.grade||"不明"} ／ ${d.exportedAt||"日時不明"}`);
        setTimeout(()=>setImportMsg(""),5000);
      }catch(err){
        setImportMsg("❌ ファイルを読み込めませんでした");
        setTimeout(()=>setImportMsg(""),3000);
      }
      e.target.value="";
    };
    reader.readAsText(file);
  };

  // ── 派生値 ────────────────────────────────
  const recent100=calcRecent100(logs.recentHistory);
  const subjRateMap=calcSubjRates(logs.recentHistory);
  const subjectRates=subjects.map(s=>{const r=subjRateMap[s];return r&&r.q>0?{s,rate:Math.round(r.c/r.q*100),q:r.q}:{s,rate:null,q:0};});
  // ④ 昨日との比較メッセージ
  const yesterdayKey=jstYesterday();
  const todayQ=logs.dailyLog?.[today()]?.q||0;
  const yesterdayQ=logs.dailyLog?.[yesterdayKey]?.q||0;
  const compareMsg=(todayQ>0&&yesterdayQ>0)?(todayQ>yesterdayQ?`昨日より${todayQ-yesterdayQ}問多いよ！🎉`:todayQ===yesterdayQ?`昨日と同じペース！`:null):null;
  const rateColor=recent100?(recent100.rate>=80?"#22c55e":recent100.rate>=60?"#f59e0b":"#ef4444"):"#9990cc";
  const rateBg=recent100?(recent100.rate>=80?"#f0fdf4":recent100.rate>=60?"#fffbeb":"#fff7f7"):"#f8f7ff";
  const rateBorder=recent100?(recent100.rate>=80?"#86efac":recent100.rate>=60?"#fde68a":"#fca5a5"):"#e8e3ff";
  const damTotal=getDamTotal(subjects);

  const todaySessions=logs.dailyLog?.[today()]?.sessions||0;
  const dailyGoalMet=todaySessions>=5;
  const reviewCount=logs.reviewQueue?.length||0;
  // 当日スコア = logs から直接計算（gs.todayScore はユーザー切替・リロード時にズレるため使わない）
  const todayScore = calcTodayScore(logs).score;

  const cal28=Array.from({length:28},(_,i)=>{
    // JST基準で日付キーを生成（端末タイムゾーンに依存しない）
    const key=jstDaysAgo(27-i);
    const base=new Date(key+"T00:00:00");
    const dayOfMonth=base.getDate();
    const l=logs.dailyLog?.[key];
    return{key,d:dayOfMonth,dow:base.getDay(),q:l?.q||0,rate:l?.q>0?Math.round(l.c/l.q*100):null};
  });

  const masteryList=Object.entries(logs.topicMastery||{})
    .map(([topic,v])=>({topic,...v}))
    .filter(t=>!topicFilterSubj||t.subj===topicFilterSubj)
    .sort((a,b)=>{
      // 状態順: mastered → learning → fresh、その中で attempts 多い順
      const stateOf=t=>{const r=t.attempts>0?t.correct/t.attempts:0;return t.mastered?2:r>=0.5?1:0;};
      const sa=stateOf(a),sb=stateOf(b);
      if(sa!==sb)return sb-sa;
      return b.attempts-a.attempts;
    })
    .slice(0,24);

  // ─ プライム表示用: 直近の不正解ミス型（1問前の型を「今回も意識！」とリマインド）
  const primeMistakeType=useMemo(()=>lastMistakeFromHistory(logs.recentHistory),[logs.recentHistory]);
  // ─ 思い込みアラート: 現在の復習アイテムが priority=true か
  const isPriorityReview=useMemo(()=>{
    if(!currentReviewItemId)return false;
    const item=(logs.reviewQueue||[]).find(q=>q.id===currentReviewItemId);
    return !!item?.priority;
  },[currentReviewItemId,logs.reviewQueue]);
  // ─ 週次ミスパターンサマリー（記録タブ用）
  const weeklySummary=useMemo(()=>calcWeeklyMistakeSummary(logs.recentHistory),[logs.recentHistory]);

  // 🎯 今週の重点単元: attempts≥3 かつ未習熟の中で「試行数が多いのに正解率が低い」ものを最優先
  const weakestTopic=(()=>{
    const candidates=Object.entries(logs.topicMastery||{})
      .filter(([,v])=>!v.mastered&&v.attempts>=3);
    if(!candidates.length)return null;
    // スコア = 試行数 × (1 - 正解率) → 試行が多くて正解率が低いほど高スコア
    candidates.sort((a,b)=>{
      const scoreA=a[1].attempts*(1-a[1].correct/a[1].attempts);
      const scoreB=b[1].attempts*(1-b[1].correct/b[1].attempts);
      return scoreB-scoreA;
    });
    return candidates[0];
  })();

  // ─── RENDER ──────────────────────────────────────────────────
  return(
    html`<${Fragment}>
      <style>${css}</style>
      <div class="root">

        <${BonusPopStack} items=${bonusPops}/>

        
        ${screen==="start"&&(
          html`<div style=${{maxWidth:460,margin:"30px auto"}}>

              <div class="hero-title">

              ${startError&&html`<div class="err">😅 ${startError}</div>`}

              
              <label style=${{fontSize:13,color:"var(--text-soft)",display:"block",textAlign:"left",marginBottom:6,fontWeight:800}}>🔑 Gemini APIキー</label>
              ${apiKeys.map((k,i)=>(
                html`<div key=${i} class="kv-row">
                  <input type="password" value=${k} onChange=${e=>{const nk=[...apiKeys];nk[i]=e.target.value;setApiKeys(nk);}} placeholder=${`APIキー ${i+1}（任意）`}/>
                  ${apiKeys.length>1&&(
                    html`<button class="kv-icon-btn del" title="この行を削除" onClick=${()=>{const nk=apiKeys.filter((_,j)=>j!==i);setApiKeys(nk.length?nk:[""]);}}>✕</button>`

                </div>`
              ))}
              <div class="kv-add-row">
                <button class="kv-icon-btn add" disabled=${apiKeys.length>=4}
                  onClick=${()=>setApiKeys([...apiKeys,""])}>＋ 1つ追加</button>
                <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style=${{marginLeft:10,fontSize:11,fontWeight:700,color:"#5b3ff8",textDecoration:"none"}}>無料で取得できます →</a>
              </div>

              
              <label style=${{fontSize:13,color:"var(--text-soft)",display:"block",textAlign:"left",marginBottom:6,marginTop:8,fontWeight:800}}>👥 ユーザー名（最大4人）</label>
              <div style=${{padding:"10px 12px",background:"var(--input-bg)",border:"1px solid var(--input-border)",borderRadius:14,marginBottom:10}}>
                <div class="user-switch-wrap">
                  ${users.map(u=>(
                    html`<button key=${u.id} class=${`user-chip${u.id===currentUid?" on":""}`}
                      onClick=${()=>{

                        pollingCancelRef.current++;
                        setWaitingForStock(null);setQuiz(null);setQuizPhase(null);
                        switchUser(u.id);setCurrentUid(u.id);
                        setTimeout(()=>{reloadProfile();reloadUserScopedSettings();try{cleanDam();}catch(_){}loadLogs();setDamStats(getDamStats(subjectsR.current));setGs(_initGsDefaults());welcomeShownRef.current=false;},0);
                      }}>
                      <span class="uc-icon">${u.icon||"😀"}</span>${u.name}
                    </button>`
                  ))}
                  <button class="user-chip-add" disabled=${users.length>=4}
                    onClick=${()=>setShowUserEdit({mode:"add"})}>＋ 追加</button>
                </div>
                <div style=${{fontSize:10,color:"var(--text-muted)",marginTop:4,lineHeight:1.5}}>各ユーザーで学習データ・ストック・スコアが独立して保存されます。</div>

                    </div>
                    <div style=${{marginTop:10,background:"#f8f7ff",border:"1px solid #e8e3ff",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#7c6fb0",fontWeight:700,lineHeight:1.6}}>
                      80%以上で上がる / 40%未満で下がる。各科目に3段階のストックを用意し、自動で切り替えます。
                    </div>
                  </div>
                </div>

                <div class="card">
                  <div class="section-title">${isLowGrade(grade)?"データの ほぞん／よみこみ":"エクスポート / インポート"}</div>

                  </label>
                  ${importMsg&&(
                    html`<div style=${{fontSize:12,fontWeight:700,borderRadius:10,padding:"8px 12px",marginBottom:4,
                      color:importMsg.startsWith("✓")?"#166534":"#991b1b",
                      background:importMsg.startsWith("✓")?"#dcfce7":"#fee2e2"}}>

                  )}

                </div>

                <div class="card">
                  <div class="section-title">${isLowGrade(grade)?"データの かんり":"データ管理"}</div>
                  <div class="danger-zone">
                    <div style=${{fontSize:12,fontWeight:800,color:"#991b1b",marginBottom:10}}>⚠️ 削除操作は取り消せません</div>
                    <button class="danger-btn" onClick=${clearLogs}>
                      📊 学習記録・バッジをリセット
                    </button>
                    <button class="danger-btn" onClick=${clearStock}>
                      📦 ストック問題をすべて削除
                    </button>
                    <button class="danger-btn secondary" onClick=${clearAllData}>
                      🗑️ すべてのデータを削除
                    </button>
                  </div>
                </div>

                <div class="card">
                  <div class="section-title">${isLowGrade(grade)?"アプリの じょうほう":"アプリについて"}</div>
                  <div style=${{fontSize:13,color:"var(--text-soft)",lineHeight:1.8}}>
                    <div>📚 まちがいラボ v23 — Conviction Edition</div>
                    <div>🎯 4択問題 × ミス削減エンジン × 思考プロセス強制言語化</div>
                    <div>🌱 やさしい / 📝 ふつう / 🔥 むずかしい の自動難易度</div>
                    <div>👥 マルチユーザー（最大4人） · 各データ独立保存</div>
                    <div>📱 PWA対応 · ホーム画面追加可能</div>
                    <div>🛡 Safari ITP対策 · IndexedDBミラー</div>
                    <div>⚡ Gemini 3.1 Flash → 3.1 Flash-Lite → 2.5 Flash 自動フォールバック</div>
                  </div>
                  <div style=${{marginTop:14,paddingTop:12,borderTop:"1px solid var(--input-border)",fontSize:11,color:"var(--text-soft)",lineHeight:1.7}}>
                    <div style=${{fontWeight:800,marginBottom:6,color:"#7a6fa8"}}>ご利用にあたって</div>
                    <div>・本アプリは Google が提供する Gemini API を利用しています。Google 側の仕様変更・料金体系の改定・サービス提供条件の変更により、将来にわたって同じ動作・無料での利用継続を保証することはできません。</div>
                    <div style=${{marginTop:4}}>・AI が自動生成する問題・解説には誤りが含まれる場合があります。最終的な学習内容の正誤判断は、教科書や指導者にご確認ください。</div>
                    <div style=${{marginTop:4}}>・学習データは端末（ブラウザ）にのみ保存されます。機種変更・ブラウザのデータ削除等で消失する可能性があるため、定期的なエクスポートを推奨します。</div>
                    <div style=${{marginTop:4}}>・本アプリの利用によって生じたいかなる損害についても、開発者は責任を負いかねます。自己責任にてご利用ください。</div>
                  </div>
                </div>
              <//>`
            )}

          </div>`
        )}
      </div>

      ${showLoginBonus&&(
        html`<div role="status" aria-live="polite" style=${{position:"fixed",top:"var(--toast-top)",left:0,right:0,zIndex:1000,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
          <div style=${{background:"linear-gradient(135deg,#ff6b35,#f7931e)",color:"#fff",borderRadius:20,padding:"14px 24px",boxShadow:"0 8px 32px rgba(255,107,53,.4)",textAlign:"center",maxWidth:"calc(100vw - 32px)",boxSizing:"border-box",pointerEvents:"auto",animation:"bounce .5s cubic-bezier(.34,1.56,.64,1) both"}}>
            <div style=${{fontSize:28,marginBottom:4}}>${"🔥".repeat(getFireLevel(logs.loginStreak))}</div>
            <div style=${{fontSize:15,fontWeight:900}}>${logs.loginStreak}日連続！すごい！</div>
            ${logs.loginStreak===logs.bestLoginStreak&&html`<div style=${{fontSize:11,marginTop:4,opacity:.9}}>🏆 自己最高記録更新！</div>`}

      )}

      ${showNormaBanner&&(
        html`<div role="status" aria-live="polite" style=${{position:"fixed",top:"var(--toast-top)",left:0,right:0,zIndex:1001,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
          <div style=${{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",borderRadius:20,padding:"14px 24px",boxShadow:"0 8px 32px rgba(34,197,94,.4)",textAlign:"center",maxWidth:"calc(100vw - 32px)",boxSizing:"border-box",pointerEvents:"auto",animation:"bounce .5s cubic-bezier(.34,1.56,.64,1) both"}}>
            <div style=${{fontSize:28,marginBottom:4}}>🎉</div>
            <div style=${{fontSize:15,fontWeight:900}}>ノルマ達成！頑張りました！</div>

          </div>
        </div>`
      )}

      ${newBadges.length>0&&(
        html`<div role="status" aria-live="polite" style=${{position:"fixed",top:"var(--toast-top)",left:"50%",transform:"translateX(-50%)",zIndex:999,background:"#5b3ff8",color:"#fff",borderRadius:16,padding:"12px 20px",fontWeight:800,fontSize:14,boxShadow:"0 4px 20px rgba(91,63,248,.4)",textAlign:"center",maxWidth:"calc(100vw - 32px)",boxSizing:"border-box"}}>
          🏆 新実績: ${newBadges.map(b=>b.icon+b.label).join(" · ")}
        </div>`
      )}

      ${welcomeMsg&&!showLoginBonus&&html`<div role="status" aria-live="polite" class=${`toast-base toast-safe${newBadges.length>0?" toast-shift":""}`} style=${{background:"linear-gradient(135deg,#5b3ff8,#9b59f8)",color:"#fff"}}>${welcomeMsg}</div>`}

      ${subjectImprovedMsg&&html`<div role="status" aria-live="polite" class=${`toast-base toast-safe${newBadges.length>0?" toast-shift":""}`} style=${{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff"}}>${subjectImprovedMsg}</div>`}
      ${revivalBurst&&html`<${RevivalBurst}
        show=${!!revivalBurst}
        big=${revivalBurst.big}
        sub=${revivalBurst.sub}
        phrase=${revivalBurst.phrase}
        onDone=${()=>setRevivalBurst(null)}
      />`}

      ${streakBrokenMsg&&html`<div role="status" aria-live="polite" class="toast-base toast-safe" style=${{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#fff"}}>${streakBrokenMsg}</div>`}

      ${showRestartMsg&&html`<div role="status" aria-live="polite" class="toast-base toast-safe" style=${{background:"#f0fdf4",border:"2px solid #86efac",color:"#166534"}}>久しぶり！また一緒に頑張ろう 🌱</div>`}

      ${/* [BUG FIX] subjectSlideMsg トーストを削除: setSubjectSlideMsg が呼ばれないデッドコードだった */ ""}

      ${reportMsg&&html`<div role="status" aria-live="polite" class="toast-base toast-safe" style=${{background:"#1e1e3a",color:"#fff"}}>${reportMsg}</div>`}

      ${showCorrectBurst&&html`<${Fragment}><div class="correct-burst"/><div class="correct-burst-2"/><//>`}

      ${rankInToast&&(
        html`<div class="rankin-toast">
          <span class="rankin-big"><span class="rankin-spark">✨</span> ${rankInToast.label} ${isLowGrade(grade)?"TOP5に はいった！":"TOP5入り！"}</span>
          <span style=${{fontSize:11,fontWeight:700,opacity:.8}}>${isLowGrade(grade)?`${rankInToast.rank}いに ランクイン`:`第${rankInToast.rank}位にランクイン`}</span>
        </div>`
      )}

      ${showUserEdit&&(
        html`<${UserEditModal}
          users=${users}
          mode=${showUserEdit.mode}
          initialUser=${showUserEdit.user}
          iconChoices=${ICON_CHOICES}
          onSubmit=${commitUser}
          onDelete=${removeUser}
          onCancel=${()=>setShowUserEdit(false)}
        />`
      )}

    <//>`
  );
}

render(html`<${App}/>`, document.getElementById('root'));
// ════════════════════════════════════════════════════════
//  PWA: Service Worker 登録
//  - https:// か localhost のみ登録（file:// は不可）
//  - 新バージョン待機中なら SKIP_WAITING を送って即適用
// ════════════════════════════════════════════════════════
if ('serviceWorker' in navigator &&
    (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            newSW.postMessage('SKIP_WAITING');
          }
        });
      });
    })
    .catch(err => console.warn('[まちがいラボ] SW registration failed:', err));
}
</script>
