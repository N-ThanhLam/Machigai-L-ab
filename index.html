const { useState, useEffect, useCallback, useRef } = React;

const SUBJECTS = ["国語", "算数", "英語", "社会", "理科"];

// ─── SYSTEM PROMPT ────────────────────────────────────────────────
const SYSTEM_PROMPT = `【対象】指定された学年・科目・単元に準拠（学習指導要領ベース）
・現在の学習月に合わせること。その月時点で未習の内容は出さない。

【問題ルール】
・テキストだけで解ける問題にする（図・地図・表への言及は不可）
・未習漢字はひらがなで書く。問題文は200文字以内
・1問で確認することは1つだけ
・英語問題でも指示文は日本語
・国語では文法の分類を目的にした不自然な問いにしない
・教師が授業で自然に出す問題にする
・問題文を読めば何を答えるか分かるようにする
・正解まで必要以上に遠回りさせない

【誤答の生成】
・その学年の子がよくやる思考のズレ・混同を1つ選び、student_answer に入れる
・正解を correct_answer に必ず入れる

【分析設問（analysis_step1〜3）共通】4択・正解1つ・各選択肢100文字以内。学年の授業で習う言葉だけを使う。未習漢字はひらがなにする。1ステップ1確認。正解が1つに絞れない問いは作らない。不正解肢＝その学年で自然にありえる誤解。ただし正解と区別できる内容にする。feedbackは否定せず寄り添う表現。
step1 何を答える問題か：正解＝正しい問題意図、不正解＝よくある読み違い
step2 どこで間違えたか：mistake_typeと必ず対応させること
step3 正しく考えよう：何を教えてあげたら正解になるか
正解＝答えに近づく考え方。不正解＝よくある別の思い込み

【出力形式】要素数1のJSON配列のみ（説明・コードブロック・前置き禁止）

・analysis_step1〜3 の choices は必ず4個
・answer は 0〜3 の整数
・answer は choices の正解位置と一致させる
・文字列や説明をJSONの外に書かないこと
・必ず有効なJSONとして出力すること

[{
"mistake_type":"読み違い／計算ミス／条件見落とし／用語混同　から1つ",
"topic_tag":"単元名",
"subject":"科目名",
"question":"問題文（200文字以内）",
"student_answer":"生徒の誤答",
"correct_answer":"正解",
"correct_feedback":"なぜ正しいかを1文で",
"analysis_step1":{"name":"何を答える問題？","question":"設問文","choices":["選択肢0","選択肢1","選択肢2","選択肢3"],"answer":0,"feedback":"解説1文"},
"analysis_step2":{"name":"どこで間違えた？","question":"設問文","choices":["選択肢0","選択肢1","選択肢2","選択肢3"],"answer":0,"feedback":"解説1文"},
"analysis_step3":{"name":"何を教えてあげるといいか？","question":"設問文","choices":["選択肢0","選択肢1","選択肢2","選択肢3"],"answer":0,"feedback":"解説1文"}
}]
※ answer は choices 配列の正解インデックス（0始まり）。例：choices[2]が正解なら "answer":2`;

// ─── DAM ─────────────────────────────────────────────────────────
const DAM_KEY="manabi_dam_v3";
const DAM_MAX=60;
const DAM_BATCH=5;
const getDam=()=>{try{return JSON.parse(localStorage.getItem(DAM_KEY)||"{}");}catch(e){return{};}};
const saveDam=d=>{try{localStorage.setItem(DAM_KEY,JSON.stringify(d));}catch(e){}};
const addToDam=(subj,qs)=>{const dam=getDam(),ex=dam[subj]||[];const keys=new Set(ex.map(q=>(q.question||"").slice(0,30)));dam[subj]=[...ex,...qs.filter(q=>!keys.has((q.question||"").slice(0,30)))].slice(-DAM_MAX);saveDam(dam);};
const popFromDam=(subj,n=1)=>{const dam=getDam(),b=dam[subj]||[];const take=Math.min(n,b.length);if(!take)return[];const r=b.slice(0,take);dam[subj]=b.slice(take);saveDam(dam);return r;};
const getDamStats=()=>SUBJECTS.reduce((a,s)=>({...a,[s]:(getDam()[s]||[]).length}),{});
const getDamTotal=()=>SUBJECTS.reduce((t,s)=>t+(getDam()[s]||[]).length,0);
const lowestBucket=()=>{const dam=getDam();let min=Infinity,cands=[];for(const s of SUBJECTS){const n=(dam[s]||[]).length;if(n<min){min=n;cands=[{subj:s,cnt:n}];}else if(n===min)cands.push({subj:s,cnt:n});}return cands.length?cands[Math.floor(Math.random()*cands.length)]:null;};

// ─── UTILS ───────────────────────────────────────────────────────
const calcGrade=birth=>{if(!birth)return"一般";const b=new Date(birth),now=new Date();let sy=now.getFullYear();if(now.getMonth()<3)sy--;let ent=b.getFullYear()+7;if(b.getMonth()<3)ent--;const y=sy-ent+1;if(y>=1&&y<=6)return`小学${y}年生`;if(y>=7&&y<=9)return`中学${y-6}年生`;if(y>=10&&y<=12)return`高校${y-9}年生`;return"一般";};
const today=()=>new Date().toISOString().slice(0,10);
let _ki=0;
const pickKey=keys=>{const k=keys[_ki%keys.length];_ki++;return k;};

// ─── STEP SHUFFLE ─────────────────────────────────────────────────
const shuffleStep=step=>{
  const ix=step.choices.map((c,i)=>({c,i}));
  for(let i=ix.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]];}
  return{...step,choices:ix.map(x=>x.c),answer:ix.findIndex(x=>x.i===step.answer)};
};
const shuffleAllSteps=q=>({
  ...q,
  analysis_step1:shuffleStep(q.analysis_step1),
  analysis_step2:shuffleStep(q.analysis_step2),
  analysis_step3:shuffleStep(q.analysis_step3),
});

const hasValidAnalysis=q=>{
  if(
    !q ||
    !q.student_answer ||
    !q.correct_answer ||
    !q.question
  ) return false;

  return [1,2,3].every(i=>{
    const s=q[`analysis_step${i}`];

    return (
      s &&
      s.question &&
      Array.isArray(s.choices) &&
      s.choices.length===4 &&
      Number.isInteger(s.answer) &&
      s.answer>=0 &&
      s.answer<=3
    );
  });
};

const calcRecent100=h=>{if(!h||!h.length)return null;const last=h.slice(-100),c=last.filter(r=>r.correct).length;return{rate:Math.round(c/last.length*100),count:last.length};};
const calcSubjRates=h=>{if(!h||!h.length)return{};const m={};for(const r of h.slice(-100)){if(!m[r.subject])m[r.subject]={q:0,c:0};m[r.subject].q++;if(r.correct)m[r.subject].c++;}return m;};

// ─── BADGES ──────────────────────────────────────────────────────
const BADGES=[
  // ─ かんたん ─

  {id:"allsubject", icon:"🌈",label:"全科目制覇",        desc:"5科目すべてを経験",                      cond:s=>Object.keys(s.subjectStats||{}).length>=5},
  {id:"check10",    icon:"🔎",label:"成長の証",          desc:"25問を解いた",                           cond:s=>s.totalQ>=25},
  {id:"streak7",    icon:"⚡",label:"7連続！！",          desc:"7問連続正解",                            cond:s=>s.bestStreak>=7},
  {id:"q50",        icon:"🏆",label:"50問の壁",           desc:"合計50問を解いた",                       cond:s=>s.totalQ>=50},
  // ─ むずかしい ─
  {id:"mastery3",   icon:"🗺️",label:"単元マスター",     desc:"3単元を習熟した",                        cond:s=>Object.values(s.topicMastery||{}).filter(t=>t.mastered).length>=3},
  {id:"debug10",    icon:"⚖️",label:"バランス学習者",    desc:"全科目で正解率50%以上を達成",            cond:s=>{const r=calcSubjRates(s.recentHistory);return SUBJECTS.every(sub=>r[sub]&&r[sub].q>=3&&r[sub].c/r[sub].q>=0.5);}},

  // ─ とてもむずかしい ─
  {id:"debugMaster",icon:"🏅",label:"名コーチ",          desc:"完璧な分析（3問全正解）を10回達成",       cond:s=>(s.debugStats?.perfect||0)>=10},
  {id:"debug50",    icon:"🎓",label:"科目マスター",      desc:"同じ科目で50問以上挑戦した",             cond:s=>{const r=calcSubjRates(s.recentHistory);return Object.values(r).some(v=>v.q>=50);}},
  {id:"genius",     icon:"👑",label:"努力の天才",        desc:"累計300問を達成",                        cond:s=>s.totalQ>=300},
  {id:"runner",     icon:"⏳",label:"不屈のランナー",   desc:"累計365日学習した",                       cond:s=>Object.keys(s.dailyLog||{}).length>=365},
  {id:"legend",   icon:"💎",label:"レジェンド",  desc:"直近100問で正解率100%以上",          cond:s=>{const r=calcRecent100(s.recentHistory);return r&&r.count>=100&&r.rate>=100;}},
];

.an-fb{background:#f0edff;border-radius:10px;padding:12px 14px;margin:8px 0;font-size:13px;color:#4c1d95;border-left:3px solid #7c3aed;line-height:1.7;font-weight:600}
.an-next{background:linear-gradient(135deg,#5b3ff8,#9b59f8);color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-top:6px;transition:all .18s}
.an-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,63,248,.3)}
.an-complete{text-align:center;padding:20px 16px}

.an-stat-n{font-size:17px;font-weight:900;color:#5b3ff8}
.an-stat-l{font-size:10px;color:#7c6fb0;margin-top:2px}

.anhist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0edff;font-size:12px}
.anhist-subj{font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px;background:#ede9ff;color:#5b3ff8}
.anhist-score{display:flex;gap:3px}
.anhist-dot{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px}
.anhist-dot.ok{background:#dcfce7;color:#166534}
.anhist-dot.ng{background:#fee2e2;color:#991b1b}
`;

// ─── initLogs ────────────────────────────────────────────────────
const initLogs=()=>({
  subjectStats:{},dailyLog:{},totalQ:0,totalCorrect:0,
  bestStreak:0,loginStreak:0,bestLoginStreak:0,lastLogin:"",
  earnedBadges:[],reviewQueue:[],recentHistory:[],
  debugStats:{completed:0,perfect:0},
  checkStats:{total:0,correct:0},
  topicMastery:{},
  debugHistory:[],
});

// ─── MAIN ────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("start");
  const [tab,setTab]=useState("learn");
  const [apiKeys,setApiKeys]=useState(["","","",""]);
  const [birthday,setBirthday]=useState("");
  const [grade,setGrade]=useState("");
  const [subject,setSubject]=useState("");
  const [gs,setGs]=useState({streak:0,best:0,wrong:0,qNum:1,used:[]});
  const [quiz,setQuiz]=useState(null);
  const [loading,setLoading]=useState(false);
  const [isCooldown,setIsCooldown]=useState(false);
  const [startError,setStartError]=useState("");
  const [appError,setAppError]=useState("");
  const [showSubjSel,setShowSubjSel]=useState(false);
  const [damStats,setDamStats]=useState(getDamStats);
  const [isRefilling,setIsRefilling]=useState(false);
  const [logs,setLogs]=useState(initLogs);
  const [isReview,setIsReview]=useState(false);
  const [newBadges,setNewBadges]=useState([]);
  const [settingsSaved,setSettingsSaved]=useState(false);
  const [showLoginBonus,setShowLoginBonus]=useState(false);
  const [autoRefill,setAutoRefill]=useState(()=>{try{return JSON.parse(localStorage.getItem("manabi_autorefill")??'true');}catch(e){return true;}});
  const autoRefillR=useRef(autoRefill);
  useEffect(()=>{autoRefillR.current=autoRefill;try{localStorage.setItem("manabi_autorefill",JSON.stringify(autoRefill));}catch(e){};},[autoRefill]);

  // ── 誤答分析ステート（フラット） ──
  const [analysisStep,setAnalysisStep]=useState(null); // null | 1 | 2 | 3 | "done"
  const [stepAns,setStepAns]=useState(null);
  const [stepResults,setStepResults]=useState([null,null,null]);

  const STORE="manabi_logs_v4";const PROF="manabi_profile_v2";const SESS="manabi_session_v2";

  const logsR=useRef(logs);const gsR=useRef(gs);const subjR=useRef(subject);
  const keysR=useRef(apiKeys);const gradeR=useRef(grade);const bdR=useRef(birthday);
  const refillLk=useRef(false);const fetchLk=useRef(false);const nextLk=useRef(false);const reqId=useRef(null);

  useEffect(()=>{logsR.current=logs;},[logs]);
  useEffect(()=>{gsR.current=gs;},[gs]);
  useEffect(()=>{subjR.current=subject;},[subject]);
  useEffect(()=>{keysR.current=apiKeys;},[apiKeys]);
  useEffect(()=>{gradeR.current=grade;},[grade]);
  useEffect(()=>{bdR.current=birthday;},[birthday]);
  useEffect(()=>{try{localStorage.setItem(SESS,JSON.stringify({...gs,savedDate:today()}));}catch(e){}},[gs]);

  // quiz がセットされたら分析を自動スタート
  useEffect(()=>{
    if(!quiz)return;
    if(hasValidAnalysis(quiz)){
      setAnalysisStep(1);
      setStepAns(null);
      setStepResults([null,null,null]);
    }
  },[quiz]);

  useEffect(()=>{
    try{
      const p=localStorage.getItem(PROF);
      if(p){const d=JSON.parse(p);setBirthday(d.birthday||"");if(d.apiKeys&&Array.isArray(d.apiKeys))setApiKeys(d.apiKeys);else if(d.apiKey)setApiKeys([d.apiKey,"","",""]);}
      const s=localStorage.getItem(SESS);
      if(s){const p2=JSON.parse(s);if(p2.savedDate===today())setGs(p2);else setGs(prev=>({...prev,streak:p2.streak||0,best:prev.best||0,wrong:0,qNum:1,used:[]}));}
    }catch(e){}
    loadLogs();setDamStats(getDamStats());
  },[]);

  const loadLogs=()=>{
    try{
      const r=localStorage.getItem(STORE);
      if(r){
        const p=JSON.parse(r);
        if(!p.debugStats)p.debugStats={completed:0,perfect:0};
        if(!p.checkStats)p.checkStats={total:0,correct:0};
        if(!p.topicMastery)p.topicMastery={};
        if(!p.debugHistory)p.debugHistory=[];
        if(!p.bestLoginStreak)p.bestLoginStreak=0;
        const td=today();
        if(p.loginStreak>=2&&p.lastLogin!==td){setShowLoginBonus(true);setTimeout(()=>setShowLoginBonus(false),3500);}
        setLogs(p);
      }
    }catch(e){}
  };
  const saveLogs=nl=>{try{localStorage.setItem(STORE,JSON.stringify(nl));}catch(e){}};

  const checkBadges=(next)=>{
    const earned=BADGES.filter(b=>!next.earnedBadges.includes(b.id)&&b.cond(next));
    if(earned.length){next.earnedBadges=[...next.earnedBadges,...earned.map(b=>b.id)];setNewBadges(earned);setTimeout(()=>setNewBadges([]),3500);}
  };

  const updateLogs=(correct,subj,wrongItem,newBest)=>{
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));const td=today();
      if(!next.subjectStats[subj])next.subjectStats[subj]={q:0,c:0};
      next.subjectStats[subj].q++;if(correct)next.subjectStats[subj].c++;
      if(!next.dailyLog[td])next.dailyLog[td]={q:0,c:0,subjects:[],sessions:0};
      next.dailyLog[td].q++;if(correct)next.dailyLog[td].c++;
      if(!next.dailyLog[td].sessions)next.dailyLog[td].sessions=0;
      next.dailyLog[td].sessions++;
      if(!next.dailyLog[td].subjects.includes(subj))next.dailyLog[td].subjects.push(subj);
      next.totalQ++;if(correct)next.totalCorrect++;
      if(newBest!==undefined)next.bestStreak=Math.max(next.bestStreak||0,newBest);
      if(!next.recentHistory)next.recentHistory=[];
      next.recentHistory.push({correct,subject:subj,date:td});
      if(next.recentHistory.length>200)next.recentHistory=next.recentHistory.slice(-200);
      if(!correct&&wrongItem){if(!next.reviewQueue)next.reviewQueue=[];if(next.reviewQueue.length<20)next.reviewQueue.push(wrongItem);}
      if(next.lastLogin!==td){const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().slice(0,10);next.loginStreak=(next.lastLogin===ys)?(next.loginStreak||0)+1:1;next.lastLogin=td;next.bestLoginStreak=Math.max(next.bestLoginStreak||0,next.loginStreak);}
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic){
        if(!next.topicMastery[topic])next.topicMastery[topic]={subj,attempts:0,correct:0,debugDone:0,mastered:false};
        const tm=next.topicMastery[topic];tm.attempts++;if(correct)tm.correct++;
        if(!tm.mastered&&tm.attempts>=5&&tm.correct/tm.attempts>=.8)tm.mastered=true;
      }
      checkBadges(next);saveLogs(next);return next;
    });
  };

  const updateAnalysisStats=(results,subj)=>{
    const perfect=results.every(Boolean);
    setLogs(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next.debugStats)next.debugStats={completed:0,perfect:0};
      next.debugStats.completed++;if(perfect)next.debugStats.perfect++;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic){next.reviewQueue=(next.reviewQueue||[]).filter(q=>q.topic!==topic);}
      if(topic&&next.topicMastery[topic]){
      next.topicMastery[topic].debugDone++;
    }
      if(!next.debugHistory)next.debugHistory=[];
      next.debugHistory.unshift({date:today(),subj,topic:topic||"—",results});
      if(next.debugHistory.length>20)next.debugHistory=next.debugHistory.slice(0,20);
      checkBadges(next);saveLogs(next);return next;
    });
  };

  const getFireLevel=n=>{if(n>=30)return 5;if(n>=14)return 4;if(n>=7)return 3;if(n>=3)return 2;if(n>=1)return 1;return 0;};
  const pickSubject=cur=>{
    const rates=calcSubjRates(cur.recentHistory);
    const ws=SUBJECTS.map(s=>{const r=rates[s];if(!r||r.q<3)return{s,w:3};const rt=r.c/r.q;return{s,w:rt<.5?4:rt<.7?2:1};});
    const tot=ws.reduce((a,b)=>a+b.w,0);let r=Math.random()*tot;
    for(const x of ws){r-=x.w;if(r<=0)return x.s;}return SUBJECTS[0];
  };

  const buildPrompt=(g,subj,s,review,reviewItem,cur)=>{
    const mon=new Date().getMonth()+1;
    const rates=calcSubjRates(cur.recentHistory);
    const weak=SUBJECTS.filter(sub=>{const r=rates[sub];return r&&r.q>=3&&r.c/r.q<.6;});
    const dam=getDam();
    const damTopics=[...new Set((dam[subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
    let p=`\n学年:${g}\n時期:${mon}月\n科目:${subj}\n日本公立学校の進度に合わせること。${mon}月時点で未習内容は禁止。\n`;
    p+=`【出題済み単元】以下の単元はストックに存在する。同じ単元でも問題文・題材・数値が異なれば出題可。完全に同じ問題は禁止:${damTopics}\n`;
    if(review&&reviewItem)p+=`【復習】科目「${subj}」で過去に間違えたテーマ:${reviewItem.topic}の類似問題を1問。`;
    else p+=`科目「${subj}」から1問。`;
    return p;
  };

  const resetState=()=>{
    setQuiz(null);
    setAnalysisStep(null);setStepAns(null);setStepResults([null,null,null]);
  };

  // バックグラウンド補充
  useEffect(()=>{
    if(screen!=="app")return;
    let cancelled=false;
    const doRefill=async()=>{
      if(cancelled||refillLk.current)return false;
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)return false;
      const target=lowestBucket();if(!target||(!autoRefillR.current&&target.cnt>=DAM_MAX))return true;
      refillLk.current=true;setIsRefilling(true);
      try{
        const g=gradeR.current||calcGrade(bdR.current);
        const damTopics=[...new Set((getDam()[target.subj]||[]).map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
        const body={systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:`【科目固定】「${target.subj}」の誤答付き問題を${DAM_BATCH}問。\n学年:${g}\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`}]}],generationConfig:{responseMimeType:"application/json",temperature:.25,topP:.9,topK:20}};
        const key=pickKey(keys);
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        if(!res.ok)return false;
        const data=await res.json();if(data.error)return false;
        const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text)return false;
        let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){return false;}
        if(!Array.isArray(parsed))parsed=[parsed];
        const valid=parsed.filter(q=>q.question&&q.student_answer&&q.correct_answer&&q.subject===target.subj&&hasValidAnalysis(q));
        if(valid.length){addToDam(target.subj,valid.map(q=>
  shuffleAllSteps({
    ...q,
    mistake_type:q.mistake_type||"不明",
    _subject:target.subj
  })
      ));if(!cancelled)setDamStats(getDamStats());return true;}
      }catch(e){}finally{refillLk.current=false;if(!cancelled)setIsRefilling(false);}
      return false;
    };
    const loop=async delay=>{await new Promise(r=>setTimeout(r,delay));if(cancelled)return;const ok=await doRefill();if(!cancelled)loop(ok?120000:90000);};
    loop(15000);
    return()=>{cancelled=true;};
  },[screen]);

  const fetchQ=useCallback(async(s,g,subj,review,reviewItem)=>{
    if(fetchLk.current)return;fetchLk.current=true;
    const rid=Date.now()+Math.random();reqId.current=rid;
    const stale=()=>reqId.current!==rid;
    try{
      if(!stale()){resetState();setAppError("");}
      if(!review){
        const st=popFromDam(subj,1);
        if(st.length){const q=st[0];if(!stale()){setQuiz(q);setLoading(false);setIsCooldown(false);setDamStats(getDamStats());setGs(p=>({...p,used:[...p.used,(q.question||"").slice(0,20)].slice(-5)}));}return;}
      }
      if(!stale()){setLoading(true);setQuiz(null);}
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)throw new Error("no key");
      let ok=false;
      for(const key of keys){
        if(ok||stale())break;
        try{
          const body={systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:buildPrompt(g,subj,s,review,reviewItem,logsR.current)}]}],generationConfig:{responseMimeType:"application/json",temperature:.25,topP:.9,topK:20}};
          const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
          if(!res.ok)continue;const data=await res.json();if(data.error)continue;
          const text=data.candidates?.[0]?.content?.parts?.[0]?.text;if(!text)continue;
          let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){continue;}
          if(!Array.isArray(parsed))parsed=[parsed];
          parsed=parsed.filter(q=>
          q &&
          q.question &&
          q.student_answer &&
          q.correct_answer &&
          q.subject===subj &&
          hasValidAnalysis(q)
         );
          if(!parsed.length)continue;
          const enriched=parsed.map(q=>
          shuffleAllSteps({
          ...q,
          mistake_type:q.mistake_type||"不明",
          _subject:subj
         })
       );
          const[first,...rest]=enriched;
          if(stale())return;
          console.log(first)
          setQuiz(first);setGs(p=>({...p,used:[...p.used,(first.question||"").slice(0,20)].slice(-5)}));
          if(rest.length){addToDam(subj,rest);setDamStats(getDamStats());}
          setIsCooldown(false);ok=true;
        }catch(e){console.error(e);}
      }
      if(!ok&&!stale()){const fb=popFromDam(subj,1);if(fb.length){setQuiz(fb[0]);setIsCooldown(true);setDamStats(getDamStats());return;}throw new Error("fail");}
    }catch(e){
      if(!stale())setAppError("AIにつながれなかったよ！もう一度おしてみてね");
    }
    finally{if(reqId.current===rid)setLoading(false);fetchLk.current=false;}
  },[]);

  const resetFetch=useCallback((subj,sg)=>{
    const cur=gsR.current;const init={streak:cur.streak,best:cur.best,wrong:0,qNum:1,used:[]};
    resetState();setGs(init);setSubject(subj);
    const g=sg||grade;requestAnimationFrame(()=>fetchQ(init,g,subj,false,null));
  },[grade,fetchQ]);

  // 分析ステップ回答
  const handleStepAnswer=idx=>{
    if(stepAns!==null||!analysisStep||analysisStep==="done")return;
    const step=quiz[`analysis_step${analysisStep}`];
    const correct=idx===step.answer;
    setStepAns(idx);
    setStepResults(p=>{const n=[...p];n[analysisStep-1]=correct;return n;});
  };

  // 次のステップへ / 完了
  const handleStepNext=()=>{
    if(analysisStep<3){
      setAnalysisStep(p=>p+1);
      setStepAns(null);
    }else{
      const finalResults=[...stepResults];
      const score=finalResults.filter(Boolean).length;
      const correct=score>=2;
      const wrongItem=!correct?{
      topic:quiz.topic_tag||quiz.question.slice(0,20),
      subject,
      mistakeType:quiz.mistake_type||"不明"
     }:null;
      const nextStr=correct?gs.streak+1:0;
      const newBest=Math.max(gs.best,nextStr);
      updateLogs(correct,subject,wrongItem,newBest);
      updateAnalysisStats(finalResults,subject);
      setGs(p=>({...p,streak:nextStr,best:newBest,wrong:correct?p.wrong:p.wrong+1,qNum:p.qNum+1}));
      setAnalysisStep("done");
    }
  };

  const handleNext=async()=>{
    if(nextLk.current)return;nextLk.current=true;
    resetState();
    try{
      const cur=logsR.current;
      if(cur.reviewQueue?.length){
        const item=cur.reviewQueue[0];
        setLogs(p=>{const n={...p,reviewQueue:p.reviewQueue.slice(1)};saveLogs(n);return n;});
        setIsReview(true);await fetchQ(gsR.current,gradeR.current,subjR.current,true,item);return;
      }
      const cand=gsR.current.qNum%5===0?pickSubject(cur):subjR.current;
      let fromDam=popFromDam(cand,1),ns=cand;
      if(!fromDam.length&&cand!==subjR.current){const fb=popFromDam(subjR.current,1);if(fb.length){fromDam=fb;ns=subjR.current;}}
      if(!fromDam.length){for(const s of SUBJECTS){if(s===cand||s===subjR.current)continue;const any=popFromDam(s,1);if(any.length){fromDam=any;ns=s;break;}}}
      if(fromDam.length){
        if(ns!==subjR.current)setSubject(ns);
        setIsReview(false);setDamStats(getDamStats());
        setGs(p=>({...p,used:[...p.used,(fromDam[0].question||"").slice(0,20)].slice(-5)}));
        setQuiz(fromDam[0]);return;
      }
      setIsReview(false);if(ns!==subjR.current)setSubject(ns);
      await fetchQ(gsR.current,gradeR.current,ns,false,null);
    }finally{setTimeout(()=>{nextLk.current=false;},150);}
  };

  const saveSettings=()=>{
    if(!birthday){setStartError("生年月日を入力してください");return;}
    try{localStorage.setItem(PROF,JSON.stringify({birthday,apiKeys}));}catch(e){}
    const g=calcGrade(birthday);
    setGrade(g);setSettingsSaved(true);setTimeout(()=>setSettingsSaved(false),2000);
  };

  const clearLogs=()=>{
    if(!confirm("学習記録・バッジをすべて削除しますか？\nストック問題は残ります。この操作は取り消せません。"))return;
    try{localStorage.removeItem(STORE);localStorage.removeItem(SESS);}catch(e){}
    setLogs(initLogs());setGs({streak:0,best:0,wrong:0,qNum:1,used:[]});
    alert("学習記録を削除しました。");
  };

  const clearStock=()=>{
    if(!confirm("ストック問題をすべて削除しますか？\nこの操作は取り消せません。"))return;
    try{localStorage.removeItem(DAM_KEY);}catch(e){}
    setDamStats(getDamStats());
    alert("ストック問題を削除しました。");
  };

  const clearAllData=()=>{
    if(!confirm("すべてのデータを削除しますか？\nこの操作は取り消せません。"))return;
    try{localStorage.removeItem(STORE);localStorage.removeItem(DAM_KEY);localStorage.removeItem(SESS);}catch(e){}
    setLogs(initLogs());setDamStats(getDamStats());setGs({streak:0,best:0,wrong:0,qNum:1,used:[]});
    alert("データを削除しました。");
  };

  // ── 派生値 ────────────────────────────────
  const recent100=calcRecent100(logs.recentHistory);
  const subjRateMap=calcSubjRates(logs.recentHistory);
  const subjectRates=SUBJECTS.map(s=>{const r=subjRateMap[s];return r&&r.q>0?{s,rate:Math.round(r.c/r.q*100),q:r.q}:{s,rate:null,q:0};});
  const rateColor=recent100?(recent100.rate>=80?"#22c55e":recent100.rate>=60?"#f59e0b":"#ef4444"):"#9990cc";
  const rateBg=recent100?(recent100.rate>=80?"#f0fdf4":recent100.rate>=60?"#fffbeb":"#fff7f7"):"#f8f7ff";
  const rateBorder=recent100?(recent100.rate>=80?"#86efac":recent100.rate>=60?"#fde68a":"#fca5a5"):"#e8e3ff";
  const damTotal=getDamTotal();
  const stageClr=["s1","s2","s3"];
  const stageIcon=["🔍","🧩","✅"];
  const currentStep=(analysisStep&&analysisStep!=="done"&&quiz)?quiz[`analysis_step${analysisStep}`]:null;

  const todaySessions=logs.dailyLog?.[today()]?.sessions||0;
  const dailyGoalMet=todaySessions>=3;
  const reviewCount=logs.reviewQueue?.length||0;

                        const un=SUBJECTS.filter(s=>!rates[s]||rates[s].q===0);
                        if(un.length&&Math.random()<.7){resetFetch(un[Math.floor(Math.random()*un.length)]);return;}

                {masteryList.length>0&&(
                  <div className="card">
                    <div className="section-title">🗺️ 単元習熟マップ</div>
                    <div className="mastery-grid">
                      {masteryList.map(({topic,subj,attempts,correct,mastered})=>{
                        const rate=attempts>0?Math.round(correct/attempts*100):0;
                        const state=mastered?"mastered":rate>=50?"learning":"fresh";
                        const labels={fresh:"学習中",learning:"定着中",mastered:"習熟済み"};
                        return(
                          <div key={topic} className={`mastery-card ${state}`}>
                            <div className="mastery-tag">{labels[state]} ｜ {subj}</div>
                            <div className="mastery-topic">{topic}</div>
                            <div className="mastery-meta">{attempts}問 正解率{rate}%</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontSize:11,color:"#bbb",marginTop:8,textAlign:"center"}}>5問以上解いて正解率80%超えで「習熟済み」</div>
                  </div>
                )}

                {reviewCount>0&&(
                  <div className="card" style={{background:"#fffbeb",border:"1.5px solid #fde68a"}}>
                    <div style={{fontWeight:800,color:"#92400e",marginBottom:6}}>📝 復習キュー: {reviewCount}件</div>
                    <div style={{fontSize:13,color:"#78350f"}}>次回の学習で自動出題。分析完了で自動削除！</div>
                  </div>
                )}

                {/* ストック */}
                <div className="card" style={{background:"#f8f7ff"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div className="section-title" style={{margin:0}}>📦 問題ストック</div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      {isRefilling&&<span className="refill-dot"></span>}
                      <span style={{fontSize:12,fontWeight:900,color:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}>{damTotal}/{DAM_MAX*SUBJECTS.length}問</span>
                    </div>
                  </div>
                  <div style={{marginBottom:8}}><div className="bar-wrap" style={{height:7}}><div className="bar" style={{width:`${Math.min(100,damTotal/(DAM_MAX*SUBJECTS.length)*100)}%`,background:damTotal>180?"#22c55e":damTotal>90?"#f59e0b":"#ef4444"}}></div></div></div>
                  {SUBJECTS.map(s=>{const cnt=damStats[s]||0;const pct=Math.min(100,cnt/DAM_MAX*100);const c=pct>60?"#22c55e":pct>30?"#f59e0b":"#ef4444";return(
                    <div key={s} className="dam-row">
                      <span className="dam-label">{s}</span>
                      <div className="dam-bw"><div className="dam-bf" style={{width:`${pct}%`,background:c}}></div></div>
                      <span style={{fontSize:11,fontWeight:900,minWidth:40,textAlign:"right",color:c}}>{cnt}/{DAM_MAX}</span>
                    </div>
                  );})}
                  <div style={{fontSize:10,color:"#bbb",marginTop:6,textAlign:"center"}}>{isRefilling?"⚡ バックグラウンドで補充中...":"✓ 自動補充エンジン稼働中"}</div>
                </div>
              </React.Fragment>
            )}

            {/* ── BADGE ── */}
            {tab==="badge"&&(
              <div className="card">
                <div className="section-title">実績 {logs.earnedBadges?.length||0} / {BADGES.length}</div>
                <div className="badge-grid">
                  {BADGES.map(b=>{const e=logs.earnedBadges?.includes(b.id);return(
                    <div key={b.id} className={`badge ${e?"earned":"locked"}`}>
                      <div className="badge-icon">{b.icon}</div>
                      <div className="badge-name">{b.label}</div>
                      <div className="badge-desc">{b.desc}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}

            {/* ── SETTINGS ── */}
            {tab==="settings"&&(
              <React.Fragment>
                <div className="card">
                  <div className="section-title">プロフィール設定</div>

                  <div className="setting-row">
                    <span className="setting-label">生年月日（学年自動計算）</span>
                    <input type="date" value={birthday} onChange={e=>setBirthday(e.target.value)} min="2000-01-01" max="2026-12-31" style={{marginBottom:0}}/>
                    <div style={{fontSize:12,color:"#5b3ff8",fontWeight:700,marginTop:4}}>→ {calcGrade(birthday)}</div>
                  </div>

                  <div className="setting-row" style={{paddingTop:14}}>
                    <span className="setting-label">Gemini APIキー（最大4つ）</span>
                    {apiKeys.map((k,i)=>(
                      <div key={i} className="key-row">
                        <input type="password" value={k} onChange={e=>{const nk=[...apiKeys];nk[i]=e.target.value;setApiKeys(nk);}} placeholder={`APIキー ${i+1}${i===0?" (必須)":" (任意)"}`}/>
                        <span className={`key-status ${k.trim()?"ok":"empty"}`}>{k.trim()?"✓":"—"}</span>
                      </div>
                    ))}
                    <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#5b3ff8",fontWeight:700,textDecoration:"none"}}>🔑 APIキーを取得する（無料）</a>
                  </div>

                  <div style={{marginTop:16}}>
                    <button className="btn btn-primary" onClick={saveSettings}>
                      {settingsSaved?"✓ 保存しました！":"設定を保存する"}
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">学習データ</div>
                  <div style={{display:"flex",gap:10,marginBottom:12}}>
                    <div className="stat" style={{flex:1}}><div className="stat-n" style={{color:"#5b3ff8"}}>{logs.totalQ}</div><div className="stat-l">累計問題数</div></div>
                    <div className="stat" style={{flex:1}}><div className="stat-n" style={{color:"#22c55e"}}>{logs.totalCorrect}</div><div className="stat-l">累計正解数</div></div>
                    <div className="stat" style={{flex:1}}><div className="stat-n" style={{color:"#7c3aed"}}>{logs.debugStats?.completed||0}</div><div className="stat-l">分析数</div></div>
                    <div className="stat" style={{flex:1}}><div className="stat-n">{Object.keys(logs.dailyLog||{}).length}</div><div className="stat-l">学習日数</div></div>
                  </div>

                  <div style={{marginTop:16,padding:"14px 0",borderTop:"1px solid #f0edff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:"#1e1e3a"}}>📦 ストック自動更新</div>
                        <div style={{fontSize:11,color:"#9990cc",marginTop:2}}>ONにすると問題ストックが満たされた後も、古い問題を入れ替えて新鮮にします</div>
                      </div>
                      <div onClick={()=>setAutoRefill(p=>!p)} style={{width:44,height:24,borderRadius:12,background:autoRefill?"#5b3ff8":"#e8e3ff",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
                        <div style={{position:"absolute",top:3,left:autoRefill?22:3,width:18,height:18,borderRadius:9,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.2)",transition:"left .2s"}}></div>
                      </div>
                    </div>
                  </div>

                  <div className="danger-zone">
                    <div style={{fontWeight:800,color:"#991b1b",marginBottom:6,fontSize:13}}>⚠️ データの削除</div>
                    <div style={{fontSize:12,color:"#7f1d1d",marginBottom:12,lineHeight:1.6}}>削除したいデータを選んでください。この操作は取り消せません。</div>
                    <button className="danger-btn" onClick={clearLogs}>
                      📊 学習記録を削除する（ストックは残す）
                    </button>
                    <button className="danger-btn" onClick={clearStock}>
                      📦 ストック問題を削除する（記録は残す）
                    </button>
                    <button className="danger-btn secondary" onClick={clearAllData}>
                      🗑️ すべてのデータを削除する
                    </button>
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">アプリについて</div>
                  <div style={{fontSize:13,color:"#9990cc",lineHeight:1.8}}>
                    <div>📚 まちがいラボ v6.0</div>
                    <div>🔍 誤答分析型 学習エンジン</div>
                    <div>⚡ Gemini 2.5 Flash 使用</div>
                  </div>
                </div>
              </React.Fragment>
            )}

          </div>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
