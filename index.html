.user-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1.5px solid var(--input-border);background:var(--input-bg);cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;color:var(--text-soft);transition:all .15s}
.user-chip:hover{transform:translateY(-1px)}
.user-chip.on{background:linear-gradient(135deg,#5b3ff8,#9b59f8);border-color:#5b3ff8;color:#fff;box-shadow:0 4px 14px rgba(91,63,248,.3)}
.user-chip .uc-icon{font-size:16px}
.user-chip-add{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:99px;border:1.5px dashed var(--input-border);background:transparent;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;color:var(--primary)}
.user-chip-add:hover:not(:disabled){background:var(--primary-soft)}
.user-chip-add:disabled{opacity:.4;cursor:not-allowed}
.user-edit-modal{position:fixed;inset:0;background:rgba(30,30,58,.55);z-index:1500;display:flex;align-items:center;justify-content:center;padding:16px}
.user-edit-card{background:var(--card-bg);border-radius:18px;padding:20px;max-width:360px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:8px 0}
.icon-pick-btn{aspect-ratio:1;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:10px;font-size:20px;cursor:pointer;transition:all .15s}
.icon-pick-btn:hover{transform:scale(1.08)}
.icon-pick-btn.on{background:linear-gradient(135deg,#5b3ff8,#9b59f8);border-color:#5b3ff8;color:#fff}

/* ─── 学習画面のクイックトグル（タイムアタック / ライフライン）────── */
.quick-mode-row{display:flex;gap:8px;margin-bottom:10px}
.quick-mode-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;border-radius:12px;border:1.5px solid var(--input-border);background:var(--input-bg);cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;color:var(--text-soft);transition:all .15s;position:relative}
.quick-mode-btn:hover{transform:translateY(-1px)}
.quick-mode-btn.on{background:linear-gradient(135deg,#5b3ff8,#9b59f8);border-color:#5b3ff8;color:#fff;box-shadow:0 4px 14px rgba(91,63,248,.3)}
.quick-mode-btn .qm-icon{font-size:16px}
.quick-mode-btn .qm-dot{position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;background:#cbd5e1}
.quick-mode-btn.on .qm-dot{background:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.4)}

/* ─── 久々成長 / 苦手克服 / AI総評トースト ─────── */
.celebration-card{display:flex;align-items:flex-start;gap:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:18px;padding:14px 16px;margin-bottom:10px;box-shadow:0 6px 22px rgba(245,158,11,.2);animation:celebration-pop .55s cubic-bezier(.34,1.56,.64,1) both;box-sizing:border-box;width:100%}
.celebration-card.welcome-back{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-color:#3b82f6;box-shadow:0 6px 22px rgba(59,130,246,.2)}
.celebration-card.overcome{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e;box-shadow:0 6px 22px rgba(34,197,94,.2)}
.celebration-card.ai-review{background:linear-gradient(135deg,#f3e8ff,#e9d5ff);border-color:#a855f7;box-shadow:0 6px 22px rgba(168,85,247,.2)}
.celebration-card.growth-type{background:linear-gradient(135deg,#e0f2fe,#bae6fd);border-color:#0ea5e9;box-shadow:0 6px 22px rgba(14,165,233,.2)}
.celebration-icon{font-size:26px;line-height:1;flex-shrink:0;animation:wiggle 1.4s ease-in-out infinite;align-self:flex-start;padding-top:2px}
.celebration-text{flex:1;min-width:0;overflow:hidden}
@keyframes wiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.celebration-title{font-size:11px;font-weight:900;color:#7c2d12;margin-bottom:4px;line-height:1.4;word-break:keep-all;overflow-wrap:break-word}
.celebration-card.welcome-back .celebration-title{color:#1e3a8a}
.celebration-card.overcome .celebration-title{color:#14532d}
.celebration-card.ai-review .celebration-title{color:#581c87}
.celebration-card.growth-type .celebration-title{color:#0c4a6e}
.celebration-body{font-size:13px;color:#78350f;line-height:1.6;font-weight:700;word-break:break-all;overflow-wrap:break-word}
.celebration-card.welcome-back .celebration-body{color:#1e40af}
.celebration-card.overcome .celebration-body{color:#166534}
.celebration-card.ai-review .celebration-body{color:#6b21a8}
.celebration-card.growth-type .celebration-body{color:#0369a1}

/* ─── 思考のズレ：大見出しカード ─── */
.thought-quote{background:linear-gradient(135deg,#fff7f7,#fee2e2);border:2px solid #fca5a5;border-radius:16px;padding:16px 18px;margin-bottom:10px;box-shadow:0 4px 14px rgba(239,68,68,.12)}
.thought-quote .thought-label{font-size:10px;font-weight:900;color:#991b1b;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.thought-quote .thought-text{font-size:17px;font-weight:900;color:#7f1d1d;line-height:1.5;margin-bottom:8px;word-break:break-all}
.thought-quote .thought-text .qmark{font-size:22px;color:#dc2626;margin:0 2px;font-weight:900}
.thought-quote .thought-why-wrong{background:rgba(255,255,255,.7);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;color:#991b1b;line-height:1.6}
[data-theme="dark"] .thought-quote{background:linear-gradient(135deg,#3a1f1f,#4a1f1f);border-color:#dc2626}
[data-theme="dark"] .thought-quote .thought-text{color:#fecaca}
[data-theme="dark"] .thought-quote .thought-why-wrong{background:rgba(0,0,0,.25);color:#fecaca}

/* ─── 思い込みアラートバッジ ─── */
.priority-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:900;color:#92400e}
.priority-banner .pb-icon{font-size:16px;animation:wiggle 1.4s ease-in-out infinite}

/* ─── プライム表示（直前のミス型）─── */
.prime-banner{background:linear-gradient(135deg,#ede9ff,#ddd6fe);border:1.5px solid #a78bfa;border-radius:12px;padding:8px 14px;margin-bottom:10px;font-size:12px;font-weight:800;color:#5b3ff8;display:flex;align-items:center;gap:8px;line-height:1.5}
/* 3秒見直しカード（決定前の確認ステップ）— 条件読み落とし対策 */
.threesec-card{background:linear-gradient(135deg,#fffbeb,#fde68a);border:2px solid #f59e0b;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 18px rgba(245,158,11,.18);animation:result-slide-in .35s cubic-bezier(.22,1.2,.36,1) both}
.threesec-card .threesec-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900;color:#7c2d12;line-height:1.4;margin-bottom:8px}
.threesec-card .threesec-icon{font-size:22px}
.threesec-card .threesec-q{font-size:12.5px;font-weight:700;color:#7c2d12;background:rgba(255,255,255,.55);border-radius:10px;padding:8px 10px;line-height:1.55;margin-bottom:6px}
.threesec-card .threesec-pick{font-size:12px;font-weight:800;color:#92400e;margin-bottom:10px;line-height:1.4}
.threesec-card .threesec-row{display:flex;gap:8px}
.threesec-card .threesec-row button{flex:1;border:none;border-radius:12px;padding:11px 8px;font-size:12.5px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .12s}
.threesec-card .threesec-row button:active{transform:scale(.96)}
.threesec-cancel{background:#fff;color:#92400e;border:1.5px solid #f59e0b !important}
.threesec-go{background:linear-gradient(135deg,#5b3ff8,#9b59f8);color:#fff}
[data-theme="dark"] .threesec-card{background:#3a2f1a;border-color:#f59e0b;color:#fde68a}
[data-theme="dark"] .threesec-card .threesec-head,[data-theme="dark"] .threesec-card .threesec-q,[data-theme="dark"] .threesec-card .threesec-pick{color:#fde68a}
[data-theme="dark"] .threesec-card .threesec-q{background:rgba(0,0,0,.25)}
[data-theme="dark"] .threesec-cancel{background:#1f1f35;color:#fde68a}
/* ミス改善率カード（記録タブ最上部）— 点数より改善幅で動機付け */
.mistake-improve-card{border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.mistake-improve-card .mic-tag{display:inline-block;font-size:10px;font-weight:900;letter-spacing:.06em;background:rgba(255,255,255,.7);border-radius:99px;padding:3px 10px;margin-bottom:8px}
.mistake-improve-card .mic-head{font-size:26px;font-weight:900;line-height:1.15;margin-bottom:6px}
.mistake-improve-card .mic-msg{font-size:13px;font-weight:700;line-height:1.55}
[data-theme="dark"] .mistake-improve-card{box-shadow:0 4px 14px rgba(0,0,0,.2)}
/* 今日はここまででOK 終了導線カード */
.stop-here-card{background:linear-gradient(135deg,#eef2ff,#c7d2fe);border:1.5px solid #818cf8;border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;position:relative}
.stop-here-card .shc-icon{font-size:28px;flex-shrink:0}
.stop-here-card .shc-body{flex:1}
.stop-here-card .shc-title{font-size:13px;font-weight:900;color:#3730a3;line-height:1.3;margin-bottom:2px}
.stop-here-card .shc-sub{font-size:11.5px;font-weight:700;color:#4338ca;line-height:1.5}
.stop-here-card .shc-close{background:transparent;border:none;color:#6366f1;font-size:18px;cursor:pointer;font-family:inherit;padding:4px 8px;flex-shrink:0;font-weight:900}
[data-theme="dark"] .stop-here-card{background:#1f2540;border-color:#818cf8}
[data-theme="dark"] .stop-here-card .shc-title,[data-theme="dark"] .stop-here-card .shc-sub{color:#c7d2fe}
/* 苦手単元 TOP3 カード（学習タブ・問題未表示時） */
.weak-top3-card{background:linear-gradient(135deg,#fff7f7,#fee2e2);border:1.5px solid #fca5a5;border-radius:14px;padding:12px 14px;margin-bottom:10px}
.weak-top3-card .wtc-head{font-size:11.5px;font-weight:900;color:#991b1b;margin-bottom:8px;letter-spacing:.04em}
.weak-top3-card .wtc-list{display:flex;flex-direction:column;gap:6px}
.weak-top3-card .wtc-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #fca5a5;border-radius:10px;padding:8px 10px;font-family:inherit;cursor:pointer;width:100%;text-align:left;transition:transform .12s,background .15s}
.weak-top3-card .wtc-row:hover{background:#fee2e2}
.weak-top3-card .wtc-row:active{transform:scale(.98)}
.weak-top3-card .wtc-rate{flex-shrink:0;background:#ef4444;color:#fff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:900;min-width:42px;text-align:center}
.weak-top3-card .wtc-topic{flex:1;font-size:12.5px;font-weight:900;color:#7f1d1d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weak-top3-card .wtc-subj{font-size:10.5px;font-weight:800;color:#991b1b;background:#fee2e2;border-radius:6px;padding:2px 6px;flex-shrink:0}
.weak-top3-card .wtc-go{color:#ef4444;font-weight:900;font-size:14px;flex-shrink:0}
[data-theme="dark"] .weak-top3-card{background:#3a1f24;border-color:#ef4444}
[data-theme="dark"] .weak-top3-card .wtc-head,[data-theme="dark"] .weak-top3-card .wtc-topic{color:#fecaca}
[data-theme="dark"] .weak-top3-card .wtc-row{background:#1f1f35;border-color:#ef4444}
[data-theme="dark"] .weak-top3-card .wtc-subj{background:#3a1f24;color:#fecaca}
/* 学習タブ上部の継続促進メッセージ — できてる感の演出（あと1問だけ） */
.encourage-banner{background:linear-gradient(135deg,#ede9ff,#ddd6fe);border:1.5px solid #a78bfa;border-radius:10px;padding:6px 12px;margin-bottom:8px;font-size:11.5px;font-weight:900;color:#4c1d95;line-height:1.45;text-align:center}
[data-theme="dark"] .encourage-banner{background:#3a2f5c;border-color:#a78bfa;color:#c4b5fd}
/* 学習タブ上部の「今日の弱点」1行帯 — calcMistakeTypes TOP1 を子ども語で */
.session-prime-banner{background:linear-gradient(135deg,#fff7ed,#fed7aa);border:1.5px solid #fbbf24;border-radius:10px;padding:6px 12px;margin-bottom:8px;font-size:11.5px;font-weight:800;color:#92400e;display:flex;align-items:center;gap:8px;line-height:1.4}
.session-prime-banner .spb-tag{background:#f59e0b;color:#fff;border-radius:6px;padding:2px 7px;font-size:9.5px;font-weight:900;letter-spacing:.04em;flex-shrink:0}
.session-prime-banner .spb-text{flex:1;color:#7c2d12;font-weight:900}
[data-theme="dark"] .session-prime-banner{background:#3a2f1a;border-color:#f59e0b;color:#fde68a}
[data-theme="dark"] .session-prime-banner .spb-text{color:#fde68a}
.prime-banner .pb-tag{background:#5b3ff8;color:#fff;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:900;letter-spacing:.04em;flex-shrink:0}
.prime-banner b{color:#4c1d95;font-weight:900}
[data-theme="dark"] .prime-banner{background:#3a2f5c;border-color:#a78bfa;color:#c4b5fd}
[data-theme="dark"] .prime-banner b{color:#fff}

/* ─── アクティブリコール（正解時に出すなぜ違うかクイズ）─── */
.recall-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:14px;padding:14px;margin:10px 0}
.recall-label{font-size:10px;font-weight:900;color:#166534;letter-spacing:.06em;margin-bottom:6px}
.recall-q{font-size:13px;font-weight:800;color:#166534;margin-bottom:10px;line-height:1.5}
.recall-q b{color:#15803d;background:#fff;border-radius:6px;padding:2px 6px;border:1px solid #86efac}
.recall-opts{display:flex;flex-direction:column;gap:6px}
.recall-opt{background:#fff;border:1.5px solid #86efac;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:700;color:#166534;text-align:left;line-height:1.55;cursor:pointer;font-family:inherit;transition:all .15s}
.recall-opt:hover:not(:disabled){background:#dcfce7;transform:translateX(2px)}
.recall-opt.correct{background:#dcfce7;border-color:#16a34a;color:#166534;font-weight:900}
.recall-opt.wrong{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.recall-opt:disabled{cursor:default;transform:none}
.recall-result{margin-top:8px;font-size:12px;font-weight:900;line-height:1.5}
.recall-result.ok{color:#166534}
.recall-result.ng{color:#991b1b}
[data-theme="dark"] .recall-card{background:#1a3a24;border-color:#16a34a}
[data-theme="dark"] .recall-label,[data-theme="dark"] .recall-q,[data-theme="dark"] .recall-opt{color:#86efac}
[data-theme="dark"] .recall-opt{background:#1f1f35;border-color:#3a3a55}
[data-theme="dark"] .recall-q b{background:#1f1f35;color:#86efac;border-color:#3a3a55}

/* ─── 週次ミスパターンサマリー ─── */
.weekly-summary{background:linear-gradient(135deg,#fff7ed,#fed7aa);border:2px solid #f59e0b;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(245,158,11,.15)}
.weekly-summary .ws-head{font-size:11px;font-weight:900;color:#92400e;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.weekly-summary .ws-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.weekly-summary .ws-rank{font-size:11px;font-weight:900;color:#fff;background:linear-gradient(135deg,#dc2626,#ef4444);border-radius:99px;padding:2px 10px}
.weekly-summary .ws-type{font-size:17px;font-weight:900;color:#7c2d12;line-height:1.3}
.weekly-summary .ws-cnt{font-size:13px;font-weight:800;color:#92400e}
.weekly-summary .ws-diff{font-size:11px;font-weight:900;border-radius:8px;padding:2px 8px;letter-spacing:.04em}
.weekly-summary .ws-diff.up{background:#fee2e2;color:#991b1b}
.weekly-summary .ws-diff.down{background:#dcfce7;color:#166534}
.weekly-summary .ws-diff.flat{background:#f3f4f6;color:#6b7280}
.weekly-summary .ws-tip{font-size:12px;font-weight:700;color:#78350f;line-height:1.55;margin-top:6px;background:rgba(255,255,255,.65);border-radius:10px;padding:8px 10px}
[data-theme="dark"] .weekly-summary{background:linear-gradient(135deg,#3a2f1a,#4a3a1a);border-color:#f59e0b}
[data-theme="dark"] .weekly-summary .ws-head,[data-theme="dark"] .weekly-summary .ws-type,[data-theme="dark"] .weekly-summary .ws-cnt,[data-theme="dark"] .weekly-summary .ws-tip{color:#fde68a}
[data-theme="dark"] .weekly-summary .ws-tip{background:rgba(0,0,0,.25)}

/* ─── ステータスアップ フローティングポップ（正解／不正解ボックス内に表示） ─── */
/* result-big-ok / result-big-ng の内部に absolute 配置し、ボックスを中心軸として
   pill が「フォーカスされた結果カードの上で」舞うように見せる。 */
@keyframes stat-pop-float{
  0%  {opacity:0;transform:translate(-50%,8px) scale(.6);}
  18% {opacity:1;transform:translate(-50%,-6px) scale(1.08);}
  70% {opacity:1;transform:translate(-50%,-24px) scale(1);}
  100%{opacity:0;transform:translate(-50%,-46px) scale(.93);}
}
.stat-gain-overlay{
  position:absolute;inset:0;
  pointer-events:none;z-index:6;
  overflow:visible;
}
.stat-gain-float{
  position:absolute;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  border:1.5px solid #22c55e;border-radius:99px;
  padding:5px 12px;font-size:12px;font-weight:900;color:#166534;
  box-shadow:0 4px 18px rgba(34,197,94,.32);
  opacity:0;
  animation:stat-pop-float 1.8s ease-out both;
  white-space:nowrap;
  max-width:90%;overflow:hidden;text-overflow:ellipsis;
  will-change:opacity,transform;
}
.stat-gain-float.unit{
  background:linear-gradient(135deg,#f0edff,#ddd6fe);
  border-color:#a78bfa;color:#5b3ff8;
  box-shadow:0 4px 18px rgba(91,63,248,.24);
}
[data-theme="dark"] .stat-gain-float{background:linear-gradient(135deg,#1a3a24,#1f4a2e);border-color:#22c55e;color:#86efac;}
[data-theme="dark"] .stat-gain-float.unit{background:linear-gradient(135deg,#2a1f4a,#3a2f5c);border-color:#a78bfa;color:#c4b5fd;}
/* 結果カードを基準にするため position:relative。overflow:visible で pill が
   ボックス上端から自由に飛び出せるようにする（はみ出てもアプリ枠は超えない）。 */
.result-big-ok, .result-big-ng { position:relative; overflow:visible; }

/* ─── ボーナス ステータスアップ ポップ（クリック位置にアンカー） ─── */
@keyframes bonus-pop-rise{
  0%  {opacity:0;transform:translate(-50%,8px) scale(.8);}
  18% {opacity:1;transform:translate(-50%,0) scale(1.08);}
  100%{opacity:0;transform:translate(-50%,-34px) scale(.95);}
}
.bonus-pop-fly{
  position:fixed;z-index:997;pointer-events:none;
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  border:1.5px solid #22c55e;border-radius:99px;
  padding:6px 14px;font-size:13px;font-weight:900;color:#166534;
  box-shadow:0 6px 20px rgba(34,197,94,.32);
  animation:bonus-pop-rise 1.4s ease-out both;
  white-space:nowrap;max-width:calc(100vw - 32px);
  will-change:opacity,transform;
}
[data-theme="dark"] .bonus-pop-fly{background:linear-gradient(135deg,#1a3a24,#1f4a2e);border-color:#22c55e;color:#86efac;}

/* ─── 演出ポリシー: 常時アニメーションON（変更禁止） ─────────── */
/* 【方針確定 / 触らないこと】
   ポップ・ホップ・チック・スピン・ウィグル・バースト等の演出は、

// ─── RecallQuiz: 正解時に1問だけ「なぜ他は違うか」をアクティブリコール出題 ──
// 受動的閲覧（why-wrong パネルを開くだけ）を能動的想起へ変換するためのミニクイズ
const RecallQuiz=memo(({quiz,onAnswered})=>{
  // 出題内容を問題変更時のみ確定（再レンダーで質問が変わらないように）
  const data=useMemo(()=>{
    const wa=Array.isArray(quiz?.wrong_analysis)?quiz.wrong_analysis.filter(x=>x&&typeof x.index==="number"&&typeof x.why_wrong==="string"):[];
    if(wa.length<2)return null;
    // 正解選択肢の why_wrong と、別の誤答の why_wrong を 2 択で並べる
    const targetIdx=Math.floor(Math.random()*wa.length);
    const target=wa[targetIdx];
    const others=wa.filter((_,i)=>i!==targetIdx);
    const distractor=others[Math.floor(Math.random()*others.length)];
    // 2択をシャッフル
    const opts=[{text:target.why_wrong,correct:true},{text:distractor.why_wrong,correct:false}];
    if(Math.random()<0.5)opts.reverse();
    return{target,opts};
  },[quiz]);
  const [picked,setPicked]=useState(null);
  // 問題が変わったら回答もリセット
  useEffect(()=>{setPicked(null);},[quiz]);
  if(!data)return null;
  const labels=["A","B","C","D"];
  const choiceText=(quiz.choices||[])[data.target.index]||"";
  return(
    html`<div class="recall-card">
      <div class="recall-label">🧠 アクティブリコール — 想起トレーニング</div>
      <div class="recall-q">
        <b>${labels[data.target.index]}: ${choiceText}</b> が違う理由は？
      </div>
      <div class="recall-opts">
        ${data.opts.map((o,i)=>{
          const isPicked=picked!==null&&picked===i;
          const showState=picked!==null;
          const cls=`recall-opt${showState?(o.correct?" correct":(isPicked?" wrong":"")):""}`;
          return(
            html`<button key=${i} class=${cls} disabled=${showState} onClick=${(e)=>{
              if(picked!==null)return;
              setPicked(i);
              if(onAnswered)onAnswered(o.correct,e);
            }}>
              ${showState&&o.correct?"✓ ":showState&&isPicked&&!o.correct?"✗ ":""}${o.text}
            </button>`
          );
        })}
      </div>
      ${picked!==null&&(
        html`<div class=${`recall-result ${data.opts[picked].correct?"ok":"ng"}`}>
          ${data.opts[picked].correct?"🎯 完璧！消去法もバッチリ":"💡 落ち着いて。正しい理由は緑のボタンの方"}
        </div>`
      )}
    </div>`
  );
});

// ─── StatGainsPop ────────────────────────────────────────────────
// QuizPanel の外で定義して再マウントを防ぐ。
// answerGains が変わるたびに JSタイマーで 0.4s 間隔で項目を1つずつ追加し、
// 1.8s 後に削除する。タブ非表示時はタイマーを全キャンセルして消す。
// 結果ボックス内（result-big-ok / -ng）の % 座標。pill は translateX(-50%) で中心寄せ。
// 縦アニメで上方向に 46px 上昇するので、最終的にボックス上端からも自由に飛び出す。
// 2列×4段の重ならないグリッド。stat-pop-float は -46px 上昇するため、
// 上下の段は少なくとも約20%（≒50px @ 250px box）あけて配置する。
// idx の順番で「左→右→左→右」と交互に置くと、連続発火時に隣同士で重ならない。
const _SG_POS=[[22,18],[78,18],[22,40],[78,40],[22,62],[78,62],[22,82],[78,82]];
const StatGainsPop=memo(({answerGains})=>{
  const [shown,setShown]=useState([]);
  const tids=useRef([]);
  useEffect(()=>{
    tids.current.forEach(clearTimeout);tids.current=[];
    setShown([]);
    if(!answerGains||!answerGains.length)return;
    const items=answerGains.slice(0,8);
    const ANIM_MS=1800;
    items.forEach((_,idx)=>{
      const at=idx*400;
      tids.current.push(
        setTimeout(()=>setShown(p=>[...p,idx]),at),
        setTimeout(()=>setShown(p=>p.filter(i=>i!==idx)),at+ANIM_MS)
      );
    });
    return()=>{tids.current.forEach(clearTimeout);tids.current=[];};
  },[answerGains]);
  // タブ非表示→再表示でアニメが再発動しないよう、非表示になった瞬間に全キャンセル
  useEffect(()=>{
    const fn=()=>{
      if(!document.hidden)return;
      tids.current.forEach(clearTimeout);tids.current=[];
      setShown([]);
    };
    document.addEventListener('visibilitychange',fn);
    return()=>document.removeEventListener('visibilitychange',fn);
  },[]);
  if(!shown.length)return null;
  return(
    html`<div class="stat-gain-overlay">
      ${(answerGains||[]).slice(0,8).map((g,idx)=>{
        if(!shown.includes(idx))return null;
        const [bl,bt]=_SG_POS[idx%_SG_POS.length];
        // pill は translateX(-50%) で中心寄せ。オーバーレイ自身が max-width:480px・
        // overflow:hidden なので、left は 20%–80% で安全に収まる。
        const left=`clamp(20%,${bl}%,80%)`;
        const top=`clamp(15%,${bt}%,78%)`;
        return(
          html`<div key=${idx} class=${`stat-gain-float${g.isUnit?" unit":""}`}
            style=${{left,top}}>
            <span>${g.icon}</span><span>${g.name}</span><span>+${g.amount}</span>
          </div>`
        );
      })}
    </div>`
  );
});

// ─── RevivalBurst ────────────────────────────────────────────────
// 復活ボーナス（直前ミス→次で正解）の派手な演出。
// 紙吹雪は data.show が立った瞬間に乱数で一度だけ作り、メモ化（再render で再生しない）。
// 1.6s 後に fadeout クラスを付けて 0.35s でフェード、その後 onDone() で親に消してもらう。
const _RB_COLORS=["#fef08a","#fb7185","#22d3ee","#86efac","#c4b5fd","#fdba74","#f0abfc"];
const RevivalBurst=memo(({show,big,sub,phrase,onDone})=>{
  const [phase,setPhase]=useState("in"); // in → out → null
  const flakes=useMemo(()=>{
    if(!show)return [];
    const N=16, vw=Math.min(window.innerWidth||360,520);
    return Array.from({length:N},(_,i)=>{
      const ang=(Math.PI*2)*(i/N) + (Math.random()*.4-.2);
      const dist=Math.max(110, Math.min(vw*0.45, 140 + Math.random()*120));
      const dx=Math.cos(ang)*dist;
      const dy=Math.sin(ang)*dist*0.85 - 20; // 少し上に偏らせる
      return {
        c:_RB_COLORS[i%_RB_COLORS.length],
        dx, dy,
        rot:(Math.random()*720-360)|0,
        delay:Math.random()*0.18,
        size:8+Math.random()*8,
      };
    });
  },[show]);
  useEffect(()=>{
    if(!show)return;
    setPhase("in");
    const t1=setTimeout(()=>setPhase("out"),1700);
    const t2=setTimeout(()=>{ setPhase("in"); onDone&&onDone(); },2100);
    return()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[show,onDone]);
  if(!show)return null;
  const fade=phase==="out";
  return(
    html`<div class="revival-overlay" aria-hidden="true">
      <div class="revival-ring"/>
      <div class="revival-ring r2"/>
      <div class="revival-ring r3"/>
      ${flakes.map((f,i)=>(
        html`<div key=${i} class="revival-flake" style=${{
          background:f.c,
          width:`${f.size}px`,height:`${f.size*1.4}px`,
          marginLeft:`-${f.size/2}px`,marginTop:`-${f.size*0.7}px`,
          animationDelay:`${f.delay}s`,
          ['--dx']:`${f.dx}px`,
          ['--dy']:`${f.dy}px`,
          ['--rot']:`${f.rot}deg`,
        }}/>`
      ))}
      <div class=${`revival-hero${fade?" fadeout":""}`} role="status" aria-live="polite">
        <span class="rh-icon rh-shake">💥</span>
        <div class="rh-big">${big}</div>
        <div class="rh-sub">${sub}</div>
        ${phrase&&html`<span class="rh-phrase">${phrase}</span>`}
      </div>
    </div>`
  );
});

// クリックイベント / 要素から「pop を出す中心座標」を抽出。
// 触ったボタンの位置に pop を出したいので、まず currentTarget の rect を最優先で
// 取得する。Preact のイベントは原則ネイティブ DOM Event をそのまま転送するので
// 同期実行中の currentTarget は有効。target/clientXY/changedTouches を順次フォールバック。
const popAnchorFromEvent=(e)=>{
  if(!e)return null;
  // .root に contain:layout が付いているため position:fixed は viewport 基準ではなく
  // .root（≒ドキュメント先頭）基準になる。getBoundingClientRect() の viewport 座標を
  // document 座標に変換するため scrollX/Y を加算する。
  const sx=window.scrollX||0, sy=window.scrollY||0;
  // 1) currentTarget（onClick が貼られた要素自身）の中心
  try{
    const ct=e.currentTarget;
    if(ct&&ct.getBoundingClientRect){
      const r=ct.getBoundingClientRect();
      if(r&&(r.width||r.height)){return {x:r.left+r.width/2+sx, y:r.top+r.height/2+sy};}
    }
  }catch(_){}
  // 2) target（クリックされた子要素）→ 親へ遡って rect を持つ要素を探す
  try{
    let t=e.target;
    let safety=4;
    while(t&&safety-->0){
      if(t.getBoundingClientRect){
        const r=t.getBoundingClientRect();
        if(r&&(r.width||r.height)){return {x:r.left+r.width/2+sx, y:r.top+r.height/2+sy};}
      }
      t=t.parentNode;
    }
  }catch(_){}
  // 3) マウスイベントの座標（clientX/Y はビューポート基準 → +scroll で document 座標へ）
  //    typeof で number 確認済みなので truthy チェックは不要（0 を弾く誤判定を防ぐ）。
  if(typeof e.clientX==="number"&&typeof e.clientY==="number"){
    return {x:e.clientX+sx, y:e.clientY+sy};
  }
  // 4) タッチイベントの座標
  if(e.changedTouches&&e.changedTouches[0]){
    const t=e.changedTouches[0];
    if(typeof t.clientX==="number"&&typeof t.clientY==="number"){
      return {x:t.clientX+sx, y:t.clientY+sy};
    }
  }
  return null;
};

// ─── QuizPanel ───────────────────────────────────────────────────
const CHOICE_LABELS=["A","B","C","D"];
const QuizPanel=memo(({quiz,quizPhase,selectedChoice,rankOneMode,easyMode,hintSource,showWhyWrong,onChoice,onNotLearnedYet,onRetry,onNext,onToggleWhyWrong,onShowHint,isReview,isNorma,todaySess,onReport,confidenceRating,onConfidenceRate,timeLimit,timeLimitMax,hiddenChoice,lifelineUsed,onLifeline,isTrial,timeAttackEnabled,lifelineEnabled,hintPanelOpen,onToggleHintPanel,primeMistakeType,isPriorityReview,answerGains,onActiveRecallAnswered,choicesDisabled,grade})=>{
  if(!quiz||!quizPhase)return null;
  // 学年に応じた UI 文言（低学年=ひらがな中心）。calcSubjects と同じ「学年で分岐」の系譜。
  const TXT=pickText(grade);
  const isCorrect=selectedChoice!==null&&selectedChoice===quiz.correct;
  // ─ スクロール制御 ─
  const quizCardRef=useRef(null);
  // 「問題文へのフォーカス（スクロール）」は "他フェーズ → question" の遷移時のみ。
  // 旧実装は [quizPhase] 変化のたび発火していたため、question → result の遷移でも
  // もう一度スクロールが走り「フォーカスが2回かかる」感覚を生んでいた（bug:「たまに2回」）。
  // 再マウント時の prev は null になるので、新しい問題の初期表示でも正しく発火する。
  // retry（result → question）でも prev が "result" のため正しく発火する。
  // smooth スクロールはアニメ中「画面が動いて今どこ？」感が出るため auto（瞬間）。
  // レイアウト確定待ちに「ダブル rAF」を使う。
  // 単一 rAF だと、バナー・苦手TOP3 など問題カード上側の要素がまだレイアウト計算中のため
  // getBoundingClientRect() が「画面内にある」と誤判定しスクロールをスキップすることがある。
  // 1本目の rAF でブラウザの描画サイクルを1回消化させ、2本目で位置を確定させることで
  // 「たまにフォーカスが遅い」問題を解消する。
  const prevPhaseR=useRef(null);
  useEffect(()=>{
    const prev=prevPhaseR.current;
    prevPhaseR.current=quizPhase;
    // question / result フェーズ切り替え時にスクロール
    // （同一フェーズ内の再render＝自信度クリック等ではスクロールしない）
    if(quizPhase!=="question"&&quizPhase!=="result")return;
    if(prev===quizPhase)return;
    let outer,inner;
    outer=requestAnimationFrame(()=>{
      inner=requestAnimationFrame(()=>{
        const el=quizCardRef.current;
        if(!el)return;
        // 旧仕様の「既に上端にあるならスキップ」は、結果→次へで card が同位置に
        // 再マウントされるケースで誤発火（=スキップ）し、新問題のヘッダー被りを起こす。
        // result/question どちらでも必ず scrollIntoView を呼ぶ（瞬間=auto、軽い操作）。
        el.scrollIntoView({behavior:"auto",block:"start"});
      });
    });
    return()=>{ cancelAnimationFrame(outer); cancelAnimationFrame(inner); };
  },[quizPhase]);
  // ⑯ 自信度セレクター
  // 回答前 (question フェーズ) → メタ認知を促す問いかけに切り替え（ガイナー効果）
  const ConfidenceSelector=()=>{
    const isBeforeAnswer=quizPhase==="question";
    const label=isBeforeAnswer?TXT.confidenceBefore:TXT.confidenceAfter;
    return(
      html`<div class="confidence-wrap">
        <div class="confidence-label-txt">${label}</div>
        <div class="confidence-row">
          <button class=${`confidence-btn c1${confidenceRating===1?" selected":""}`} onClick=${(e)=>onConfidenceRate(1,e)}>🎲<br/>${TXT.confKan}</button>
          <button class=${`confidence-btn c2${confidenceRating===2?" selected":""}`} onClick=${(e)=>onConfidenceRate(2,e)}>🤔<br/>${TXT.confHalf}</button>
          <button class=${`confidence-btn c3${confidenceRating===3?" selected":""}`} onClick=${(e)=>onConfidenceRate(3,e)}>✅<br/>${TXT.confCan}</button>
        </div>
      </div>`
    );
  };
  const ModeBanner=()=>{
    if(isReview&&isNorma)return(
      html`<${Fragment}>
        <div style=${{background:"linear-gradient(135deg,#ede9ff,#ddd6fe)",border:"1.5px solid #a78bfa",borderRadius:12,padding:"8px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style=${{fontSize:16}}>🎯</span>
          <div><div style=${{fontSize:12,fontWeight:900,color:"#5b3ff8"}}>${TXT.normaTitle} ${todaySess+1} / 5</div><div style=${{fontSize:11,color:"#4c1d95"}}>${TXT.normaGoal}</div></div>
        </div>
        <div style=${{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <span style=${{fontSize:16}}>📝</span>
          <div><div style=${{fontSize:12,fontWeight:900,color:"#92400e"}}>${TXT.reviewTitle}</div><div style=${{fontSize:11,color:"#78350f"}}>${TXT.reviewSub}</div></div>
        </div>
      <//>`
    );
    if(isReview)return(
      html`<div style=${{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style=${{fontSize:16}}>📝</span>
        <div><div style=${{fontSize:12,fontWeight:900,color:"#92400e"}}>${TXT.reviewTitle}</div><div style=${{fontSize:11,color:"#78350f"}}>${TXT.reviewSub}</div></div>
      </div>`
    );
    if(isNorma)return(
      html`<div style=${{background:"linear-gradient(135deg,#ede9ff,#ddd6fe)",border:"1.5px solid #a78bfa",borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style=${{fontSize:16}}>🎯</span>
        <div><div style=${{fontSize:12,fontWeight:900,color:"#5b3ff8"}}>${TXT.normaTitle} ${todaySess+1} / 5</div><div style=${{fontSize:11,color:"#4c1d95"}}>${TXT.normaGoal}</div></div>
      </div>`
    );
    return null;
  };

  // ─ 問題フェーズ ─
  if(quizPhase==="question"){
    return(
      html`<div ref=${quizCardRef} class=${`quiz-card${easyMode?" diff-easy-soft":""}`}>
        ${isTrial&&(
          html`<div style=${{background:"linear-gradient(135deg,#fff7ed,#fed7aa)",border:"1.5px solid #f59e0b",borderRadius:12,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:800,color:"#92400e"}}>
            <span style=${{fontSize:16}}>🎁</span>
            <span>${TXT.trialMode}</span>
          </div>`
        )}
        ${ModeBanner()}

        ${isPriorityReview&&(
          html`<div class="priority-banner">
            <span class="pb-icon">⚠️</span>
            <span><b>${TXT.priorityHead}</b> — ${TXT.prioritySub}</span>
          </div>`
        )}
        
        ${/* 重複していた「前回ミス型」帯は学習タブ上部の session-prime-banner に統一 */ ""}

        ${timeAttackEnabled&&timeLimit!==null&&timeLimit!==undefined&&!hintSource&&(
          html`<div style=${{marginBottom:10}}>
            <div style=${{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:800,color:timeLimit<=10?"#dc2626":"#5b3ff8",marginBottom:4}}>
              <span>${TXT.timeAttack}</span>
              <span>${timeLimit}秒</span>
            </div>
            <div class="comeback-bar-wrap" style=${{height:6}}>
              <div class="comeback-bar-fill" style=${{width:`${(timeLimit/(timeLimitMax||30))*100}%`}}/>
            </div>
          </div>`
        )}
        ${hintSource&&quiz.hint?(
          html`<${Fragment}>
            <div class="hint-box">
              <div class="hint-label">${TXT.hintLabel}</div>
              ${quiz.hint}
              ${hintSource==="notLearned"?(
                html`<button class="btn btn-ghost" style=${{marginTop:10}} onClick=${onNext}>
                  ${TXT.understoodNext}
                </button>`
              ):(
                html`<button class="btn btn-ghost" style=${{marginTop:10,background:"#f0fdf4",color:"#166534",border:"1.5px solid #86efac"}} onClick=${()=>onShowHint(null)}>
                  ${TXT.backToProblem}
                </button>`
              )}
            </div>
            <div class="q-text" style=${{opacity:.45}}>${quiz.question}</div>
          <//>`
        ):(
          html`<${Fragment}>
            <div class="q-text">${quiz.question}</div>
            ${/* ⑩ 自信度セレクタを回答前に表示（ガイナー効果）— メタ認知をオンにする */ ""}
            ${ConfidenceSelector()}
            ${quiz.choices.map((c,i)=>{
              const isHidden=hiddenChoice===i;
              const isLocked=!!choicesDisabled&&!isHidden;
              const disabled=isHidden||isLocked;
              const lockedStyle=isLocked?{opacity:.55,cursor:"not-allowed"}:undefined;
              const hiddenStyle=isHidden?{textDecoration:"line-through",opacity:.35,cursor:"not-allowed"}:undefined;
              return(
                html`<button key=${i} class=${`choice-btn${isHidden?" dim":""}`} onClick=${(e)=>!disabled&&onChoice(i,e)} disabled=${disabled} aria-disabled=${disabled} style=${hiddenStyle||lockedStyle}>
                  <span class="choice-label">${CHOICE_LABELS[i]}</span>
                  ${isHidden?"（消去済み）":c}
                </button>`
              );
            })}
            
            ${lifelineEnabled&&!lifelineUsed&&(

              html`<button class="btn btn-ghost" style=${{marginBottom:8,background:"#f0f9ff",color:"#1e40af",border:"1.5px solid #93c5fd"}} onClick=${()=>onShowHint("hintBtn")}>

            )}
            <button class="not-learned-btn" onClick=${onNotLearnedYet}>
              <span class="choice-label" style=${{background:"#f3f4f6",color:"#6b7280"}}>E</span>

            </button>
          <//>`
        )}
      </div>`
    );

  // ─ 結果フェーズ：不正解 ─
  // 並び方針: ①ミスタイプ大見出し → ②「ここまでは合ってた」途中成功 → ③選んだ選択肢の分析 → ④問題と答え合わせ → ⑤行動ボタン

    const partials=calcPartialSuccesses(quiz,{selectedChoice,isReview,confidenceRating});
    return(
      html`<div ref=${quizCardRef} class=${`quiz-card${easyMode?" diff-easy-soft":""}`}>

        <div class="result-big-ng">
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>

          <${StatGainsPop} answerGains=${answerGains}/>
        </div>

        ${partials.length>0&&(
          html`<div class="partial-success-box">
            <div class="partial-success-label">${TXT.hereCorrect}</div>
            <div class="partial-success-pills">
              ${partials.map((p,i)=>(
                html`<span key=${i} class="partial-success-pill">${p.icon} ${p.label}</span>`

        ${chosenAnalysis&&selectedChoice!==null&&(
          html`<div class="thought-quote">
            <div class="thought-label">${TXT.yourThought} — ${CHOICE_LABELS[selectedChoice]}: ${quiz.choices[selectedChoice]}</div>
            <div class="thought-text">
              あなたは<span class="qmark">「</span>${chosenAnalysis.why_chosen}<span class="qmark">」</span>と考えた
            </div>
            <div class="thought-why-wrong">✗ ${chosenAnalysis.why_wrong}</div>
          </div>`
        )}

        ${easyMode&&(
          html`<div class="encourage-box">
            ${TXT.encourageEasy}
          </div>`
        )}
        
        <div class="q-text">${quiz.question}</div>
        ${quiz.choices.map((c,i)=>{
          let cls="choice-btn";
          if(i===quiz.correct)cls+=" correct";
          else if(i===selectedChoice)cls+=" wrong";
          else cls+=" dim";
          return(
            html`<div key=${i} class=${cls} style=${{cursor:"default"}}>
              <span class="choice-label">${CHOICE_LABELS[i]}</span>${c}
            </div>`
          );
        })}
        
        <div style=${{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"10px 12px",marginTop:6,marginBottom:10,fontSize:13,color:"#166534",fontWeight:700,lineHeight:1.65}}>
          ✅ ${quiz.correct_feedback}
        </div>
        
        <button class="why-wrong-btn" onClick=${onToggleWhyWrong}>

          html`<div class="why-wrong-panel">

            ${quiz.wrong_analysis.map((wa,i)=>{
              const idx=typeof wa.index==="number"?wa.index:null;
              const choiceText=idx!==null?quiz.choices[idx]:"";
              return(
                html`<div key=${i} class="why-wrong-item">
                  <div class="why-wrong-choice">${idx!==null?CHOICE_LABELS[idx]:""} ${choiceText}</div>
                  <div style=${{color:"#d97706",marginBottom:2}}>🤔 ${wa.why_chosen}</div>
                  <div style=${{color:"#991b1b"}}>✗ ${wa.why_wrong}</div>
                </div>`
              );
            })}
          </div>`
        )}
        ${/* 自信度は回答前で固定。結果フェーズでは再表示しない */ ""}
        <button class="btn-retry" onClick=${onRetry}>${TXT.retry}</button>
        ${!easyMode&&quiz.hint&&(
          html`<${Fragment}>
            <button class="btn btn-ghost" onClick=${onToggleHintPanel} style=${{marginBottom:8}}>
              ${hintPanelOpen?TXT.closeHintInline:TXT.showHintInline}

              html`<div class="hint-box" style=${{marginBottom:8}}>

  // ─ 結果フェーズ：正解 ─
  if(quizPhase==="result"&&isCorrect){
    return(
      html`<div ref=${quizCardRef} class=${`quiz-card${easyMode?" diff-easy-soft":""}`}>

        </div>
        
        <div style=${{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"12px 14px",marginBottom:10,fontSize:13,color:"#166534",fontWeight:700,lineHeight:1.65}}>
          ${quiz.correct_feedback}
        </div>
        
        <${RecallQuiz} quiz=${quiz} onAnswered=${onActiveRecallAnswered}/>
        
        <button class="why-wrong-btn" onClick=${onToggleWhyWrong}>
          ${showWhyWrong?TXT.whyWrongClose:TXT.whyWrongOpen}
        </button>
        ${showWhyWrong&&Array.isArray(quiz.wrong_analysis)&&(
          html`<div class="why-wrong-panel">

              return(
                html`<div key=${i} class="why-wrong-item">

                </div>`
              );
            })}
          </div>`
        )}
        ${/* 自信度は回答前で固定。結果フェーズでは再表示しない */ ""}
        <button class="btn-green" onClick=${onNext}>${TXT.next}</button>
        <button class="report-btn" onClick=${onReport}>${TXT.reportBtn}</button>

  return null;
});

  const [todayKey,setTodayKey]=useState(()=>today());

      setGs(p=>_rolloverGs(p));

  const refillLk=useRef(false);const fetchLk=useRef(false);const nextLk=useRef(false);const reqId=useRef(null);

  // 「今日の成長タイプ」と「AI総評」を成長スコアタブ表示時に動的算出
  // 低学年（小1-3）はやさしい文言。学年が変わると useEffect が再走するため gradeR ではなく grade を依存に含める。
  useEffect(()=>{

    const low=isLowGrade(grade);
    const gained=STAT_ORDER.filter(k=>(tg[k]||0)>0)

      const typeMap=low?{

        attention:"👀 観察型 — ミスから注意力を磨いた1日",
        verificationPower:"🔍 確認型 — 『説明できる』正解を積めた1日",
        retryAgain:"🔁 粘り型 — もう一回解いて正解を掴んだ瞬間が多かった",

      setGrowthTypeMsg("");
    }
    // AI総評: 今日の正解率・連続・科目偏りから良かった点を1つピックアップ
    const todayQ=logs.dailyLog?.[td]?.q||0;

    if(todayQ>=3){
      const rate=todayC/todayQ;
      const reviews=[];
      if(low){
        if(rate>=0.8)reviews.push(`せいかいりつ ${Math.round(rate*100)}% は すごい あんていかん。`);
        if(logs.bestStreak>=5)reviews.push(`れんぞく せいかい さいこう ${logs.bestStreak}もんは きみの つよみ。`);
        if((logs.dailyLog?.[td]?.subjects||[]).length>=3)reviews.push(`${(logs.dailyLog[td].subjects||[]).length}かもくを まわせた バランスかんかく。`);
        if(reviews.length===0)reviews.push(`${todayQ}もんに ちょうせんし つづけた ことが いちばんの せいか。`);
      }else{
        if(rate>=0.8)reviews.push(`正解率${Math.round(rate*100)}%は素晴らしい安定感。`);
        if(logs.bestStreak>=5)reviews.push(`連続正解の最高${logs.bestStreak}問はあなたの強み。`);
        if((logs.dailyLog?.[td]?.subjects||[]).length>=3)reviews.push(`${(logs.dailyLog[td].subjects||[]).length}科目を回せたバランス感覚。`);
        if(reviews.length===0)reviews.push(`${todayQ}問挑戦し続けたこと自体が一番の成果。`);

  // quiz がセットされたら問題フェーズを自動スタート
  useEffect(()=>{

  // 初回ロード: IndexedDB → localStorage への ITP救済を非同期で実行（完了後 loadLogs を再実行）

  const reloadProfile=()=>{

  // ユーザー切替時に呼ぶ：個別スコープのキーから state を再ロード。

    try{cleanDam();}catch(e){}
    loadLogs();setDamStats(getDamStats(subjectsR.current));
  },[]);

  // ─── 旧データの "数学" → 内部キー "算数" 正規化 ────────────────────
  // loadLogs / importData でロード直後に呼ぶ。in-memory を常にクリーンに保つ。
  const normalizeSubjectsInLogs=logs=>{
    const out={...logs};
    // reviewQueue: 科目正規化 + idなし旧エントリに id を補完
    // id がないと updateAnalysisStats の topic fallback 削除が誤爆するため、
    // ロード時に一括で id を付与して id ベース削除に一本化する。
    if(Array.isArray(out.reviewQueue)){
      out.reviewQueue=out.reviewQueue.map(q=>{

        const withId=normalized.id?normalized:{...normalized,id:safeUUID()};
        // SM-2 マイグレーション: dueDate がない旧データは今日扱いで即出題対象に
        if(withId.dueDate&&typeof withId.reps==="number")return withId;
        return {...withId,reps:withId.reps||0,dueDate:withId.dueDate||today()};

      );
    }

    if(Array.isArray(out.recentHistory)){
      out.recentHistory=out.recentHistory.map(r=>
        r.subject==="数学"?{...r,subject:"算数"}:r
      );
    }
    // subjectStats: "数学" キーがあれば "算数" にマージして削除
    if(out.subjectStats?.["数学"]){
      const m=out.subjectStats["数学"];
      const a=out.subjectStats["算数"]||{q:0,c:0};
      out.subjectStats={...out.subjectStats,"算数":{q:a.q+m.q,c:a.c+m.c}};
      delete out.subjectStats["数学"];
    }

    if(out.dailyLog){
      const dl={};
      for(const [k,v] of Object.entries(out.dailyLog)){
        dl[k]=Array.isArray(v.subjects)
          ?{...v,subjects:v.subjects.map(s=>s==="数学"?"算数":s)}
          :v;
      }
      out.dailyLog=dl;
    }
    // subjectUnitStats: "数学" キーがあれば "算数" にマージして削除
    if(out.subjectUnitStats?.["数学"]){
      const m=out.subjectUnitStats["数学"];
      const a=out.subjectUnitStats["算数"]||{};
      const merged={...a};
      for(const [unit,pts] of Object.entries(m)){merged[unit]=(merged[unit]||0)+pts;}
      out.subjectUnitStats={...out.subjectUnitStats,"算数":merged};
      delete out.subjectUnitStats["数学"];

  // ─── localStorage 肥大化防止 ──────────────────────────────────────
  // 保存前に呼ぶ。in-memory の state は触らず、書き込み用オブジェクトだけ刈る。
  // Safari の 5MB 制限を意識して各種上限を絞っている。
  const pruneLogs=nl=>{
    const out={...nl};
    // topicMastery: 150件上限（旧300から削減）
    const tm={...(out.topicMastery||{})};
    const tmKeys=Object.keys(tm);
    if(tmKeys.length>150){
      tmKeys.sort((a,b)=>(tm[a].attempts||0)-(tm[b].attempts||0));
      tmKeys.slice(0,tmKeys.length-150).forEach(k=>delete tm[k]);
      out.topicMastery=tm;
    }
    // dailyLog: 180日上限（旧365から削減）
    const dl={...(out.dailyLog||{})};
    const dlKeys=Object.keys(dl).sort();
    if(dlKeys.length>180){
      dlKeys.slice(0,dlKeys.length-180).forEach(k=>delete dl[k]);
      out.dailyLog=dl;
    }
    // subjectUnitStats: 各科目最大20単元（ポイント低い順に削除）
    const sus={...(out.subjectUnitStats||{})};
    for(const subj of Object.keys(sus)){
      const m=sus[subj]||{};
      const keys=Object.keys(m);
      if(keys.length>20){
        keys.sort((a,b)=>(m[a]||0)-(m[b]||0));
        const trimmed={};
        keys.slice(keys.length-20).forEach(k=>{trimmed[k]=m[k];});
        sus[subj]=trimmed;
      }
    }
    out.subjectUnitStats=sus;
    // recentHistory: 直近200問。updateLogs 側の slice(-200) とキャップを揃え、
    // リロード前後で calcMistakeTypes・週次サマリーの数字がズレないようにする。
    if(Array.isArray(out.recentHistory)&&out.recentHistory.length>200){
      out.recentHistory=out.recentHistory.slice(-200);
    }
    // debugHistory: 直近50件まで（旧100から削減）
    // ※ recentHistory は push（末尾追加）→ slice(-200) で先頭を切り捨てる。
    //   debugHistory は unshift（先頭追加）→ slice(0,50) で末尾を切り捨てる。
    //   両者でスライス方向が逆なのはバグではなく、追加方向の違いに合わせた正しい設計。
    //   どちらも「新しいデータを残す」動作として一貫している。
    if(Array.isArray(out.debugHistory)&&out.debugHistory.length>50){
      out.debugHistory=out.debugHistory.slice(0,50);
    }
    // dailyStatGains / dailyUnitGains / dailyUnitGainsByName: 直近30日まで
    for(const k of ["dailyStatGains","dailyUnitGains","dailyUnitGainsByName"]){
      const m={...(out[k]||{})};
      const ks=Object.keys(m).sort();
      if(ks.length>30)ks.slice(0,ks.length-30).forEach(kk=>delete m[kk]);
      out[k]=m;
    }
    return out;
  };

  const loadLogs=()=>{

        if(!p.dailyUnitGains)p.dailyUnitGains={};
        if(!p.dailyUnitGainsByName)p.dailyUnitGainsByName={};
        if(!p.subjectUnitStats)p.subjectUnitStats={};
        if(!p.subjectDifficulty)p.subjectDifficulty={};
        // 旧 dailyStatGains 内の signControl も attention にマージ
        for(const dk of Object.keys(p.dailyStatGains)){

        //   days===2（一昨日）のとき "昨日はお休みだったね" と表示するのは一見おかしく見えるが、
        //   isGap が true になる最小の空白が「2日前（=一昨日）」であり、
        //   「昨日休んで今日来た」という文脈として正しい。バグではない。
        // [要調査→バグではない B] days===2 で「昨日はお休みだったね」は「前回ログインが一昨日＝
        //   昨日を休んだ」という意味で正しい。isGap の最小値は 2 日前（today-lastLogin>=2）。
        //   days===1 は lastLogin===yk2（昨日）なので isGap=false → ここに到達しない。
        if(!isGap&&p.loginStreak>=1&&p.lastLogin!==td){setShowLoginBonus(true);setTimeout(()=>setShowLoginBonus(false),3500);}

        if(isGap){

          try{

            const now=new Date(td+"T00:00:00");

            if(days>=3){
              setLongTimeMsg(`${days}日ぶりの学習！ブランクは決して無駄にはなっていない。今日の1問が、続ける力を取り戻す合図。`);

  const saveLogs=nl=>{try{_safeLS.set(STORE(),JSON.stringify(pruneLogs(nl)));}catch(e){}};

  // ボーナス +ステータス: 操作起点で1問につき1回だけ発火（連打を抑止）。
  // anchor (クリック座標) を受け取り、触ったところ近くに pop を出す。
  // 表示は CSS アニメ + setTimeout のみで軽量。trial 中は視覚のみで永続化しない。
  const addBonusPop=useCallback(({icon,name,statKey,amount=1,anchor=null})=>{
    const vw=window.innerWidth||360, vh=window.innerHeight||640;
    const sx=window.scrollX||0, sy=window.scrollY||0;
    // アンカー無し → 直前にクリックされた要素 (document.activeElement) を試し、
    // それも無理なら画面中央へ（旧仕様の "画面上部" は遠すぎて見切れるためやめる）。
    // .root に contain:layout があるため position:fixed は .root 基準になる。
    // getBoundingClientRect() の viewport 座標に scrollX/Y を足して document 座標に変換。
    let x=anchor?.x, y=anchor?.y;
    if(typeof x!=="number"||typeof y!=="number"){
      try{
        const ae=document.activeElement;
        if(ae&&ae.getBoundingClientRect){
          const r=ae.getBoundingClientRect();
          if(r&&(r.width||r.height)){
            x=r.left+r.width/2+sx; y=r.top+r.height/2+sy;
          }
        }
      }catch(_){}
    }
    // 完全フォールバック: 常に「今見えている画面の中央」= viewport中央 + scroll
    if(typeof x!=="number")x=sx+vw/2;
    if(typeof y!=="number")y=sy+vh/2;
    // 画面端で pop が見切れないようクランプ（pill 幅 ~150px / 高さ ~32px）
    x=Math.max(sx+80, Math.min(sx+vw-80, x));
    y=Math.max(sy+48, Math.min(sy+vh-48, y));
    const id=++bonusIdR.current;
    // 同じ近傍に既存ポップがあるとき（自信度→ヒント→リコール 等を連打した場合）
    // 同座標で重なって読めなくなる。横±90px / 縦±120px 以内にある既存数だけ
    // 上方向にずらして縦積みにする（最大 4 段 = 152px）。
    setBonusPops(prev=>{
      const tail=prev.slice(-5);
      const nearCount=tail.filter(p=>Math.abs(p.x-x)<90 && Math.abs(p.y-y)<120).length;
      const offsetY=Math.min(nearCount,4)*38;
      const adjY=Math.max(sy+48, y-offsetY);
      return [...tail,{id,icon,name,amount,x,y:adjY}];
    });
    const tid=setTimeout(()=>{
      setBonusPops(p=>p.filter(x=>x.id!==id));
      bonusTidsR.current.delete(id);
    },1400);
    bonusTidsR.current.set(id,tid);
    if(trialModeR.current)return;
    if(!statKey||!STAT_ORDER.includes(statKey))return;
    setLogs(prev=>{
      const next=deepClone(prev);
      const td=today();
      next.cumulativeStats={..._zeroStats(),...(next.cumulativeStats||{})};
      if(!next.dailyStatGains)next.dailyStatGains={};
      if(!next.dailyStatGains[td])next.dailyStatGains[td]=_zeroStats();
      else next.dailyStatGains[td]={..._zeroStats(),...next.dailyStatGains[td]};
      next.cumulativeStats[statKey]=(next.cumulativeStats[statKey]||0)+amount;
      next.dailyStatGains[td][statKey]=(next.dailyStatGains[td][statKey]||0)+amount;
      saveLogs(next);
      return next;
    });
  },[]);

  // 問題切替時にボーナス発火ガードをリセット（&残存タイマー掃除はそのまま自然消滅で OK）
  useEffect(()=>{
    bonusFiredR.current={recall:false,whyWrong:false,confidence:false,timeAttack:false,hintShown:false};
  },[quiz]);
  // ⑦ hint 表示有無の追跡：ヒントを見ずに正解できたかを判定するため
  const hintUsedR=useRef(false);
  useEffect(()=>{hintUsedR.current=false;},[quiz]);
  useEffect(()=>{if(hintSource)hintUsedR.current=true;},[hintSource]);

  // アンマウント時のタイマー掃除
  useEffect(()=>()=>{ bonusTidsR.current.forEach(clearTimeout); bonusTidsR.current.clear(); },[]);

  const checkBadges=(next)=>{
    const subs=subjectsR.current;
    const earned=BADGES.filter(b=>!next.earnedBadges.includes(b.id)&&b.cond(next,subs));
    if(earned.length){next.earnedBadges=[...next.earnedBadges,...earned.map(b=>b.id)];setNewBadges(earned);setTimeout(()=>setNewBadges([]),3500);}
  };

  const updateLogs=useCallback((correct,subj,wrongItem,newBest,sessionComplete,wasRetry=false)=>{
    setLogs(prev=>{
      const next=deepClone(prev);const td=today();
      // 「不正解→リトライ」での扱い:
      // 「初回の回答」を正答率／履歴の正本とする。同じ問題のリトライ回は、問題数・正解数・履歴・reviewQueue を二重に積まない。
      // また、初回が不正解だった事実は書き換えず保持する（戻って正解しても正解率100%になる不整合を防ぐ）。
      // ステータス／単元力は後段で「ストレート正解と同等の net 加算」になるよう wasRetry 分岐で調整する。
      if(!next.subjectStats[subj])next.subjectStats[subj]={q:0,c:0};
      if(!wasRetry){
        next.subjectStats[subj].q++;
        if(correct)next.subjectStats[subj].c++;
      }
      if(!next.dailyLog[td])next.dailyLog[td]={q:0,c:0,subjects:[],sessions:0};
      if(!wasRetry){
        next.dailyLog[td].q++;
        if(correct)next.dailyLog[td].c++;
      }
      if(sessionComplete&&!wasRetry)next.dailyLog[td].sessions++; // 初回正解のみノルマカウント（リトライ正解で水増ししない）
      if(!next.dailyLog[td].subjects.includes(subj))next.dailyLog[td].subjects.push(subj);
      if(!wasRetry){
        next.totalQ++;
        if(correct)next.totalCorrect++;
      }
      if(newBest!==undefined)next.bestStreak=Math.max(next.bestStreak||0,newBest);
      if(!next.recentHistory)next.recentHistory=[];
      if(!wasRetry){
        next.recentHistory.push({correct,subject:subj,date:td,mistake_type:(!correct&&quiz?.mistake_type)||undefined,confidence:confidenceRatingR.current??undefined});
      }
      // リトライ回は recentHistory を書き換えない（初回の不正解とミス型を保持）
      if(next.recentHistory.length>200)next.recentHistory=next.recentHistory.slice(-200);
      // 初回の不正解のみ reviewQueue へ追加（リトライ wrong は wrongItem=null で来る）
      // [要調査→バグではない A] `length<=19` でプッシュ → 追加後の最大は20件。
      //   importData の `slice(-20)` キャップと上限が一致しており意図的な設計。
      //   「<20 にすべきでは？」と見えるが <=19 は「20未満のとき追加」と同義なので正しい。
      if(!correct&&wrongItem){if(!next.reviewQueue)next.reviewQueue=[];if(next.reviewQueue.length<=19)next.reviewQueue.push(wrongItem);}
      // ── 継続力: 新しい日かチェック（loginStreak更新前に確認）──
      const isNewDay=(next.lastLogin!==td);
      if(next.lastLogin!==td){const ys=jstYesterday();next.loginStreak=(next.lastLogin===ys)?(next.loginStreak||0)+1:1;next.lastLogin=td;next.bestLoginStreak=Math.max(next.bestLoginStreak||0,next.loginStreak);}
      // 当日スコアの自己最高記録は dailyStatGains / dailyUnitGains の加算後に行う
      // （加算前に呼ぶと「今回の回答ぶん」が反映されず、自己ベストが常に1問遅れる）
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      if(topic&&!wasRetry){
        // 初回の試行のみを単元マスター集計に反映（リトライで attempts を二重カウントしない）
        if(!next.topicMastery[topic])next.topicMastery[topic]={subj,attempts:0,correct:0,debugDone:0,mastered:false};
        const tm=next.topicMastery[topic];tm.attempts++;if(correct)tm.correct++;
        if(!tm.mastered&&tm.attempts>=5&&tm.correct/tm.attempts>=.8)tm.mastered=true;
      }
      // ── 累積ステータス & 今日伸びた能力 ─────────────────────────────
      next.cumulativeStats={..._zeroStats(),...(next.cumulativeStats||{})};
      if(!next.dailyStatGains)next.dailyStatGains={};
      if(!next.dailyStatGains[td])next.dailyStatGains[td]=_zeroStats();
      else next.dailyStatGains[td]={..._zeroStats(),...next.dailyStatGains[td]};
      // 直前が不正解だったかチェック（復帰力用）
      const prevRec=prev.recentHistory&&prev.recentHistory.length?prev.recentHistory[prev.recentHistory.length-1]:null;
      const prevWrong=!!(prevRec&&!prevRec.correct);
      // 連続正解数（安定力用）。リトライ回は streak を動かさない（前回の値を引き継ぐ）
      // ※ wasRetry 時に `prev._streak||0` を返すのはバグではない。
      //   リトライは「同じ問題の再挑戦」なので連続カウントを変動させず前回値を維持する設計。
      //   correct=true のとき `(prevRec.correct ? prev._streak : 0) + 1` で
      //   「直前が正解ならストリーク継続、不正解なら1にリセット」を正しく実装している。
      // [要調査→バグではない #3] wasRetry 正解時にも streak を加算しないのは「水増し防止」の設計。
      //   初回不正解 → リトライ正解の流れで streak が+1されると、不正解があったのに
      //   連続正解が伸び続ける不整合が生じる。wasRetry 時は prev._streak をそのまま
      //   持ち越すことで「不正解で一度 0 に戻った事実を保持」している。バグではない。
      const newStreak=wasRetry?(prev._streak||0):correct?(((prevRec&&prevRec.correct)?(prev._streak||0):0)+1):0;
      next._streak=newStreak;
      // 基本ゲイン: daily と cumulative の両方に加算（成長スコアの予測可能性を担保）
      // ・wasRetry+正解 → 直前に与えた wrong 分を差し引いて「ストレート正解と同等」に揃える
      // ・wasRetry+不正解 → 同じ問題の繰り返し誤答は加点なし（無限稼ぎ防止）
      // isFirstToday: 今日の問題カウント（incremement 前の prev 値）が 0、かつリトライでない
      const isFirstToday=!wasRetry&&((prev.dailyLog?.[td]?.q||0)===0);
      let stGains;
      if(wasRetry){
        if(correct){
          stGains=_zeroStats();
          stGains.verificationPower=1; // リトライ正解は確認力+1のみ
        }else{
          stGains=_zeroStats();
        }
      }else{
        stGains=calcStatGainsForAnswer(correct,quiz?.mistake_type,{streak:newStreak,isFirst:isFirstToday});
      }
      for(const k of Object.keys(stGains)){
        next.cumulativeStats[k]=(next.cumulativeStats[k]||0)+stGains[k];
        next.dailyStatGains[td][k]=(next.dailyStatGains[td][k]||0)+stGains[k];
      }
      // ボーナス: wasRetry 中はゼロ（retryAgain / retryPower を稼げない）。
      // 累積のみに加算（dailyStatGains には載せない）。streak は daily 側へ移動済み。
      const stBonus=wasRetry?_zeroStats():calcStatBonusesForAnswer(correct,{wasRetry,prevWrong});
      for(const k of Object.keys(stBonus)){
        if(stBonus[k]>0)next.cumulativeStats[k]=(next.cumulativeStats[k]||0)+stBonus[k];
      }
      // 自信度=3（説明できる）で初回正解 → 確認力 +2（累積のみ）。
      // ※ recentHistory.push 直前で confidence は confidenceRatingR.current として記録済み。
      //   リトライ正解は別途 stGains.verificationPower=1 を付与しているため、ここでは付与しない（二重防止）。
      const _confNow=confidenceRatingR.current;
      let _confVerifGain=0;
      if(!wasRetry&&correct&&_confNow===3){
        _confVerifGain=2;
        next.cumulativeStats.verificationPower=(next.cumulativeStats.verificationPower||0)+_confVerifGain;
      }
      // 継続力: 新しい日ログイン時に+5（累積のみ）
      if(isNewDay){
        next.cumulativeStats.consistency=(next.cumulativeStats.consistency||0)+5;
      }
      // 開始力: ノルマセッション達成時 (sessionComplete=true & まだ3未満→3達成)（累積のみ）
      if(sessionComplete){
        next.cumulativeStats.startingPower=(next.cumulativeStats.startingPower||0)+2;
      }
      // ── 単元力（科目別 topic_tag 単位の成長）──────────────────────
      // wasRetry+正解 は wrong 分を差し引いて「ストレート正解と同等」、
      // wasRetry+不正解 は加点なし（無限稼ぎ防止）。
      const unitName=quiz?.topic_tag||quiz?.question?.slice(0,12)||"";
      if(unitName&&subj){
        if(!next.subjectUnitStats)next.subjectUnitStats={};
        if(!next.subjectUnitStats[subj])next.subjectUnitStats[subj]={};
        let ug;
        if(wasRetry){
          ug=correct?(unitGainForAnswer(true)-unitGainForAnswer(false)):0;
        }else{
          ug=unitGainForAnswer(correct);
        }
        next.subjectUnitStats[subj][unitName]=(next.subjectUnitStats[subj][unitName]||0)+ug;
        // 20件を超えたらポイントが最も低いものから削除
        const m=next.subjectUnitStats[subj];const ks=Object.keys(m);
        if(ks.length>20){
          ks.sort((a,b)=>m[a]-m[b]);
          ks.slice(0,ks.length-20).forEach(k=>delete m[k]);
        }
        if(!next.dailyUnitGains)next.dailyUnitGains={};
        next.dailyUnitGains[td]=(next.dailyUnitGains[td]||0)+ug;
        // 単元名別の今日の伸び（成長スコア（今日）pill 表示用）
        if(!next.dailyUnitGainsByName)next.dailyUnitGainsByName={};
        if(!next.dailyUnitGainsByName[td])next.dailyUnitGainsByName[td]={};
        next.dailyUnitGainsByName[td][unitName]=(next.dailyUnitGainsByName[td][unitName]||0)+ug;
      }
      // dailyStatGains / dailyUnitGains / dailyUnitGainsByName は30日上限
      for(const dkey of ["dailyStatGains","dailyUnitGains","dailyUnitGainsByName"]){
        const m=next[dkey]||{};const ks=Object.keys(m).sort();
        if(ks.length>30)ks.slice(0,ks.length-30).forEach(k=>delete m[k]);
        next[dkey]=m;
      }
      // 当日スコアの自己最高記録（伸びた能力合計）— 加算後の値で判定。
      // bestLoginStreak / bestStreak と同じ Math.max スタイルに揃える。
      const {score:dayScore}=calcTodayScore(next);
      next.bestDayScore=Math.max(next.bestDayScore||0,dayScore);
      // gs.todayScore 更新用：今回 1 問で増えた分を ref 経由で setGs に橋渡し
      gainForGsRef.current=Math.floor(dayScore-(calcTodayScore(prev).score||0));
      // 自動難易度を更新（次回出題時に反映）
      if(!next.subjectDifficulty)next.subjectDifficulty={};
      next.subjectDifficulty[subj]=getAutoDifficulty(subj,next);
      // v14: ランクイン検出（前回スナップショットと比較し、TOP5入りした基本ステータスを通知）
      try{
        const prevSnap=prev.statRankSnapshot||{};
        const cur=next.cumulativeStats||{};
        const sorted=STAT_ORDER.map(k=>({k,v:cur[k]||0})).sort((a,b)=>b.v-a.v);
        const newRank={};sorted.forEach((x,i)=>{ newRank[x.k]=i+1; });
        for(const item of sorted.slice(0,5)){
          const prevR=prevSnap[item.k]||999;
          if(prevR>5 && newRank[item.k]<=5 && item.v>0){
            // ランクイン！
            setRankInToast({label:getStatLabel(item.k,gradeR.current).name,rank:newRank[item.k]});
            setTimeout(()=>setRankInToast(null),3200);
            break;
          }
        }
        next.statRankSnapshot=newRank;
      }catch(e){}
      checkBadges(next);saveLogs(next);
      // 成長ホップ再生（0.4s/item で順次跳ねる）
      // ※ 直前の reset タイマーが残っていると新しいアニメを途中で打ち切るため、必ず先にクリア。
      if(hopResetTidR.current){clearTimeout(hopResetTidR.current);hopResetTidR.current=null;}
      setHopKey(k=>k+1);
      hopResetTidR.current=setTimeout(()=>{setHopKey(0);hopResetTidR.current=null;},2600); // 5項目 × 0.4s + 余裕 0.6s
      // 結果画面で順次フェード表示する +ステータスの一覧を構築
      {
        const merged={};
        for(const k of STAT_ORDER){if(stGains[k]>0)merged[k]=(merged[k]||0)+stGains[k];}
        for(const k of STAT_ORDER){if(stBonus[k]>0)merged[k]=(merged[k]||0)+stBonus[k];}
        if(isNewDay)merged.consistency=(merged.consistency||0)+5;
        if(sessionComplete)merged.startingPower=(merged.startingPower||0)+2;
        if(_confVerifGain>0)merged.verificationPower=(merged.verificationPower||0)+_confVerifGain;
        const list=STAT_ORDER.filter(k=>merged[k]>0).map(k=>({key:k,icon:STAT_LABELS[k].icon,name:STAT_LABELS[k].name,amount:merged[k]}));
        if(unitName&&subj){
          // 単元力の pill は「分数力 +6」のように実際の単元名で表示。
          // wasRetry+正解 は wrong 分を差し引いた net 値で表示（ストレート正解と合計が同等）。
          const unitAmount=wasRetry?(correct?(unitGainForAnswer(true)-unitGainForAnswer(false)):0):unitGainForAnswer(correct);
          if(unitAmount>0){
            const shortName=unitName.length>8?unitName.slice(0,7)+"…":unitName;
            list.push({key:"__unit",icon:"🎯",name:`${shortName}力`,amount:unitAmount,isUnit:true});
          }
        }
        setAnswerGains(list.length?list:null);
      }
      return next;
    });
  },[quiz]);

  const updateAnalysisStats=useCallback((results,subj)=>{
    const perfect=results.every(Boolean);
    setLogs(prev=>{
      const next=deepClone(prev);
      if(!next.debugStats)next.debugStats={completed:0,perfect:0};
      next.debugStats.completed++;if(perfect)next.debugStats.perfect++;
      const topic=quiz?.topic_tag||quiz?.question?.slice(0,20)||"";
      // 問題ID単位で削除。旧データは normalizeSubjectsInLogs でロード時に id を補完済みなので
      // topic fallback は不要。id がない場合は削除しない（安全側に倒す）。
      // SM-2: 復習を正解できたら次の間隔へ繰り上げ（卒業すれば削除）。
      //       不正解なら現アイテムを削除（updateLogs 側で reps=0 の新規 wrongItem が積まれる）。
      const reviewId=currentReviewItemIdR.current;
      const reviewCorrect=results.every(Boolean);
      if(reviewId){
        if(reviewCorrect){
          next.reviewQueue=(next.reviewQueue||[]).map(q=>{
            if(q.id!==reviewId)return q;
            return advanceReviewItem(q); // null なら卒業
          }).filter(q=>q!=null);
        }else{
          next.reviewQueue=(next.reviewQueue||[]).filter(q=>q.id!==reviewId);
        }
      }
      if(topic&&next.topicMastery[topic]){
        next.topicMastery[topic].debugDone++;
      }
      if(!next.debugHistory)next.debugHistory=[];
      next.debugHistory.unshift({date:today(),subj,topic:topic||"—",results});
      if(next.debugHistory.length>50)next.debugHistory=next.debugHistory.slice(0,50);
      checkBadges(next);saveLogs(next);return next;
    });
  },[quiz]);

  const getFireLevel=n=>{if(n>=30)return 5;if(n>=14)return 4;if(n>=7)return 3;if(n>=3)return 2;if(n>=1)return 1;return 0;};
  const pickSubject=cur=>{
    const subs=subjectsR.current;
    const rates=calcSubjRates(cur.recentHistory);
    const ws=subs.map(s=>{if(s===subjR.current)return{s,w:0};const r=rates[s];if(!r||r.q===0)return{s,w:5};if(r.q<3)return{s,w:3};const rt=r.c/r.q;return{s,w:rt<.5?4:rt<.7?2:1};});
    const tot=ws.reduce((a,b)=>a+b.w,0);let r=Math.random()*tot;
    for(const x of ws){r-=x.w;if(r<0)return x.s;}return ws[ws.length-1].s;
  };

  const buildNormaQueue=cur=>{
    const subs=subjectsR.current;
    const done=cur.dailyLog?.[today()]?.sessions||0;
    const needed=Math.max(0,5-done);
    if(!needed)return[];
    const rates=calcSubjRates(cur.recentHistory);
    const result=[];const used=new Set();
    // 優先1: 復習キューの科目（思い込みアラート優先 → 期日到来順）
    // SM-2: 期日が今日以前のアイテムだけを対象にする
    const reviewItem0=firstDueReview(cur.reviewQueue);
    if(reviewItem0&&result.length<needed&&!used.has(reviewItem0.subject)){
      const reason=reviewItem0.priority?"思い込み復習！":"復習タイム！";
      result.push({subj:reviewItem0.subject,reason,reviewItemId:reviewItem0.id});
      used.add(reviewItem0.subject);
    }
    // 優先2: 未挑戦・苦手順
    const sorted=subs.filter(s=>!used.has(s))
      .map(s=>{const r=rates[s];const rate=(r&&r.q>=3)?r.c/r.q:null;return{s,rate,q:r?.q||0};})
      .sort((a,b)=>{
        if(a.rate===null&&b.rate===null)return a.q-b.q;
        if(a.rate===null)return-1;if(b.rate===null)return 1;
        return a.rate-b.rate;
      });
    for(const{s,rate,q}of sorted){
      if(result.length>=needed)break;
      const reason=q===0?"まだ未挑戦！":rate===null?"挑戦中！":rate<0.5?"苦手科目！":rate<0.7?"もう少し！":"バランス調整";
      result.push({subj:s,reason});used.add(s);
    }
    return result;
  };

  const startWithNorma=(cur,g)=>{
    manualSubjectR.current=false; // ノルマ開始はAI自動選択
    const nq=buildNormaQueue(cur);
    if(nq.length){
      const[first,...rest]=nq;
      setNormaQueue(rest);normaQueueR.current=rest;
      setNormaReason(first.reason);
      // ノルマ1問目が復習由来かどうかチェック
      // reviewItemId は buildNormaQueue 時点で確定済み → logsR を再参照しない
      if((first.reason==="復習タイム！"||first.reason==="思い込み復習！")&&first.reviewItemId){
        setCurrentReviewItemId(first.reviewItemId);
        currentReviewItemIdR.current=first.reviewItemId;
        setIsReview(true);
        isReviewR.current=true;
      }
      resetFetch(first.subj,g);
    }else{
      setNormaReason("");
      // ノルマ達成済み → 期日到来の復習キュー（優先度順）があれば復習モードで開始
      const item=firstDueReview(cur.reviewQueue);
      if(item){
        setCurrentReviewItemId(item.id);
        currentReviewItemIdR.current=item.id;
        setIsReview(true);
        isReviewR.current=true;
        resetFetch(item.subject,g);
      }else{
        resetFetch(pickSubject(cur),g);
      }
    }
  };

  const resetState=()=>{
    setQuiz(null);
    setQuizPhase(null);setSelectedChoice(null);setHintSource(null);setShowWhyWrong(false);setAnswerCorrect(null);
    setAnswerGains(null);
    setAnalysisStep(null);setStepAns(null);

  // ⑦ タイムアタック: advancedMode.timeAttack ON で問題表示中のみ作動（easyModeでは無効化）
  // handleChoice は後で定義されるため ref 経由で参照する
  const handleChoiceR=useRef(null);

  // ⑧ ライフライン: 間違い1つをランダムに消す
  const handleLifeline=useCallback(()=>{

  // バックグラウンド補充
  useEffect(()=>{
    if(screen!=="app")return;
    let cancelled=false;
    const doRefill=async()=>{
      if(cancelled||refillLk.current)return false;
      // 緊急生成と同時実行しない（同じ科目への二重API呼び出しを防ぐ）
      if(emergencyGenLk.current)return false;
      const keys=keysR.current.filter(k=>k.trim());if(!keys.length)return false;
      const g=gradeR.current||calcGrade(bdR.current);
      const curSubjects=calcSubjects(g);
      // (科目, 難易度) ペア単位で不足バケットを補充対象にする
      const sorted=lowestBuckets(curSubjects.length*DIFFS.length,curSubjects);
      const lacking=sorted.filter(t=>t.cnt<DAM_MAX);
      // [要調査→バグではない C] lacking.length===0（全バケット満杯）でも autoRefill=ON なら
      //   `sorted.slice(0,1)` で補充が走る。「満杯なのに補充？」と見えるが、
      //   autoRefill=ON は「最新問題に入れ替え続ける」設定なので意図的に古い問題を上書きする動作。
      //   addToDam の末尾追加 + slice(-DAM_MAX) により古い問題が押し出されて新しい問題に入れ替わる。
      //   autoRefill=OFF なら lacking が空の時点で `[]` を返し補充しない、これも正しい。
      const filtered=lacking.length>0?lacking.slice(0,1):(autoRefillR.current?sorted.slice(0,1):[]);
      if(!filtered.length)return true;
      refillLk.current=true;setIsRefilling(true);
      try{
        // ─ 生成 → バリデーション → 即時追加（APIレスポンスが返るたびに即ストックへ）──
        let totalRejected=0;let anyPassed=false;
        for(let i=0;i<filtered.length;i++){
          if(cancelled)break;
          const target=filtered[i];
          const key=keys[i%keys.length];
          const damSubj=getDam()[target.subj]||{};
          const allDamQs=[...(damSubj.easy||[]),...(damSubj.standard||[]),...(damSubj.hard||[])];
          const damTopics=[...new Set(allDamQs.map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
          // 中学・高校の場合「算数」キーでも「数学」としてGeminiに要求する
          const promptSubj=(target.subj==="算数"&&(g.startsWith("中")||g.startsWith("高")))?"数学":target.subj;
          const _curMonth=new Date().getMonth()+1;
          // 学習者の直近ミス型 TOP3 を狙い撃ちさせる
          const _topMistakes=calcMistakeTypes(logsR.current.recentHistory||[]).slice(0,3);
          const _systemPrompt=buildSystemPrompt(target.diff,{grade:g,month:_curMonth,topMistakes:_topMistakes});
          const _userText=`【科目固定】「${promptSubj}」の4択問題を${DAM_BATCH}問。\n出力JSONの"subject"フィールドには必ず「${promptSubj}」をそのまま書くこと（他の科目名・略称・英語表記は禁止）。\n【禁止テーマ】以下はストックに存在するため別のテーマで出題すること:${damTopics}`;
          try{
            const _tag=`[refill ${target.subj}/${target.diff}]`;
            const apiRes=await AIAdapter.generateQuiz({apiKey:key,systemInstruction:_systemPrompt,userText:_userText,schema:QUIZ_RESPONSE_SCHEMA});
            if(!apiRes.ok){
              if(apiRes.quotaExhausted)setQuotaExhausted(true);
              try{console.warn(`${_tag} API fail status=${apiRes.status} quota=${!!apiRes.quotaExhausted}`);}catch(e){}
              continue;
            }
            setQuotaExhausted(false);
            const fr=apiRes.finishReason;
            const text=apiRes.text;
            if(!text){try{console.warn(`${_tag} empty text finishReason=${fr}`);}catch(e){}continue;}
            let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){try{console.warn(`${_tag} JSON parse failed finishReason=${fr} head=${text.slice(0,200)}`);}catch(_){}continue;}
            if(!Array.isArray(parsed))parsed=[parsed];
            const _parsedCount=parsed.length;
            const _afterStruct=parsed.filter(q=>hasValidQuiz(q));
            if(_afterStruct.length<_parsedCount){try{console.warn(`${_tag} hasValidQuiz dropped ${_parsedCount-_afterStruct.length}/${_parsedCount}`);}catch(e){}}
            const _mapped=_afterStruct.map(q=>{
              // subjectの前後空白を正規化（全角スペース含む）
              const normSubj=(q.subject||"").replace(/^[\s\u3000]+|[\s\u3000]+$/g,"");
              // 中学・高校では「数学」を「算数」として扱う（Geminiが「数学」と返す場合の吸収）
              if(target.subj==="算数"&&normSubj==="数学")return{...q,subject:"算数"};
              // 「理科」の別表記を吸収（Geminiが「科学」「自然科学」「自然」等を返す場合）
              if(target.subj==="理科"&&["科学","自然科学","自然","理科学","サイエンス"].includes(normSubj))return{...q,subject:"理科"};
              return{...q,subject:normSubj};
            });
            const valid=_mapped.filter(q=>q.subject===target.subj);
            if(valid.length<_mapped.length){
              const mismatched=_mapped.filter(q=>q.subject!==target.subj).map(q=>q.subject);
              try{console.warn(`${_tag} subject mismatch dropped ${_mapped.length-valid.length}/${_mapped.length} returned=${JSON.stringify(mismatched)}`);}catch(e){}
            }
            if(!valid.length){try{console.warn(`${_tag} no questions survived subject filter`);}catch(e){}continue;}
            // ─ バリデーション → 即時ストック追加（全バケット完了を待たない）────
            const reasonCounts={};const localPassed=[];
            for(const q of valid){
              const r=localValidateReason(q);
              if(r===null)localPassed.push(q);
              else reasonCounts[r]=(reasonCounts[r]||0)+1;
            }
            totalRejected+=valid.length-localPassed.length;
            if(Object.keys(reasonCounts).length){try{console.warn(`${_tag} localValidate dropped ${valid.length-localPassed.length}/${valid.length} reasons=`,reasonCounts);}catch(e){}}
            if(!localPassed.length)continue;
            if(cancelled)break;
            const toStore=localPassed.map(q=>shuffleAllSteps({...q,mistake_type:q.mistake_type||"不明",_subject:target.subj,_difficulty:target.diff}));
            if(toStore.length&&!cancelled){
              const isReviewSubj=(logsR.current.reviewQueue||[]).some(q=>q.subject===target.subj);
              if(isReviewSubj)addToDamFront(target.subj,target.diff,toStore);
              else addToDam(target.subj,target.diff,toStore);
              anyPassed=true;
              // 1バケット分追加するたびにUIを即時更新
              if(!cancelled)setDamStats(getDamStats(subjectsR.current));
            }
          }catch(e){}
        }
        if(cancelled)return false;
        // ─────────────────────────────────────────────────────
        if(totalRejected>0){setRejectCount(p=>{const n=p+totalRejected;try{_safeLS.set(REJ(),String(n));}catch(e){}return n;});}
        if(!cancelled)setDamStats(getDamStats(subjectsR.current));
        return anyPassed;
      }catch(e){
        // APIエラー・例外発生時も必ずロック解除と表示リセットを行う
        refillLk.current=false;
        if(!cancelled)setIsRefilling(false);
      }finally{
        // ※ catch と finally の両方でロック解除しているが、これはバグではない。
        //   catch → finally の順に実行されるため二重呼び出しになるが、
        //   boolean フラグへの代入は idempotent なので副作用なし。
        //   正常系（return anyPassed）でも finally は必ず走るため、
        //   ロック解放を finally に書くことで「解放漏れ」を防ぐ設計。
        //   catch 内の代入は finally が走らない環境への念のある後方互換であり、
        //   現 JS エンジンでは finally が必ず実行されるので実質 finally だけで足りる。
        // [要調査→バグではない #2] catch と finally 両方で refillLk.current=false / setIsRefilling(false)
        //   を呼んでいる。「二重発火でバグ？」と見えるが boolean 代入と setState(false) は
        //   両方べき等（idempotent）であり副作用なし。finally は catch の後にも必ず走るため
        //   正常系・例外系どちらでも解放が保証される、意図的な二重安全弁。
        refillLk.current=false;
        if(!cancelled)setIsRefilling(false);
      }
      return false;
    };
    // 補充ループ: 学習活動・残量・復習待ちで適応的に間隔を変える
    //   待機中:       15秒（即座に補充）
    //   ストック<20%: 20秒（緊急水準）
    //   ストック<50%: 45秒（活動量に応じて積む）
    //   復習キューあり: 60秒
    //   通常:          120秒
    const loop=async()=>{
      let delay=8000; // 初回は8秒後にウォームアップ補充
      while(!cancelled){
        await new Promise(r=>setTimeout(r,delay));

        if(cancelled)break;

        const isWaiting=!!waitingForStockR.current;
        const curSubs=subjectsR.current;

        else if(fillRate<0.5) delay=45000;
        else if(hasReview)    delay=60000;
        else if(ok)           delay=120000;
        else                  delay=90000;
      }
    };
    loop();
    return()=>{cancelled=true;if(retryTimerRef.current)clearInterval(retryTimerRef.current);};
  },[screen]);

  // ─── ⑤ 復帰モード タイマー ──────────────────────────────────────────
  useEffect(()=>{

  // ─── 緊急生成: ストックが空のとき即座に3問生成してDAMに積む ──────────
  const generateEmergency=useCallback(async(subj,g)=>{
    if(emergencyGenLk.current)return null;
    // バックグラウンド補充が走っている間は重複API呼び出しを避ける
    // → null を返すと waiting 状態へ移行し、補充完了後にポーリングで拾う
    if(refillLk.current)return null;
    const keys=keysR.current.filter(k=>k.trim());
    if(!keys.length)return null;
    emergencyGenLk.current=true;setIsEmergencyGen(true);
    // キーローテーション: バックグラウンド補充と同じ方式で偏りを防ぐ
    const key=keys[_ki%keys.length];_ki++;
    try{
      const currentGrade=g||gradeR.current;
      const promptSubj=(subj==="算数"&&(currentGrade.startsWith("中")||currentGrade.startsWith("高")))?"数学":subj;

      const damTopics=[...new Set(allDamQs.map(q=>q.topic_tag).filter(Boolean))].join("、")||"なし";
      const _curMonth=new Date().getMonth()+1;

      const _tag=`[emergency ${subj}/${emergencyDiff}]`;

      if(!apiRes.ok){

      }

      if(!text){try{console.warn(`${_tag} empty text finishReason=${fr}`);}catch(e){}return null;}
      let parsed;try{parsed=JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());}catch(e){try{console.warn(`${_tag} JSON parse failed finishReason=${fr} head=${text.slice(0,200)}`);}catch(_){}return null;}
      if(!Array.isArray(parsed))parsed=[parsed];
      const _parsedCount=parsed.length;
      const _afterStruct=parsed.filter(q=>hasValidQuiz(q));

      const _mapped=_afterStruct.map(q=>{

      if(!localPassed.length)return null;

      // doRefill と同様に復習対象科目は先頭挿入して優先出題

  const fetchQ=useCallback(async(g,subj)=>{
    if(fetchLk.current)return;fetchLk.current=true;
