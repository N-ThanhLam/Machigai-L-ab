// ─── Safari/PrivateMode 対応 localStorage ラッパー ─────────────────
// iOS Safari の ITP は7日アクセスなしでlocalStorageを消去する。
// プライベートモードや容量超過でも setItem が throw する。
// インメモリ＋IndexedDBミラーで透過的に救済する。
const _memStore = (()=>{ try{ return new Map(); }catch(e){ return null; } })();
const _safeLS = {
  get(k){
    try{ const v = localStorage.getItem(k); if(v!==null) return v; }catch(e){}
    return _memStore ? (_memStore.has(k) ? _memStore.get(k) : null) : null;
  },
  set(k,v){
    try{ localStorage.setItem(k,v); }catch(e){}
    if(_memStore) _memStore.set(k,v);
    // 重要キーは IndexedDB にも複製（非同期・失敗無視）
    // manabi_logs_v4 / manabi_dam_v4 / manabi_profile_v2 などのバージョン番号末尾、
    // および __u{id} のユーザー接尾辞付きも対象にする。
    if(/^manabi_/.test(k) && /(_v\d+|profile|session|dam|logs|users|curUser|theme|autorefill|reject_count|advanced|easy_text_mode)(?:__u[a-z0-9]+)?$/.test(k)){
      try{ _idbSet(k,v); }catch(e){}
    }
  },
  remove(k){
    try{ localStorage.removeItem(k); }catch(e){}
    if(_memStore) _memStore.delete(k);
    try{ _idbRemove(k); }catch(e){}
  }
};

// ─── IndexedDB ミラー（Safari ITP 対策の本丸）─────────────────────
let _idbP=null;
const _idbOpen=()=>{
  if(_idbP) return _idbP;
  _idbP = new Promise((resolve,reject)=>{
    try{
      const r=indexedDB.open("manabi_mirror",1);
      r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv"); };
      r.onsuccess=()=>resolve(r.result);
      r.onerror=()=>reject(r.error);
    }catch(e){ reject(e); }
  });
  return _idbP;
};
const _idbSet=async(k,v)=>{ try{ const db=await _idbOpen(); const tx=db.transaction("kv","readwrite"); tx.objectStore("kv").put(v,k); }catch(e){} };
const _idbGet=async(k)=>{ try{ const db=await _idbOpen(); return await new Promise((res,rej)=>{ const r=db.transaction("kv","readonly").objectStore("kv").get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }catch(e){ return null; } };
const _idbRemove=async(k)=>{ try{ const db=await _idbOpen(); db.transaction("kv","readwrite").objectStore("kv").delete(k); }catch(e){} };
const _idbKeys=async()=>{ try{ const db=await _idbOpen(); return await new Promise((res,rej)=>{ const r=db.transaction("kv","readonly").objectStore("kv").getAllKeys(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }catch(e){ return []; } };
// ロード時に localStorage が空 & IndexedDB に複製がある場合は復元（ITP救済）
const restoreFromIdbIfNeeded=async()=>{
  try{
    const keys=await _idbKeys();
    let restored=0;
    for(const k of keys){
      try{ if(localStorage.getItem(k)===null){ const v=await _idbGet(k); if(v!=null){ try{ localStorage.setItem(k,v); }catch(_){ _memStore && _memStore.set(k,v); } restored++; } } }catch(e){}
    }
    return restored;
  }catch(e){ return 0; }
};

};

};

// ─── SYSTEM PROMPT ────────────────────────────────────────────────
// 設計方針：
//   1. 正解を教えるのではなく「思考のズレ」を選択肢に仕込んで気づかせる
//   2. 誤答3つは A.手順の途中欠落 / B.似たルール混同 / C.条件読み落とし の3類型を埋める
//   3. wrong_analysis は「観測できる思考のズレ」のみ書く（性格・不注意は禁止）
//   4. 難易度（easy/standard/hard）で語彙・選択肢の鋭さを変える
//   5. 出力先頭に "thought_process" を強制し、論理破綻によるハルシネーションを抑制する
//   6. 出力末尾の自己検閲で、正解の唯一性と事実誤認をAI自身に確認させる
const SYSTEM_PROMPT_BASE = `あなたは日本の学習コーチ「まちがいラボ」。
ゴールは「ミスの再発防止」。正解の暗記ではなく、子どもがよく
やる「思考のズレ」を選択肢に仕込み、気づかせて修正させる。

━━━ 出題の設計原則 ━━━
1. 1問で確認することは1つだけ（複合問題は禁止）
2. 学習指導要領に準拠。学年・現在月までの既習範囲のみ
3. テキストだけで完結（図・グラフ・表・イラスト・地図・実験器具・画像への参照は一切禁止）
4. 未習漢字はひらがな。問題文は200文字以内
5. 英語問題でも指示文は日本語
6. 国語では文法の分類目的の不自然な問いは作らない

━━━ 選択肢の作り方（最重要） ━━━
正解1つ + 認知ミスを仕込んだ誤答3つ。
誤答3つは原則「異なる型」で埋める：

  A. 手順の途中欠落系
     例: 53−28 → 35（繰り下がりを忘れた）
  B. 似たルール・似た用語との混同系
     例: 「重要」→「ちょうふく」と読み間違える系
  C. 条件読み落とし系
     例: 「3の倍数で5の倍数でないもの」を「3の倍数」と読む

【鉄則】
・各誤答が「なぜ選ばれがちか」は必ず別の理由にする
・選択肢の文字数を揃える（長さで正解がバレないように）
・選択肢は100文字以内、重複禁止
・「上記の全て」「以上の全て」など並び依存表現は禁止
・無関係な数字・語を入れる雑な誤答は禁止

━━━ wrong_analysis の書き方 ━━━
誤答3つに対して：
  index: choices内のインデックス（正解以外）
  why_chosen: 「どんな思考でその誤答に辿り着くか」を1文で
              ★性格・不注意・うっかりを理由にしない
              ★観測できる「思考のズレ」だけを書く
  why_wrong: 「その思考のどこがズレているか」を1文で
              ★「不正解だから」「違うから」は禁止

良い例:
  why_chosen「繰り下がりを忘れて上の桁だけそのまま引いた」
  why_wrong「一の位が引けないときは十の位から1借りる必要がある」

━━━ ミスの型分類（mistake_type） ━━━
以下から最適なものを選ぶ：
符号ミス / 条件読み落とし / 公式混同 / 時制混同 /
用語逆転 / 因果逆転 / 単位変換ミス / 桁ミス /
助詞混同 / 前置詞混同 / 規則の過剰適用 / 例外の見落とし

━━━ hint（前提ヒント） ━━━
「このルールを知っていれば解ける」という1〜2行。
まだ習っていない人にも、必要な前提知識だけ書けば解けるように。

━━━ short_feedback（ミス防止コーチング） ━━━
次回ミスを防ぐ1つのコツを端的に1行で。
例:「繰り下がりは上の桁から1借りるのを忘れずに」

━━━ correct_feedback（正解の説明） ━━━
なぜそれが正解か、1文で簡潔に。子どもが「そうか！」と
納得する核心だけ書く。冗長な解説は禁止。

━━━ 思考プロセス（thought_process）— ハルシネーション抑制の要 ━━━
いきなり問題を書き出すのではなく、各問の "thought_process" フィールドに
以下を必ず日本語で書く。これにより内部の整合性を担保する：
  1. この問題で確認する1点（学習目標）
  2. 正解に至る論理的根拠（手順を箇条書き・3〜5項目）
  3. 各誤答がなぜ誤りか（事実・規則の観点で）
  4. 学年・既習範囲を逸脱していないことの自己確認

thought_process は 4 項目を含む 300〜600 文字程度。
読み手向けではなく、AI 自身の論理チェック用に書くこと。

━━━ 自己検閲（self_check）— 出力前の最終確認 ━━━
各問の最後に "self_check" を必ず書く。次の3点を AI 自身が確認した結果：
  ・unique_correct: 正解が選択肢中に唯一であり、他に正解と取りうる解釈がない
  ・no_fact_error: 解説（correct_feedback・hint・wrong_analysis）に事実誤認がない
  ・within_scope: 学年・現在月の既習範囲を逸脱していない
形式: {"unique_correct":true,"no_fact_error":true,"within_scope":true,"notes":"問題なし"}
1つでも false がある場合、その問題は出力しないこと（不安な問題を世に出さない）。

━━━ 出力に関する補足 ━━━
出力 JSON のフィールド構造・型・必須項目は API 側スキーマで強制される。
内容面のみ以下を守る：
・フィールド順は thought_process → 問題本体 → self_check
・correct は choices の正解インデックス（0始まり）
・wrong_analysis の index は正解以外の3つの choices インデックス
・前置き・コードフェンス・説明文の付加は禁止（純粋な JSON 配列のみ）
`;

// ─── 難易度別サフィックス ───
// "easy"     : 勉強嫌い向け。語彙やさしく、誤答の差を明確に、達成感重視
// "standard" : 学年標準（学習指導要領水準）
// "hard"     : 上位5%向け。一見正しく見える誤答、条件の細部
const DIFFICULTY_HINTS = {
  easy:
    "\n━━━ 難易度：やさしい（勉強が苦手な子向け） ━━━\n" +
    "・問題文は120文字以内・短く明快に\n" +
    "・選択肢は1〜10文字を目安にコンパクトに\n" +
    "・誤答は「明らかに違うけど典型的に間違える」レベル\n" +
    "・身近な題材（食べ物・生き物・スポーツ等）を優先\n" +
    "・correct_feedback は「だからこうなる」と一言で。難しい用語は使わない\n" +
    "・hint は『例えば〜』の具体例つきで30字以内",
  standard: "",
  hard:
    "\n━━━ 難易度：ハード（上位5%向け） ━━━\n" +
    "・「一見正しく見えるが核心が1箇所ズレた」誤答を必ず1つ含める\n" +
    "・条件を1箇所、注意深く読まないと見落とすように仕込む\n" +
    "・教科書通りの暗記だけでは解けない、概念理解を問う\n" +
    "・ただし「ひっかけ」にはしない。丁寧に読めば確実に正解できる設計\n" +
    "・mistake_type は「規則の過剰適用」「例外の見落とし」「条件読み落とし」を優先",
};

// ─── ミス型 → 認知的勘違いの短い補足 ─────────────────────────────────
// AI に「型ラベル」だけを渡すと表層マッチで終わりがちなので、
// 「その型が生まれる思考のズレ」を一言添えてやることで、
// 本質的な勘違いを突いた誤答選択肢を作りやすくする。
const MISTAKE_TYPE_HINTS = {
  "符号ミス":"正負・プラスマイナスの処理を反転してしまう（−×−を−のままにする等）",
  "条件読み落とし":"修飾語・条件節を読み飛ばし、より広い対象を答えてしまう",
  "公式混同":"面積/周長・速さ/時間など、似た公式を取り違える",
  "時制混同":"過去/現在/未来や完了/進行など、時間の枠を取り違える",
  "用語逆転":"対概念（主語↔目的語・分子↔分母など）を逆に取る",
  "因果逆転":"「Aだから B」を「Bだから A」と読む向きの反転",
  "単位変換ミス":"100倍/1000倍などスケールを誤る、cm⇄m などの換算抜け",
  "桁ミス":"0の数や位取りを取り違えて1桁ずれる",
  "助詞混同":"「が/を/に/で」など意味を変える助詞を取り違える",
  "前置詞混同":"at/in/on/to/for などの使い分けを取り違える",
  "規則の過剰適用":"例外があるのに一般則を機械的に当てはめる",
  "例外の見落とし":"特殊ケースに気づかず通常規則で処理してしまう",
};

// ─── buildSystemPrompt ────────────────────────────────────────────
// difficulty: "easy" | "standard" | "hard"
// grade / month: 既習範囲を厳密化する（"小学3年生" "5月" など）。曖昧な「現在月までの既習」を排除。
const monthNameJa=(m)=>["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"][((m||1)-1+12)%12];
const buildSystemPrompt = (difficulty, opts={}) => {
  const {grade,month,topMistakes}=opts;
  let scope="";
  if(grade && month){
    scope=`\n━━━ 既習範囲（厳守）━━━\n対象学年: ${grade}\n現在月: ${monthNameJa(month)}\n→ ${grade}の学習指導要領のうち、${monthNameJa(month)}までに学校で学ぶ単元・語彙のみ使用する。\n→ それ以降の単元・漢字・公式を使用しないこと。`;
  }else if(grade){
    scope=`\n━━━ 既習範囲（厳守）━━━\n対象学年: ${grade}（月情報なしのため当年度内の範囲）`;
  }
  // 学習者の重点ミス型（直近の不正解傾向）を狙い撃ちさせる
  let weakness="";
  if(Array.isArray(topMistakes)&&topMistakes.length){
    const list=topMistakes.slice(0,3).map(([t,n])=>{
      const cog=MISTAKE_TYPE_HINTS[t];
      return cog?`・${t}（直近${n}回）── ${cog}`:`・${t}（直近${n}回）`;
    }).join("\n");
    weakness="\n━━━ 学習者の重点ミス型（狙い撃ち）━━━\n"
      +"この学習者は最近、以下の型で誤答しています。各型の後ろに『どんな思考のズレで起きるか』を併記：\n"
      +list+"\n"
      +"→ 今回の出題のうち約3割（最低1問）は、上記の『思考のズレ』そのものを誤答選択肢として仕込む。\n"
      +"→ 表層的に型名に合うだけでなく、併記した認知メカニズムを実際に再現する誤答にすること。\n"
      +"→ 該当問題の mistake_type には上記のいずれかを正確に設定する。\n"
      +"→ 残りの問題は通常通り A/B/C 3類型でバランスを取る。";
  }
  return SYSTEM_PROMPT_BASE + (DIFFICULTY_HINTS[difficulty] || "") + scope + weakness;
};

// ─── Gemini responseSchema ────────────────────────────────────────
// Gemini の構造化出力スキーマ（OpenAPI 3.0 サブセット）。
// これを generationConfig.responseSchema に渡すと、フィールド名のタイポや
// 配列長の崩れ、型ズレを API 側で機械的に弾けるため、
// プロンプトでの「JSON 形式を文章で説明する記述」を省略できる。
const QUIZ_RESPONSE_SCHEMA={
  type:"ARRAY",
  items:{
    type:"OBJECT",
    properties:{
      thought_process:{type:"STRING"},
      topic_tag:{type:"STRING"},
      subject:{type:"STRING"},
      question:{type:"STRING"},
      choices:{type:"ARRAY",items:{type:"STRING"},minItems:4,maxItems:4},
      correct:{type:"INTEGER",minimum:0,maximum:3},
      correct_feedback:{type:"STRING"},
      mistake_type:{type:"STRING"},
      short_feedback:{type:"STRING"},
      hint:{type:"STRING"},
      wrong_analysis:{
        type:"ARRAY",minItems:3,maxItems:3,
        items:{
          type:"OBJECT",
          properties:{
            index:{type:"INTEGER",minimum:0,maximum:3},
            why_chosen:{type:"STRING"},
            why_wrong:{type:"STRING"},
          },
          required:["index","why_chosen","why_wrong"],
          propertyOrdering:["index","why_chosen","why_wrong"],
        },
      },
      self_check:{
        type:"OBJECT",
        properties:{
          unique_correct:{type:"BOOLEAN"},
          no_fact_error:{type:"BOOLEAN"},
          within_scope:{type:"BOOLEAN"},
          notes:{type:"STRING"},
        },
        required:["unique_correct","no_fact_error","within_scope"],
        propertyOrdering:["unique_correct","no_fact_error","within_scope","notes"],
      },
    },
    required:["thought_process","topic_tag","subject","question","choices","correct","correct_feedback","mistake_type","short_feedback","hint","wrong_analysis","self_check"],
    propertyOrdering:["thought_process","topic_tag","subject","question","choices","correct","correct_feedback","mistake_type","short_feedback","hint","wrong_analysis","self_check"],
  },
};

// ─── AIAdapter: 外部AIへの通信を一手に引き受ける抽象化レイヤー ─────────────
// アプリ側のコアロジックは「条件 → 共通JSオブジェクト」というインターフェイスだけを
// 利用し、エンドポイントURL・モデル一覧・wire-format（contents 等）・認証ヘッダーは
// 全てこの中だけに閉じる。
//
// モデルリストはハードコードしない。Gemini の ListModels API
// （https://generativelanguage.googleapis.com/v1beta/models）を実行時に叩いて
// 利用可能なモデルを取得し、「強い順」スコアで降順ソートして使う。Google 側が
// 新モデルを追加・廃止してもこちらのコードを書き換えずに最新ラインナップへ追従する。
//
// 強さスコアは「バージョン番号最優先、同バージョン内ではティア（Pro > Flash > Lite）」で
// 算出するため、3.1-flash-lite が 2.5-pro より上位に並ぶ。
//
// 並列・連続実行時の二度叩きを防ぐため、モデル単位の cooldown と in-flight Promise を
// プロセス内で共有する。バックグラウンド補充と緊急生成が同じモデルに同時突入しても、
// 先行が踏んだ 429/5xx/404 を後発が即座に拾い、無駄な空振りを未然に潰す。
const AIAdapter=(()=>{
  const LIST_MODELS_ENDPOINT="https://generativelanguage.googleapis.com/v1beta/models";
  const GENERATE_ENDPOINT=m=>`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent`;
  const AUTH_HEADER="x-goog-api-key";
  const MODEL_CACHE_TTL=30*60*1000; // モデル一覧のキャッシュ寿命（30分）
  const COOLDOWN_MS=60*1000;        // 429/5xx を受けたモデルへの再試行抑制時間

  // ── プロセス内共有状態 ─────────────────────────────────────
  let _models=null;        // 強い順ソート済みモデルメタデータ配列
  let _modelsAt=0;         // 最後に取得した時刻
  let _modelsPromise=null; // 進行中の取得 Promise（並列重複防止）
  const _cooldown={};      // model -> 再試行可能になる epoch ms
  const _unavailable={};   // model -> true（404 / ListModels に存在しないモデルはセッション中スキップ）
  const _inflight={};      // model -> Promise<void>（同一モデルへの並列攻撃を直列化）
  // モデル固有のクセを自己学習して保持する。401本文の error message から検出し、
  // 以降の同モデル呼び出しでは body を自動補正することで初回以外の空振りを撲滅する。
  // 具体ベンダー名（gemini/gemma 等）をコードに書かないため、Google が新モデルを
  // 出しても・Gemini ブランドが変わっても、同じ仕組みで吸収できる。
  const _modelQuirks={};   // model -> { thinkingUnsupported?: true, ... }

  // ── 強さスコア計算（バージョン > ティア） ───────────────────
  // 「gemini-3.1-flash-lite」「gemini-2.5-pro」のような命名を想定。
  // バージョンを 100 倍するので「新世代の最弱 > 旧世代の最強」になる並び。
  // ユーザー要望（2.5-flash より 3.1-flash-lite を上に置きたい）に合致する。
  const _scoreModel=name=>{
    const n=(name||"").toLowerCase();
    const vm=n.match(/(\d+)[.\-_](\d+)/);
    if(!vm)return -1;
    const version=parseInt(vm[1],10)*10+parseInt(vm[2],10);
    let tier;
    if(n.includes("ultra"))tier=5;
    else if(n.includes("pro"))tier=4;
    else if(n.includes("flash-lite")||n.includes("flashlite")||n.includes("flash-8b"))tier=2;
    else if(n.includes("flash"))tier=3;
    else if(n.includes("nano"))tier=1;
    else tier=3;
    return version*100+tier;
  };

  // ── 安定版 generateContent モデルだけを残すフィルタ ──────────
  // preview / experimental / 専用用途モデル（embedding / imagen / tts / aqa / learnlm 等）を除外する。
  const _isStableModel=m=>{
    const n=(m.name||"").toLowerCase();
    if(n.includes("preview"))return false;
    if(n.includes("experimental")||n.includes("exp-")||n.endsWith("-exp"))return false;
    if(n.includes("embedding")||n.includes("imagen")||n.includes("tts")||n.includes("aqa")||n.includes("learnlm"))return false;
    const methods=m.supportedGenerationMethods||[];
    if(methods.length&&!methods.includes("generateContent"))return false;
    return true;
  };

  // ── ListModels を叩いて利用可能モデルを強い順に並べる ────────
  const _fetchModelList=async apiKey=>{
    const res=await fetch(LIST_MODELS_ENDPOINT,{headers:{[AUTH_HEADER]:apiKey}});
    if(!res.ok){
      const err=new Error(`AIAdapter: ListModels failed (status=${res.status})`);
      err.status=res.status;err.recoverable=res.status===429||(res.status>=500&&res.status<600);
      throw err;
    }
    const data=await res.json();
    const raw=Array.isArray(data.models)?data.models:[];
    const items=raw.filter(_isStableModel).map(m=>({
      name:(m.name||"").replace(/^models\//,""),
      score:_scoreModel(m.name||"")
    })).filter(m=>m.name&&m.score>0);
    items.sort((a,b)=>b.score-a.score);
    return items.map(m=>({name:m.name,endpoint:GENERATE_ENDPOINT,authHeader:AUTH_HEADER,score:m.score}));
  };

  // ── キャッシュ + 並列初期化重複防止 ─────────────────────────
  const _ensureModels=async apiKey=>{
    const now=Date.now();
    if(_models&&now-_modelsAt<MODEL_CACHE_TTL)return _models;
    if(_modelsPromise)return _modelsPromise;
    _modelsPromise=(async()=>{
      try{
        const list=await _fetchModelList(apiKey);
        if(list.length){_models=list;_modelsAt=Date.now();try{console.info(`[AIAdapter] models=${list.map(x=>x.name).join(", ")}`);}catch(_){}}
        return _models||[];
      }finally{_modelsPromise=null;}
    })();
    return _modelsPromise;
  };

  // 429/5xx/404 は文字通りの一時/不在エラーとして次モデルへ。
  // 400 はモデル別パラメータ不整合の可能性が高いため「次モデルへフォールバック」扱いとしつつ
  // クールダウンは入れない（パラメータ調整で復活し得るため）。
  // 401/403 は認証エラーで回復不能、即 throw。
  const _isRecoverableStatus=s=>s===400||s===429||s===404||(s>=500&&s<600);
  const _isRecoverableError=err=>{
    if(!err)return false;
    const code=err.code;const status=(err.status||"").toString();
    if(code===400||status==="INVALID_ARGUMENT"||status==="FAILED_PRECONDITION")return true;
    return code===429||code===500||code===503||status==="RESOURCE_EXHAUSTED"||status==="UNAVAILABLE"||status==="INTERNAL";
  };
  const _coolingDown=(m,now)=>_cooldown[m]&&_cooldown[m]>now;

  // Gemini固有の wire-format 組み立てはここに閉じる。コア側からは見えない。
  const _buildBody=({systemInstruction,userText,schema,generationConfig})=>{
    const body={contents:[{role:"user",parts:[{text:userText}]}],generationConfig:Object.assign({responseMimeType:"application/json",responseSchema:schema,temperature:.4,topP:.9,topK:20,maxOutputTokens:32768,thinkingConfig:{thinkingBudget:0}},generationConfig||{})};
    if(systemInstruction)body.systemInstruction={parts:[{text:systemInstruction}]};
    return body;
  };

  // 学習済みクセに基づく body 補正。具体ブランド名（pro/gemini/gemma 等）には触れない。
  // 知っているクセが増えたらここに分岐を追加する。
  const _adjustBodyForModel=(body,modelName)=>{
    const q=_modelQuirks[modelName]||{};
    let adjusted=body;
    if(q.thinkingUnsupported&&adjusted.generationConfig?.thinkingConfig){
      const gc=Object.assign({},adjusted.generationConfig);delete gc.thinkingConfig;
      adjusted=Object.assign({},adjusted,{generationConfig:gc});
    }
    return adjusted;
  };

  // 400 エラー本文からモデル固有の制約を抽出して保存する。返り値は学習に成功したか。
  // 「Thinking budget is not supported for this model.」等の文言から、
  // 「このモデルは thinkingConfig を受け付けない」というクセを永続化する。
  // 文言だけを根拠にしているので、ベンダー名やモデル名のハードコードは一切ない。
  const _learnQuirkFromError=(model,status,errMsg)=>{
    if(status!==400)return false;
    const msg=(errMsg||"").toLowerCase();
    let learned=false;
    // Thinking 系の不対応：「thinking」と「not supported / not allowed / invalid」の同時出現で判定。
    // 弱点：将来文言が大きく変わると検知漏れする。その場合はここに別パターンを追加する。
    if(msg.includes("thinking")&&(msg.includes("not supported")||msg.includes("not allowed")||msg.includes("invalid")||msg.includes("unsupported"))){
      if(!_modelQuirks[model])_modelQuirks[model]={};
      if(!_modelQuirks[model].thinkingUnsupported){_modelQuirks[model].thinkingUnsupported=true;learned=true;}
    }
    return learned;
  };

  // 1モデル分の試行。エラー種別を判定し、cooldown 等の共有状態を更新したうえで
  // 結果に recoverable フラグを乗せて返す。
  // 400 で「学習可能なクセ」が見つかった場合は、その場で body を補正して同モデルを
  // 1 度だけ即時再試行する。これにより初回のクセ発見時に「次モデルへフォールバック」を
  // 強いることなく、現モデルでそのまま成功を取り戻せる。
  // 補正後もまだ 400 を返すモデルは構造的に不整合なので _unavailable に落として
  // セッション内では以降スキップする（無限の無駄打ち防止）。
  const _tryModel=async(def,apiKey,body)=>{
    const model=def.name;
    for(let attempt=0;attempt<2;attempt++){
      const adjusted=_adjustBodyForModel(body,model);
      try{
        // APIキーは x-goog-api-key ヘッダーで送る（URLクエリは履歴/Referer/プロキシ経由で漏洩しうる）。
        const res=await fetch(def.endpoint(model),{method:"POST",headers:{"Content-Type":"application/json",[def.authHeader]:apiKey},body:JSON.stringify(adjusted)});
        if(!res.ok){
          let errMsg=null;try{const eb=await res.json();errMsg=eb?.error?.message||JSON.stringify(eb).slice(0,300);}catch(_){}
          try{console.warn(`[AIAdapter] ${model} HTTP ${res.status}: ${errMsg||"<no body>"}`);}catch(_){}
          // クセを学習できたなら、同モデルを補正版 body で即座にもう一度試す
          if(attempt===0&&res.status===400&&_learnQuirkFromError(model,res.status,errMsg)){
            try{console.info(`[AIAdapter] ${model} quirk learned (${Object.keys(_modelQuirks[model]||{}).join(",")}) — immediate retry`);}catch(_){}
            continue;
          }
          if(res.status===429)_cooldown[model]=Date.now()+COOLDOWN_MS;
          else if(res.status===404)_unavailable[model]=true;
          else if(res.status>=500&&res.status<600)_cooldown[model]=Date.now()+COOLDOWN_MS;
          else if(res.status===400&&attempt>0){
            // 補正済み body でなお 400：このセッションでは諦める
            _unavailable[model]=true;
            try{console.warn(`[AIAdapter] ${model} 400 persisted after quirk → session unavailable`);}catch(_){}
          }
          return{ok:false,status:res.status,data:null,model,errorMessage:errMsg,recoverable:_isRecoverableStatus(res.status)};
        }
        const data=await res.json();
        if(data.error){
          try{console.warn(`[AIAdapter] ${model} body.error ${data.error.status||data.error.code}: ${data.error.message||""}`);}catch(_){}
          // body.error 経由の 400 / INVALID_ARGUMENT にも同じ自己学習を適用
          if(attempt===0&&(data.error.code===400||data.error.status==="INVALID_ARGUMENT")&&_learnQuirkFromError(model,400,data.error.message)){
            try{console.info(`[AIAdapter] ${model} quirk learned via body.error — immediate retry`);}catch(_){}
            continue;
          }
          if(_isRecoverableError(data.error)){
            if(data.error.code===429||data.error.status==="RESOURCE_EXHAUSTED")_cooldown[model]=Date.now()+COOLDOWN_MS;
            return{ok:false,status:data.error.code||500,data,model,error:data.error,recoverable:true};
          }
          return{ok:false,status:data.error.code||500,data,model,error:data.error,recoverable:false};
        }
        return{ok:true,status:200,data,model};
      }catch(e){
        _cooldown[model]=Date.now()+COOLDOWN_MS;
        return{ok:false,status:0,model,error:e,recoverable:true};
      }
    }
    // 防御コード：ループが想定外に抜けた場合
    return{ok:false,status:0,model,recoverable:true};
  };

  // 低レベル呼び出し：強い順モデル配列を先頭から順番に試す。並列で同じモデルに突入しないよう
  // in-flight Promise を共有し、先行呼び出しの結果（特に cooldown）を後発が即座に拾う。
  const requestRaw=async(apiKey,body)=>{
    let models;
    try{models=await _ensureModels(apiKey);}
    catch(e){
      // ListModels が回復可能な障害（429/5xx）で失敗した場合は exhausted 扱いで戻す。
      // 認証エラー等の回復不能な失敗はそのまま throw して呼び出し側の例外ハンドラに渡す。
      if(e&&e.recoverable)return{ok:false,status:e.status||0,data:null,model:null,error:e,exhausted:true,quotaExhausted:e.status===429};
      throw e;
    }
    if(!models.length){
      return{ok:false,status:0,data:null,model:null,error:null,exhausted:true,quotaExhausted:false,noModels:true};
    }
    let lastFail=null;
    for(let i=0;i<models.length;i++){
      const def=models[i];const model=def.name;
      if(_unavailable[model])continue;
      const isLast=i===models.length-1;
      if(!isLast&&_coolingDown(model,Date.now()))continue;
      // 既に別呼び出しが同モデルを試行中なら、その完了を待ってから判定し直す。
      // 先行が 429/404/5xx を踏んでいれば cooldown/unavailable が立っているので
      // 後発はその場でスキップして次モデルへ進める（＝二度叩き防止）。
      if(_inflight[model]){
        try{await _inflight[model];}catch(_){/* noop */}
        if(_unavailable[model])continue;
        if(!isLast&&_coolingDown(model,Date.now()))continue;
      }
      let release;const pending=new Promise(r=>{release=r;});
      _inflight[model]=pending;
      let result;
      try{result=await _tryModel(def,apiKey,body);}
      finally{
        if(_inflight[model]===pending)delete _inflight[model];
        release();
      }
      if(result.ok)return result;
      lastFail=result;
      try{console.warn(`[AIAdapter] ${model} status=${result.status} recoverable=${!!result.recoverable}`);}catch(_){}
      if(result.recoverable)continue;
      // 認証エラー・本体不正等の回復不能エラーは即座に throw（リトライしても無意味）
      const err=new Error(`AIAdapter: unrecoverable failure (model=${model}, status=${result.status})`);
      err.detail=result;
      throw err;
    }
    // すべて 429/404/5xx で弾かれた状態
    const quotaExhausted=models.every(m=>_unavailable[m.name]||(_cooldown[m.name]&&_cooldown[m.name]>Date.now()));
    return{ok:false,status:lastFail?.status||0,data:null,model:lastFail?.model,error:lastFail?.error,exhausted:true,quotaExhausted};
  };

  // 高レベルAPI：問題生成・解説生成等のコアロジックはこの関数だけを利用する。
  // 入力は抽象化された条件オブジェクト、出力は外部仕様非依存の共通JSオブジェクト。
  const generateQuiz=async({apiKey,systemInstruction,userText,schema,generationConfig})=>{
    const body=_buildBody({systemInstruction,userText,schema,generationConfig});
    const res=await requestRaw(apiKey,body);
    if(!res.ok)return res;
    const cand=res.data?.candidates?.[0];
    return{ok:true,status:200,model:res.model,text:cand?.content?.parts?.[0]?.text||"",finishReason:cand?.finishReason,raw:res.data};
  };

  // 手動でモデルキャッシュを破棄したい場合のフック（基本は TTL 任せでよい）
  const invalidateModels=()=>{_models=null;_modelsAt=0;};

  return{generateQuiz,requestRaw,invalidateModels};
})();



// ─── DAM ─────────────────────────────────────────────────────────
// 構造: { 科目: { easy:[...], standard:[...], hard:[...] } }
// 各科目×3難易度=15バケット。1バケット最大40問。Safari の 5MB localStorage を意識して全体600問上限。
const DAM_KEY_BASE="manabi_dam_v4";
const DAM_MAX=40;            // 1バケット(科目×難易度)最大問題数
const DAM_BATCH=10;           // 1回のAPI呼び出しで生成する問題数
const DIFFS=["easy","standard","hard"];
const DAM_KEY=()=>userKey(DAM_KEY_BASE);
const getDam=()=>{try{return JSON.parse(_safeLS.get(DAM_KEY())||"{}");}catch(e){return{};}};
const saveDam=d=>{ _safeLS.set(DAM_KEY(),JSON.stringify(d)); };
// 旧 v3 構造（科目→配列）から v4 構造（科目→難易度→配列）へのマイグレーション
(function migrateDam(){
  try{
    const oldRaw=_safeLS.get("manabi_dam_v3");
    if(!oldRaw)return;
    if(_safeLS.get(DAM_KEY()))return; // すでにv4ある
    const old=JSON.parse(oldRaw);const nu={};
    for(const s of Object.keys(old)){nu[s]={easy:[],standard:old[s].slice(0,DAM_MAX),hard:[]};}
    _safeLS.set(DAM_KEY(),JSON.stringify(nu));
    _safeLS.remove("manabi_dam_v3");
  }catch(e){}
})();
// 重複判定キー
const dupKey=q=>`${(q.question||"")}|${(q.correct??"")}|${(q.choices||[]).slice(0,2).join("|")}`;
const _ensureBucket=(dam,subj,diff)=>{
  if(!dam[subj])dam[subj]={easy:[],standard:[],hard:[]};
  if(!Array.isArray(dam[subj][diff]))dam[subj][diff]=[];
  return dam[subj][diff];
};
// ※ addToDam は末尾追加 → slice(-DAM_MAX) で古い問題から切り捨て（FIFO）。
//   addToDamFront は先頭追加 → slice(0, DAM_MAX) で末尾の古い問題を切り捨て。
//   両者でスライス方向が逆なのはバグではなく、追加位置に合わせた正しい設計。
//   pop は常に先頭（slice(0, take) / findIndex）から取り出すため、
//   Front 版で追加した問題が優先出題される。
const addToDam=(subj,diff,qs)=>{const dam=getDam();const ex=_ensureBucket(dam,subj,diff);const keys=new Set(ex.map(dupKey));const deduped=[];for(const q of qs){const k=dupKey(q);if(!keys.has(k)){keys.add(k);deduped.push(q);}}dam[subj][diff]=[...ex,...deduped].slice(-DAM_MAX);saveDam(dam);};
const addToDamFront=(subj,diff,qs)=>{const dam=getDam();const ex=_ensureBucket(dam,subj,diff);const keys=new Set(ex.map(dupKey));const fresh=[];for(const q of qs){const k=dupKey(q);if(!keys.has(k)){keys.add(k);fresh.push(q);}}if(!fresh.length)return;dam[subj][diff]=[...fresh,...ex].slice(0,DAM_MAX);saveDam(dam);};
// 指定難易度から取り出し。空なら隣接難易度（standard→easy→hard の順）にフォールバック
// 第4引数 preferMistakeType: 同 mistake_type の問題があれば優先 pop。
// 無ければ通常の先頭から pop（フォールバック）。「理解した気」を即潰すための即出題用。
// 旧バージョンで生成された構造不備の問題（hasValidQuiz==false）は pop 時に破棄する。
const popFromDam=(subj,diff="standard",n=1,preferMistakeType=null)=>{
  const dam=getDam();
  const order=diff==="easy"?["easy","standard","hard"]:diff==="hard"?["hard","standard","easy"]:["standard","easy","hard"];
  const isValid=(typeof hasValidQuiz==="function")?hasValidQuiz:(()=>true);
  for(const d of order){
    const bRaw=_ensureBucket(dam,subj,d);
    if(!bRaw.length)continue;
    // 旧データの不整合（wrong_analysis 欠落など）を pop 時にまとめて破棄して残りから供給
    const b=bRaw.filter(isValid);
    if(b.length!==bRaw.length){
      dam[subj][d]=b;
      saveDam(dam);
    }
    // ※ b が空のとき saveDam が2回呼ばれるが、これはバグではなく意図的な冗長保証。
    //   1回目（上の if ブロック）で不整合除去を保存し、
    //   2回目（下の if ブロック）は「空バケットを明示的に永続化」する役割で書かれている。
    //   localStorage への書き込みコストはあるが動作上の問題はない（idempotent）。
    // [要調査→バグではない #1] b===[] のとき saveDam が最大2回呼ばれる二重書き込みに見えるが、
    //   同一 dam オブジェクトへの idempotent な上書きなので副作用なし。動作バグではなく、
    //   「書き込み漏れを防ぐ冗長保証」として意図的に残されている。
    if(!b.length){
      saveDam(dam);
      continue;
    }
    // 優先 mistake_type 指定があれば先に試す
    if(preferMistakeType){
      const idx=b.findIndex(q=>q&&q.mistake_type===preferMistakeType);
      if(idx>=0){
        const r=[b[idx]];
        dam[subj][d]=[...b.slice(0,idx),...b.slice(idx+1)];
        saveDam(dam);return r;
      }
    }
    const take=Math.min(n,b.length);const r=b.slice(0,take);
    dam[subj][d]=b.slice(take);saveDam(dam);return r;
  }
  return[];
};
// DAM 全体を構造検証で掃除する（旧バージョン生成の壊れた問題を起動時に一掃）
// hasValidQuiz は後方で定義されるため、呼び出しタイミングは「マウント時 useEffect」など以降に限る。
const cleanDam=()=>{
  try{
    if(typeof hasValidQuiz!=="function")return 0;
    const dam=getDam();let removed=0;let changed=false;
    for(const s of Object.keys(dam||{})){
      const bucket=dam[s];if(!bucket||typeof bucket!=="object")continue;
      for(const d of DIFFS){
        const arr=Array.isArray(bucket[d])?bucket[d]:[];
        const next=arr.filter(hasValidQuiz);
        if(next.length!==arr.length){removed+=arr.length-next.length;bucket[d]=next;changed=true;}
      }
    }
    if(changed)saveDam(dam);
    return removed;
  }catch(e){return 0;}
};
const getDamBucketCount=(subj,diff)=>{const dam=getDam();return (dam[subj]?.[diff]||[]).length;};
const getDamSubjTotal=(subj)=>{const dam=getDam();const b=dam[subj]||{};return (b.easy?.length||0)+(b.standard?.length||0)+(b.hard?.length||0);};
const getDamStats=(subjects=SUBJECTS)=>subjects.reduce((a,s)=>({...a,[s]:getDamSubjTotal(s)}),{});
const getDamTotal=(subjects=SUBJECTS)=>subjects.reduce((t,s)=>t+getDamSubjTotal(s),0);
// 補充ターゲット: 不足が最も大きい(科目, 難易度)ペアの上位N個
const lowestBuckets=(n=1,subjects=SUBJECTS)=>{
  const dam=getDam();const all=[];
  for(const s of subjects){for(const d of DIFFS){all.push({subj:s,diff:d,cnt:(dam[s]?.[d]||[]).length});}}
  return all.sort((a,b)=>a.cnt-b.cnt).slice(0,n);
};

// ─── UTILS ───────────────────────────────────────────────────────
// structuredClone は iOS Safari 15.4+ / Chrome 98+。古環境では JSON 往復にフォールバック。
// updateLogs の deep clone は recentHistory(200)・topicMastery 等を含み毎回実行されるため、
// JSON.parse(JSON.stringify(...)) より高速・型安全な structuredClone を優先利用する。
const deepClone=(v)=>{

// crypto.randomUUID は古い iOS Safari(<15.4) や非セキュアコンテキストで未定義。
// 学校配布 iPad など古め環境への対応として簡易フォールバック。
const safeUUID=()=>{
  try{ if(typeof crypto!=="undefined" && typeof crypto.randomUUID==="function") return crypto.randomUUID(); }catch(e){}
  // RFC4122 v4 風の擬似ID。衝突確率は実用上無視できる。
  const r=()=>Math.random().toString(16).slice(2,10);
  return `${r()}${r().slice(0,4)}-4${r().slice(0,3)}-${(8+Math.floor(Math.random()*4)).toString(16)}${r().slice(0,3)}-${r()}${r().slice(0,4)}`;
};
const today=()=>new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'});
const calcGrade=birth=>{if(!birth)return"一般";const b=new Date(birth+"T00:00:00"),now=new Date(today()+"T00:00:00");let sy=now.getFullYear();if(now.getMonth()<3)sy--;let ent=b.getFullYear()+7;if(b.getMonth()<3||(b.getMonth()===3&&b.getDate()===1))ent--;const y=sy-ent+1;if(y>=1&&y<=6)return`小学${y}年生`;if(y>=7&&y<=9)return`中学${y-6}年生`;if(y>=10&&y<=12)return`高校${y-9}年生`;return"一般";};
const jstYesterday=()=>{const d=new Date(new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'})+"T00:00:00");d.setDate(d.getDate()-1);return d.toLocaleDateString('sv-SE');};
// JST基準で n 日前の YYYY-MM-DD を返す（cal28 など UTC ズレ対策）
const jstDaysAgo=(n)=>{const d=new Date(today()+"T00:00:00");d.setDate(d.getDate()-n);return d.toLocaleDateString('sv-SE');};
// gs（ヘッダ表示用カウンタ）の永続化ルール:
//   streak    … 不正解になるまで常時維持（日跨ぎでもリセットしない）
//   best      … その日の最高値。日跨ぎで current streak にローテーション
//   wrong     … その日の累積。日跨ぎで 0 にリセット
//   qNum      … 現セッションの問題番号（resetFetch でリセット）
//   dayKey    … best/wrong が紐づく日付。これと today() を比較してローテ判定
const _initGsDefaults=()=>({streak:0,best:0,wrong:0,qNum:1,wrongStreak:0,dayKey:today(),todayScore:0});
const _rolloverGs=(g)=>{
  if(!g||typeof g!=="object")return _initGsDefaults();
  const td=today();
  if(g.dayKey===td)return g;
  // 日跨ぎ: best は current streak（持ち越し分）から再スタート、wrong/todayScore は 0、streak はそのまま
  return {...g,best:g.streak||0,wrong:0,todayScore:0,dayKey:td};
};
let _ki=0;

// ─── CHOICE SHUFFLE ───────────────────────────────────────────────
const shuffleChoices=q=>{
  if(!q.choices||q.choices.length!==4)return q;
  const orig=typeof q.correct==="number"?q.correct:0;
  const ix=q.choices.map((c,i)=>({c,i}));
  for(let i=ix.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]];}
  const newCorrect=ix.findIndex(x=>x.i===orig);
  const indexMap={};ix.forEach((x,ni)=>{indexMap[x.i]=ni;});
  const newWrong=(q.wrong_analysis||[]).map(wa=>({...wa,index:typeof wa.index==="number"?(indexMap[wa.index]??wa.index):wa.index}));
  return{...q,choices:ix.map(x=>x.c),correct:newCorrect>=0?newCorrect:0,wrong_analysis:newWrong};
};
const shuffleAllSteps=q=>shuffleChoices(q);

const hasValidQuiz=q=>{
  if(!q||!q.question||!Array.isArray(q.choices)||q.choices.length!==4)return false;
  if(typeof q.correct!=="number"||q.correct<0||q.correct>3)return false;
  if(!q.correct_feedback||!q.mistake_type||!q.short_feedback)return false;
  if(!Array.isArray(q.wrong_analysis)||q.wrong_analysis.length!==3)return false;
  return true;
};
// legacy alias
const hasValidAnalysis=hasValidQuiz;

// ─── バリデーション（構造チェック＋意味チェック の2層） ───
const VALID_SUBJECTS=new Set(["国語","算数","英語","社会","理科"]);
// 外部ビジュアルへの参照が明確なパターン（図形・年表・発表など正当な語は除外）
const VISUAL_REF_RE=/グラフ|地図|イラスト|[次下右左上]の図|図を見|[次下右左上]の表|表を見/;
// 並び順依存の禁止表現（プロンプトルール「上記の全て」等）
const META_CHOICE_RE=/上記の全て|以上の全て|全て正しい|全て誤り/;

// 不合格時は棄却理由（短い文字列）、合格時は null を返す。
// localValidate(q) は localValidateReason(q)===null と等価。
const localValidateReason=q=>{
  if(!q||typeof q!=="object")return"not-object";
  const req=["question","correct_feedback","mistake_type","short_feedback","topic_tag","subject"];
  for(const k of req){if(!q[k]||typeof q[k]!=="string"||!q[k].trim())return`missing-field:${k}`;}
  if(q.question.length>300)return"question-too-long";
  if(!VALID_SUBJECTS.has((q.subject||"").trim()))return`subject-invalid:${q.subject}`;
  if(VISUAL_REF_RE.test(q.question))return`visual-ref:${(q.question.match(VISUAL_REF_RE)||[""])[0]}`;
  if(!Array.isArray(q.choices)||q.choices.length!==4)return"choices-not-4";
  if(q.choices.some(c=>!c||typeof c!=="string"||!c.trim()))return"empty-choice";
  if(q.choices.some(c=>c.length>100))return"choice-too-long";
  if(new Set(q.choices.map(c=>c.trim())).size!==4)return"duplicate-choices";
  if(META_CHOICE_RE.test(q.choices.join("|")))return"meta-choice";
  if(typeof q.correct!=="number"||!Number.isInteger(q.correct)||q.correct<0||q.correct>3)return"correct-out-of-range";
  if(!Array.isArray(q.wrong_analysis)||q.wrong_analysis.length!==3)return"wrong-analysis-len";
  if(q.wrong_analysis.some(wa=>!wa||typeof wa.why_chosen!=="string"||typeof wa.why_wrong!=="string"))return"wrong-analysis-shape";
  {
    const idxs=q.wrong_analysis.map(wa=>wa.index);
    if(idxs.some(i=>!Number.isInteger(i)||i<0||i>3))return"wa-index-range";
    if(idxs.includes(q.correct))return"wa-index-eq-correct";
    if(new Set(idxs).size!==3)return"wa-index-dup";
  }
  return null;
};
const localValidate=q=>localValidateReason(q)===null;

const calcMistakeTypes=(history)=>{
  const counts={};
  for(const r of(history||[])){
    if(!r.correct&&r.mistake_type){
      counts[r.mistake_type]=(counts[r.mistake_type]||0)+1;
    }
  }
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
};

// ─── 復習スケジューリング（SM-2 簡易版） ──────────────────────────────
// reps=0→1日後、reps=1→3日後、reps=2→7日後、reps=3→14日後、reps=4以降で卒業（削除）
const SM2_INTERVALS=[1,3,7,14];
const addDaysISO=(dateStr,n)=>{const d=new Date((dateStr||today())+"T00:00:00");d.setDate(d.getDate()+n);return d.toLocaleDateString('sv-SE');};
const advanceReviewItem=(item)=>{
  const reps=(item.reps||0)+1;
  // ※ 卒業条件が `reps > SM2_INTERVALS.length`（> 4）に見えるが、これはバグではない。
  //   reps=1〜4 のとき SM2_INTERVALS[reps-1] = [1,3,7,14] を順に参照して正しく動く。
  //   reps=5 になって初めて null を返す（卒業）。配列外参照は起きない。
  if(reps>SM2_INTERVALS.length)return null; // 卒業 → キューから永続削除
  return {...item,reps,dueDate:addDaysISO(today(),SM2_INTERVALS[reps-1]),lastReview:today()};
};
const isReviewDue=(item)=>!item.dueDate||item.dueDate<=today();
// 優先順: ①思い込みアラート(priority=true) → ②期日到来順
const sortReviewQueue=(queue)=>[...(queue||[])].sort((a,b)=>{
  if(!!a.priority!==!!b.priority)return a.priority?-1:1;
  return (a.dueDate||"").localeCompare(b.dueDate||"");
});
const firstDueReview=(queue)=>sortReviewQueue(queue).find(isReviewDue)||null;

// ─── 週次ミスパターン（今週 vs 先週）─────────────────────────────────
const calcWeeklyMistakeSummary=(history)=>{
  if(!history||!history.length)return null;
  const td=today();const now=new Date(td+"T00:00:00");
  const thisStart=new Date(now);thisStart.setDate(now.getDate()-6); // 直近7日（今日含む）
  const lastStart=new Date(now);lastStart.setDate(now.getDate()-13); // 先週7日
  const thisStr=thisStart.toLocaleDateString('sv-SE');
  const lastStr=lastStart.toLocaleDateString('sv-SE');
  const thisCnt={},lastCnt={};
  for(const r of history){
    if(r.correct||!r.mistake_type||!r.date)continue;
    if(r.date>=thisStr&&r.date<=td)thisCnt[r.mistake_type]=(thisCnt[r.mistake_type]||0)+1;
    else if(r.date>=lastStr&&r.date<thisStr)lastCnt[r.mistake_type]=(lastCnt[r.mistake_type]||0)+1;
  }
  const top=Object.entries(thisCnt).sort((a,b)=>b[1]-a[1])[0];
  if(!top)return null;
  const [type,cnt]=top;
  const prev=lastCnt[type]||0;
  return {type,thisCnt:cnt,prevCnt:prev,diff:cnt-prev,totalThis:Object.values(thisCnt).reduce((a,b)=>a+b,0)};
};

// ─── 直近の不正解ミス型（プライム表示用） ─────────────────────────────
const lastMistakeFromHistory=(history)=>{
  if(!history||!history.length)return null;
  for(let i=history.length-1;i>=0;i--){
    const r=history[i];if(!r.correct&&r.mistake_type)return r.mistake_type;
  }
  return null;
};

// ─── ミス型 → 子ども語 言い換えマップ（怒られてる感を消す） ─────────────
// 専門用語のままだと「責められてる」気がしてしまうので、できる版の言葉で覚える。
const KID_MISTAKE_LABELS={
  "条件読み落とし":"最後まで読めば取れた！",
  "条件読み落し":"最後まで読めば取れた！",
  "規則の過剰適用":"いつものルールを使いすぎた！",
  "符号ミス":"プラス・マイナスの見落とし！",
  "単位ミス":"単位を合わせるとOK！",
  "桁ミス":"桁を一つ見直そう！",
  "助詞の取り違え":"小さい言葉に気をつけよう！",
  "前置詞ミス":"小さい単語に気をつけよう！",
  "用語逆転":"言葉の向きを逆にすると正解！",
  "因果逆転":"原因と結果を入れ替えると正解！",
  "公式の混同":"使う公式を一つ確かめよう！",
  "用語の混同":"似た言葉を見分けよう！",
};
const kidifyMistakeType=(mt)=>{
  if(!mt)return"";
  if(KID_MISTAKE_LABELS[mt])return KID_MISTAKE_LABELS[mt];
  for(const k of Object.keys(KID_MISTAKE_LABELS)){
    if(mt.includes(k))return KID_MISTAKE_LABELS[k];
  }
  return mt; // マッピングが無ければ元のまま
};

// ─── ミス改善率（今週 vs 先週） ──────────────────────────────────
// 「今日の TOP ミス型」が「先週より何%減ったか」を子ども向けに返す。
// 改善があれば肯定メッセージ、悪化なら静かな注意喚起。
const calcMistakeImprovement=(history)=>{
  const w=calcWeeklyMistakeSummary(history);
  if(!w)return null;
  if(w.prevCnt<=0&&w.thisCnt<=0)return null;
  if(w.prevCnt<=0)return {type:w.type,deltaPct:null,direction:"new",msg:`今週は「${kidifyMistakeType(w.type)}」型のミスが見えてきたよ。意識すれば確実に減るやつ！`};
  const pct=Math.round(((w.thisCnt-w.prevCnt)/w.prevCnt)*100);
  const k=kidifyMistakeType(w.type);
  if(pct<=-50)return {type:w.type,deltaPct:pct,direction:"down",msg:`「${k}」が先週より半分以下！すごい！`};
  if(pct<0)return {type:w.type,deltaPct:pct,direction:"down",msg:`「${k}」が先週より${Math.abs(pct)}%減ったよ！その調子！`};
  if(pct===0)return {type:w.type,deltaPct:pct,direction:"flat",msg:`「${k}」は先週と同じ。あと少しで減る！`};
  return {type:w.type,deltaPct:pct,direction:"up",msg:`「${k}」が先週より${pct}%増えた。今日は意識してみよう！`};
};

// ─── 途中成功（partial success）の抽出 ──────────────────────────────
// 不正解でも「ここまでは合ってた」を 2-3 個拾う。子供は "全部ダメ" と感じると萎える。
// 失敗したミス型に該当しない領域は、概ね機能していたと見做す。
//   - 読解(条件・助詞・読み落とし) / 計算(符号・桁・単位) / 知識(公式・用語) の3軸
//   - 加えて自信度入力・復習挑戦・再挑戦の事実を拾う
// pure function, 状態を持たない。表示直前に呼ぶだけ。
const calcPartialSuccesses=(quiz,opts={})=>{
  const out=[];
  const mt=(quiz&&quiz.mistake_type)||"";
  const isReadMiss=/条件|助詞|前置詞|読み落と/.test(mt);
  const isCalcMiss=/符号|桁|単位/.test(mt);
  const isKnowMiss=/公式|用語|混同|逆転/.test(mt);
  if(!isReadMiss)out.push({icon:"📖",label:"条件は読めてた"});
  if(!isCalcMiss)out.push({icon:"🧮",label:"計算はしっかり"});
  if(!isKnowMiss)out.push({icon:"📚",label:"知識は引き出せた"});
  // 「答えを選びきれた」は "まだ習ってない" を選んでない場合に常に true
  if(opts.selectedChoice!==null&&opts.selectedChoice!==undefined)out.push({icon:"🎯",label:"最後まで考えた"});
  if(opts.wasRetry)out.push({icon:"🔄",label:"もう一回挑んだ"});
  if(opts.isReview)out.push({icon:"💪",label:"復習に挑戦中"});
  if(opts.confidenceRating)out.push({icon:"🤔",label:"手応えを言語化"});
  // 多すぎても主張過多なので 3 件まで。3 軸のうち失敗してない方を優先。
  return out.slice(0,3);
};

// ─── 親向け一言（parent-friendly praise）──────────────────────────────
// 親が子供に "正解した" 以外で褒めやすい一言を自動生成する。
// 親が褒める対象を増やすことが子供のやる気に効くため、最も褒め甲斐のあるシグナルを1つ選んで返す。
// 入力: logs（既存の累積）。出力: {title, body} | null
const calcParentPraise=(logs,grade)=>{
  if(!logs)return null;
  const td=today();
  const hist=logs.recentHistory||[];
  const low=isLowGrade(grade);
  const title=low?"きょうの ほめポイント":"今日はここを褒めてあげて";
  // 1. ミス改善率: 先週比で TOP ミス型が減っていれば最優先
  const imp=calcMistakeImprovement(hist);
  if(imp&&imp.direction==="down"){
    return {title,body:low
      ?`「${kidifyMistakeType(imp.type)}」が せんしゅうより ${Math.abs(imp.deltaPct)}% へったよ。じみだけど いちばん のびてる ちから。`
      :`「${kidifyMistakeType(imp.type)}」が先週より${Math.abs(imp.deltaPct)}%減っています。地味だけど一番伸びてる力です。`};
  }
  // 2. リトライからの正解（粘った）
  const today24=hist.filter(r=>r.date===td);
  let retryWins=0;
  for(let i=1;i<today24.length;i++){
    if(today24[i].correct&&!today24[i-1].correct)retryWins++;
  }
  if(retryWins>=1){
    return {title,body:low
      ?`まちがえた つぎに とりかえした かいすう ${retryWins} かい。「とちゅうで なげずに かんがえなおせた」が きょうの しゅやく。`
      :`不正解の次に正解を取り戻した回数 ${retryWins} 回。「途中で投げずに考え直せた」が今日の主役です。`};
  }
  // 3. ノルマ完遂 or 開始力
  const todayQ=logs.dailyLog?.[td]?.q||0;
  if(todayQ>=3&&(logs.loginStreak||0)>=2){
    return {title,body:low
      ?`${logs.loginStreak}にち つづけて とりくめてる！「つづける ちから」が しずかに そだってるよ。`
      :`${logs.loginStreak}日連続で取り組めています。「続ける力」が静かに育っています。`};
  }
  if(todayQ>=5){
    return {title,body:low
      ?`きょう ${todayQ} もんに ちょうせん。「さいごまで よむ」「えらびきる」を ${todayQ} かい くりかえした、それだけで じゅうぶんな せいちょう。`
      :`今日 ${todayQ} 問に挑戦。「最後まで読む」「選びきる」を ${todayQ} 回くり返した、それだけで十分な成長です。`};
  }
  // 4. 直近の自己ベスト連続
  if((logs.bestStreak||0)>=3){
    return {title,body:low
      ?`れんぞく せいかいの じこベストは ${logs.bestStreak} もん。「しゅうちゅうが きれずに つづけられた」しゅんかんが ちゃんと あったよ。`
      :`連続正解の自己ベストは ${logs.bestStreak} 問。「集中が切れずに続けられた」瞬間が確かにあります。`};
  }
  return null;
};

// ─── 探偵フレーバー（ミス探偵モード）─────────────────────────────────
// 「勉強してる」感を減らし「攻略してる」感に寄せるためのタグ。
// ミス型ごとに探偵風の呼び名を返す。CSS 上は小さなチップで添えるだけ。
const detectiveBadgeFor=(mistakeType)=>{
  if(!mistakeType)return {icon:"🔍",label:"ひっかけ解除"};
  if(/条件|読み落と|助詞|前置詞/.test(mistakeType))return {icon:"📖",label:"読み落としハンター"};
  if(/符号|桁|単位/.test(mistakeType))return {icon:"🧮",label:"うっかり計算スナイパー"};
  if(/因果|逆転/.test(mistakeType))return {icon:"🧭",label:"原因と結果の入替探偵"};
  if(/公式|用語|混同|過剰適用|規則/.test(mistakeType))return {icon:"🎭",label:"似てるルール見破り"};
  return {icon:"🔍",label:"勘違いハンター"};
};

const calcRecent100=h=>{if(!h||!h.length)return null;const last=h.slice(-100),c=last.filter(r=>r.correct).length;return{rate:Math.round(c/last.length*100),count:last.length};};
const calcSubjRates=h=>{if(!h||!h.length)return{};const m={};for(const r of h.slice(-100)){if(!m[r.subject])m[r.subject]={q:0,c:0};m[r.subject].q++;if(r.correct)m[r.subject].c++;}return m;};

// ─── 自動難易度判定 ───────────────────────────────────────────────
// 直近10問（指定科目）の正解率で easy / standard / hard を切り替える。
// 80% 以上 → 上げる / 40% 未満 → 下げる / それ以外は維持。
const getAutoDifficulty=(subj,logs)=>{
  const cur=(logs?.subjectDifficulty||{})[subj]||"standard";
  const recent=(logs?.recentHistory||[]).filter(r=>r.subject===subj).slice(-10);
  if(recent.length<5)return cur; // データ不足は維持
  const rate=recent.filter(r=>r.correct).length/recent.length;
  const order=["easy","standard","hard"];
  let idx=order.indexOf(cur);if(idx<0)idx=1;
  if(rate>=0.8&&idx<2)return order[idx+1];
  if(rate<0.4&&idx>0)return order[idx-1];
  return cur;
};

// ─── 成長スコア（旧「本日スコア」）計算 ──────────────────────────
// 「今日伸びた能力」(dailyStatGains[today] + 単元力 today) の合計。
// 20問連続正解で約300点 / 70%正答率20問で約200点 / 全問不正解でも80点。上限なし。
// ストリークボーナス（floor(streak/2)）が daily に含まれるため連続正解で大きく伸びる。
const calcTodayScore=(logs)=>{
  const td=today();
  const dg=logs?.dailyStatGains?.[td]||{};
  let score=0;
  for(const k of STAT_ORDER){score+=(dg[k]||0);}
  const ug=logs?.dailyUnitGains?.[td]||0;
  score+=ug;
  return{score:Math.floor(score),combo:0};
};

// ─── 累積ステータス（基本10項目） ─────────────────────────────────
// 基本ステータス。各科目の単元力（subjectUnitStats）と合わせて 1+5=6 カテゴリで表示する。
// 並び順は「学習プロセスの自然な流れ」に揃える：
//   ① 入口（やる気・始動）  : 開始力 → 継続力
//   ② 入力理解（読み解く）  : 読解力 → 論理整理
//   ③ 実行品質（丁寧に解く）: 集中力 → 注意力 → 確認力
//   ④ 立て直し（直す）      : 復帰力 → 再挑戦力 → 安定力
// 表示順は「今日伸びた pill」(line 4429-) で見える。基本ステ TOP5 は値ソートのため不変。
const STAT_LABELS={
  startingPower:    {name:"開始力",   icon:"🚀"},
  consistency:      {name:"継続力",   icon:"📅"},
  readingAccuracy:  {name:"読解力",   icon:"👁"},
  logicalReasoning: {name:"論理整理", icon:"🧩"},
  focus:            {name:"集中力",   icon:"🧠"},
  attention:        {name:"注意力",   icon:"👀"},
  verificationPower:{name:"確認力",   icon:"🔍"},
  retryPower:       {name:"復帰力",   icon:"💪"},
  retryAgain:       {name:"再挑戦力", icon:"🔁"},
  stability:        {name:"安定力",   icon:"⚖️"},
};
// 低学年（小1-3）向けのやさしい呼び名。icon は共通。表示時のみ name を差替える。
const EASY_STAT_LABELS={
  startingPower:    {name:"はじめる ちから",   icon:"🚀"},
  consistency:      {name:"つづける ちから",   icon:"📅"},
  readingAccuracy:  {name:"よみとる ちから",   icon:"👁"},
  logicalReasoning: {name:"せいりする ちから", icon:"🧩"},
  focus:            {name:"しゅうちゅう",       icon:"🧠"},
  attention:        {name:"よく みる ちから",   icon:"👀"},
  verificationPower:{name:"たしかめる ちから", icon:"🔍"},
  retryPower:       {name:"たちなおる ちから", icon:"💪"},
  retryAgain:       {name:"もういちど ちから", icon:"🔁"},
  stability:        {name:"あんてい",           icon:"⚖️"},
};
// 学年でラベルを切り替えるヘルパー。引数省略時は通常版。
const getStatLabel=(key,grade)=>(isLowGrade(grade)?EASY_STAT_LABELS:STAT_LABELS)[key]||STAT_LABELS[key];
const STAT_ORDER=["startingPower","consistency","readingAccuracy","logicalReasoning","focus","attention","verificationPower","retryPower","retryAgain","stability"];
// 旧 signControl キーは attention にマイグレーション
// ミスの型 → 対応ステータス
const mistakeToStat=mt=>{
  if(!mt)return"readingAccuracy";
  if(mt.includes("符号")||mt.includes("単位")||mt.includes("桁"))return"attention";
  if(mt.includes("条件")||mt.includes("助詞")||mt.includes("読み落とし")||mt.includes("前置詞"))return"readingAccuracy";
  if(mt.includes("因果")||mt.includes("用語逆転"))return"logicalReasoning";
  if(mt.includes("公式")||mt.includes("用語"))return"focus";
  return"readingAccuracy";
};
// ─── スコア設計（リセット版）─────────────────────────────────────
// 成長スコア（dailyStatGains 合計 + dailyUnitGains）を予測可能にするため、
// 「基本ゲイン」のみが daily に積まれる。ストリーク・リトライ等のボーナスは
// 累積ステータス (cumulativeStats) 側でのみ加算する（calcStatBonusesForAnswer 参照）。
//
//   correct → focus+2 / mistake関連+2  ＋ 単元+6 = 10/問 → 20問正解で 200点
//   wrong   → attention+1 / mistake関連+1 ＋ 単元+2 = 4/問  → 20問不正解で 80点
const calcStatGainsForAnswer=(correct,mistakeType,opts={})=>{
  const {streak=0,isFirst=false}=opts;
  const g={};STAT_ORDER.forEach(k=>g[k]=0);
  const stat=mistakeToStat(mistakeType);
  // 基本ゲイン
  if(correct){
    if(stat!=="focus")g.focus+=2;
    g[stat]+=2;
  }else{
    if(stat!=="attention")g.attention+=1;
    g[stat]+=1;
  }
  // 開始力ボーナス（今日初の1問だけ）
  if(isFirst){
    g.startingPower+=5;
  }
  // 連続正解ボーナス（daily に反映 → 成長スコアを伸ばす）
  //   streak=1 → 0, streak=2 → 1, streak=10 → 5, streak=20 → 10
  //   20問連続で累計 +100 → 200+100=300点
  if(correct && streak>=2){
    const bonus=Math.floor(streak/2);
    const half=Math.floor(bonus/2);
    g.stability+=half;
    g.consistency+=bonus-half; // 奇数余りは consistency 側へ
  }
  return g;
};
// 累積ステータス専用ボーナス（dailyStatGains には加算しない）。
// 連続ボーナスは daily 側（calcStatGainsForAnswer）に移動済み。
// ここはリトライ・復帰など「累積でしか効かない」差分を担う。
const calcStatBonusesForAnswer=(correct,opts={})=>{
  const {wasRetry=false,prevWrong=false}=opts;
  const g={};STAT_ORDER.forEach(k=>g[k]=0);
  if(correct){
    if(wasRetry)g.retryAgain+=6;   // 同問リトライ成功（cumul のみ）
    if(prevWrong)g.retryPower+=4;  // 直前ミス後の復帰（cumul のみ）
  }
  return g;
};
// 単元力（subjectUnitStats）の更新ポイント
//   correct: +6 / wrong: +2
const unitGainForAnswer=correct=>correct?6:2;

  {id:"mastery3",   icon:"🗺️",label:"単元マスター",     desc:"3単元を習熟した",                        cond:s=>Object.values(s.topicMastery||{}).filter(t=>t.mastered).length>=3},
  {id:"q100",       icon:"🗻",label:"100問の山",         desc:"累計100問を解いた",                      cond:s=>s.totalQ>=100},
  {id:"debug10",    icon:"⚖️",label:"バランス学習者",    desc:"全科目で正解率50%以上を達成",            cond:(s,subs)=>{const r=calcSubjRates(s.recentHistory);const sub=subs||SUBJECTS;return sub.every(sub=>r[sub]&&r[sub].q>=3&&r[sub].c/r[sub].q>=0.5);}},
  {id:"recent80",   icon:"🎯",label:"直近80%超え",       desc:"直近100問で正解率80%以上",               cond:s=>{const r=calcRecent100(s.recentHistory);return r&&r.count>=100&&r.rate>=80;}},
  // ─ とてもむずかしい ─
  {id:"debug50",    icon:"🎓",label:"科目マスター",      desc:"同じ科目で50問以上挑戦した",             cond:s=>{const r=calcSubjRates(s.recentHistory);return Object.values(r).some(v=>v.q>=50);}},
  {id:"month1",     icon:"🌙",label:"月の戦士",          desc:"30日連続で学習した",                     cond:s=>(s.bestLoginStreak||0)>=30},
  {id:"genius",     icon:"👑",label:"努力の天才",        desc:"累計300問を達成",                        cond:s=>s.totalQ>=300},
  {id:"runner",     icon:"🏃",label:"不屈のランナー",   desc:"累計365日学習した",                       cond:s=>Object.keys(s.dailyLog||{}).length>=365},
  {id:"legend",     icon:"💎",label:"レジェンド",        desc:"直近100問をすべて正解した",              cond:s=>{const r=calcRecent100(s.recentHistory);return r&&r.count>=100&&r.rate>=100;}},
];

/* ⑥⑦⑨⑪ トースト共通 */
@keyframes toast-in{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* iOS PWA のノッチ／ステータスバーと重ならないよう safe-area-inset を加算。
   インラインで top:20 や top:68 を当てているコードのため、CSS変数で扱う。 */
:root{--toast-top:max(20px, calc(env(safe-area-inset-top, 0px) + 12px));}
.toast-base{position:fixed;top:var(--toast-top);left:50%;transform:translateX(-50%);z-index:996;border-radius:18px;padding:12px 22px;font-weight:800;font-size:13px;text-align:center;animation:toast-in .4s cubic-bezier(.34,1.56,.64,1) both;max-width:calc(100vw - 32px);box-sizing:border-box;box-shadow:0 4px 20px rgba(0,0,0,.13)}
/* インラインで top:数値 を直書きしている要素も safe-area を上乗せ。
   .toast-shift クラスを付けると上にずれる（既存トーストでバナー時に top:68 を使うケース）。*/
.toast-safe{top:var(--toast-top) !important;}
.toast-safe.toast-shift{top:calc(var(--toast-top) + 48px) !important;}
/* ② あと1問ハイライト */
@keyframes norma-pulse{0%,100%{opacity:1}50%{opacity:.55}}
.norma-last{background:linear-gradient(135deg,#fef3c7,#fde68a)!important;border-color:#f59e0b!important;animation:norma-pulse 1s ease-in-out infinite}
/* ⑧ ボーナスボタン */
.btn-bonus{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#166534;border:2px solid #86efac;border-radius:14px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;transition:all .18s}
.btn-bonus:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(34,197,94,.25)}

/* ── 復帰モード ── */
.comeback-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.comeback-timer-num{font-size:28px;font-weight:900;color:#92400e;line-height:1;min-width:54px;text-align:center}
.comeback-bar-wrap{flex:1;height:6px;background:rgba(245,158,11,.2);border-radius:4px;overflow:hidden}
.comeback-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:4px;transition:width 1s linear}
.comeback-end-btn{background:rgba(239,68,68,.1);border:1.5px solid #ef4444;color:#ef4444;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── 累積ステータス ── */
.stat-params{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.stat-param-card{background:#f8f7ff;border:1.5px solid #e8e3ff;border-radius:12px;padding:8px 10px}
.stat-param-name{font-size:10px;font-weight:800;color:#9990cc;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.stat-param-val{font-size:18px;font-weight:900;color:#5b3ff8;line-height:1.1}
.stat-param-bar{height:4px;background:#e8e3ff;border-radius:2px;overflow:hidden;margin-top:5px}
.stat-param-fill{height:100%;background:linear-gradient(90deg,#5b3ff8,#9b59f8);border-radius:2px;transition:width .5s}

/* ── 今日伸びた能力 ── */
.today-gains{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.gain-pill{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;color:#166534}

/* ── 自信度セレクター ── */
.confidence-wrap{margin:10px 0 2px;border-top:1px solid #f0edff;padding-top:10px}
.confidence-label-txt{font-size:10px;font-weight:800;color:#9990cc;letter-spacing:.04em;margin-bottom:6px}
.confidence-row{display:flex;gap:5px}
.confidence-btn{flex:1;background:#f8f7ff;border:2px solid #e8e3ff;border-radius:10px;padding:9px 6px;font-size:12px;font-weight:800;color:#9990cc;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;line-height:1.5}
.confidence-btn:hover{border-color:#5b3ff8;color:#5b3ff8;background:#ede9ff}
.confidence-btn.c1.selected{background:#fff7f7;border-color:#ef4444;color:#991b1b}
.confidence-btn.c2.selected{background:#fffbeb;border-color:#f59e0b;color:#92400e}
.confidence-btn.c3.selected{background:#f0fdf4;border-color:#22c55e;color:#166534}

/* ─── ヘッダー再設計 ─── */
.hdr-card{padding:12px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.hdr-meta{display:flex;align-items:center;gap:6px}
.hdr-grade{font-size:11px;color:#9990cc;font-weight:700}
.hdr-fire{display:inline-flex;align-items:center;gap:2px;letter-spacing:-2px;font-size:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fde68a;border-radius:99px;padding:2px 8px}
.hdr-fire-n{margin-left:4px;letter-spacing:0;font-size:10px;font-weight:900;color:#92400e}
.hdr-mode-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-refill{font-size:10px;color:#9990cc;display:flex;align-items:center;gap:3px;font-weight:700}
.hdr-subject-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hdr-subject{font-size:22px;font-weight:900;color:#1e1e3a;letter-spacing:.02em;line-height:1.2}
.hdr-pills{display:flex;gap:5px;flex-wrap:wrap}
.hdr-stats{display:flex;gap:5px}
.pill-ok{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.pill-ng{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.pill-norma{background:#fef3c7;color:#92400e;border:1px solid #fde68a}

/* ─── 難易度ピル（ヘッダー） ─── */
.diff-pill{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:900;cursor:pointer;transition:all .18s;font-family:inherit;border-width:1.5px;border-style:solid}
.diff-pill.diff-easy{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e;color:#166534}
.diff-pill.diff-standard{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;color:#92400e}
.diff-pill.diff-hard{background:linear-gradient(135deg,#dc2626,#ef4444);border-color:#dc2626;color:#fff}

/* ─── 難易度セレクター（設定タブ） ─── */
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.diff-btn{background:#fff;border:2px solid #e8e3ff;border-radius:14px;padding:12px 6px;cursor:pointer;font-family:inherit;color:#9990cc;transition:all .18s;text-align:center}
.diff-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.diff-btn.on{box-shadow:0 4px 14px rgba(91,63,248,.12);transform:translateY(-1px)}

/* ─── 結果フェーズの強化 ─── */
.result-big-ok{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:2px solid #22c55e;border-radius:18px;padding:20px 16px;margin-bottom:12px;text-align:center;box-shadow:0 4px 18px rgba(34,197,94,.15);animation:result-slide-in .42s cubic-bezier(.22,1.2,.36,1) both}
.result-big-ng{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:18px;padding:18px 16px;margin-bottom:12px;box-shadow:0 4px 18px rgba(245,158,11,.12);animation:result-slide-in .42s cubic-bezier(.22,1.2,.36,1) both}
.result-big-icon{font-size:44px;margin-bottom:4px;animation:bounce .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes result-slide-in{0%{transform:translateY(-14px) scale(.97);opacity:0}60%{transform:translateY(3px) scale(1.01);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
.result-big-title{font-size:22px;font-weight:900;line-height:1.1}
.result-big-sub{font-size:12px;font-weight:700;opacity:.85;margin-top:4px}
.encourage-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#166534;font-weight:700;line-height:1.6}

/* ─── ノルマ3段階ドット ─── */
.norma-dots{display:flex;align-items:center;gap:6px;justify-content:center;margin:8px 0}
.norma-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;border:2px solid;transition:all .25s}
.norma-dot.done{background:#22c55e;border-color:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.3)}
.norma-dot.now{background:#fef3c7;border-color:#f59e0b;color:#92400e;animation:norma-pulse 1.2s ease-in-out infinite}
.norma-dot.todo{background:#fff;border-color:#fde68a;color:#fde68a}
.norma-line{flex:1;height:3px;background:#fde68a;border-radius:2px;max-width:32px;transition:background .3s}
.norma-line.done{background:#22c55e}

/* ─── 学習タブ：難易度ベース調整 ─── */
.diff-easy-soft .choice-btn{font-size:15px;padding:14px 16px;min-height:52px}
.diff-easy-soft .q-text{font-size:17px;line-height:1.85;padding:16px}

/* ─── 成長スコア演出 ────────────────────────────────── */
/* 成長ホップ: 1項目 0.4秒で順に跳ねる */
@keyframes growth-hop{0%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(34,197,94,0)}30%{transform:translateY(-10px) scale(1.06);box-shadow:0 8px 22px rgba(34,197,94,.35)}60%{transform:translateY(-2px) scale(1.02)}100%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(34,197,94,0)}}
.hop-anim{animation:growth-hop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes value-tick{0%{transform:scale(1);color:#5b3ff8}40%{transform:scale(1.25);color:#22c55e}100%{transform:scale(1)}}
.tick-anim{animation:value-tick .55s ease-out both;display:inline-block}

/* スコアカード: 1行表示にも対応 */
.stat-params-1col{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.stat-line{display:flex;align-items:center;gap:10px;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:12px;padding:8px 12px}
.stat-line .stat-line-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.stat-line .stat-line-name{font-size:12px;font-weight:800;color:var(--text-soft);min-width:62px;flex-shrink:0}
.stat-line .stat-line-bar{flex:1;height:6px;background:var(--input-border);border-radius:3px;overflow:hidden}
.stat-line .stat-line-bar > div{height:100%;background:linear-gradient(90deg,#5b3ff8,#9b59f8);border-radius:3px;transition:width .5s}
.stat-line .stat-line-val{font-size:15px;font-weight:900;color:var(--primary);min-width:36px;text-align:right}
.stat-line .rank-no{font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:99px;padding:1px 7px;flex-shrink:0;letter-spacing:.04em}
.stat-line .rank-no.r1{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.stat-line .rank-no.r2{background:linear-gradient(135deg,#cbd5e1,#94a3b8)}
.stat-line .rank-no.r3{background:linear-gradient(135deg,#fdba74,#c2410c)}
[data-theme="dark"] .stat-line{background:#1f1f35;border-color:#3a3a55}
[data-theme="dark"] .stat-line .stat-line-name{color:#aba6cf}
[data-theme="dark"] .stat-line .stat-line-val{color:#c4b5fd}

/* ── 復活ボーナス（ミス→次で正解）派手な演出 ──
   ・中央に大型ヒーロー、紙吹雪14片、3連リング、軽い揺れ
   ・transform/opacity だけで合成（reflow を起こさない）→ 瞬間負荷のみ
   ・pointer-events:none で操作を一切ブロックしない
*/
@keyframes revival-hero-in{0%{transform:translate(-50%,-50%) scale(.35) rotate(-6deg);opacity:0}45%{transform:translate(-50%,-50%) scale(1.18) rotate(2deg);opacity:1}70%{transform:translate(-50%,-50%) scale(.94) rotate(-1deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}}
@keyframes revival-hero-out{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.12);opacity:0}}
@keyframes revival-hero-shake{0%,100%{margin-left:0}25%{margin-left:-4px}75%{margin-left:4px}}
@keyframes revival-ring{0%{transform:translate(-50%,-50%) scale(.35);opacity:.75}100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}}
@keyframes revival-flake{0%{transform:translate(0,0) rotate(0);opacity:0}10%{opacity:1}100%{transform:translate(var(--dx,80px),var(--dy,120px)) rotate(var(--rot,360deg));opacity:0}}
@keyframes revival-aura{0%{box-shadow:0 0 0 0 rgba(236,72,153,.6),0 24px 64px rgba(124,58,237,.5)}50%{box-shadow:0 0 0 18px rgba(236,72,153,0),0 26px 70px rgba(124,58,237,.55)}100%{box-shadow:0 0 0 0 rgba(236,72,153,0),0 24px 64px rgba(124,58,237,.5)}}
.revival-overlay{position:fixed;inset:0;z-index:1500;pointer-events:none;overflow:hidden;will-change:contents}
.revival-hero{position:fixed;top:48%;left:50%;background:linear-gradient(135deg,#7c3aed 0%,#ec4899 55%,#f59e0b 100%);color:#fff;border-radius:24px;padding:18px 28px 16px;font-weight:900;text-align:center;max-width:88vw;letter-spacing:.02em;border:3px solid rgba(255,255,255,.4);animation:revival-hero-in .6s cubic-bezier(.34,1.56,.64,1) both,revival-aura 1.4s ease-in-out .55s 2}
.revival-hero .rh-shake{display:inline-block;animation:revival-hero-shake .42s ease-in-out .55s 2}
.revival-hero .rh-icon{font-size:46px;display:block;line-height:1;margin-bottom:6px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.28))}
.revival-hero .rh-big{font-size:22px;font-weight:900;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.22)}
.revival-hero .rh-sub{font-size:11.5px;font-weight:800;opacity:.95;margin-top:6px;letter-spacing:.06em;text-shadow:0 1px 4px rgba(0,0,0,.22)}
.revival-hero .rh-phrase{display:block;margin-top:8px;font-size:13px;font-weight:800;background:rgba(255,255,255,.22);border-radius:12px;padding:6px 10px;backdrop-filter:blur(2px)}
.revival-hero.fadeout{animation:revival-hero-out .35s ease-in both !important}
.revival-ring{position:fixed;top:48%;left:50%;width:130px;height:130px;border-radius:50%;border:5px solid #f0abfc;animation:revival-ring .95s ease-out both;pointer-events:none}
.revival-ring.r2{border-color:#fde68a;animation-delay:.08s;animation-duration:1.05s;border-width:4px}
.revival-ring.r3{border-color:#86efac;animation-delay:.18s;animation-duration:1.15s;border-width:3px}
.revival-flake{position:fixed;top:48%;left:50%;width:10px;height:14px;border-radius:2px;will-change:transform,opacity;animation:revival-flake 1.15s ease-out both;pointer-events:none}
[data-theme="dark"] .revival-hero{border-color:rgba(255,255,255,.5)}

/* ランクイン演出: TOP5入りトースト */
@keyframes rankin-pop{0%{transform:translate(-50%,-30px) scale(.6);opacity:0}50%{transform:translate(-50%,4px) scale(1.1);opacity:1}100%{transform:translate(-50%,0) scale(1);opacity:1}}
@keyframes celebration-pop{0%{transform:translateY(-12px) scale(.92);opacity:0}60%{transform:translateY(3px) scale(1.03);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
.rankin-toast{position:fixed;top:max(24px, calc(env(safe-area-inset-top, 0px) + 16px));left:50%;z-index:998;background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:18px;padding:12px 22px;font-weight:900;color:#92400e;box-shadow:0 8px 28px rgba(245,158,11,.45);animation:rankin-pop .55s cubic-bezier(.34,1.56,.64,1) both;font-size:13px;text-align:center;max-width:calc(100vw - 32px);box-sizing:border-box}
.rankin-toast .rankin-big{font-size:20px;font-weight:900;display:block;margin-bottom:2px}
.rankin-toast .rankin-spark{display:inline-block;animation:spark-spin 1.2s linear infinite}
@keyframes spark-spin{to{transform:rotate(360deg)}}

/* ─── 途中成功（ここまでは合ってた）──────────────── */
/* 不正解 UI で「全部ダメだった」感を打ち消すための小さなチップ列。 */
.partial-success-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:12px;padding:10px 12px;margin-bottom:10px}
.partial-success-label{font-size:10px;font-weight:900;color:#15803d;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.partial-success-pills{display:flex;flex-wrap:wrap;gap:6px}
.partial-success-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.7);border:1px solid #bbf7d0;border-radius:99px;padding:3px 10px;font-size:11.5px;font-weight:800;color:#166534;line-height:1.4}
[data-theme="dark"] .partial-success-box{background:#0f2a1a;border-color:#166534}
[data-theme="dark"] .partial-success-pill{background:rgba(0,0,0,.25);border-color:#15803d;color:#bbf7d0}
[data-theme="dark"] .partial-success-label{color:#bbf7d0}

/* ─── 探偵フレーバータグ ────────────────────────── */
/* "勉強してる" 感を減らすため、ミスタイプ脇に小さな攻略風タグを添える。 */
.detective-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(146,64,14,.08);border:1px solid rgba(146,64,14,.18);border-radius:99px;padding:1px 8px;font-size:9.5px;font-weight:900;color:#92400e;letter-spacing:.04em;margin-left:6px;vertical-align:middle}
[data-theme="dark"] .detective-tag{background:rgba(253,230,138,.12);border-color:rgba(253,230,138,.25);color:#fde68a}

/* ─── 親向け一言 ──────────────────────────────── */
.celebration-card.parent-praise{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-color:#fb7185;box-shadow:0 6px 22px rgba(251,113,133,.18)}
.celebration-card.parent-praise .celebration-title{color:#9f1239}
.celebration-card.parent-praise .celebration-body{color:#be123c}
[data-theme="dark"] .celebration-card.parent-praise{background:linear-gradient(135deg,#3a1c22,#4a1d2a);border-color:#fb7185}
[data-theme="dark"] .celebration-card.parent-praise .celebration-title{color:#fecdd3}
[data-theme="dark"] .celebration-card.parent-praise .celebration-body{color:#fda4af}

/* ─── 改善率トップバナー ───────────────────────── */
.improvement-banner{background:linear-gradient(135deg,#ecfeff,#cffafe);border:1.5px solid #22d3ee;border-radius:12px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#155e75;line-height:1.4}
.improvement-banner .ib-tag{background:#06b6d4;color:#fff;border-radius:6px;padding:2px 7px;font-size:9.5px;font-weight:900;letter-spacing:.04em;flex-shrink:0}
[data-theme="dark"] .improvement-banner{background:#0c2a30;border-color:#22d3ee;color:#a5f3fc}

/* ─── タイトル・ヒーロー（説得力強化）────────────── */
.hero-title{position:relative;text-align:center;padding:8px 0 4px}
.hero-logo{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#5b3ff8,#9b59f8);box-shadow:0 12px 32px rgba(91,63,248,.35),inset 0 1px 0 rgba(255,255,255,.4);margin-bottom:10px;position:relative;overflow:hidden}
.hero-logo::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.5) 0%, transparent 50%);pointer-events:none}
.hero-logo span{font-size:42px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.18))}
.hero-h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,#5b3ff8,#9b59f8 60%,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;letter-spacing:.01em;margin-bottom:4px}
.hero-sub{font-size:12px;font-weight:800;color:#9990cc;line-height:1.6;margin-bottom:4px}
.hero-tag{display:inline-block;background:rgba(91,63,248,.08);border:1px solid rgba(91,63,248,.18);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:800;color:#5b3ff8;margin-top:6px}

/* ─── APIキー＆ユーザー行 ────────────────────────── */
.kv-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.kv-row > input{margin-bottom:0 !important;flex:1;min-width:0}
.kv-icon-btn{flex-shrink:0;width:38px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:18px;font-weight:900;transition:all .15s}
.kv-icon-btn.del{background:#fee2e2;color:#991b1b}
.kv-icon-btn.del:hover{background:#fecaca;transform:scale(1.06)}
.kv-icon-btn.add{background:linear-gradient(135deg,#5b3ff8,#9b59f8);color:#fff;width:auto;padding:0 14px}

/* ─── ユーザースイッチャー ──────────────────────── */
